drunk miner is spoiling for a fight. You spot a wanted poster for Blackwood himself \u2014 dead or alive, $5000.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s2_gamble\">Sit down and gamble with the stranger</label>\n                <label for=\"s2_barfight\">Challenge the drunk miner to a fight</label>\n            </div>\n        </div>\n\n        <!-- SHERIFF BRANCH -->\n        <div id=\"scene1_sheriff\" class=\"scene\">\n            <pre>\n      .-------.\n      |       |\n      |  STAR |\n      |       |\n      '-------'\n        |   |\n        |   |\n    </pre>\n            <div class=\"story-text\">\n                Sheriff Dalton is a tired man with a grizzled beard. He offers you a deputy badge: \"Help me bring Blackwood in, and the reward is yours.\" But his deputy whispers that the gang has a spy in town. You can take the badge or pretend to join the gang as an informant.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s2_take_badge\">Pin on the deputy star</label>\n                <label for=\"s2_infiltrate\">Refuse the badge and offer to infiltrate the gang</label>\n            </div>\n        </div>\n\n        <!-- BADLANDS BRANCH -->\n        <div id=\"scene1_outskirts\" class=\"scene\">\n            <pre>\n       ~   ~\n      ~   ~   ~\n     ~   ~   ~\n      ~   ~   ~\n       ~   ~\n    ---+   +---\n       |   |\n    </pre>\n            <div class=\"story-text\">\n                The badlands are harsh and red. You come across an abandoned mine entrance, a rattlesnake coiled on a rock nearby, and, oddly, a satchel of dynamite sticks left behind by a careless prospector.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s2_snake_hill\">Try to grab the dynamite without disturbing the snake</label>\n                <label for=\"s4_hidden_gold\">Head deeper into the abandoned mine</label>\n            </div>\n        </div>\n\n        <!-- GAMBLE -->\n        <div id=\"scene2_gamble\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  Ace  \\\n     |  of   |\n     \\ Spades/\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                The stranger is Deadeye Jack, a former gunslinger. He offers a high-stakes game: if you win, he gives you his prized custom revolver. If you lose, you owe him a favor. You can play fair or try to cheat.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_win_gamble\">Play honestly and trust your luck</label>\n                <label for=\"s3_lose_gamble\">Try to palm an ace</label>\n            </div>\n        </div>\n\n        <!-- BARFIGHT -->\n        <div id=\"scene2_barfight\" class=\"scene\">\n            <pre>\n      ( )   ( )\n       |     |\n       |     |\n      / \\   / \\\n    </pre>\n            <div class=\"story-text\">\n                You and the miner trade blows. He's strong but slow. You can use a bottle on the bar, or fight him fair. The winner gets the respect of the saloon \u2014 and a clue about Blackwood's hideout.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_fight_win\">Fight fair and square</label>\n                <label for=\"s3_fight_lose\">Smash a bottle over his head</label>\n            </div>\n        </div>\n\n        <!-- TAKE BADGE -->\n        <div id=\"scene2_take_badge\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  STAR  \\\n     |   OF   |\n     \\  LAW   /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                As a deputy, you get a rifle and the authority to form a posse. The sheriff tells you the gang is hiding in Rattlesnake Canyon. You can lead a direct assault or try to cut them off at the pass.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_track_gang\">Lead the posse into the canyon</label>\n                <label for=\"s3_warn_sheriff\">Set up an ambush at the pass</label>\n            </div>\n        </div>\n\n        <!-- INFILTRATE -->\n        <div id=\"scene2_infiltrate\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  MASK  \\\n     |   OF   |\n     \\  LIES /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                You ride into Blackwood's camp pretending to be an outlaw. Blackwood is suspicious but offers you a place if you help rob the stagecoach. You can go along with the robbery or try to warn the sheriff.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_dynamite\">Join the stagecoach robbery and earn their trust</label>\n                <label for=\"s3_warn_sheriff\">Slip away and warn Sheriff Dalton</label>\n            </div>\n        </div>\n\n        <!-- SNAKE HILL -->\n        <div id=\"scene2_snake_hill\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  ~o~  \\\n     |   /|   |\n     \\  / \\  /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                You carefully reach for the dynamite. The rattlesnake uncoils but doesn't strike. You now have three sticks of dynamite. With these, you could blow the gang's hideout or sell them for a small fortune.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_ambush\">Use the dynamite to ambush Blackwood's hideout</label>\n                <label for=\"s4_horse_chase\">Ride to town and sell the dynamite</label>\n            </div>\n        </div>\n\n        <!-- GAMBLE WIN -->\n        <div id=\"scene3_win_gamble\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  = =  \\\n     |   ~   |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                You win fairly. Jack slides you a polished silver revolver engraved with \"Last Word\". He tells you: \"Blackwood's hiding in the old Spanish mission. Use that iron wisely.\" Armed and informed, you head out.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_duel_blackwood\">Ride to the mission and confront Blackwood</label>\n                <label for=\"s4_ambush\">Gather a posse and surround the mission</label>\n            </div>\n        </div>\n\n        <!-- GAMBLE LOSE -->\n        <div id=\"scene3_lose_gamble\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  X X  \\\n     |   ^   |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                Jack catches you cheating. He doesn't kill you, but you now owe him a blood debt. He forces you to ride with him to rob the Dry Gulch bank. You can go through with it or try to double-cross him.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_dynamite\">Reluctantly agree to the bank job</label>\n                <label for=\"s3_warn_sheriff\">Try to warn the sheriff about the robbery</label>\n            </div>\n        </div>\n\n        <!-- FIGHT WIN -->\n        <div id=\"scene3_fight_win\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  WIN  \\\n     |   !   |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                You knock the miner out cold. The saloon erupts in cheers. The bartender slides you a map: it shows a hidden trail to Blackwood's canyon hideout, a route the gang thinks no one knows.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_track_gang\">Follow the hidden trail alone</label>\n                <label for=\"s4_ambush\">Take the map to the sheriff and plan a trap</label>\n            </div>\n        </div>\n\n        <!-- FIGHT LOSE -->\n        <div id=\"scene3_fight_lose\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  LOSE \\\n     |   x   |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                The bottle shatters and the miner goes down hard. The crowd turns on you for fighting dirty. You are thrown out of the saloon. As you dust yourself off, you notice a figure watching from the shadows \u2014 one of Blackwood's men, impressed by your ruthlessness.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s2_infiltrate\">Follow the gang member to their camp</label>\n                <label for=\"s4_horse_chase\">Ignore him and ride out of town</label>\n            </div>\n        </div>\n\n        <!-- TRACK GANG (posse) -->\n        <div id=\"scene3_track_gang\" class=\"scene\">\n            <pre>\n      .-.   .-.\n     /   \\ /   \\\n     |   | |   |\n     \\   / \\   /\n      '-'   '-'\n    </pre>\n            <div class=\"story-text\">\n                Your posse corners the gang in the canyon. A fierce gunfight erupts. Blackwood challenges you to a duel \u2014 one shot each, winner takes all. You can accept or order your men to fire.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_duel_blackwood\">Accept the duel</label>\n                <label for=\"s4_ambush\">Open fire with the posse</label>\n            </div>\n        </div>\n\n        <!-- WARN SHERIFF -->\n        <div id=\"scene3_warn_sheriff\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  WARN \\\n     |   !   |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                You get word to the sheriff just in time. He sets up an ambush on the main road. You can join the ambush with a rifle or try to capture Blackwood alone for the full reward.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_ambush\">Join the sheriff's ambush</label>\n                <label for=\"s4_duel_blackwood\">Sneak away to face Blackwood one-on-one</label>\n            </div>\n        </div>\n\n        <!-- DYNAMITE -->\n        <div id=\"scene3_dynamite\" class=\"scene\">\n            <pre>\n      .___.\n      |!!!|\n      '---'\n    </pre>\n            <div class=\"story-text\">\n                With dynamite in hand, you have options. You can blow the entrance to the gang's hideout, trapping them inside, or use it during the stagecoach robbery to create chaos and steal the loot.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_ambush\">Blow the hideout entrance</label>\n                <label for=\"s4_horse_chase\">Use it to rob the stagecoach yourself</label>\n            </div>\n        </div>\n\n        <!-- DUEL BLACKWOOD -->\n        <div id=\"scene4_duel_blackwood\" class=\"scene\">\n            <pre>\n      \\   /\n       \\ /\n        O\n       / \\\n      /   \\\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: THE LAST GUNSLINGER</strong><br><br>\n                You and Blackwood face off at high noon. Your hand blurs to your holster. One shot rings out. Blackwood falls. You become the legend they'll sing about for generations: the drifter who brought justice to Dry Gulch.\n            </div>\n            <div class=\"choices\"><label for=\"s5_legend\">Continue</label></div>\n        </div>\n\n        <!-- AMBUSH -->\n        <div id=\"scene4_ambush\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  BANG \\\n     |   *   |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                The ambush works perfectly. The gang is captured or killed. The sheriff thanks you and hands you the full reward. You have enough money to buy a ranch and hang up your guns \u2014 but the West has a way of calling you back.\n            </div>\n            <div class=\"choices\"><label for=\"s5_sheriff_end\">Continue</label></div>\n        </div>\n\n        <!-- HORSE CHASE -->\n        <div id=\"scene4_horse_chase\" class=\"scene\">\n            <pre>\n      .-\"-. .-\"-.\n     /     X     \\\n     \\   / \\   /\n      '-'   '-'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: THE OUTLAW TRAIL</strong><br><br>\n                You take the money and run, leaving Dry Gulch behind. With a fast horse and a satchel of cash, you become a wanted man yourself \u2014 but a rich one. The open range is yours.\n            </div>\n            <div class=\"choices\"><label for=\"s5_outlaw\">Continue</label></div>\n        </div>\n\n        <!-- HIDDEN GOLD -->\n        <div id=\"scene4_hidden_gold\" class=\"scene\">\n            <pre>\n      .___. .___. .___.\n      |Au| |Au| |Au|\n      '---' '---' '---'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: GOLD FEVER</strong><br><br>\n                Deep in the mine, you strike a vein of gold. You become the wealthiest man in the territory, buying up the entire town. But wealth can't buy back the thrill of the gunfight. You often stand on your porch, staring at the sunset, wondering what could have been.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- LEGEND -->\n        <div id=\"scene5_legend\" class=\"scene\">\n            <pre>\n      * * * * *\n       *  *  *\n        *   *\n         * *\n          *\n    </pre>\n            <div class=\"story-text\">\n                <strong>TRUE ENDING: DUST AND LEAD</strong><br><br>\n                Your name becomes synonymous with justice in the frontier. Years later, a young boy asks you about the day you faced Blackwood. You just smile, tip your hat, and ride into the sunset. The legend never dies.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- OUTLAW -->\n        <div id=\"scene5_outlaw\" class=\"scene\">\n            <pre>\n      .-.   .-.\n     /   \\_/   \\\n     |         |\n     \\_________/\n    </pre>\n            <div class=\"story-text\">\n                <strong>TRUE ENDING: THE OUTLAW KING</strong><br><br>\n                You become the most feared outlaw in the West, always one step ahead of the law. The reward on your head climbs higher, but no jail can hold you. You live fast and free, the way the desert intended.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- SHERIFF END -->\n        <div id=\"scene5_sheriff_end\" class=\"scene\">\n            <pre>\n      .-------.\n      |       |\n      |  STAR |\n      |       |\n      '-------'\n    </pre>\n            <div class=\"story-text\">\n                <strong>TRUE ENDING: THE LAWMAN</strong><br><br>\n                You settle down as the new sheriff of Dry Gulch. The town thrives under your protection. Every so often, a young outlaw thinks they can take you. They're wrong. You wear the star with pride.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- DEAD (back to start) -->\n        <div id=\"scene5_dead\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  RIP  \\\n     |   |   |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: BURIED IN BOOT HILL</strong><br><br>\n                The desert takes another soul. Your story ends here, but someone else will ride into Dry Gulch someday. Maybe they'll have better luck.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n    </div>\n</body>\n</html>\n",
  "detective": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Choose Your Own Adventure</title>\n    <style>\n        :root {\n            --neon-pink: #ff44aa;\n            --neon-cyan: #00eeff;\n            --bg: #080012;\n            --dim: #4a1a5a;\n            --red: #ff3355;\n            --glow-street: rgba(255, 68, 170, 0.3);\n            --glow-office: rgba(0, 238, 255, 0.25);\n            --glow-alley: rgba(200, 100, 200, 0.2);\n            --glow-danger: rgba(255, 51, 85, 0.35);\n            --glow-truth: rgba(0, 238, 255, 0.4);\n        }\n        * { box-sizing: border-box; margin: 0; padding: 0; }\n        body {\n            background-color: #05000a;\n            color: var(--neon-pink);\n            font-family: 'Courier New', monospace;\n            margin: 0;\n            padding: 16px;\n            line-height: 1.55;\n            min-height: 100vh;\n            background-image: repeating-linear-gradient(0deg,\n                transparent, transparent 2px,\n                rgba(50, 10, 50, 0.03) 2px,\n                rgba(50, 10, 50, 0.03) 4px);\n            background-size: 100% 4px;\n        }\n        .game-container {\n            max-width: 720px;\n            margin: 0 auto;\n            border: 2px solid var(--neon-cyan);\n            padding: 28px 22px;\n            min-height: 82vh;\n            box-shadow: 0 0 20px var(--glow-street);\n            position: relative;\n            background: radial-gradient(ellipse at center,\n                rgba(20, 5, 35, 0.8) 0%,\n                rgba(2, 0, 5, 0.95) 70%);\n            transition: box-shadow 0.6s, border-color 0.6s, color 0.6s;\n        }\n        .env-street { box-shadow: 0 0 20px var(--glow-street); border-color: #cc44aa; color: #f0a0cc; }\n        .env-office { box-shadow: 0 0 20px var(--glow-office); border-color: #00bbdd; color: #a0f0ff; }\n        .env-alley { box-shadow: 0 0 20px var(--glow-alley); border-color: #8844aa; color: #d0a0f0; }\n        .env-danger { box-shadow: 0 0 20px var(--glow-danger); border-color: #cc2244; color: #ff8899; }\n        .env-truth { box-shadow: 0 0 20px var(--glow-truth); border-color: #00ddff; color: #e0f8ff; }\n        pre {\n            font-size: 13px;\n            white-space: pre;\n            text-align: center;\n            margin-bottom: 24px;\n            text-shadow: 0 0 6px currentColor;\n            letter-spacing: 0;\n            line-height: 1.25;\n            overflow-x: auto;\n            padding: 4px 0;\n            animation: flickerIn 1.2s ease-out;\n        }\n        @keyframes flickerIn {\n            0% { opacity: 0; text-shadow: 0 0 20px currentColor; }\n            15% { opacity: 0.4; text-shadow: 0 0 2px currentColor; }\n            25% { opacity: 0.7; text-shadow: 0 0 14px currentColor; }\n            35% { opacity: 0.5; }\n            50% { opacity: 0.9; text-shadow: 0 0 8px currentColor; }\n            100% { opacity: 1; text-shadow: 0 0 6px currentColor; }\n        }\n        .story-text {\n            font-size: 1.15rem;\n            margin-bottom: 28px;\n            text-align: center;\n            padding: 0 8px;\n            animation: fadeIn 0.5s ease-out;\n        }\n        @keyframes fadeIn {\n            from { opacity: 0; transform: translateY(10px); }\n            to { opacity: 1; transform: translateY(0); }\n        }\n        .choices { display: flex; flex-direction: column; gap: 13px; align-items: center; }\n        label {\n            display: inline-block;\n            border: 1px solid currentColor;\n            padding: 13px 26px;\n            cursor: pointer;\n            text-transform: uppercase;\n            letter-spacing: 1.5px;\n            transition: all 0.25s;\n            width: 82%;\n            text-align: center;\n            background: #0a0015;\n            font-weight: bold;\n            font-size: 0.9rem;\n            position: relative;\n            user-select: none;\n        }\n        label:hover {\n            background-color: currentColor;\n            color: #0a0015;\n            font-weight: bold;\n            box-shadow: 0 0 18px currentColor;\n            transform: scale(1.02);\n            letter-spacing: 2px;\n        }\n        label:active { transform: scale(0.97); }\n        label::before { content: '> '; opacity: 0; transition: opacity 0.2s; }\n        label:hover::before { opacity: 1; animation: blink 0.7s infinite; }\n        @keyframes blink { 0%,100%{ opacity:1; } 50%{ opacity:0.2; } }\n        input[type=\"radio\"] { display: none; }\n        .scene { display: none; animation: fadeIn 0.5s ease-out; }\n\n        /* STATE MACHINE */\n        #s0:checked ~ .game-container #scene0,\n        #s1_office:checked ~ .game-container #scene1_office,\n        #s1_alley:checked ~ .game-container #scene1_alley,\n        #s1_bar:checked ~ .game-container #scene1_bar,\n        #s2_check_file:checked ~ .game-container #scene2_check_file,\n        #s2_tail:checked ~ .game-container #scene2_tail,\n        #s2_interrogate:checked ~ .game-container #scene2_interrogate,\n        #s2_sneak:checked ~ .game-container #scene2_sneak,\n        #s3_lockpick:checked ~ .game-container #scene3_lockpick,\n        #s3_evidence:checked ~ .game-container #scene3_evidence,\n        #s3_confront:checked ~ .game-container #scene3_confront,\n        #s3_ambush_alley:checked ~ .game-container #scene3_ambush_alley,\n        #s4_boss:checked ~ .game-container #scene4_boss,\n        #s4_betrayal:checked ~ .game-container #scene4_betrayal,\n        #s4_truth:checked ~ .game-container #scene4_truth,\n        #s5_hardboiled:checked ~ .game-container #scene5_hardboiled,\n        #s5_shadows:checked ~ .game-container #scene5_shadows,\n        #s5_corrupt:checked ~ .game-container #scene5_corrupt,\n        #s5_dead_end:checked ~ .game-container #scene5_dead_end {\n            display: block;\n        }\n        @media (max-width: 500px) {\n            .game-container { padding: 16px 10px; min-height: 88vh; }\n            pre { font-size: 10px; }\n            .story-text { font-size: 0.95rem; }\n            label { width: 94%; padding: 11px 14px; font-size: 0.78rem; }\n        }\n    </style>\n</head>\n<body>\n<a href=\"#\" onclick=\"window.parent.showMenu();return false;\" style=\"color:white;cursor:pointer;\">Back to Home</a>\n    <input type=\"radio\" name=\"cyoa\" id=\"s0\" checked>\n    <input type=\"radio\" name=\"cyoa\" id=\"s1_office\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s1_alley\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s1_bar\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_check_file\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_tail\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_interrogate\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_sneak\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_lockpick\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_evidence\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_confront\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_ambush_alley\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_boss\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_betrayal\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_truth\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s5_hardboiled\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s5_shadows\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s5_corrupt\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s5_dead_end\">\n\n    <div class=\"game-container env-street\" id=\"gameBox\">\n\n        <!-- START -->\n        <div id=\"scene0\" class=\"scene\">\n            <pre>\n     /|\n    / |\n   /  |\n  /___|___\n |   |   |\n |   |   |\n |___|___|\n    / \\\n   /   \\\n  /     \\\n /       \\\n    </pre>\n            <div class=\"story-text\">\n                Rain slashes across the neon skyline of Veridian City. You're a private eye with a dead-end case and an empty bottle of whiskey. A dame just walked out. Your office phone rings \u2014 a tip about the murder of city councilman Vance. The caller hangs up. Three leads: the case file on your desk, a shadowy alley where Vance was last seen, or a dive bar where his enemies drink.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s1_office\">Reopen the Vance file on your desk</label>\n                <label for=\"s1_alley\">Head to the rain-soaked alley</label>\n                <label for=\"s1_bar\">Visit the Neon Dragon Bar</label>\n            </div>\n        </div>\n\n        <!-- OFFICE BRANCH -->\n        <div id=\"scene1_office\" class=\"scene\">\n            <pre>\n      .-------.\n      |  FILE  |\n      |  VANCE |\n      '-------'\n        | |\n        | |\n    </pre>\n            <div class=\"story-text\">\n                The file reveals Vance was investigating police corruption. A photo shows him with a woman known as \"Silk\", a criminal informant. You find a matchbook from the Neon Dragon bar tucked in the folder. A clue, or a trap?\n            </div>\n            <div class=\"choices\">\n                <label for=\"s2_check_file\">Call Silk to set a meeting</label>\n                <label for=\"s2_tail\">Tail the lead detective on the case, Detective Marlow</label>\n            </div>\n        </div>\n\n        <!-- ALLEY BRANCH -->\n        <div id=\"scene1_alley\" class=\"scene\">\n            <pre>\n     ~~~~ ~~~~\n     ~~~~~~~~\n     ~~~~~~~~\n     ~~~~|~~~~\n     ~~~~|~~~~\n     ~~~~|~~~~\n    </pre>\n            <div class=\"story-text\">\n                Puddles reflect flickering neon. You find a spent bullet casing and a torn piece of a police uniform. Someone was here before you. Suddenly, a figure in a trench coat bolts deeper into the alley. Give chase or search for more evidence?\n            </div>\n            <div class=\"choices\">\n                <label for=\"s2_sneak\">Chase the mysterious figure</label>\n                <label for=\"s3_evidence\">Scour the alley for more clues</label>\n            </div>\n        </div>\n\n        <!-- BAR BRANCH -->\n        <div id=\"scene1_bar\" class=\"scene\">\n            <pre>\n      .-------.\n      |  BAR  |\n      |  ~~~  |\n      '-------'\n        | |\n        | |\n    </pre>\n            <div class=\"story-text\">\n                The Neon Dragon reeks of smoke and jazz. The bartender, a man called Fix, knows everything for a price. He hints that a corrupt cop named Bullock was Vance's last meeting. Bullock is here, drinking at the back table. Do you confront him or just observe?\n            </div>\n            <div class=\"choices\">\n                <label for=\"s2_interrogate\">Slide into Bullock's booth and ask hard questions</label>\n                <label for=\"s2_tail\">Wait and tail Bullock when he leaves</label>\n            </div>\n        </div>\n\n        <!-- CHECK FILE / CALL SILK -->\n        <div id=\"scene2_check_file\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  RING \\\n     |  RING |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                Silk agrees to meet at the pier, but she's edgy. She tells you Vance was killed because he had evidence that the police commissioner is taking bribes from the mob. She gives you a key to Vance's safety deposit box. Now you have a target.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_lockpick\">Go to the bank and open the deposit box</label>\n                <label for=\"s3_confront\">Confront the commissioner directly with the info</label>\n            </div>\n        </div>\n\n        <!-- TAIL MARLOW -->\n        <div id=\"scene2_tail\" class=\"scene\">\n            <pre>\n      .-.   .-.\n     /   \\_/   \\\n     |   O O   |\n     \\_________/\n    </pre>\n            <div class=\"story-text\">\n                You shadow Marlow to an abandoned warehouse. He meets with a mob boss and hands over a folder. Marlow is dirty. You can gather photographic evidence or call the commissioner for backup.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_evidence\">Snap photos for proof</label>\n                <label for=\"s3_confront\">Rush in and catch them red-handed</label>\n            </div>\n        </div>\n\n        <!-- INTERROGATE BULLOCK -->\n        <div id=\"scene2_interrogate\" class=\"scene\">\n            <pre>\n      ( )  ( )\n       |    |\n       |    |\n      / \\  / \\\n    </pre>\n            <div class=\"story-text\">\n                Bullock snarls but you see the fear in his eyes. He admits he was ordered to clean up Vance's body. He gives you a lead: the murder weapon is hidden in the police evidence locker. You can use your lockpick skills or bluff your way in with a fake badge.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_lockpick\">Use the lockpick to break into the evidence locker</label>\n                <label for=\"s3_ambush_alley\">Create a distraction and grab the weapon</label>\n            </div>\n        </div>\n\n        <!-- CHASE FIGURE -->\n        <div id=\"scene2_sneak\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  RUN  \\\n     |   |   |\n     \\  / \\  /\n      '-' '-'\n    </pre>\n            <div class=\"story-text\">\n                You corner the figure \u2014 it's Silk, the informant. She's terrified and tells you the real killer is someone you trust. She gives you a bloodstained badge number. It belongs to your old partner, Detective Rourke. Now it's personal.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_confront\">Find Rourke and confront him</label>\n                <label for=\"s3_evidence\">Gather more evidence before making a move</label>\n            </div>\n        </div>\n\n        <!-- LOCKPICK / BANK -->\n        <div id=\"scene3_lockpick\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  KEY  \\\n     |   ~   |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                The deposit box contains a revolver and a signed confession from Vance naming the entire conspiracy. You now have the smoking gun. You can take it to the press or go straight to the District Attorney.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_truth\">Leak the confession to the press</label>\n                <label for=\"s4_boss\">Take it to the DA and risk police interference</label>\n            </div>\n        </div>\n\n        <!-- EVIDENCE GATHER -->\n        <div id=\"scene3_evidence\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  PHOTO \\\n     |   []   |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                You have crisp photos of Marlow's betrayal. You can use them to blackmail him for more names, or hand them to Internal Affairs and wash your hands.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_betrayal\">Blackmail Marlow for the full conspiracy</label>\n                <label for=\"s4_truth\">Hand evidence to Internal Affairs</label>\n            </div>\n        </div>\n\n        <!-- CONFRONT ROOKE/CAMPAIGN -->\n        <div id=\"scene3_confront\" class=\"scene\">\n            <pre>\n      \\   /\n       \\ /\n        O\n       / \\\n      /   \\\n    </pre>\n            <div class=\"story-text\">\n                You find Rourke at his apartment. He admits he killed Vance under orders from the mob. He offers you a cut to walk away. Your finger tightens on the trigger. Shoot him or bring him in?\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_boss\">Pull the trigger \u2014 justice served</label>\n                <label for=\"s4_betrayal\">Take the bribe and become part of the corruption</label>\n            </div>\n        </div>\n\n        <!-- AMBUSH ALLEY / DISTRACTION -->\n        <div id=\"scene3_ambush_alley\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  BANG \\\n     |   *   |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                The distraction works. You grab the murder weapon \u2014 a police-issue revolver with serial numbers filed. Ballistics will tie it to the commissioner. You now hold the entire case in your hands.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_truth\">Go public with the evidence</label>\n                <label for=\"s4_boss\">Confront the commissioner privately for a payoff</label>\n            </div>\n        </div>\n\n        <!-- BOSS / PULL TRIGGER -->\n        <div id=\"scene4_boss\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  DEAD \\\n     |   |   |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: HARD JUSTICE</strong><br><br>\n                You take down the corrupt powers that be, but the city doesn't change. You're a hero for a day, a target forever. Still, the rain sounds different now. Cleaner, somehow.\n            </div>\n            <div class=\"choices\"><label for=\"s5_hardboiled\">Continue</label></div>\n        </div>\n\n        <!-- BETRAYAL / BRIBE -->\n        <div id=\"scene4_betrayal\" class=\"scene\">\n            <pre>\n      .$$$  .$$$  .$$$\n      '---' '---' '---'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: THE DIRTY HAND</strong><br><br>\n                You take the money and bury the evidence. You become exactly what you once hunted. But the nightmares stop when you count the cash. The city stays the same. So do you.\n            </div>\n            <div class=\"choices\"><label for=\"s5_corrupt\">Continue</label></div>\n        </div>\n\n        <!-- TRUTH / PRESS -->\n        <div id=\"scene4_truth\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  NEWS \\\n     |   *   |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: THE FOURTH ESTATE</strong><br><br>\n                The headlines scream the truth. The commissioner resigns, the mob boss flees. You become a celebrated investigator, but you know there's another story around every corner. The neon never turns off.\n            </div>\n            <div class=\"choices\"><label for=\"s5_hardboiled\">Continue</label></div>\n        </div>\n\n        <!-- HARDBOILED FINAL -->\n        <div id=\"scene5_hardboiled\" class=\"scene\">\n            <pre>\n      ~~~~ ~~~~ ~~~~\n      ~~~~~~~~~~~~~\n      ~~~~~~~~~~~~~\n      ~~~~~~~~~~~~~\n    </pre>\n            <div class=\"story-text\">\n                <strong>TRUE ENDING: NEON SHADOWS</strong><br><br>\n                You walk the streets of Veridian City, a legend in the rain. Every shadow holds a story, and you'll be the one to tell it. The case is closed, but the city never sleeps \u2014 and neither do you.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- CORRUPT FINAL -->\n        <div id=\"scene5_corrupt\" class=\"scene\">\n            <pre>\n      .-.   .-.\n     /   \\_/   \\\n     |  MONEY  |\n     \\_________/\n    </pre>\n            <div class=\"story-text\">\n                <strong>TRUE ENDING: THE PRICE OF SILENCE</strong><br><br>\n                You're rich and untouchable. But sometimes, late at night, you see Vance's face in the mirror. The rain still falls, but it sounds like judgment.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- DEAD END -->\n        <div id=\"scene5_dead_end\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  RIP  \\\n     |   |   |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: CASE UNSOLVED</strong><br><br>\n                The streets claim another one. Your case file ends up in a cold storage box. Veridian City keeps its secrets, and you become one of them.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n    </div>\n</body>\n</html>\n",
  "underwater": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Choose Your Own Adventure</title>\n    <style>\n        :root {\n            --deep-blue: #1af;\n            --ocean-glow: rgba(17, 170, 255, 0.3);\n            --abyss-glow: rgba(0, 80, 180, 0.4);\n            --trench-glow: rgba(0, 40, 100, 0.6);\n            --danger-glow: rgba(255, 60, 60, 0.4);\n            --discovery-glow: rgba(10, 255, 180, 0.35);\n        }\n        * { box-sizing: border-box; margin: 0; padding: 0; }\n        body {\n            background: #000a14;\n            color: #a0e0ff;\n            font-family: 'Courier New', monospace;\n            padding: 16px;\n            line-height: 1.55;\n            min-height: 100vh;\n            background-image:\n                repeating-linear-gradient(0deg,\n                    transparent,\n                    transparent 3px,\n                    rgba(0, 40, 80, 0.03) 3px,\n                    rgba(0, 40, 80, 0.03) 6px);\n            background-size: 100% 6px;\n        }\n        .game-container {\n            max-width: 760px;\n            margin: 0 auto;\n            border: 2px solid var(--deep-blue);\n            padding: 28px 22px;\n            min-height: 82vh;\n            box-shadow: 0 0 25px var(--ocean-glow), inset 0 0 40px rgba(0, 100, 200, 0.04);\n            background: radial-gradient(ellipse at center,\n                    rgba(5, 25, 55, 0.75) 0%,\n                    rgba(0, 4, 10, 0.96) 70%);\n            transition: box-shadow 0.6s, border-color 0.6s, color 0.6s;\n        }\n        .env-abyss { box-shadow: 0 0 25px var(--abyss-glow); border-color: #06a; color: #c0e0ff; }\n        .env-trench { box-shadow: 0 0 25px var(--trench-glow); border-color: #048; color: #80c8ff; }\n        .env-danger { box-shadow: 0 0 25px var(--danger-glow); border-color: #b33; color: #ffaaaa; }\n        .env-discovery { box-shadow: 0 0 30px var(--discovery-glow); border-color: #0aa; color: #c0ffe0; }\n\n        pre {\n            font-size: 13px;\n            white-space: pre;\n            text-align: center;\n            margin-bottom: 24px;\n            text-shadow: 0 0 6px currentColor;\n            letter-spacing: 0;\n            line-height: 1.25;\n            overflow-x: auto;\n            padding: 4px 0;\n            animation: flickerIn 1.2s ease-out;\n        }\n        @keyframes flickerIn {\n            0% { opacity: 0; text-shadow: 0 0 20px currentColor; }\n            15% { opacity: 0.4; text-shadow: 0 0 2px currentColor; }\n            25% { opacity: 0.7; text-shadow: 0 0 14px currentColor; }\n            35% { opacity: 0.5; }\n            50% { opacity: 0.9; text-shadow: 0 0 8px currentColor; }\n            100% { opacity: 1; text-shadow: 0 0 6px currentColor; }\n        }\n        .story-text {\n            font-size: 1.15rem;\n            margin-bottom: 28px;\n            text-align: center;\n            padding: 0 8px;\n            animation: fadeIn 0.5s ease-out;\n        }\n        @keyframes fadeIn {\n            from { opacity: 0; transform: translateY(10px); }\n            to { opacity: 1; transform: translateY(0); }\n        }\n        .choices { display: flex; flex-direction: column; gap: 13px; align-items: center; }\n        label {\n            display: inline-block;\n            border: 1px solid currentColor;\n            padding: 13px 26px;\n            cursor: pointer;\n            text-transform: uppercase;\n            letter-spacing: 1.5px;\n            transition: all 0.25s;\n            width: 82%;\n            text-align: center;\n            background: #000a18;\n            font-weight: bold;\n            font-size: 0.9rem;\n            user-select: none;\n        }\n        label:hover {\n            background-color: currentColor;\n            color: #000a18;\n            box-shadow: 0 0 18px currentColor;\n            transform: scale(1.02);\n            letter-spacing: 2px;\n        }\n        label:active { transform: scale(0.97); }\n        label::before { content: '> '; opacity: 0; transition: opacity 0.2s; }\n        label:hover::before { opacity: 1; animation: blink 0.7s infinite; }\n        @keyframes blink { 0%,100%{ opacity:1; } 50%{ opacity:0.2; } }\n\n        input[type=\"radio\"] { display: none; }\n        .scene { display: none; animation: fadeIn 0.5s ease-out; }\n\n        /* STATE MACHINE */\n        #s0:checked ~ .game-container #scene0,\n        #s1_bell:checked ~ .game-container #scene1_bell,\n        #s1_ridge:checked ~ .game-container #scene1_ridge,\n        #s2_cave:checked ~ .game-container #scene2_cave,\n        #s2_trench:checked ~ .game-container #scene2_trench,\n        #s2_salvage:checked ~ .game-container #scene2_salvage,\n        #s3_search_cave:checked ~ .game-container #scene3_search_cave,\n        #s3_temple:checked ~ .game-container #scene3_temple,\n        #s3_descend:checked ~ .game-container #scene3_descend,\n        #s3_sonar:checked ~ .game-container #scene3_sonar,\n        #s3_leak:checked ~ .game-container #scene3_leak,\n        #s4_creature:checked ~ .game-container #scene4_creature,\n        #s4_relic:checked ~ .game-container #scene4_relic,\n        #s4_ancient:checked ~ .game-container #scene4_ancient,\n        #s4_secret_base:checked ~ .game-container #scene4_secret_base,\n        #s5_surface:checked ~ .game-container #scene5_surface,\n        #s5_lost:checked ~ .game-container #scene5_lost,\n        #s5_legacy:checked ~ .game-container #scene5_legacy,\n        #s5_deep:checked ~ .game-container #scene5_deep {\n            display: block;\n        }\n\n        @media (max-width: 500px) {\n            .game-container { padding: 16px 10px; min-height: 88vh; }\n            pre { font-size: 10px; }\n            .story-text { font-size: 0.95rem; }\n            label { width: 94%; padding: 11px 14px; font-size: 0.78rem; }\n        }\n    </style>\n</head>\n<body>\n<a href=\"#\" onclick=\"window.parent.showMenu();return false;\" style=\"color:white;cursor:pointer;\">Back to Home</a>\n    <input type=\"radio\" name=\"cyoa\" id=\"s0\" checked>\n    <input type=\"radio\" name=\"cyoa\" id=\"s1_bell\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s1_ridge\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_cave\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_trench\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_salvage\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_search_cave\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_temple\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_descend\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_sonar\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_leak\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_creature\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_relic\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_ancient\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_secret_base\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s5_surface\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s5_lost\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s5_legacy\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s5_deep\">\n\n    <div class=\"game-container env-abyss\" id=\"gameBox\">\n\n        <!-- START SCENE -->\n        <div id=\"scene0\" class=\"scene\">\n            <pre>\n     .   .   .   .\n       .   ~   .\n    .  ~~~  *  ~~~  .\n      ~~~~~ | ~~~~~\n     ~~~~~~ | ~~~~~~\n    ~~~~~~~~|~~~~~~~~\n    ~~~~~~~~|~~~~~~~~\n     ~~~~~ BATHY ~~~~\n      ~~~~~SPHERE~~~~\n       ~~~~~~~~~~~~\n    </pre>\n            <div class=\"story-text\">\n                Your bathysphere settles on the ocean floor, 4,000 meters below the surface. The abyss presses against the thick steel. Sonar shows a cliff to the west and a jagged ridge to the east. Your oxygen supply is finite. The radio crackles \u2014 your support ship can only wait so long.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s1_bell\">Explore the western cliff face</label>\n                <label for=\"s1_ridge\">Head east toward the jagged ridge</label>\n            </div>\n        </div>\n\n        <!-- CLIFF BRANCH -->\n        <div id=\"scene1_bell\" class=\"scene\">\n            <pre>\n      .   .\n     .   .\n        .   .\n       .   .\n      .   .\n     .   .\n        .   .\n    </pre>\n            <div class=\"story-text\">\n                The cliff plunges into deeper darkness. Bioluminescent creatures pulse along the rock face. You spot the entrance to an underwater cave, and just beyond it, a narrow trench that seems to swallow light itself.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s2_cave\">Swim into the luminous cave</label>\n                <label for=\"s2_trench\">Descend into the lightless trench</label>\n            </div>\n        </div>\n\n        <!-- RIDGE BRANCH -->\n        <div id=\"scene1_ridge\" class=\"scene\">\n            <pre>\n      ~~~  ~~~\n     ~~~~~~~~~\n    ~~~~~~~~~~~\n    ~~~~~~~~~~~\n     ~~~~~~~~~\n      ~~~~~~~\n    </pre>\n            <div class=\"story-text\">\n                The ridge is littered with the skeletal remains of a World War II submarine. The hull is cracked open, but something metallic glints inside. Nearby, a low-frequency sonar signal emanates from beneath the seafloor.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s2_salvage\">Enter the wreck to salvage the metal object</label>\n                <label for=\"s3_sonar\">Investigate the mysterious sonar signal</label>\n            </div>\n        </div>\n\n        <!-- CAVE BRANCH -->\n        <div id=\"scene2_cave\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  o o  \\\n     |  ~ ~  |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                The cave glows with strange fungi. Carved into the wall are symbols that predate any known civilization. You can take a piece of glowing coral as a sample, or press deeper into the tunnel where you hear a rhythmic thrumming.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_search_cave\">Take the coral and explore the symbols</label>\n                <label for=\"s3_temple\">Follow the thrumming sound deeper</label>\n            </div>\n        </div>\n\n        <!-- TRENCH BRANCH -->\n        <div id=\"scene2_trench\" class=\"scene\">\n            <pre>\n      \\   /\n       \\ /\n        V\n       / \\\n      /   \\\n    </pre>\n            <div class=\"story-text\">\n                The trench is impossibly deep. Your lights barely penetrate the gloom. Something enormous shifts below \u2014 a mass of tentacles and glowing eyes. You can try to communicate using the bathysphere's external lights, or flee back toward the cave.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_descend\">Signal the creature with lights</label>\n                <label for=\"s3_leak\">Retreat, but risk a hull leak from the pressure change</label>\n            </div>\n        </div>\n\n        <!-- SALVAGE BRANCH -->\n        <div id=\"scene2_salvage\" class=\"scene\">\n            <pre>\n      .-------.\n      | WRECK |\n      | BOX   |\n      '-------'\n    </pre>\n            <div class=\"story-text\">\n                Inside the submarine you find a sealed naval dispatch case. It contains a map of a secret underwater base, labeled \"Project Leviathan\". The base should be nearby. Do you follow the map or report it?\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_temple\">Follow the map to the secret base</label>\n                <label for=\"s3_sonar\">Head back to the sonar signal first</label>\n            </div>\n        </div>\n\n        <!-- CAVE EXPLORE -->\n        <div id=\"scene3_search_cave\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  RUNE  \\\n     |   /\\   |\n     \\  /  \\  /\n      '-'  '-'\n    </pre>\n            <div class=\"story-text\">\n                The symbols tell the story of a civilization that built a city at the bottom of the ocean to escape the surface world. They created a device called the \"Depth Key\" that could raise the city back to the light. The key is hidden nearby.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_relic\">Search for the Depth Key</label>\n                <label for=\"s4_creature\">Use the coral to attract a giant creature for help</label>\n            </div>\n        </div>\n\n        <!-- TEMPLE / BASE -->\n        <div id=\"scene3_temple\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  BASE  \\\n     |   __   |\n     \\  /  \\  /\n      '-'  '-'\n    </pre>\n            <div class=\"story-text\">\n                The thrumming leads you to an ancient structure, half-buried in the silt. It's not human. A doorway pulses with energy. You can enter the structure or plant a beacon and return later.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_ancient\">Step through the energy doorway</label>\n                <label for=\"s4_secret_base\">Plant the beacon and explore the secret base instead</label>\n            </div>\n        </div>\n\n        <!-- DESCEND / CREATURE -->\n        <div id=\"scene3_descend\" class=\"scene\">\n            <pre>\n      \\|/  \\|/\n       O    O\n      /|\\  /|\\\n    </pre>\n            <div class=\"story-text\">\n                The creature responds to your lights. It is a colossal cephalopod, but its skin ripples with patterns that mimic speech. It wraps a tentacle gently around the bathysphere and begins to carry you toward a glowing rift in the trench wall.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_ancient\">Let it guide you into the rift</label>\n                <label for=\"s4_creature\">Try to break free and escape</label>\n            </div>\n        </div>\n\n        <!-- SONAR -->\n        <div id=\"scene3_sonar\" class=\"scene\">\n            <pre>\n      ~~~   ~~~\n     ~~~~~~~~~\n     ~~~ o ~~~\n     ~~~~|~~~~\n     ~~~~|~~~~\n    </pre>\n            <div class=\"story-text\">\n                The sonar signal is a distress call from a forgotten deep-sea station, still broadcasting after 80 years. It contains coordinates to a hidden cache of technology that could change the world \u2014 or destroy it.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_secret_base\">Locate the secret base</label>\n                <label for=\"s4_relic\">Dive deeper to find the source of the signal</label>\n            </div>\n        </div>\n\n        <!-- LEAK -->\n        <div id=\"scene3_leak\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  HULL  \\\n     |  CRACK |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                A hairline crack hisses water. You manage to patch it, but you've lost precious oxygen. You must choose: make a desperate dash for the surface, or continue exploring knowing you have only minutes left.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s5_surface\">Emergency ascent to the surface</label>\n                <label for=\"s4_ancient\">Risk everything to discover the truth</label>\n            </div>\n        </div>\n\n        <!-- CREATURE -->\n        <div id=\"scene4_creature\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  GUARD \\\n     |   o_o  |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: THE GUARDIAN</strong><br><br>\n                The creature is the last guardian of the abyss. It spares you, but you surface with nothing but a tale of a living mountain in the deep. Scientists dismiss you, but you know the truth.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- RELIC -->\n        <div id=\"scene4_relic\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  KEY  \\\n     |   *   |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: THE DEPTH KEY</strong><br><br>\n                You find the key \u2014 a crystalline orb that hums with ancient power. When you raise it toward the surface, the seafloor trembles. The sunken city begins to rise. You become its first surface ambassador.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- ANCIENT -->\n        <div id=\"scene4_ancient\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  VAULT \\\n     |  OF    |\n     \\  AGES /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: THE FIRST ONES</strong><br><br>\n                You meet the architects of the abyss \u2014 beings of pure energy. They share the knowledge of millennia, and you return to the surface a changed person, carrying the wisdom of the deep.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- SECRET BASE -->\n        <div id=\"scene4_secret_base\" class=\"scene\">\n            <pre>\n      .-------.\n      | LEVI- |\n      | ATHAN |\n      '-------'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: PROJECT LEVIATHAN</strong><br><br>\n                The base contains a prototype submarine that can reach the deepest trenches. You climb aboard and set course for uncharted abyssal plains, leaving the surface world behind forever.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- SURFACE -->\n        <div id=\"scene5_surface\" class=\"scene\">\n            <pre>\n      *   *\n       *   *\n        * *\n         *\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: SURFACE AGAIN</strong><br><br>\n                You break through the waves, gasping. The support ship hauls you aboard. You survived, but the secrets of the abyss remain unknown. The ocean keeps its mysteries.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- LOST -->\n        <div id=\"scene5_lost\" class=\"scene\">\n            <pre>\n      ~~~~ ~~~~\n      ~~~~~~~~\n      ~~~~~~~~\n      ~~~~~~~~\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: CLAIMED BY THE DEEP</strong><br><br>\n                Your oxygen runs out. The bathysphere becomes your tomb. But the glowing life around you continues its eternal dance, indifferent to your passing.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- LEGACY -->\n        <div id=\"scene5_legacy\" class=\"scene\">\n            <pre>\n      .   .   .\n     .   .   .\n    .   .   .   .\n     .   .   .\n      .   .   .\n    </pre>\n            <div class=\"story-text\">\n                <strong>TRUE ENDING: ECHOES OF THE DEEP</strong><br><br>\n                You transmit everything you learned before your systems fail. The world listens. They name the trench after you. Your voice becomes the echo that changes humanity's understanding of the ocean \u2014 and themselves.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- DEEP -->\n        <div id=\"scene5_deep\" class=\"scene\">\n            <pre>\n      ~~~~ ~~~~\n      ~~~~~~~~\n      ~~~~~~~~\n      ~~~~~~~~\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: INTO THE ABYSS</strong><br><br>\n                You choose to stay. The abyss accepts you. You become a story told by future divers \u2014 the one who never came back, but whose lights can still be seen, deep in the trench, guiding the curious forward.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n    </div>\n\n</body>\n</html>\n",
  "prehistoric": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Choose Your Own Adventure</title>\n    <style>\n        :root {\n            --ember: #ff9933;\n            --flint: #cc5500;\n            --glow-ember: rgba(255, 153, 51, 0.3);\n            --glow-danger: rgba(255, 60, 20, 0.4);\n            --glow-spirit: rgba(255, 200, 100, 0.35);\n            --glow-ice: rgba(150, 220, 255, 0.3);\n        }\n        * { box-sizing: border-box; margin: 0; padding: 0; }\n        body {\n            background-color: #0a0400;\n            color: #f0b060;\n            font-family: 'Courier New', monospace;\n            padding: 16px;\n            line-height: 1.55;\n            min-height: 100vh;\n            background-image:\n                repeating-linear-gradient(0deg,\n                    transparent,\n                    transparent 2px,\n                    rgba(100, 40, 0, 0.04) 2px,\n                    rgba(100, 40, 0, 0.04) 4px);\n            background-size: 100% 4px;\n        }\n        .game-container {\n            max-width: 720px;\n            margin: 0 auto;\n            border: 2px solid var(--ember);\n            padding: 28px 22px;\n            min-height: 82vh;\n            box-shadow: 0 0 20px var(--glow-ember), inset 0 0 40px rgba(255, 100, 0, 0.03);\n            background: radial-gradient(ellipse at center,\n                    rgba(60, 20, 5, 0.8) 0%,\n                    rgba(5, 2, 0, 0.95) 70%);\n            transition: box-shadow 0.6s, border-color 0.6s, color 0.6s;\n        }\n        .env-spirit { box-shadow: 0 0 25px var(--glow-spirit); border-color: #aa6600; color: #f8d090; }\n        .env-danger { box-shadow: 0 0 25px var(--glow-danger); border-color: #aa3311; color: #ff9977; }\n        .env-ice { box-shadow: 0 0 25px var(--glow-ice); border-color: #5599bb; color: #c8e8ff; }\n\n        pre {\n            font-size: 13px;\n            white-space: pre;\n            text-align: center;\n            margin-bottom: 24px;\n            text-shadow: 0 0 6px currentColor;\n            letter-spacing: 0;\n            line-height: 1.25;\n            overflow-x: auto;\n            padding: 4px 0;\n            animation: flickerIn 1.2s ease-out;\n        }\n        @keyframes flickerIn {\n            0% { opacity: 0; text-shadow: 0 0 20px currentColor; }\n            15% { opacity: 0.4; text-shadow: 0 0 2px currentColor; }\n            25% { opacity: 0.7; text-shadow: 0 0 14px currentColor; }\n            35% { opacity: 0.5; }\n            50% { opacity: 0.9; text-shadow: 0 0 8px currentColor; }\n            100% { opacity: 1; text-shadow: 0 0 6px currentColor; }\n        }\n        .story-text {\n            font-size: 1.15rem;\n            margin-bottom: 28px;\n            text-align: center;\n            padding: 0 8px;\n            animation: fadeIn 0.5s ease-out;\n        }\n        @keyframes fadeIn {\n            from { opacity: 0; transform: translateY(10px); }\n            to { opacity: 1; transform: translateY(0); }\n        }\n        .choices { display: flex; flex-direction: column; gap: 13px; align-items: center; }\n        label {\n            display: inline-block;\n            border: 1px solid currentColor;\n            padding: 13px 26px;\n            cursor: pointer;\n            text-transform: uppercase;\n            letter-spacing: 1.5px;\n            transition: all 0.25s;\n            width: 82%;\n            text-align: center;\n            background: #150600;\n            font-weight: bold;\n            font-size: 0.9rem;\n            user-select: none;\n        }\n        label:hover {\n            background-color: currentColor;\n            color: #150600;\n            box-shadow: 0 0 18px currentColor;\n            transform: scale(1.02);\n            letter-spacing: 2px;\n        }\n        label:active { transform: scale(0.97); }\n        label::before { content: '> '; opacity: 0; transition: opacity 0.2s; }\n        label:hover::before { opacity: 1; animation: blink 0.7s infinite; }\n        @keyframes blink { 0%,100%{ opacity:1; } 50%{ opacity:0.2; } }\n        input[type=\"radio\"] { display: none; }\n        .scene { display: none; animation: fadeIn 0.5s ease-out; }\n\n        /* State machine rules \u2013 32 scenes */\n        #s0:checked ~ .game-container #scene0,\n        #s1_hunt:checked ~ .game-container #scene1_hunt,\n        #s1_gather:checked ~ .game-container #scene1_gather,\n        #s2_spear:checked ~ .game-container #scene2_spear,\n        #s2_trap:checked ~ .game-container #scene2_trap,\n        #s2_berries:checked ~ .game-container #scene2_berries,\n        #s2_medicinal:checked ~ .game-container #scene2_medicinal,\n        #s3_fight_cat:checked ~ .game-container #scene3_fight_cat,\n        #s3_cornered:checked ~ .game-container #scene3_cornered,\n        #s3_pit:checked ~ .game-container #scene3_pit,\n        #s3_mammoth:checked ~ .game-container #scene3_mammoth,\n        #s3_cave_poison:checked ~ .game-container #scene3_cave_poison,\n        #s3_heal:checked ~ .game-container #scene3_heal,\n        #s3_river:checked ~ .game-container #scene3_river,\n        #s4_chief:checked ~ .game-container #scene4_chief,\n        #s4_spirit:checked ~ .game-container #scene4_spirit,\n        #s4_fire:checked ~ .game-container #scene4_fire,\n        #s4_exile:checked ~ .game-container #scene4_exile,\n        #s4_tusk:checked ~ .game-container #scene4_tusk,\n        #s4_ice_path:checked ~ .game-container #scene4_ice_path,\n        #s4_poison_end:checked ~ .game-container #scene4_poison_end,\n        #s4_trade:checked ~ .game-container #scene4_trade,\n        #s5_legend:checked ~ .game-container #scene5_legend,\n        #s5_new_home:checked ~ .game-container #scene5_new_home,\n        #s5_shaman:checked ~ .game-container #scene5_shaman,\n        #s5_frozen:checked ~ .game-container #scene5_frozen,\n        #s5_honor:checked ~ .game-container #scene5_honor,\n        #s5_starve:checked ~ .game-container #scene5_starve,\n        #s5_discover:checked ~ .game-container #scene5_discover,\n        #s5_volcano:checked ~ .game-container #scene5_volcano,\n        #s5_tribe:checked ~ .game-container #scene5_tribe {\n            display: block;\n        }\n\n        @media (max-width: 500px) {\n            .game-container { padding: 16px 10px; min-height: 88vh; }\n            pre { font-size: 10px; }\n            .story-text { font-size: 0.95rem; }\n            label { width: 94%; padding: 11px 14px; font-size: 0.78rem; }\n        }\n    </style>\n</head>\n<body>\n<a href=\"#\" onclick=\"window.parent.showMenu();return false;\" style=\"color:white;cursor:pointer;\">Back to Home</a>\n    <input type=\"radio\" name=\"cyoa\" id=\"s0\" checked>\n    <input type=\"radio\" name=\"cyoa\" id=\"s1_hunt\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s1_gather\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_spear\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_trap\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_berries\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_medicinal\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_fight_cat\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_cornered\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_pit\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_mammoth\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_cave_poison\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_heal\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_river\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_chief\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_spirit\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_fire\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_exile\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_tusk\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_ice_path\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_poison_end\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_trade\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s5_legend\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s5_new_home\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s5_shaman\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s5_frozen\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s5_honor\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s5_starve\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s5_discover\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s5_volcano\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s5_tribe\">\n\n    <div class=\"game-container\" id=\"gameBox\">\n\n        <!-- SCENE 0 - START -->\n        <div id=\"scene0\" class=\"scene\">\n            <pre>\n       (   )\n      (     )\n     (  O O  )\n      (  ^  )\n       (___)\n        | |\n        | |\n       /   \\\n      /     \\\n    </pre>\n            <div class=\"story-text\">\n                You are a young hunter of the Red Elk clan. The elders speak of a vision: a land where the sun never sets and game is plenty. But the journey is dangerous. Wakai, the shaman, gives you a flint knife and a pouch of dried meat. Two paths lie beyond the camp: the hunting trail to the north, where mammoths roam, or the berry thickets to the south, where wise women gather herbs.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s1_hunt\">Take the hunting trail north</label>\n                <label for=\"s1_gather\">Go south to the berry thickets</label>\n            </div>\n        </div>\n\n        <!-- SCENE 1 - HUNT -->\n        <div id=\"scene1_hunt\" class=\"scene\">\n            <pre>\n      .   .\n     . ~ . ~ .\n    . ~~~~~ .\n     . ~~~ .\n      . ~ .\n        |\n        |\n    </pre>\n            <div class=\"story-text\">\n                The trail winds through tall grass. You spot a herd of mammoths, but also the tracks of a saber\u2011toothed cat. You can try to craft a spear from a nearby sapling, or dig a pit trap to catch the cat off guard.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s2_spear\">Craft a spear and prepare for a fight</label>\n                <label for=\"s2_trap\">Dig a pit trap to ambush the cat</label>\n            </div>\n        </div>\n\n        <!-- SCENE 1 - GATHER -->\n        <div id=\"scene1_gather\" class=\"scene\">\n            <pre>\n      .  .  .\n      . WWW .\n      . WWW .\n      .  .  .\n    </pre>\n            <div class=\"story-text\">\n                The thickets are rich with berries, but some plants have a dark, oily sheen. You can collect sweet, safe berries or search for medicinal herbs that might help your clan.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s2_berries\">Pick the safe berries</label>\n                <label for=\"s2_medicinal\">Search for medicinal herbs</label>\n            </div>\n        </div>\n\n        <!-- SCENE 2 - SPEAR -->\n        <div id=\"scene2_spear\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  FLINT \\\n     |   ||   |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                Your spear is ready. You climb a rocky outcrop and see the cat stalking a young mammoth. You can throw the spear now, or wait and try to scare it away with a war cry.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_fight_cat\">Hurl the spear at the cat</label>\n                <label for=\"s3_cornered\">Let out a war cry and bluff</label>\n            </div>\n        </div>\n\n        <!-- SCENE 2 - TRAP -->\n        <div id=\"scene2_trap\" class=\"scene\">\n            <pre>\n      .--.\n      |  |_\n      |    |\n      |____|\n    </pre>\n            <div class=\"story-text\">\n                The pit trap is deep. You cover it with branches and smear mammoth blood to lure the cat. From a safe distance, you wait. Hours pass. Then, a rumble \u2014 not from the cat, but a stampede of mammoths!\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_pit\">Hide near the trap and hope the cat falls in</label>\n                <label for=\"s3_mammoth\">Run toward the mammoth herd to escape the stampede</label>\n            </div>\n        </div>\n\n        <!-- SCENE 2 - BERRIES -->\n        <div id=\"scene2_berries\" class=\"scene\">\n            <pre>\n      .-. .-. .-.\n      |B| |B| |B|\n      '-' '-' '-'\n    </pre>\n            <div class=\"story-text\">\n                You fill your pouch with juicy berries. As you turn back, you see smoke rising from a cave in the distance. It could be a rival tribe \u2014 or a spirit. You can investigate the cave or return to camp.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_cave_poison\">Investigate the smoky cave</label>\n                <label for=\"s3_heal\">Return to camp and share the berries</label>\n            </div>\n        </div>\n\n        <!-- SCENE 2 - MEDICINAL -->\n        <div id=\"scene2_medicinal\" class=\"scene\">\n            <pre>\n      .-.   .-.\n      |H|   |H|\n      '-'   '-'\n    </pre>\n            <div class=\"story-text\">\n                You find rare healing leaves used to cure fever. A wounded fox lies nearby, its leg caught in a snare. You can free the fox, hoping it will lead you to something, or leave it and hurry back.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_heal\">Free the fox and follow it</label>\n                <label for=\"s3_river\">Ignore the fox and head toward the river</label>\n            </div>\n        </div>\n\n        <!-- SCENE 3 - FIGHT CAT -->\n        <div id=\"scene3_fight_cat\" class=\"scene\">\n            <pre>\n      ( )   ( )\n       |     |\n      / \\   / \\\n    </pre>\n            <div class=\"story-text\">\n                The spear flies true and wounds the cat. It retreats, but you are left with a choice: track it to finish the kill, or claim the mammoth calf it was stalking as your prize.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_chief\">Finish the cat and prove your bravery</label>\n                <label for=\"s4_tusk\">Take the mammoth calf back to camp</label>\n            </div>\n        </div>\n\n        <!-- SCENE 3 - CORNERED -->\n        <div id=\"scene3_cornered\" class=\"scene\">\n            <pre>\n      \\   /\n       \\ /\n        O\n       / \\\n      /   \\\n    </pre>\n            <div class=\"story-text\">\n                Your war cry only enrages the cat. It charges, and you are forced to climb a boulder. The cat circles below. You can try to leap onto its back, or wait for a chance to escape.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_spirit\">Leap onto the cat's back and wrestle it</label>\n                <label for=\"s4_exile\">Wait until it leaves, but risk losing your way</label>\n            </div>\n        </div>\n\n        <!-- SCENE 3 - PIT -->\n        <div id=\"scene3_pit\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  PIT  \\\n     |       |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                The cat falls into the trap, and the mammoths thunder past. You have a live, angry predator in your hole. You can kill it with spears, or try to tame it with food.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_chief\">Kill the cat and wear its pelt</label>\n                <label for=\"s4_spirit\">Try to befriend the cat</label>\n            </div>\n        </div>\n\n        <!-- SCENE 3 - MAMMOTH -->\n        <div id=\"scene3_mammoth\" class=\"scene\">\n            <pre>\n       ___\n      /   \\\n     |  O  |\n      \\___/\n       / \\\n      /   \\\n    </pre>\n            <div class=\"story-text\">\n                You run with the mammoths and find an ancient migration trail that leads to a hidden valley \u2014 the very place from the elders' vision. Do you explore the valley, or mark the path and return to guide your clan?\n            </div>\n            <div class=\"choices\">\n                <label for=\"s5_new_home\">Explore the hidden valley</label>\n                <label for=\"s5_legend\">Return to your clan and lead them here</label>\n            </div>\n        </div>\n\n        <!-- SCENE 3 - CAVE POISON -->\n        <div id=\"scene3_cave_poison\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  GAS  \\\n     |   !!  |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                Inside the cave, you find a bubbling pool of glowing liquid and strange carvings. Breathing the fumes makes you dizzy. You can scoop up some liquid as a weapon, or retreat before you pass out.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_fire\">Collect the glowing poison</label>\n                <label for=\"s4_poison_end\">Quickly escape the cave</label>\n            </div>\n        </div>\n\n        <!-- SCENE 3 - HEAL -->\n        <div id=\"scene3_heal\" class=\"scene\">\n            <pre>\n      .-.   .-.\n      |F|   |F|\n      '-'   '-'\n    </pre>\n            <div class=\"story-text\">\n                You free the fox. It limps toward a sacred grove, where a stone altar holds a necklace of mammoth ivory \u2014 a symbol of leadership. The fox disappears into the undergrowth. You can take the necklace, or leave it as an offering.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_chief\">Take the ivory necklace</label>\n                <label for=\"s4_spirit\">Leave the necklace and thank the spirits</label>\n            </div>\n        </div>\n\n        <!-- SCENE 3 - RIVER -->\n        <div id=\"scene3_river\" class=\"scene\">\n            <pre>\n      ~~~~ ~~~~\n      ~~~~~~~~\n      ~~~~~~~~\n    </pre>\n            <div class=\"story-text\">\n                At the river, you meet a fisher from the Pale Shell tribe. He offers you a trade: a strong fishing net for your flint knife. With the net, you could feed many. Without the knife, you are vulnerable.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_trade\">Trade your knife for the net</label>\n                <label for=\"s4_exile\">Refuse and keep your knife</label>\n            </div>\n        </div>\n\n        <!-- SCENE 4 - CHIEF -->\n        <div id=\"scene4_chief\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  CROWN \\\n     |   ^_^  |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: THE CHIEF</strong><br><br>\n                Your courage earns you the title of chief. You lead the Red Elk clan to prosperity, and your name is spoken in every campfire story for generations.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- SCENE 4 - SPIRIT -->\n        <div id=\"scene4_spirit\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  WISDOM \\\n     |   ~_~  |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: THE SHAMAN'S PATH</strong><br><br>\n                You learn to speak with the beasts and become the new shaman. The spirits guide your clan through hard winters, and you are remembered as a wise protector.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- SCENE 4 - FIRE -->\n        <div id=\"scene4_fire\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  FIRE  \\\n     |   *   |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: FIRE BRINGER</strong><br><br>\n                The glowing poison is volatile \u2014 you discover how to ignite it. You bring the secret of fire to your people, becoming a figure of myth.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- SCENE 4 - EXILE -->\n        <div id=\"scene4_exile\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  LOST  \\\n     |   ;_;  |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: THE EXILE</strong><br><br>\n                You wander alone, unable to return. The valley remains a dream. But even in solitude, you find peace with the wild. Your bones will rest among the stars.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- SCENE 4 - TUSK -->\n        <div id=\"scene4_tusk\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  TUSK  \\\n     |   | |  |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: THE PROVIDER</strong><br><br>\n                The mammoth calf provides meat for the whole clan. You are celebrated as a master hunter, and the clan grows strong under your stewardship.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- SCENE 4 - ICE PATH (from mammoth - but we have ice path? we'll use as a deeper fork) -->\n        <div id=\"scene4_ice_path\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  COLD  \\\n     |   >_<  |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                The mammoths lead you to a frozen pass. Beyond it, a green valley steams with warm springs
