id=\"s_defect5\">\n<input type=\"radio\" name=\"game\" id=\"s_east1\">\n<input type=\"radio\" name=\"game\" id=\"s_east2\">\n<input type=\"radio\" name=\"game\" id=\"s_east3\">\n<input type=\"radio\" name=\"game\" id=\"s_stasi1\">\n<input type=\"radio\" name=\"game\" id=\"s_stasi2\">\n<input type=\"radio\" name=\"game\" id=\"s_stasi3\">\n<input type=\"radio\" name=\"game\" id=\"s_stasi4\">\n<!-- Act 2b -->\n<input type=\"radio\" name=\"game\" id=\"s_kgb1\">\n<input type=\"radio\" name=\"game\" id=\"s_kgb2\">\n<input type=\"radio\" name=\"game\" id=\"s_kgb3\">\n<input type=\"radio\" name=\"game\" id=\"s_kgb4\">\n<!-- Act 3 -->\n<input type=\"radio\" name=\"game\" id=\"s_tunnel1\">\n<input type=\"radio\" name=\"game\" id=\"s_tunnel2\">\n<input type=\"radio\" name=\"game\" id=\"s_tunnel3\">\n<input type=\"radio\" name=\"game\" id=\"s_tunnel4\">\n<input type=\"radio\" name=\"game\" id=\"s_tunnel5\">\n<input type=\"radio\" name=\"game\" id=\"s_sewer1\">\n<input type=\"radio\" name=\"game\" id=\"s_sewer2\">\n<input type=\"radio\" name=\"game\" id=\"s_sewer3\">\n<input type=\"radio\" name=\"game\" id=\"s_cross1\">\n<input type=\"radio\" name=\"game\" id=\"s_cross2\">\n<input type=\"radio\" name=\"game\" id=\"s_cross3\">\n<input type=\"radio\" name=\"game\" id=\"s_cross4\">\n<input type=\"radio\" name=\"game\" id=\"s_cross5\">\n<!-- Act 4 -->\n<input type=\"radio\" name=\"game\" id=\"s_chase1\">\n<input type=\"radio\" name=\"game\" id=\"s_chase2\">\n<input type=\"radio\" name=\"game\" id=\"s_chase3\">\n<input type=\"radio\" name=\"game\" id=\"s_shot1\">\n<input type=\"radio\" name=\"game\" id=\"s_shot2\">\n<input type=\"radio\" name=\"game\" id=\"s_caught1\">\n<input type=\"radio\" name=\"game\" id=\"s_caught2\">\n<input type=\"radio\" name=\"game\" id=\"s_caught3\">\n<input type=\"radio\" name=\"game\" id=\"s_caught4\">\n<!-- Endings -->\n<input type=\"radio\" name=\"game\" id=\"e_dead\">\n<input type=\"radio\" name=\"game\" id=\"e_burned\">\n<input type=\"radio\" name=\"game\" id=\"e_traded\">\n<input type=\"radio\" name=\"game\" id=\"e_defected\">\n<input type=\"radio\" name=\"game\" id=\"e_doubled\">\n<input type=\"radio\" name=\"game\" id=\"e_cipher\">\n<input type=\"radio\" name=\"game\" id=\"e_free\">\n<input type=\"radio\" name=\"game\" id=\"e_true\">\n\n<div class=\"game-container\" id=\"gameBox\">\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     SCENE 0 \u2014 TITLE / BRIEFING\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<div id=\"scene0\" class=\"scene\">\n<pre>\n  _____ _   _ _____   ____  _____ ____    _     ___ _   _\n |_   _| | | | ____| | __ )| ____|  _ \\  | |   |_ _| \\ | |\n   | | | |_| |  _|   |  _ \\|  _| | |_) | | |    | ||  \\| |\n   | | |  _  | |___  | |_) | |___| |_\\ \\ | |___ | || |\\  |\n   |_| |_| |_|_____| |____/|_____|_|  \\ \\|_____|___|_| \\_|\n\n           ____  ___ ____  _   _ _____ ____\n          / ___|_ _|  _ \\| | | | ____|  _ \\\n         | |    | || |_) | |_| |  _| | |_) |\n         | |___ | ||  __/|  _  | |___|  _ <\n          \\____|___|_|   |_| |_|_____|_| \\_\\\n</pre>\n<span class=\"scene-tag\">// CLASSIFIED \u2014 EYES ONLY // OPERATION: BROKEN MIRROR // OCTOBER 1973 //</span>\n<div class=\"story-text\">\n    <p>The briefing file is stamped in red: <strong>MOST SECRET \u2014 DESTROY AFTER READING.</strong> You read it twice, then burn it in the hotel ashtray, just like they taught you. The ashes smell like trouble.</p>\n\n    <p>Your name, for the purposes of this operation, is <strong>Klaus Bergmann</strong> \u2014 West German antiquarian, traveling to East Berlin on a cultural exchange visa to examine pre-war manuscripts at the Humboldt University library. Your real name, your real employer, your real purpose: all of that is filed in a locked cabinet in Vauxhall Cross, London, and it stays there.</p>\n\n    <p>The actual mission: <strong>OPERATION BROKEN MIRROR.</strong> Three weeks ago, a senior <strong>KGB cryptographer</strong> named <strong>Aleksandr Volkov</strong> made contact with British intelligence through an intermediary in Vienna. Volkov claims to hold \u2014 in his head, not on paper \u2014 the complete algorithmic structure of <strong>SOVA-7</strong>, the Soviet cipher system currently protecting all Warsaw Pact military communications. SOVA-7 replaced the old system six months ago. Since then, GCHQ has been deaf and blind to Soviet military traffic. If Volkov's claim is genuine, SOVA-7 could be broken within weeks. The intelligence implications are staggering.</p>\n\n    <p>The problem: Volkov is having second thoughts. He wants guarantees London can't put in writing. He wants a face-to-face meeting with someone who can make promises. Someone with authority. Your station chief, <strong>Edith Marsh</strong>, decided that someone is you.</p>\n\n    <p>The second problem: your <strong>primary contact in East Berlin</strong>, an asset code-named <strong>SPARROW</strong>, has gone silent. Three missed signals. Either SPARROW has been rolled up by the Stasi, or SPARROW is compromised and waiting to hand you over. You don't know which. You have to find out before you can make contact with Volkov \u2014 because SPARROW was the only person who knew Volkov's location and schedule.</p>\n\n    <p>You crossed at Checkpoint Charlie this morning. Your papers are clean. Your cover is solid. Your handler, a cigarette-voiced woman in the Trade Mission building on Unter den Linden, slipped you a folded note with your safehouses and dead-drop locations. Then she walked away without looking back, which is either professionalism or a very bad sign.</p>\n\n    <p>You're standing on the corner of <strong>Karl-Marx-Allee</strong>, East Berlin, with a briefcase full of plausible manuscripts, a concealed 9mm Walther you'd rather not use, and approximately four hours before the Stasi begin their evening shift-change \u2014 the brief window when surveillance gaps open up and things can happen without official notice.</p>\n\n    <p>Your note listed three starting points. Choose carefully. In East Berlin, the wrong door is the last one you open.</p>\n\n    <p class=\"dim\">// The game has 8 endings and over 60 scenes. An attempt to find all paths and all endings should take 70\u201390 minutes at a comfortable reading pace. No JavaScript. The Wall is real. Choose well. //</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_safe1\">Go to the first safehouse \u2014 an antiquarian bookshop on Sch\u00f6nhauser Allee</label>\n    <label for=\"s_contact1\">Go directly to SPARROW's last known location \u2014 a caf\u00e9 near the Nikolaiviertel</label>\n    <label for=\"s_dead_drop1\">Check the dead-drop first \u2014 a loose brick behind the war memorial on Frankfurter Allee</label>\n</div>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     ACT 1 \u2014 BRANCH A: THE BOOKSHOP SAFEHOUSE\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<div id=\"scene_safe1\" class=\"scene\">\n<pre>\n   _____________________\n  |  ALTE B\u00dcCHER        |\n  |  Sch\u00f6nhauser Allee  |\n  |  Ge\u00f6ffnet 9-18 Uhr  |\n  |_____________________|\n  |  [ EINGANG ]        |\n  |__[ push ]___________|\n</pre>\n<span class=\"scene-tag\">// SAFEHOUSE ALPHA \u2014 SCH\u00d6NHAUSER ALLEE \u2014 14:22 //</span>\n<div class=\"story-text\">\n    <p>The bookshop is a narrow slice of accumulated dust between a bakery and a state-run tailor's. A bell announces your arrival. Shelves of yellowed paperbacks climb to the ceiling. The smell is magnificent: paper, old leather, something faintly chemical underneath that you recognize, after a moment, as developer fluid. Someone has a darkroom in the back.</p>\n\n    <p>The proprietor is a heavyset man in his sixties with the careful movements of someone who has survived several political systems by moving slowly and making no sudden decisions. His name \u2014 his <em>real</em> name \u2014 is <strong>Gerhard M\u00fcller</strong>. His code-name is <strong>ATLAS</strong>. He's been running the bookshop as a cover since 1961, when the Wall went up and suddenly there was money to be made in messages that needed to travel from one side to the other inside the spines of books.</p>\n\n    <p>He sees you, registers something behind his eyes, and says nothing for a full thirty seconds. Then: <em>\"You're early. Or late. I can never tell with you people.\"</em></p>\n\n    <p>You give the recognition phrase \u2014 <em>\"I'm looking for a 1938 Brecht, first edition, blue boards.\"</em></p>\n\n    <p>He disappears into the back. You wait. Outside, a Trabant coughs past. A woman with a string bag full of turnips stops to look at the window display and moves on. Normal. Everything looks normal, which in East Berlin means nothing.</p>\n\n    <p>M\u00fcller returns with a brown envelope and a very small cup of coffee. He sets both on the counter. <em>\"The coffee you drink here. The envelope you don't open until you're somewhere they can't see the windows.\"</em></p>\n\n    <p>You drink the coffee \u2014 it's ersatz, mostly chicory, the flavor of compromise \u2014 and look at him. <em>\"SPARROW,\"</em> you say. <em>\"What do you know?\"</em></p>\n\n    <p>His expression doesn't change, but something shifts beneath it. <em>\"SPARROW made contact with me six days ago. Said she'd been flagged by the district surveillance office. Someone informed. She was going to ground.\"</em> He pauses. <em>\"She left something for you. Inside the envelope. She said to tell you: 'the nest is compromised, but the eggs are safe.' I don't know what that means. I don't want to know.\"</em></p>\n\n    <p>You take the envelope. It's thin. <em>\"And Volkov?\"</em></p>\n\n    <p>At this, M\u00fcller actually glances at the door. <em>\"That name,\"</em> he says quietly, <em>\"does not exist in this shop. What I know \u2014 only this: there is a man who gives lectures at the Academy of Sciences on Tuesday afternoons. Philosophy of language. He takes the number 15 tram home. He always sits in the last car. He is very punctual.\"</em> He picks up a book and pretends to examine it. <em>\"Today is Tuesday.\"</em></p>\n\n    <p>It's 14:40. The number 15 tram runs on the half hour.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_safe2\">Open the envelope now, here in the shop \u2014 you need the information</label>\n    <label for=\"s_safe3\">Pocket the envelope and go immediately to catch the number 15 tram</label>\n    <label for=\"s_safe4\">Ask M\u00fcller more questions \u2014 something about his account doesn't add up</label>\n</div>\n</div>\n\n<div id=\"scene_safe2\" class=\"scene\">\n<pre>\n   [ ENVELOPE \u2014 CLASSIFIED ]\n   ________________________\n  | To: MIRROR             |\n  | Fr: SPARROW            |\n  | Date: 14 Oct 1973      |\n  | Re: VOLKOV / URGENT    |\n  |________________________|\n</pre>\n<span class=\"scene-tag\">// SAFE HOUSE \u2014 READING SPARROW'S MESSAGE \u2014 14:28 //</span>\n<div class=\"story-text\">\n    <p>M\u00fcller goes to stand near the front window as you open the envelope. You take this as his way of watching the street while giving you the fiction of privacy.</p>\n\n    <p>The message inside is written on thin paper in a careful, small hand \u2014 SPARROW's handwriting, you've seen it before on dead drops. She writes in German, which is her natural language, and you read it in the same:</p>\n\n    <p><em>\"Mirror \u2014 I've been flagged. Not formally arrested, but the district office has a file on me under my cover name. I think it came from within \u2014 someone inside the network knew too many details about my movements. Be careful about M\u00fcller. He is loyal but he talks when he drinks and he drinks more than he admits. The information about V. [Volkov] is as follows: he is not in East Berlin proper. He is at the Academy of Sciences residential conference center in K\u00f6penick, southeast of the city. Guest lecturer residency, ends Friday. After Friday he returns to Moscow and we lose him. He is in Room 14. He expects contact. The signal: leave a white handkerchief in the left breast pocket visible. He will say: 'Philosophy is the art of asking the wrong question.' You respond: 'And mathematics is the art of getting the right answer to it.' He wants three guarantees before he talks: full identity protection, passage to the UK not the US, and immunity for his daughter, who is studying medicine in Leningrad. He says she knows nothing. She probably doesn't. \u2014 SPARROW.\"</em></p>\n\n    <p>A postscript, added in a slightly different hand pressure, as though written later: <em>\"I don't know if I'm still safe. If I'm not, then whoever reads this is in more danger than they know. The mole in the network is close to the center. Don't trust the handoff point. Don't trust anything that comes from London through the Trade Mission. Someone there is feeding the Stasi. \u2014 S.\"</em></p>\n\n    <p>You fold the paper and eat it. Literal tradecraft: the paper is rice-based and dissolves quickly. You've tasted worse intelligence.</p>\n\n    <p>M\u00fcller is still at the window. He has not turned around. <em>\"Good news or bad?\"</em> he asks.</p>\n\n    <p><em>\"Both,\"</em> you say. <em>\"Mostly bad with a good center, like a chocolate you'd rather not bite into.\"</em></p>\n\n    <p>He almost smiles. <em>\"In East Germany, all chocolates are like this.\"</em></p>\n\n    <p>You have SPARROW's intelligence. Volkov is in K\u00f6penick, southeast of the city \u2014 at least an hour by tram. He expects contact before Friday. Today is Tuesday. You have a window.</p>\n\n    <p>But the warning about the Trade Mission mole troubles you. Your handler \u2014 the cigarette-voiced woman who gave you the note this morning \u2014 came from the Trade Mission.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_defect1\">Go directly to K\u00f6penick to make contact with Volkov \u2014 the window is narrow</label>\n    <label for=\"s_burned1\">Investigate the Trade Mission mole before anything else \u2014 if they know you're here, everything fails</label>\n    <label for=\"s_contact2\">Find SPARROW first \u2014 you need her corroboration and she may be in danger</label>\n</div>\n</div>\n\n<div id=\"scene_safe3\" class=\"scene\">\n<pre>\n   LINIE 15 \u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014>\n   [  ][ ][ ][ ][ ][ ][ ][ ]\n   HALTSTELLE: KARL-MARX-ALLEE\n   Abfahrt: 15:00 Uhr\n</pre>\n<span class=\"scene-tag\">// KARL-MARX-ALLEE TRAM STOP \u2014 14:52 //</span>\n<div class=\"story-text\">\n    <p>You pocket the envelope unopened and thank M\u00fcller with a handshake that conveys nothing and contains everything. Then you walk briskly toward the tram stop on Karl-Marx-Allee, threading through the grey afternoon crowds.</p>\n\n    <p>East Berlin has a particular quality of light in October \u2014 flat, diffuse, the color of old aluminum \u2014 that makes everyone look slightly ill and vaguely suspicious of their neighbors. Which, statistically, they should be. One in sixty-three East Germans was an informant for the Stasi at the height of the surveillance state. You think about this as you wait at the tram stop, watching faces.</p>\n\n    <p>The number 15 arrives at 15:00 exactly. You board the rear car as instructed and find a seat near the back. The car is maybe half full: a factory worker sleeping against the window, two women with shopping bags discussing the price of pork, a student reading something that isn't quite hidden under his arm \u2014 you can see the edge of a Western paperback, which in East Germany is either bravery or stupidity or both.</p>\n\n    <p>Three stops later, a man gets on and sits four seats ahead of you. Late fifties. Round-shouldered. A good grey suit that is slightly too well-cut for a state academic salary, unless he supplements that salary with something London pays for. He sits down, arranges his briefcase on his lap, and stares out the window with the focused inattention of a man pretending not to notice everything.</p>\n\n    <p>This, you are fairly certain, is <strong>Aleksandr Volkov</strong>.</p>\n\n    <p>You're not prepared. You have no white handkerchief visible \u2014 it's in your breast pocket, but tucked in, not displayed. You haven't read SPARROW's note. You don't have the recognition phrase. But you <em>are</em> on the tram, and he <em>is</em> here, and sometimes in this business the unprepared moment is the only moment you get.</p>\n\n    <p>He glances at you in the window's reflection. Just once. Then looks away. He does this three more times in the next two minutes. He's looking for something.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_defect2\">Pull out your handkerchief and make the visible signal \u2014 improvise the recognition phrase</label>\n    <label for=\"s_safe2\">Ride the tram and do nothing \u2014 get off at the next stop, read SPARROW's note, come back prepared tomorrow</label>\n    <label for=\"s_contact3\">Follow him when he gets off \u2014 don't signal, just track his location for later</label>\n</div>\n</div>\n\n<div id=\"scene_safe4\" class=\"scene\">\n<pre>\n   [  ALTE B\u00dcCHER  ]\n   BACK ROOM \u2014 PRIVATE\n   ///////////////////\n   Something is wrong.\n</pre>\n<span class=\"scene-tag\">// THE BOOKSHOP \u2014 SOMETHING DOESN'T FIT \u2014 14:35 //</span>\n<div class=\"story-text\">\n    <p>You don't leave. Instead, you set your briefcase on the counter and look at M\u00fcller steadily. He's put on the expression of a man waiting for a bus \u2014 patient, unconcerned \u2014 which is exactly the expression someone wears when they're trying to seem unconcerned.</p>\n\n    <p><em>\"SPARROW said she'd been flagged six days ago,\"</em> you say. <em>\"But the last dead-drop signal from her was eight days ago. If she'd already been flagged when she came to you, why would she have sent the signal two days <strong>before</strong> she knew she was in trouble?\"</em></p>\n\n    <p>M\u00fcller is quiet for a long time. Then: <em>\"Perhaps I misremembered the day.\"</em></p>\n\n    <p><em>\"Or perhaps you've been asked to tell me that story.\"</em></p>\n\n    <p>He sets the book down. When he turns to face you, something in his posture has shifted \u2014 not threatening, but honest, which in a spy is almost more alarming than threatening. <em>\"Sit down,\"</em> he says. <em>\"I'll make more coffee.\"</em></p>\n\n    <p>The second cup is real coffee \u2014 West German, smuggled in through the book trade \u2014 and he pours it like a man making a confession.</p>\n\n    <p><em>\"Two days ago, a man came to the shop. Not Stasi \u2014 I know their smell. KGB. He knew SPARROW's real name. He knew my codename. He said that SPARROW had already been taken, that the network was compromised, and that anyone who continued operating would be swept up within the week. He offered me a choice: continue as normal, pass messages as normal, but allow him to \u2014 monitor \u2014 what passed through me. Or be arrested.\"</em></p>\n\n    <p>He meets your eyes. <em>\"I chose to continue. But I am telling you now, which was not part of his arrangement.\"</em></p>\n\n    <p>You consider this. <em>\"The envelope you gave me \u2014 is the message in it genuine?\"</em></p>\n\n    <p><em>\"I believe so. SPARROW left it before the KGB man came. He didn't find it \u2014 it was inside a hollowed Brecht, which is either ironic or appropriate.\"</em> He almost smiles. <em>\"He gave me a message to pass to anyone who came. It is this: Volkov is not the asset. Volkov is bait. The real prize is you \u2014 your identity, your network. They want to know who runs British operations in East Germany. If you meet Volkov, you walk into a KGB trap.\"</em></p>\n\n    <p>He pauses. <em>\"I am telling you this because I have children in West Berlin, and I would like to see them again, and helping the KGB roll up a British network is not a deed that ages well.\"</em></p>\n\n    <p>The envelope sits on the counter between you. It might contain truth, or it might contain a perfectly constructed lie designed to send you somewhere useful to the wrong people.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_burned1\">Believe M\u00fcller \u2014 abort the Volkov contact, investigate the KGB trap instead</label>\n    <label for=\"s_contact2\">Disbelieve him \u2014 he's been turned, everything he says is disinformation. Find SPARROW yourself.</label>\n    <label for=\"s_kgb1\">Play it through \u2014 M\u00fcller may be right that it's a trap, but you can spring it on your terms</label>\n</div>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     ACT 1 \u2014 BRANCH B: THE CAF\u00c9 / SPARROW\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<div id=\"scene_contact1\" class=\"scene\">\n<pre>\n  ____________________\n |  CAF\u00c9 VOLKSGARTEN  |\n |  Nikolaiviertel    |\n |  Kaffee u. Kuchen  |\n |____________________|\n  | O  |  O  |  O   |\n  |____|_____|______|\n   Tables for the watched\n    and the watchers.\n</pre>\n<span class=\"scene-tag\">// NIKOLAIVIERTEL \u2014 CAF\u00c9 VOLKSGARTEN \u2014 14:18 //</span>\n<div class=\"story-text\">\n    <p>The Nikolaiviertel is the oldest part of East Berlin \u2014 medieval lanes and rebuilt facades, a Potemkin village of historical authenticity plastered over the ruins of the war. The caf\u00e9 sits on a corner where two narrow streets intersect, and it has the specific quality of a place where everyone is pretending they haven't noticed the person at the next table.</p>\n\n    <p>SPARROW's last known position was a corner table, near the window, where she would sit with a crossword and a small pot of tea on Tuesdays and Thursdays. She's been your most reliable asset for three years. She's also \u2014 though you've never met her in person, only seen her file photo \u2014 the reason twelve other operations have succeeded without casualties.</p>\n\n    <p>Her table is occupied. Not by her.</p>\n\n    <p>A man sits there instead. Mid-forties, unremarkable, with the deliberate unremarkability of a professional. He has ordered tea. He has an unfinished crossword. He is reading it upside down, which is a detail so small that it almost doesn't register until it does, and then it hits you like a fist: he's watching the reflection in the window using the pen as a reference point.</p>\n\n    <p>Stasi. Or KGB. Either way, SPARROW's table is burned.</p>\n\n    <p>You order a coffee at the counter, lean against the bar like a man with nowhere pressing to be, and observe. After four minutes, you've catalogued three more: one near the door reading a newspaper he hasn't turned a page of, one at the back corner with a coffee he hasn't touched, and the waitress herself, who is making too many trips to the window table with unnecessary refills.</p>\n\n    <p>Four watchers for one empty table. Either SPARROW is expected to come back here, which means she doesn't know they're waiting \u2014 or this is an ambush point, and they're waiting for you.</p>\n\n    <p>Your coffee arrives. It's terrible. You drink it anyway. Leaving too quickly is as conspicuous as staying too long.</p>\n\n    <p>Then you notice something. On the windowsill above SPARROW's usual table, between a dying plant and a stack of menus: a very small red mark. A smear, like a lipstick stain, on the white windowsill. SPARROW's emergency signal. She was here. She left a warning. She's still operating.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_contact2\">Leave the caf\u00e9 \u2014 go to SPARROW's secondary location, the bookbinder's on Linienstrasse</label>\n    <label for=\"s_burned2\">The watchers have made you \u2014 play the tourist and bluff your way out cleanly</label>\n    <label for=\"s_dead_drop2\">Check whether there's a secondary dead drop hidden in this caf\u00e9 \u2014 SPARROW might have left more</label>\n</div>\n</div>\n\n<div id=\"scene_contact2\" class=\"scene\">\n<pre>\n   BUCHBINDEREI KREUZMANN\n   Linienstrasse 44\n   Berlin-Mitte\n   ___________\n  | Reparatur |\n  | von alten |\n  | B\u00fcchern   |\n  |___________|\n</pre>\n<span class=\"scene-tag\">// BUCHBINDEREI KREUZMANN \u2014 LINIENSTRASSE \u2014 15:10 //</span>\n<div class=\"story-text\">\n    <p>The bookbinder's is a different kind of quiet from the bookshop \u2014 the quiet of concentration, of craft, of someone doing a precise thing in a small space. The smell of glue and vellum is strong. A radio plays classical music at low volume. East German Radio, which plays Beethoven and Brahms and nothing written after 1945 that would require acknowledging the existence of the West.</p>\n\n    <p>Behind the counter, a small woman with severe glasses and ink-stained fingers looks up. She has the face of someone who has survived by being difficult to read, which means you can't read her, which means she's almost certainly <strong>SPARROW</strong>.</p>\n\n    <p><em>\"I need a book repaired,\"</em> you say, in German. <em>\"The spine is coming apart. It's a first edition \u2014 I'd rather not lose it.\"</em></p>\n\n    <p><em>\"Bring it tomorrow,\"</em> she says. <em>\"I'm very busy today.\"</em> Her eyes, behind the glasses, are doing something more complicated than her voice.</p>\n\n    <p>You set your briefcase on the counter and turn it so the lock faces her. A small detail: the lock combination is set to a number that means nothing to you but means everything to her. She would have given that number to London two years ago. It's a last-resort recognition.</p>\n\n    <p>She looks at the lock combination for a very long moment. Then: <em>\"I close at six. If you'd like to wait, I might have time to look at it then.\"</em> She turns back to her work. <em>\"There's a chair in the back.\"</em></p>\n\n    <p>You go to the back. It's a workshop \u2014 tools, half-repaired bindings, a skylight that lets in the flat grey afternoon. And SPARROW herself, two minutes later, who closes the workshop door and stands against it and looks at you with the eyes of someone who has been frightened for days and is managing it through sheer professionalism.</p>\n\n    <p><em>\"They took two of our people last week,\"</em> she says, without preamble. <em>\"Hauser and the student, Rolf. The Stasi have a transcript of a meeting that only four people attended. One of them is me, one of them is dead, and the other two are in London.\"</em> She pauses. <em>\"Someone in London is feeding them our internal communications. Not just operational traffic. Internal memos. Read-backs. Things that never leave the building.\"</em></p>\n\n    <p>She gives you everything she knows about Volkov's location and schedule \u2014 he's at the Academy of Sciences residential center in K\u00f6penick, southeast of the city, Room 14. His residency ends Friday. The recognition phrases. His three conditions: identity protection, UK not US, his daughter's immunity.</p>\n\n    <p>Then she tells you something that SPARROW's note in the bookshop didn't include \u2014 because this is SPARROW herself, not a note, and she can say what paper can't safely carry.</p>\n\n    <p><em>\"Volkov knows there's a mole,\"</em> she says. <em>\"He's known for six months. He told his KGB handlers that he suspected a penetration of British intelligence. They believed him. They've been using him as bait \u2014 running a double operation to identify the mole by seeing what information gets back to Moscow through which channel.\"</em></p>\n\n    <p>She looks at you directly. <em>\"The mole in London is real. Volkov is also real. He genuinely wants to come over. But the KGB is monitoring his contact \u2014 which means the moment you make contact with him, the clock starts. You have maybe six hours before they move.\"</em></p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_defect1\">Go directly to K\u00f6penick \u2014 you understand the timeline, six hours is enough</label>\n    <label for=\"s_east1\">Go with SPARROW's recommendation: hit the KGB's local monitoring post first, blind them, then extract Volkov</label>\n    <label for=\"s_burned1\">The mole in London changes everything \u2014 signal for an abort before this mission compromises the entire network</label>\n</div>\n</div>\n\n<div id=\"scene_contact3\" class=\"scene\">\n<pre>\n   TRAM LINE 15\n   Eastbound: K\u00f6penick-Gr\u00fcnau\n   Next stop: Tierpark\n   [ following subject \u2014 maintaining distance ]\n</pre>\n<span class=\"scene-tag\">// TRAM LINE 15 \u2014 SURVEILLANCE \u2014 15:22 //</span>\n<div class=\"story-text\">\n    <p>You make the decision not to signal. You sit and watch, and wait, and think.</p>\n\n    <p>Volkov \u2014 if it is Volkov \u2014 rides the tram with the composure of a man who has done this every Tuesday for several weeks and has stopped noticing the journey. He checks his watch. He looks out the window. Once, he reads a small notebook, flipping through it with the practised speed of someone reviewing notes before a lecture, then puts it away.</p>\n\n    <p>He gets off at the Tierpark stop. You follow, maintaining forty meters. The streets around the Tierpark \u2014 the East Berlin zoo \u2014 are tree-lined and relatively quiet, and following someone discreetly here requires a certain commitment to the fiction of being on a pleasant afternoon walk, which you attempt.</p>\n\n    <p>He walks southeast for seven minutes and enters a residential compound you recognize \u2014 from the trade description in your briefing materials \u2014 as the Academy of Sciences guest accommodation. Three buildings around a central courtyard. A guard post at the entrance that he passes through with a wave and a badge.</p>\n\n    <p>You have his location. You don't have access.</p>\n\n    <p>You turn the problem over as you walk back to the tram stop. The compound has one entrance \u2014 the guarded gate \u2014 and several windows at ground level that face a narrow service lane on the eastern side. The service lane has a door marked for deliveries.</p>\n\n    <p>You also note, before you go, that a grey Wartburg sedan has been parked at the corner of the service lane for what looks like several hours \u2014 the windscreen has a thin film of condensation on the inside that suggests occupants have been sitting there for a long time. Watchers. Not necessarily watching Volkov. Possibly watching the lane itself. Possibly watching you watching.</p>\n\n    <p>This city watches everything. The only privacy in East Berlin is the inside of your own skull, and sometimes even that feels occupied.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_defect3\">Come back tomorrow with a delivery pretext \u2014 plan the approach properly</label>\n    <label for=\"s_east2\">The grey Wartburg is a Stasi surveillance post \u2014 neutralize it first, then approach Volkov tonight</label>\n    <label for=\"s_safe2\">Go back to the bookshop and read SPARROW's message \u2014 you need the recognition phrases before you can do anything</label>\n</div>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     ACT 1 \u2014 BRANCH C: THE DEAD DROP\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<div id=\"scene_dead_drop1\" class=\"scene\">\n<pre>\n  FRANKFURTER ALLEE\n  War Memorial \u2014 East Berlin\n  [  brick  ]  [  brick  ]\n  [ LOOSE > ]  [  brick  ]\n  [  brick  ]  [  brick  ]\n  \u2014 dead drop location \u2014\n</pre>\n<span class=\"scene-tag\">// FRANKFURTER ALLEE \u2014 WAR MEMORIAL \u2014 14:05 //</span>\n<div class=\"story-text\">\n    <p>The war memorial on Frankfurter Allee is a serious piece of stone \u2014 a Soviet soldier, twice life-size, facing west with an expression of socialist determination. The plaque lists the dead with careful completeness. People walk past it every day without looking at it, which is its own kind of memorial.</p>\n\n    <p>The loose brick is behind the fourth course from the base on the memorial's western face, in the shadow of a decorative pillar. You've never used this drop before, but you know the method: press the brick, feel for movement, slide it two centimeters. If there's something there, it'll be in a waterproofed tube the size of a lipstick.</p>\n\n    <p>You time your approach for when the foot traffic is maximum \u2014 the after-lunch crowd of office workers returning from the state canteen. You stop to tie your shoe beside the pillar. Your hand finds the brick. Pressure. Movement. A slight grating sound, barely audible over the street noise.</p>\n\n    <p>There's something there. A tube.</p>\n\n    <p>You close your hand around it and stand, continuing your walk naturally. The whole thing takes four seconds. Nobody looked. Probably.</p>\n\n    <p>In the sheltered doorway of a nearby apartment building, you open the tube. Inside: a tightly rolled strip of paper, SPARROW's handwriting, in German. You read it fast, the way they trained you, absorbing quickly rather than reading slowly.</p>\n\n    <p>It's an emergency dump \u2014 SPARROW's entire current intelligence, compressed into a single message. It tells you: Volkov is at the Academy of Sciences guest quarters in K\u00f6penick, Room 14. Recognition phrases. His conditions. The deadline: Friday. And a warning \u2014 the dead drop at the bookshop has been compromised, <em>do not go to the bookshop</em>. The Stasi know about M\u00fcller. He's been turned or he's under surveillance. The caf\u00e9 near the Nikolaiviertel is also burned.</p>\n\n    <p>And then, at the bottom, added in a more urgent hand: <em>\"I don't have time for the secondary message. There's something wrong with Volkov's situation \u2014 I don't know what yet. Be careful. Trust the recognition phrase, not the face. \u2014 S.\"</em></p>\n\n    <p>You roll the paper up and swallow it. Rice paper. Dissolves in twenty seconds. It tastes like warnings and very faint chamomile.</p>\n\n    <p>Both of your other starting points \u2014 the bookshop and the caf\u00e9 \u2014 are burned. The intelligence points to one place: K\u00f6penick. But SPARROW's last line nags at you. <em>Trust the recognition phrase, not the face.</em> What does that mean? That Volkov might not look like his file photo? That someone else might be presenting themselves as Volkov?</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_defect1\">Go directly to K\u00f6penick \u2014 you have the recognition phrases and the location</label>\n    <label for=\"s_dead_drop2\">Find SPARROW \u2014 the incomplete message suggests she knows something critical she didn't have time to write</label>\n    <label for=\"s_stasi1\">Investigate what's wrong with Volkov's situation before making contact \u2014 the warning is too specific to ignore</label>\n</div>\n</div>\n\n<div id=\"scene_dead_drop2\" class=\"scene\">\n<pre>\n  CAF\u00c9 VOLKSGARTEN\n  Under the second table from the window \u2014\n  [ chewing gum \u2014 SPARROW's mark ]\n  [ message capsule \u2014 embedded ]\n</pre>\n<span class=\"scene-tag\">// NIKOLAIVIERTEL \u2014 SECONDARY DEAD DROP \u2014 14:40 //</span>\n<div class=\"story-text\">\n    <p>You know SPARROW's habits. If she burned her primary position in the caf\u00e9 but hadn't yet been physically lifted, she would have left something. She always leaves something. It's a compulsion, a professional tic \u2014 the need to communicate even when communication is dangerous.</p>\n\n    <p>You order a second coffee and move to a different table \u2014 the second from the window, just as the first empties. The watcher near the door has relaxed slightly. You're reading a magazine. You're a Western tourist. Boring. Probably harmless.</p>\n\n    <p>Under the table's edge, your fingers find a small pellet of chewing gum \u2014 SPARROW's mark \u2014 with something embedded in it. A capsule the size of a grain of rice. You pick it off without looking down and palm it into your pocket.</p>\n\n    <p>Outside, in the narrow lane behind the Nikolaiviertel's Church of St. Nicholas, you open the capsule under cover of lighting a cigarette. Inside: a microfilm strip. Without a reader you can only hold it to the sky and squint, which gives you blurry impressions of text and one image.</p>\n\n    <p>The text is a name: <strong>LIEUTENANT COLONEL ERNST KR\u00d6GER</strong>. Stasi. The image, blurry as it is, shows a man in civilian clothes at what looks like a Western airport \u2014 Heathrow, possibly, judging by the signage. The date stamp at the corner: three weeks ago. Two weeks before your current operation was approved.</p>\n\n    <p>SPARROW was trying to tell you something about the Stasi officer running the operation to catch you. Kr\u00f6ger has been to London. Three weeks ago. When the mole in the Trade Mission would have been briefing him on your deployment.</p>\n\n    <p>You tuck the capsule back into your pocket. Kr\u00f6ger is the man hunting you. And he already knows you're coming.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_stasi1\">Track down Kr\u00f6ger \u2014 if you neutralize the hunter, you can extract Volkov cleanly</label>\n    <label for=\"s_defect1\">This changes nothing \u2014 go to K\u00f6penick immediately, Volkov is the mission</label>\n    <label for=\"s_burned2\">You need to signal London about Kr\u00f6ger \u2014 the London mole and Kr\u00f6ger may be coordinating</label>\n</div>\n</div>\n\n<div id=\"scene_dead_drop3\" class=\"scene\">\n<pre>\n  ______________________\n | DEAD DROP \u2014 EMPTY    |\n | The brick is there.  |\n | The tube is there.   |\n | The message is gone. |\n |______________________|\n</pre>\n<span class=\"scene-tag\">// FRANKFURTER ALLEE \u2014 DEAD DROP COMPROMISED \u2014 14:09 //</span>\n<div class=\"story-text\">\n    <p>The brick moves. The tube is there. But when you unscrew it in the shelter of the apartment doorway, it's empty \u2014 except for a single strip of paper, about a centimeter wide, on which someone has written, in neat capitals, two words in German:</p>\n\n    <p style=\"text-align:center; letter-spacing:4px;\"><strong>WIR WISSEN.</strong></p>\n\n    <p><em>We know.</em></p>\n\n    <p>It's not SPARROW's handwriting. It's someone else's. Someone who found the dead drop, emptied the message, and left this instead. The Stasi. Or the KGB. Or both, which in 1973 East Berlin are often the same thing wearing different suits.</p>\n\n    <p>They know about this dead drop. They may have read SPARROW's message. They may know her current location. They may know your identity and cover.</p>\n\n    <p>Or \u2014 and this is a thought that you turn over carefully because it could be wishful thinking \u2014 they may have found the dead drop but not the message, because SPARROW cleaned it out before they arrived and left this paper as her own warning: <em>the drop is burned, don't use it.</em> SPARROW was always that kind of agent. The kind who leaves signs in the wreckage so you know the wreckage is a message.</p>\n\n    <p>You don't know which interpretation is correct. You need more data. And standing here too long will itself become data \u2014 the wrong kind, for the wrong people.</p>\n\n    <p>You walk. In East Berlin, when in doubt, you walk. Movement is innocence. Stillness is conspicuous. You become a man with somewhere to be, which in this city is almost radical \u2014 having somewhere to be, some purpose, some forward motion that isn't fear.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_contact2\">Go to SPARROW's secondary location \u2014 the bookbinder's on Linienstrasse</label>\n    <label for=\"s_burned2\">Assume full compromise \u2014 contact the emergency exfil protocol immediately</label>\n    <label for=\"s_stasi2\">Find out who is running the Stasi operation to catch you \u2014 knowledge is safety</label>\n</div>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     ACT 1 \u2014 BURNED / ABORT SEQUENCES\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<div id=\"scene_burned1\" class=\"scene\">\n<pre>\n  TRADE MISSION \u2014 UNTER DEN LINDEN\n  Western Section \u2014 Cultural Attache\n  [SECURE COMMUNICATION ROOM \u2014 B3]\n  // WARNING: POSSIBLE PENETRATION //\n</pre>\n<span class=\"scene-tag\">// ABORT ASSESSMENT \u2014 TRADE MISSION \u2014 15:55 //</span>\n<div class=\"story-text\">\n    <p>You make your way to the Trade Mission building on Unter den Linden \u2014 a grey pile of Soviet-era concrete that squats between two pre-war buildings like an uninvited guest who's moved in permanently. The British Trade Mission occupies the fourth floor. The secure communication room is in the basement, which is typical: the most sensitive things are always underground.</p>\n\n    <p>The duty officer on the B3 line is a young man who sounds perpetually surprised, as though each new piece of intelligence is somehow unexpected despite his job being to receive it. You give your identification cipher and wait while he reads it back.</p>\n\n    <p><em>\"Right, yes. Uh \u2014 you're MIRROR. Yes. We have you.\"</em> The sound of papers shuffling. <em>\"Your station chief wants to know status. She used the word 'urgent' twice, which from Marsh is basically shouting.\"</em></p>\n\n    <p><em>\"Tell Marsh the network has a penetration,\"</em> you say, keeping your voice flat. <em>\"Someone in the Trade Mission is feeding the Stasi our internal communications. I need a list of everyone with access to OPERATION BROKEN MIRROR's planning documents.\"</em></p>\n\n    <p>A long silence. <em>\"I \u2014 that's a significant allegation.\"</em></p>\n\n    <p><em>\"It's not an allegation. It's an operational finding. Treat it accordingly.\"</em></p>\n\n    <p>Another silence. Then the young man says something that makes the hairs on the back of your neck rise: <em>\"I'll need to route that through the Deputy Head of Mission for verification. That'll be \u2014 let me see \u2014 Mrs. Feldmann. She handles internal security here.\"</em></p>\n\n    <p>You close your eyes for half a second. The cigarette-voiced woman who handed you your note this morning \u2014 the woman from the Trade Mission \u2014 her name was Feldmann.</p>\n\n    <p><em>\"Don't route it through anyone,\"</em> you say. <em>\"Send it directly to Marsh's eyes-only cipher. Nobody else touches it. Acknowledge.\"</em></p>\n\n    <p><em>\"Acknowledged. But\u2014\"</em></p>\n\n    <p>You hang up. The problem with discovering a mole is that the mole might already know you've discovered her. If Feldmann is feeding the Stasi, she knows you're here, she knows your cover, she knows your contacts, and she now knows you know something is wrong because you went off-protocol to contact Marsh directly.</p>\n\n    <p>You have, at most, an hour before Feldmann takes some form of action. The question is what you do with that hour.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_defect1\">Go straight to Volkov \u2014 the mission comes first, deal with the mole problem from the other side of the Wall</label>\n    <label for=\"s_stasi3\">Confront Feldmann directly \u2014 trap the mole before she can alert her handlers</label>\n    <label for=\"s_kgb1\">Use Feldmann as a channel \u2014 feed her disinformation that draws the Stasi away from Volkov's location</label>\n</div>\n</div>\n\n<div id=\"scene_burned2\" class=\"scene\">\n<pre>\n  EMERGENCY PROTOCOL \u2014 BROKEN MIRROR\n  Exfil signal: three calls to number\n  444-77-23, hang up after two rings.\n  Await contact at CHECKPOINT CHARLIE\n  HOTEL, room 6, within four hours.\n</pre>\n<span class=\"scene-tag\">// EMERGENCY PROTOCOL \u2014 INITIATED \u2014 16:10 //</span>\n<div class=\"story-text\">\n    <p>You find a public telephone box on a quiet street near the Nikolaiviertel and make three calls to the emergency number, hanging up each time after two rings. Then you walk to the Checkpoint Charlie Hotel \u2014 a grim establishment near the crossing point that caters to Western business travelers and, by extension, to a certain category of intelligence traffic \u2014 and take room 6.</p>\n\n    <p>Room 6 is exactly what you'd expect from a hotel that exists primarily as a tradecraft location: clean, sparse, with a window that faces the courtyard and has no line of sight to any building that could support a camera. The bedside lamp has been replaced with one that doesn't quite match the fixture, which means it's been switched for one that contains no listening device, which means someone with very careful hands has been here before you.</p>\n\n    <p>You wait.</p>\n\n    <p>Twenty minutes later, there's a knock at the door. Not the emergency contact \u2014 a woman in her forties with the comfortable authority of someone who has been knocking on hotel room doors in foreign countries for a very long time. She comes in, closes the door, and sits in the chair by the window without being invited.</p>\n\n    <p><em>\"I'm NIGHTJAR,\"</em> she says. <em>\"Emergency backup, Station Vienna. Marsh sent me when SPARROW went silent.\"</em> She looks at you. <em>\"You've activated the abort protocol. Tell me why.\"</em></p>\n\n    <p>You tell her about the dead drop, about Kr\u00f6ger, about the Trade Mission mole, about the warning written in the empty drop tube. She listens without interrupting, which is either professional or because she already knows most of it.</p>\n\n    <p>When you finish, she's quiet for a moment. Then: <em>\"The abort protocol exists for a reason. But I should tell you something: Volkov reached out to us in Vienna forty-eight hours ago. Directly \u2014 bypassing the network. He's terrified. The KGB knows he's been meeting Western intelligence contacts. He doesn't have long.\"</em></p>\n\n    <p>She meets your eyes. <em>\"If you abort, Volkov gets buried in the Lubyanka and SOVA-7 stays dark for another decade. The choice is yours. I won't make it for you.\"</em></p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_defect1\">Override the abort \u2014 go to K\u00f6penick and get Volkov out</label>\n    <label for=\"s_east3\">NIGHTJAR has Vienna station resources \u2014 use them to hit multiple targets simultaneously</label>\n    <label for=\"e_burned\">Complete the abort \u2014 the network compromise is too deep to risk everything on one asset</label>\n</div>\n</div>\n\n<div id=\"scene_burned3\" class=\"scene\">\n<pre>\n  PERSONAL SIGNAL \u2014 SPARROW\n  [ Linden leaf on windowsill ]\n  [ Coin left heads-up outside door ]\n  [ Third newspaper left of the stack ]\n  Emergency meeting: 2200h, Treptower Park\n</pre>\n<span class=\"scene-tag\">// EAST BERLIN \u2014 TRACKING SPARROW \u2014 17:00 //</span>\n<div class=\"story-text\">\n    <p>You know enough about SPARROW to know she wouldn't disappear completely. She's been in the game too long to go dark without leaving threads. You walk the route between her known locations and watch for her personal signals \u2014 small, specific, the kind of marks that only mean something if you know her methodology.</p>\n\n    <p>The first: a linden leaf on a windowsill she walks past on her way to work. It's there. Fresh \u2014 placed today.</p>\n\n    <p>The second: a coin, left heads-up, in a specific crack in the pavement outside a tobacconist. It's there, with the specific German coin \u2014 a 10-Pfennig piece \u2014 that she uses as a signal marker.</p>\n\n    <p>The third: she always buys a newspaper. The stack outside the kiosk near the Rathaus has one paper left slightly offset from the others \u2014 the third from the left. SPARROW's mark for <em>follow this sequence to the meeting point.</em></p>\n\n    <p>She wants to meet. Tonight, 22:00, Treptower Park \u2014 the park southeast of the city center where the enormous Soviet war memorial rises among the trees like a conscience made of stone. It's a good location: dark, open enough to spot surveillance, close enough to the S-Bahn for a quick departure.</p>\n\n    <p>But it's also six hours away. And Volkov's window is closing. And you still don't know if the signal chain is SPARROW's or a copy.</p>\n\n    <p>In tradecraft, sometimes the choice is between the certain risk and the uncertain opportunity. The certain risk is: go to Treptower Park and you'll know what SPARROW knows, but you burn six hours. The uncertain opportunity is: go to Volkov now, without SPARROW's latest intelligence, and trust what you already have.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_defect1\">Don't wait for SPARROW \u2014 go to K\u00f6penick and extract Volkov now</label>\n    <label for=\"s_contact2\">Go find SPARROW in person before the scheduled meeting \u2014 this is too important to wait</label>\n    <label for=\"s_stasi4\">Use the six hours to investigate the Stasi surveillance operation \u2014 come to the meeting with your own intelligence</label>\n</div>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     ACT 2 \u2014 THE DEFECTOR\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<div id=\"scene_defect1\" class=\"scene\">\n<pre>\n  AKADEMIE DER WISSENSCHAFTEN\n  G\u00e4stehaus \u2014 K\u00f6penick\n  ______________________\n |  ROOM 14            |\n |  [ knock ]          |\n |  [ knock ]          |\n |  [ knock ]          |\n |_____________________|\n    Tuesday evening.\n</pre>\n<span class=\"scene-tag\">// K\u00d6PENICK \u2014 ACADEMY GUESTHOUSE \u2014 18:40 //</span>\n<div class=\"story-text\">\n    <p>The Academy of Sciences guesthouse is a solid pre-war building that has been converted, through the medium of bureaucratic paint and institutional furniture, into something aspiring to be a hotel but settling for being a residence. You obtained access through the service entrance using the credentials of a manuscript evaluator \u2014 a slightly different professional identity than your cover, but in the vague middle ground of cultural exchange, one plausible cover overlaps another.</p>\n\n    <p>You found a delivery of academic papers arriving for the conference. You helped carry them. Nobody questioned this. People rarely question someone who is visibly occupied with a task, especially if the task is boring and they are carrying something heavy.</p>\n\n    <p>Room 14 is at the end of the second-floor corridor. You arranged your white handkerchief in your breast pocket \u2014 left breast, as SPARROW specified \u2014 so that a corner shows clearly. Then you knocked: three times, pause, twice.</p>\n\n    <p>Silence. Long enough that you began to compose your retreat in your head.</p>\n\n    <p>Then the door opened.</p>\n\n    <p><strong>Aleksandr Volkov</strong> is shorter than his file photo suggested, and older in the face \u2014 not the aging of years but the aging of anxiety, of long nights calculating probabilities, of knowing too many secrets for too long. He has the eyes of a mathematician: quick, evaluating, always checking the equation. He looks at your handkerchief. Then at your face. Then back at the handkerchief.</p>\n\n    <p><em>\"Philosophy,\"</em> he says, in German accented with Russian, <em>\"is the art of asking the wrong question.\"</em></p>\n\n    <p><em>\"And mathematics,\"</em> you say, <em>\"is the art of getting the right answer to it.\"</em></p>\n\n    <p>He steps back. You enter. He closes the door behind you and immediately moves to the window, adjusts the curtain by a precise amount \u2014 enough to see the courtyard, not enough to be seen from it \u2014 and then turns to face you with the focus of a man who has been waiting for this conversation for a long time and has rehearsed it from multiple angles.</p>\n\n    <p><em>\"You have authority to make commitments?\"</em> he asks.</p>\n\n    <p><em>\"Within defined limits. Tell me your conditions.\"</em></p>\n\n    <p>He sits. You sit across from him. Between you: a small table, a lamp that casts a warm pool of light, and the very careful silence of two people about to exchange something irreversible.</p>\n\n    <p>His conditions are three. First: complete identity protection \u2014 no public disclosure of his role or existence, even after he is gone from Soviet service, even in sanitized intelligence reports. Second: asylum in the United Kingdom, not the United States \u2014 he has specific, private reasons for this which he says he will explain later. Third: his daughter, <strong>Natalya Volkova</strong>, currently studying medicine at the Leningrad Medical Institute, must be exfiltrated along with him or given the guarantee that she will not be punished for his defection.</p>\n\n    <p>You can give him the first. You can probably give him the second. The third is the problem \u2014 it requires resources and time you may not have.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_defect2\">Give all three guarantees \u2014 you'll find a way to honour them, the intelligence is worth it</label>\n    <label for=\"s_defect3\">Be honest about the daughter \u2014 you can guarantee two of the three conditions now, work on the third</label>\n    <label for=\"s_defect4\">Ask about SOVA-7 first \u2014 you need to verify his intelligence before making any commitments</label>\n</div>\n</div>\n\n<div id=\"scene_defect2\" class=\"scene\">\n<pre>\n   [ ALL CONDITIONS ACCEPTED ]\n   Volkov nods. The deal is made.\n   Now the hard part begins.\n</pre>\n<span class=\"scene-tag\">// ROOM 14 \u2014 AGREEMENT \u2014 19:05 //</span>\n<div class=\"story-text\">\n    <p><em>\"You have all three,\"</em> you say. <em>\"Identity protection, UK asylum, and immunity for Natalya. I give you my word and the word of the Service that sent me.\"</em></p>\n\n    <p>You're not entirely certain you have the authority to guarantee the daughter's immunity \u2014 that particular thread requires cooperation from the Foreign Office and possibly the Home Office and definitely some careful negotiation with Leningrad assets who may or may not be willing to move on short notice. But you believe it's achievable, and in the intelligence business, believing something is achievable and saying it is achievable are separated by a distinction so thin it's more of a suggestion than a line.</p>\n\n    <p>Volkov studies you for a moment. Then he nods, slowly. <em>\"All right.\"</em></p>\n\n    <p>What follows is three hours of the most concentrated intelligence you have ever received. Volkov doesn't write anything down \u2014 he speaks, and you memorize, which is how they trained you and which is also the most exhausting form of professional listening you know. You go through SOVA-7's algorithmic structure twice. The first time, you're simply absorbing. The second time, you're asking verification questions, checking internal consistency, probing for the kind of detail that only genuine insider knowledge contains rather than prepared cover.</p>\n\n    <p>He passes every test. The intelligence is real. SOVA-7 is real. And if GCHQ gets this, they'll be reading Soviet military traffic within three weeks.</p>\n\n    <p>At 22:00, Volkov says: <em>\"I need to sleep. Tomorrow morning, I give my final lecture. In the afternoon I am free. We can move after the lecture \u2014 it would look strange if I missed it.\"</em></p>\n\n    <p>He pauses. <em>\"You trust your exfiltration route?\"</em></p>\n\n    <p><em>\"Working on it,\"</em> you say. Which is true. You don't have an exfiltration route yet. This is the next problem.</p>\n\n    <p>You leave Room 14 with three hours of SOVA-7 cipher architecture in your head and the weight of a man's life and his daughter's safety on your conscience. The courtyard is quiet. The grey Wartburg sedan is still in the service lane. The watchers are patient. They're all patient in this city. Everyone is waiting for something.</p>\n\n    <p>You need an exfiltration route. You have two options you've been considering since you arrived in K\u00f6penick: the tunnel network that a West Berlin church group has been operating since 1968 \u2014 still active, according to pre-mission intelligence \u2014 or an overland route through the diplomatic quarter using forged credentials that your Vienna station prepared before you left. The tunnel is certain but slow and physical. The diplomatic credentials are fast but require a crossing point, and crossing points are watched.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_tunnel1\">Go to the tunnel contact \u2014 the underground route is more reliable</label>\n    <label for=\"s_cross1\">Use the diplomatic credentials route \u2014 get to Checkpoint Charlie with Volkov under diplomatic cover</label>\n    <label for=\"s_east1\">Check whether you're already under surveillance before committing to either route</label>\n</div>\n</div>\n\n<div id=\"scene_defect3\" class=\"scene\">\n<pre>\n   [ PARTIAL AGREEMENT ]\n   Two of three conditions granted.\n   Natalya Volkova \u2014 status: uncertain.\n   Volkov listens. Volkov considers.\n</pre>\n<span class=\"scene-tag\">// ROOM 14 \u2014 HONEST NEGOTIATION \u2014 19:15 //</span>\n<div class=\"story-text\">\n    <p><em>\"I can give you identity protection \u2014 complete, permanent, regardless of what changes in policy over the years. I can give you UK asylum \u2014 not US, you have my word on that, and the Service will honor it. The daughter\u2014\"</em> You pause. <em>\"I can't give you a guarantee I'm not certain I can honor. What I can give you is my commitment to make it the highest priority of the extraction, and a realistic assessment: if your daughter knows nothing and is in no operative role, the odds of her facing reprisal are lower than you fear. Soviet intelligence doesn't generally punish families for defections unless the family member is a useful leverage point, and a medical student in Leningrad with no intelligence connections is not a useful leverage point.\"</em></p>\n\n    <p>Volkov is quiet for a long time.</p>\n\n    <p><em>\"You know what I appreciate?\"</em> he says finally. <em>\"You didn't promise what you can't deliver. The last three British agents I've spoken to all promised everything. You are the first one to tell me the truth about the limits.\"</em> He leans back. <em>\"I have been in intelligence for twenty-three years. I know what a lie sounds like. I also know what honesty sounds like. It sounds like what you just said.\"</em></p>\n\n    <p>He accepts. Not with the warmth of a man who got everything he wanted, but with the considered calm of a man who received what he could realistically expect.</p>\n\n    <p>What follows is the intelligence exchange \u2014 three hours of SOVA-7 cipher architecture, memorized rather than written, verified through cross-questioning until you're as certain as you can be that it's genuine. It passes every internal consistency test you know. It's real.</p>\n\n    <p>At 22:15, you leave Room 14 with SOVA-7 in your head and a man's reasonable trust in your pocket, which is the heavier of the two burdens.</p>\n\n    <p>The exfiltration route is the next problem. Volkov can move tomorrow afternoon after his final lecture. You have one night to arrange the route.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_tunnel1\">Use the underground tunnel route \u2014 a West Berlin church group has been running it since 1968</label>\n    <label for=\"s_cross1\">Use forged diplomatic credentials for the Checkpoint Charlie crossing</label>\n    <label for=\"s_sewer1\">There's a third option \u2014 the old sewage infrastructure runs under the Wall in three places</label>\n</div>\n</div>\n\n<div id=\"scene_defect4\" class=\"scene\">\n<pre>\n   SOVA-7 AUTHENTICATION\n   Testing the intelligence...\n   Cross-reference: GCHQ intercepts\n   Analysis: consistent with known data\n   Assessment: GENUINE\n</pre>\n<span class=\"scene-tag\">// ROOM 14 \u2014 VERIFICATION FIRST \u2014 19:30 //</span>\n<div class=\"story-text\">\n    <p><em>\"Before conditions,\"</em> you say, <em>\"I need to verify I'm talking to the right person about the right information. Tell me something about SOVA-7 that a fabricator wouldn't know.\"</em></p>\n\n    <p>Volkov blinks. Then, unexpectedly, he smiles \u2014 not warmly, but with the recognition of one professional acknowledging another. <em>\"Good,\"</em> he says. <em>\"Good. Yes, this is the right approach.\"</em></p>\n\n    <p>He tells you three things about SOVA-7. The first two you have no way to verify on the spot. But the third \u2014 he describes a specific vulnerability in the system's key-exchange protocol, one that he says was introduced accidentally during a November 1972 revision and that the Soviets don't know about because the programmer who introduced it was subsequently transferred to a naval posting in Vladivostok and hasn't reviewed his own code since. And you <em>do</em> know something about this: a partial GCHQ intercept from early 1973, which your briefing materials described as \"unexplained regularities in SOVA-7 traffic patterns.\" The regularity Volkov describes would produce exactly those patterns.</p>\n\n    <p>He's genuine.</p>\n\n    <p>You give him his conditions \u2014 all three \u2014 and then you spend three hours recording SOVA-7's full architecture in your head with the systematic thoroughness of a professional doing the thing they were trained to do and are very good at.</p>\n\n    <p>At 22:30, you leave with everything you came for and the problem of how to get it \u2014 and Volkov \u2014 to the other side of the Wall.</p>\n\n    <p>But as you reach the ground floor of the guesthouse, you pause at the window overlooking the courtyard. The grey Wartburg is still there. But now there's a second car beside it \u2014 a black Volga, Soviet-made, with the specific front-quarter dent pattern that appears in your briefing files beside the word: <em>COUNTERINTELLIGENCE.</em></p>\n\n    <p>They're not just watching Volkov. They're waiting. And they've brought more people.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_east1\">Go back to Volkov \u2014 the timeline has moved up, you need to move tonight</label>\n    <label for=\"s_chase1\">The watchers have you \u2014 run now, get to the tunnel contact before they close the perimeter</label>\n    <label for=\"s_kgb2\">This might be the KGB trap M\u00fcller warned about \u2014 assess the situation before acting</label>\n</div>\n</div>\n\n<div id=\"scene_defect5\" class=\"scene\">\n<pre>\n   VOLKOV'S ROOM \u2014 DAWN\n   Wednesday, 05:40 Uhr\n   Light through the curtain.\n   A man and a decision.\n   Both waiting to move.\n</pre>\n<span class=\"scene-tag\">// K\u00d6PENICK GUESTHOUSE \u2014 NEXT MORNING \u2014 05:40 //</span>\n<div class=\"story-text\">\n    <p>You stayed the night \u2014 a calculated risk, but the alternative was returning to East Berlin proper with a full surveillance net potentially active, and moving through the city at night with the SOVA-7 architecture in your head and no protection felt worse than staying close to Volkov in a location they may not yet have identified as active.</p>\n\n    <p>Volkov slept in his room. You slept in a chair in the service corridor, which is exactly as comfortable as it sounds and exactly as useful: you heard everything that moved on this floor, and nothing moved that shouldn't have.</p>\n\n    <p>In the grey dawn, you review the situation. You have the intelligence. You have Volkov's agreement. You have no confirmed exfiltration route. You have an uncertain surveillance situation in the courtyard below. And you have the knowledge that somewhere in the city, a Stasi colonel named Kr\u00f6ger is looking for you, and a Trade Mission officer named Feldmann may have already told him where to look.</p>\n\n    <p>Volkov opens his door at 06:00 and finds you in the corridor. He looks unsurprised, which means he either expected it or his capacity for surprise has been professionally removed, which in a KGB man is likely.</p>\n\n    <p><em>\"You didn't leave,\"</em> he says.</p>\n\n    <p><em>\"The situation is more complex than planned,\"</em> you tell him. <em>\"Are you willing to move today? Before your lecture?\"</em></p>\n\n    <p>He considers. <em>\"If I miss the lecture, they'll know immediately. The cover dissolves. But if we move after the lecture and the route is ready...\"</em> He trails off. <em>\"What is the route?\"</em></p>\n\n    <p>That, precisely, is the question.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_tunnel1\">The tunnel \u2014 a West Berlin church group has been running an underground route since 1968</label>\n    <label for=\"s_cross2\">Diplomatic cover through Checkpoint Charlie \u2014 you have forged credentials from Vienna station</label>\n    <label for=\"s_sewer1\">The old sewage tunnels \u2014 they run under the Wall and haven't been fully mapped by either side</label>\n</div>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     ACT 2b \u2014 EAST BERLIN / STASI INVESTIGATIONS\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<div id=\"scene_east1\" class=\"scene\">\n<pre>\n  EAST BERLIN \u2014 NIGHT\n  [ surveillance on K\u00f6penick perimeter ]\n  [ Wartburg: Reg. OB-44-22 ]\n  [ Volga:    unknown plates ]\n  Watchers are themselves watched.\n</pre>\n<span class=\"scene-tag\">// K\u00d6PENICK \u2014 PERIMETER SWEEP \u2014 21:00 //</span>\n<div class=\"story-text\">\n    <p>You do a full circuit of the Academy guesthouse compound before committing to anything. Four passes \u2014 each from a different approach angle, different pace, different pretext. On the third pass you count seven distinct surveillance positions. That's a lot for one building in a city that runs on manpower budgets. Either they have a specific target \u2014 Volkov \u2014 or they have something else.</p>\n\n    <p>On the fourth pass, you spot something that changes the calculus: two of the watchers are arguing. In low voices, but arguing \u2014 the specific tense body language of a disagreement between professionals about procedure. One of them keeps gesturing at the building. The other keeps shaking his head.</p>\n\n    <p>They don't agree on when to move. That means they're waiting for something \u2014 an order, a signal, a condition. Which means the trap isn't closed yet. You have time.</p>\n\n    <p>You also find something useful: the grey Wartburg is crewed by two men who take turns walking to a nearby kiosk for cigarettes. The kiosk is on the corner of the service lane. When the first man goes for cigarettes, there's a four-minute gap in coverage of the service door. If Volkov can move to the service door in that gap, you can get him out of the compound before the second car's crew has reacted.</p>\n\n    <p>But you need help with the timing. And the only person in East Berlin you currently trust to help you is either SPARROW, who you haven't located, or someone you're about to recruit in the next fifteen minutes.</p>\n\n    <p>You notice a woman sitting on a bench near the compound's east gate \u2014 mid-thirties, a book in her lap, an expression of deliberate relaxation that doesn't quite match the careful way she's tracking movements with her peripheral vision. Not Stasi. Not KGB. She's watching <em>them</em>. Which means she's watching from the West.</p>\n\n    <p>It's NIGHTJAR. The Vienna emergency backup. She followed you here.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_east2\">Approach NIGHTJAR \u2014 coordinate the distraction to open Volkov's escape window</label>\n    <label for=\"s_tunnel2\">Forget the compound \u2014 go now to the tunnel contact and set up the route first</label>\n    <label for=\"s_defect5\">Go back to Volkov and accelerate the timeline \u2014 move tonight, not tomorrow</label>\n</div>\n</div>\n\n<div id=\"scene_east2\" class=\"scene\">\n<pre>\n  NIGHTJAR \u2014 VIENNA STATION\n  Backup role: surveillance detection\n  Current status: active and watching\n  \"You need a distraction.\"\n  \"I am the distraction.\"\n</pre>\n<span class=\"scene-tag\">// BENCH NEAR EAST GATE \u2014 21:20 //</span>\n<div class=\"story-text\">\n    <p>You sit on the bench beside her. Neither of you looks at the other. This is how professionals have conversations in hostile territory: parallel gaze, low voice, the posture of two strangers sharing a bench because benches are public property and East German civil code requires you to be reasonably polite about it.</p>\n\n    <p><em>\"Four-minute gap on the service door,\"</em> you murmur. <em>\"First Wartburg man goes for cigarettes. We need something to extend that gap to eight.\"</em></p>\n\n    <p>NIGHTJAR turns a page of her book. <em>\"Give me fifteen minutes. Walk Volkov to the service door at 22:00 exactly. The cigarette man will be otherwise engaged.\"</em></p>\n\n    <p><em>\"What will you do?\"</em></p>\n\n    <p><em>\"I'll be elsewhere having a medical emergency. It's extraordinary how much attention an unconscious woman on a public street attracts. Even in East Berlin, where the official policy is that public emergencies are embarrassing.\"</em></p>\n\n    <p>She stands, smoothes her coat, and walks away in the direction of the kiosk without looking back.</p>\n\n    <p>You have fifteen minutes. You go back to Room 14.</p>\n\n    <p>Volkov is ready \u2014 you realize, when you return, that he's been ready since you left. He has one small bag. Everything else he's leaving. <em>\"There is nothing in this room I need,\"</em> he says. <em>\"Everything I need I am carrying.\"</em> He touches his temple.</p>\n\n    <p>At 21:58, you move to the service door. At 22:00, somewhere near the kiosk, there is a commotion. The first Wartburg man turns toward it. The second Wartburg man hesitates, looks at the building, looks at his colleague, and \u2014 because he is human and humans are drawn to drama \u2014 takes three steps toward the commotion to see what's happening.</p>\n\n    <p>Three steps is all you need. The service door opens. You and Volkov are through it and into the service lane before the second man has finished his third step.</p>\n\n    <p>The service lane exits onto a residential street. From there, it's two blocks to the S-Bahn, and you have a route planned \u2014 K\u00f6penick to Ostbahnhof, then decide. The question is where you're going from there.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_tunnel3\">Go to the tunnel contact \u2014 the underground route, scheduled for tonight</label>\n    <label for=\"s_cross3\">Head for Checkpoint Charlie with the diplomatic credentials</label>\n    <label for=\"s_chase1\">They spotted the exit \u2014 you're being followed, run</label>\n</div>\n</div>\n\n<div id=\"scene_east3\" class=\"scene\">\n<pre>\n  NIGHTJAR + MIRROR\n  Vienna station + London station\n  Combined operation \u2014 unauthorized\n  \"Marsh will be furious.\"\n  \"Marsh is always furious.\"\n</pre>\n<span class=\"scene-tag\">// CHECKPOINT CHARLIE HOTEL \u2014 COMBINED PLANNING \u2014 16:30 //</span>\n<div class=\"story-text\">\n    <p>NIGHTJAR spreads a hand-drawn map on the hotel bed \u2014 the kind of map that exists in one copy and gets eaten afterward. You lean over it together. She smells of cigarettes and that particular caliber of operational focus that manifests as absolute stillness in the body despite a very active mind.</p>\n\n    <p><em>\"Vienna has a tunnel team on standby,\"</em> she says. <em>\"They've been waiting for this operation for three weeks. They can be at the East Berlin entrance by midnight \u2014 but only midnight, the contact rotates at 01:00 and the next slot is forty-eight hours.\"</em></p>\n\n    <p><em>\"Volkov is in K\u00f6penick,\"</em> you say. <em>\"We need to get him out of the compound first, then to the tunnel entrance in Prenzlauer Berg. That's forty minutes by S-Bahn.\"</em></p>\n\n    <p><em>\"I can neutralize the compound surveillance,\"</em> she says. <em>\"But I need you to simultaneously keep the Trade Mission mole busy. If Feldmann alerts the Stasi about the compound, we lose the window.\"</em></p>\n\n    <p>You think about this. <em>\"How do I keep Feldmann busy?\"</em></p>\n\n    <p>NIGHTJAR almost smiles. <em>\"You call her. You tell her you have a problem. You ask for her help. She has to keep you talking as long as possible to get information about the operation \u2014 and while she's keeping you talking, she can't be calling Kr\u00f6ger.\"</em></p>\n\n    <p><em>\"That's an elegant trap.\"</em></p>\n\n    <p><em>\"That's why Vienna does it better than London.\"</em> She rolls up the map. <em>\"We move at 21:30. Agreed?\"</em></p>\n\n    <p>The plan has a beautiful internal logic. Which, in tradecraft, is exactly when you should be most suspicious of it. But you agree. Sometimes the elegant solution is correct. Sometimes it's bait. You won't know which until you're inside it.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_tunnel3\">Execute the plan \u2014 21:30, coordinate the tunnel extraction</label>\n    <label for=\"s_defect1\">Trust NIGHTJAR with the Feldmann distraction but go to Volkov yourself, directly</label>\n    <label for=\"s_kgb3\">NIGHTJAR seems to know too much \u2014 verify her bona fides before trusting her with anything</label>\n</div>\n</div>\n\n<!-- STASI INVESTIGATION SCENES -->\n<div id=\"scene_stasi1\" class=\"scene\">\n<pre>\n  MINISTRY FOR STATE SECURITY\n  District Office \u2014 Berlin-Mitte\n  Oberstleutnant Ernst Kr\u00f6ger\n  [ OPERATIONAL FILE \u2014 ACTIVE ]\n  Operation: MIRROR HUNT\n</pre>\n<span class=\"scene-tag\">// STASI DISTRICT OFFICE \u2014 OBSERVATION \u2014 16:00 //</span>\n<div class=\"story-text\">\n    <p>You locate the Stasi district office through a method that is perfectly legal and completely obvious: you find the address in the city directory. The Ministry for State Security's regional offices are not secret buildings \u2014 their function is partially the function of visible intimidation. Everyone in East Berlin knows where they are. The secret is what happens inside.</p>\n\n    <p>What you need is something more specific: the operational log for MIRROR HUNT, which is what SPARROW's microfilm indicated Kr\u00f6ger is running. You won't get inside the building. But buildings have predictable rhythms.</p>\n\n    <p>You watch the office for two hours from a caf\u00e9 across the street. The rhythm: shift change at 17:00, which creates a forty-minute window when the incoming shift is getting briefed and the outgoing shift is in the locker room. During this window, the administrative section runs skeleton staff.</p>\n\n    <p>But more useful than this: at 16:45, a man exits the building in civilian clothes, collects a bicycle from the rack outside, and cycles east on Prenzlauer Allee. He's carrying a document satchel. He's cycling with the focused efficiency of a courier rather than the aimless pace of someone going home. He's going somewhere specific.</p>\n\n    <p>You follow him on foot, which is faster than it sounds because Berlin traffic is dense and bicycles in dense traffic are not always the speed advantage they appear to be.</p>\n\n    <p>He leads you to a bar in Prenzlauer Berg \u2014 a working-class establishment that serves good dark beer and the kind of clientele that minds its own business, which is exactly the kind of clientele a Stasi courier would choose. He goes to a corner table where a woman is waiting: mid-fifties, fur-collared coat, cigarette. She accepts the satchel without looking at the courier. The courier leaves. She stays.</p>\n\n    <p>The woman is <strong>Feldmann</strong>. Your Trade Mission handler. Collecting operational documents from a Stasi courier in a bar in Prenzlauer Berg at 17:00 on a Tuesday.</p>\n\n    <p>You have your mole. Now: what do you do with her?</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_stasi2\">Pho
