ng time. Then, almost reluctantly, stamps both passports and hands them back. <em>\"You may proceed.\"</em></p>\n\n    <p>You proceed. You don't speed up. You walk through the checkpoint at a pace that contains absolutely no relief, because relief looks exactly like someone who expected to be stopped.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"e_true\">Cross into West Berlin \u2014 the extraction is complete</label>\n</div>\n</div>\n\n<div id=\"scene_caught3\" class=\"scene\">\n<pre>\n  SURROUNDED\n  [ North: Stasi surveillance vehicle ]\n  [ East: Kr\u00f6ger's team on foot ]\n  [ South: checkpoint \u2014 camera active ]\n  [ West: open \u2014 for now ]\n  Trapped? Or an illusion of trapped?\n</pre>\n<span class=\"scene-tag\">// EAST BERLIN \u2014 ENCIRCLEMENT \u2014 22:00 //</span>\n<div class=\"story-text\">\n    <p>You do a full-stop assessment from the doorway of a closed pharmacy on a street that has no foot traffic at this hour, which gives you thirty seconds of relative safety to count your problems.</p>\n\n    <p>North: the Stasi surveillance vehicle from the Academy compound, which has been following you since K\u00f6penick and which you've confirmed through three consecutive position-change tests. One car, two occupants.</p>\n\n    <p>East: Kr\u00f6ger's on-foot team. You made two of them four blocks ago. Professionals, maintaining distance, not converging yet.</p>\n\n    <p>South: the checkpoint camera, which has been photographing checkpoint approaches for at least four hours, meaning your face and Volkov's face are now in their system if they've been run against files \u2014 which they may or may not have been, depending on how good their facial recognition protocols are, which in 1973 East Germany are good but not instantaneous.</p>\n\n    <p>West: open. A direct street to the Spree riverbank. The Spree forms part of the border between East and West Berlin in this section, and there are points \u2014 under bridges, at maintenance access points \u2014 where the border is defined by the river itself rather than a physical wall. Not a crossing point. Not authorized. Not safe. But possible, if you have equipment you don't currently have, or nerve you might.</p>\n\n    <p>Or \u2014 and this is the thought that arrives with the particular clarity of desperation \u2014 you create a situation in which all three surveillance teams think you've gone in a different direction. Not evasion. Deception. Make them look somewhere specific while you go somewhere else.</p>\n\n    <p>Volkov, reading your silence, says: <em>\"Tell me what you need from me.\"</em></p>\n\n    <p><em>\"I need you to walk out of this doorway and go south, toward the checkpoint, and keep walking for four minutes.\"</em></p>\n\n    <p><em>\"And then?\"</em></p>\n\n    <p><em>\"Then you turn around and come back. But the surveillance will have moved south to cover the checkpoint approach, because that's where they expect us to go, and while they've moved, we go west.\"</em></p>\n\n    <p>He considers this. <em>\"You're using me as a decoy.\"</em></p>\n\n    <p><em>\"I'm using both of us as a decoy. I'll go south first, you come thirty seconds later. We look like we're heading for the checkpoint together. At the second corner, I turn west and go fast. You keep going south, take a left at the pharmacy, circle north, and meet me at the Spree riverbank access in twelve minutes.\"</em></p>\n\n    <p>He nods. <em>\"I've done more complicated operations with worse odds.\"</em></p>\n\n    <p><em>\"I believe you.\"</em></p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_sewer2\">Execute the decoy \u2014 meet at the Spree, find the sewer crossing</label>\n    <label for=\"s_tunnel4\">Abandon the decoy \u2014 straight to Prenzlauer Berg, now, before the net tightens further</label>\n    <label for=\"e_traded\">The net is already closed \u2014 you've been maneuvered here deliberately</label>\n</div>\n</div>\n\n<div id=\"scene_caught4\" class=\"scene\">\n<pre>\n  IN CUSTODY\n  STASI FACILITY \u2014 HOHENSCH\u00d6NHAUSEN\n  Interrogation Room 7\n  Present: Oberstleutnant Kr\u00f6ger\n  Status: Detained\n  Cover: maintained (for now)\n</pre>\n<span class=\"scene-tag\">// STASI DETENTION \u2014 HOHENSCH\u00d6NHAUSEN \u2014 UNKNOWN TIME //</span>\n<div class=\"story-text\">\n    <p>The room is white. Not clean white \u2014 the particular grey-white of a room painted many times over many years, each coat slightly different, creating a texture that suggests accumulated institutional time. The chair is bolted to the floor. The table is bolted to the floor. The lamp overhead is very bright.</p>\n\n    <p>Kr\u00f6ger sits across from you. He has the look of a man who has spent a great deal of his career in rooms exactly like this one \u2014 comfortable with them in the way that some people are comfortable with hospitals, a professional relationship with a place that most people find intolerable.</p>\n\n    <p>He hasn't introduced himself. He doesn't need to. You know who he is. He knows you know who he is. That kind of information is itself part of the negotiation.</p>\n\n    <p><em>\"Your cover,\"</em> he says, pleasantly, in German, <em>\"is Bergmann, Klaus. West German. Antiquarian. Cultural exchange visa issued Vienna, October 8th. This cover is \u2014 professionally constructed. I've seen worse.\"</em> He tilts his head. <em>\"I've also seen better.\"</em></p>\n\n    <p>You say nothing. Your cover is: you know nothing. You are Klaus Bergmann. You were visiting the university library. You don't understand why you're here. You will maintain this for as long as physically possible, and then after that you will maintain it longer, and after that you will see.</p>\n\n    <p><em>\"The man you met at the Academy guesthouse,\"</em> Kr\u00f6ger continues, <em>\"introduced himself as Volkov. This is accurate. Aleksandr Volkov is a genuine KGB cryptographer. He is also,\"</em> he says, with a slight emphasis, <em>\"currently cooperating with this investigation. He told us you would come.\"</em></p>\n\n    <p>This is either true or a construction designed to make you feel betrayed, which would be the most productive emotional state for an interrogation to exploit. You maintain the cover. You know nothing. You are Klaus Bergmann.</p>\n\n    <p>Kr\u00f6ger looks at you with a kind of professional appreciation. <em>\"We have time,\"</em> he says. <em>\"We always have time.\"</em></p>\n\n    <p>In this moment, you consider your options, which are narrower than any point in your career.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"e_traded\">Maintain cover indefinitely \u2014 you'll be traded eventually, this is how it ends</label>\n    <label for=\"e_burned\">Give Kr\u00f6ger something true but limited \u2014 protect the network, sacrifice the operation</label>\n    <label for=\"e_doubled\">Kr\u00f6ger is offering you a deal \u2014 you felt it in his approach, there's a negotiation available here</label>\n</div>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     ENDINGS\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n\n<!-- ENDING: DEAD -->\n<div id=\"scene_e_dead\" class=\"scene\">\n<pre>\n   X  .  .\n  . X  .  .\n   .  X  .\n  .  .  X\n   GONE\n</pre>\n<span class=\"scene-tag\">// ENDING: THE FINAL CALCULATION //</span>\n<div class=\"story-text\">\n    <p class=\"ending-title\"><span class=\"red\">\u2715 ENDING: CASUALTIES OF THE COLD WAR \u2715</span></p>\n\n    <p>The motor pool plan failed in the way that overcomplicated plans tend to fail: at the simplest point. The Academy motor pool had a guard \u2014 one guard, which the pre-mission briefing hadn't noted, because the Academy didn't have a motor pool guard a year ago when the intelligence was gathered, and sometime in the intervening months they'd added one. Small administrative change. Enormous operational consequence.</p>\n\n    <p>The guard saw you. He called it in. Kr\u00f6ger's team arrived in four minutes, which meant they were already close, which meant the net had already been partially closed before you reached the motor pool.</p>\n\n    <p>You ran. Volkov ran. For seven minutes, you ran through the pre-war streets of East K\u00f6penick at 23:00 with two pursuit teams behind you and a third, you eventually realized, ahead. They had anticipated the direction. They had learned from the lane confrontation where you were likely to go.</p>\n\n    <p>The shot came from a doorway at the corner of Lindenstrasse and Am M\u00fcggelsee, which is a crossroads you shouldn't have passed through but which was the fastest route to the riverbank, and sometimes in the chaos of pursuit you take the fastest route and hope.</p>\n\n    <p>Volkov went down. A trained soldier \u2014 which he was, underneath the cryptographer \u2014 would have pulled you left instead of right, which was the reflex that directed both of you into the intersection, and the intersection was the kill zone, and that is the last thing you understood completely in the professional part of your mind before everything became very urgent and very simple.</p>\n\n    <p>You survived. You don't know why you survived and Volkov didn't, except that in the specific chaos of three seconds, the same odds that created the shot also prevented a second one. You ran. You kept running. You crossed the river at a maintenance access point you'd identified during a different calculation. You swam forty meters in October water, which was cold enough to be clarifying in a way that nothing else could have been.</p>\n\n    <p>You made it to West Berlin. Volkov didn't. The SOVA-7 cipher architecture is in your head, which means it survived with you. But Volkov is a man, not an architecture, and men don't survive the same way.</p>\n\n    <p>Marsh's debrief, three days later in a room in Vauxhall Cross, is methodical and professional. The intelligence is valuable. The mission is assessed as a partial success. The file on Natalya Volkova, in Leningrad, is marked for monitoring. The file on the guarantees you made to her father is marked in a different way.</p>\n\n    <p>You leave the debrief and stand in the corridor for a long time. In your head, very precisely, the SOVA-7 cipher algorithm turns over and over, correct and complete and permanent, and you think about a man who said <em>\"everything I need I am carrying\"</em> and touched his temple.</p>\n\n    <p class=\"dim\">// He carried it. He just never got to set it down. Some missions succeed. Some men don't. The Cold War makes this distinction all the time, without apology. //</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s0\">Begin Again \u2014 A Different Path, A Different Outcome</label>\n</div>\n</div>\n\n<!-- ENDING: BURNED -->\n<div id=\"scene_e_burned\" class=\"scene\">\n<pre>\n  ABORT SIGNAL \u2014 SENT\n  Network: secured (partial)\n  Volkov: status \u2014 unknown\n  SOVA-7: remains dark\n  Cost: one mission, one man\n</pre>\n<span class=\"scene-tag\">// ENDING: THE LONG GAME //</span>\n<div class=\"story-text\">\n    <p class=\"ending-title\"><span class=\"dim\">\u25a1 ENDING: PROFESSIONAL NECESSITY \u25a1</span></p>\n\n    <p>You sent the abort through the emergency protocol \u2014 three calls, two rings, hang up \u2014 and crossed back through Checkpoint Charlie on your cultural exchange visa at 17:00, twenty-three hours after you arrived in East Berlin. You declared your manuscripts to the exit guard with the bland cheerfulness of a man who has found exactly the archival material he was looking for and is looking forward to getting home, which is a performance you give adequately enough that the guard stamps you through without a second look.</p>\n\n    <p>In West Berlin, in a hotel room that doesn't exist in your expense report, you write a full operational debrief in the method you were trained for: systematic, non-evaluative, factual sequence from first contact to abort decision, formatted for immediate transmission to Marsh. You also write something that isn't in the standard format: a separate, personal assessment of why the network compromise made the operation unrecoverable. The mole \u2014 Feldmann \u2014 has been active long enough that the damage extends beyond this operation. Every asset she knew about is potentially burned. The conservative estimate of the damage, which you write with the detachment of someone cataloguing a flood, is eighteen months of operational reconstruction and the loss of several assets who will not know to come in until it's too late.</p>\n\n    <p>Volkov stays in East Berlin. He returns to Moscow on Friday, as scheduled. His residency ends. He goes back to the Lubyanka, to his cipher work, to the long careful ordinary of a man who almost did something extraordinary and then didn't. SOVA-7 remains dark. GCHQ continues deaf and blind to Soviet military traffic for another eleven months, until a different defector, through a different operation, brings out a different piece of it.</p>\n\n    <p>Feldmann is recalled to London quietly, on a pretext, and the photographs and your report do the rest. She denies everything for three months. Then she doesn't. The investigation reveals she began feeding the Stasi in 1968, motivated by a combination of ideological conviction and personal grievance that the subsequent debrief document describes in the careful neutral language of institutional assessment and which you read, later, with the knowledge that twenty-three years ago a different set of choices in a different person's life led to the specific ripple that washed through your career this week.</p>\n\n    <p>You're back in London in time for a Sunday afternoon. You walk along the Thames. It's a grey October day. The river is the color of old pewter. You think about Volkov \u2014 the tired eyes, the mathematical precision, the small act of going first into the tunnel. Going first into the dark.</p>\n\n    <p>He's still in there somewhere. The dark. Some of the best people are.</p>\n\n    <p class=\"dim\">// You protected the network. You contained the damage. You made the professional choice. In the intelligence business, the professional choice is usually the right one. Usually. The exceptions are the ones you carry. //</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s0\">Begin Again \u2014 Other Paths Were Possible</label>\n</div>\n</div>\n\n<!-- ENDING: TRADED -->\n<div id=\"scene_e_traded\" class=\"scene\">\n<pre>\n  PRISONER EXCHANGE\n  Glienicke Bridge \u2014 1974\n  [ EAST ] \u2190\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2014\u2192 [ WEST ]\n   You:  \u2190\n              \u2192 THEM:\n  The bridge is always cold.\n  The exchange is always quiet.\n</pre>\n<span class=\"scene-tag\">// ENDING: THE BRIDGE //</span>\n<div class=\"story-text\">\n    <p class=\"ending-title\"><span class=\"silver\">\u25c7 ENDING: GLIENICKE BRIDGE \u25c7</span></p>\n\n    <p>You spent four months in Hohensch\u00f6nhausen, which is a long time and not as long as some people spend. Kr\u00f6ger ran the interrogations personally, which you respected in the way that you can respect professional competence in an adversary without any of the warmth that word usually implies. You maintained cover for the first six weeks. Then you maintained a reduced cover \u2014 acknowledging British citizenship, denying operational role, which is the middle territory where interrogations tend to settle when neither side wants to push to the conclusion. Then, after the third month, the interrogations stopped, which meant negotiation had begun somewhere above both your heads.</p>\n\n    <p>The exchange happens on Glienicke Bridge in February 1974, on a morning of such committed grey that the sky and the river and the concrete of the bridge are all the same color and the only contrast is the people on both sides, walking toward each other across the midpoint. You walk east to west. Two Soviet intelligence officers walk west to east. The mathematics are asymmetric, which they always are \u2014 one British officer is worth two Soviet officers in the exchange rate of 1974, which sounds complimentary and isn't really, it just reflects the relative scarcity of useful people in each system.</p>\n\n    <p>You don't look back at the two Soviets. You don't know who they are. In the intelligence business, you generally don't.</p>\n\n    <p>Marsh meets you on the western end of the bridge and gives you a thermos of tea, which is precisely the right response to everything. She says nothing operational for forty-eight hours, which is her version of compassion and is effective.</p>\n\n    <p>At the debrief, you give everything you have: Volkov's location (confirmed, still in Russia), Kr\u00f6ger's operational methodology, the internal structure of the Hohensch\u00f6nhausen interrogation program, the names of two Stasi officers who expressed, during the interrogation months, a certain ambivalence about their work that suggested future exploitability. You give Feldmann's network as completely as you can reconstruct it.</p>\n\n    <p>The SOVA-7 cipher architecture is still in your head, intact, and you give it too. It's eleven months old now \u2014 there may have been revisions \u2014 but it's a starting point. GCHQ works with it for three months and breaks enough of the structure to recover 60% of intercepted traffic. Not complete. Useful.</p>\n\n    <p>Volkov, when you think about him \u2014 and you do, in the specific recurring way that unfinished business has \u2014 is still in Moscow. Still cryptographing. Still carrying everything he carries. You never kept your promise to him. The intelligence business is full of unkept promises. That doesn't make any specific one easier to leave behind.</p>\n\n    <p class=\"dim\">// You came back. That's more than some people manage. The Cold War has a specific talent for consuming professionals who believed themselves to be operating above its rules. You came back, which means you get to keep believing, for a while longer, that the rules can be navigated. Maybe they can. You'll find out. //</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s0\">Begin Again \u2014 The Bridge Goes Both Ways</label>\n</div>\n</div>\n\n<!-- ENDING: DEFECTED -->\n<div id=\"scene_e_defected\" class=\"scene\">\n<pre>\n  YOU CHOSE TO STAY.\n  West Berlin \u2192 East Berlin\n  A different kind of crossing.\n  Not every defection goes west.\n</pre>\n<span class=\"scene-tag\">// ENDING: THE OTHER DIRECTION //</span>\n<div class=\"story-text\">\n    <p class=\"ending-title\"><span class=\"blue\">\u25c6 ENDING: A DIFFERENT KIND OF CROSSING \u25c6</span></p>\n\n    <p>The offer came through Kr\u00f6ger, which is where offers like this always come from \u2014 the people with the authority to make them, delivered in the antiseptic air of an interrogation room after the initial positions have been established and the real conversation can begin.</p>\n\n    <p>It was specific and calibrated: your identity would be protected within the East German system. Your family \u2014 such as it was, a sister in Edinburgh who received Christmas cards from an older brother who traveled a great deal \u2014 would be told you had died in an accident. Your file would be closed in London as missing, presumed dead. And you would work, under Kr\u00f6ger's directorate, on counter-intelligence operations against the Western services. Not forever. For a period. Until your knowledge depreciated to the point of uselessness, at which point \u2014 and this was the part that required the most trust and received the least \u2014 you would be released to live quietly somewhere unremarkable, under a permanent cover identity, on a sufficient pension.</p>\n\n    <p>The thing that made you consider it \u2014 and you considered it, seriously, over three weeks \u2014 was not the offer itself. It was Volkov.</p>\n\n    <p>Volkov had, as Kr\u00f6ger confirmed with what seemed like genuine regret, not survived the October extraction attempt. He'd been shot in the same incident that you'd been captured in, and the medical care available at 23:00 in that particular district of East K\u00f6penick was not adequate to the wound. He died at 02:30 on Thursday morning. His daughter, Natalya, in Leningrad, received a notification that her father had died of a cardiac event. She attended his funeral with the bewildered grief of someone who didn't understand what they were losing, or why.</p>\n\n    <p>You had promised him three things. You had delivered none of them.</p>\n\n    <p>This is not a rational basis for the decision you made. It is, however, an honest one.</p>\n\n    <p>You chose to stay. Not from ideology. Not from coercion. From the specific weight of a dead man's trust and the knowledge that going back to London with a failed mission and a cleaned conscience would require a kind of self-forgiveness that you currently lacked the appetite for.</p>\n\n    <p>You worked for Kr\u00f6ger's directorate for seven years. You protected several British assets who would have been burned otherwise \u2014 quietly, through omission and misdirection, feeding accurate intelligence in areas where it wouldn't matter and inaccurate intelligence where it would. Whether this makes your decision a moral success is a question you'll spend a long time not answering.</p>\n\n    <p>In 1981, you were moved to Leipzig and given your permanent cover. The pension is adequate. The weather is grey. Sometimes you think about a bridge in February and wonder which direction you'd walk if you had to choose again.</p>\n\n    <p class=\"dim\">// Not every moral failure is clean. Not every loyalty is legible. And not every story about the Cold War ends with the spy coming in from the cold. Some of them stay. //</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s0\">Begin Again \u2014 The Bridge Is Always There</label>\n</div>\n</div>\n\n<!-- ENDING: DOUBLED -->\n<div id=\"scene_e_doubled\" class=\"scene\">\n<pre>\n  DOUBLE AGENT\n  You: British intelligence officer\n  Also you: East German asset\n  Also also you: KGB asset\n  The layers are the point.\n  The layers are all you.\n</pre>\n<span class=\"scene-tag\">// ENDING: MIRRORS ALL THE WAY DOWN //</span>\n<div class=\"story-text\">\n    <p class=\"ending-title\"><span class=\"silver\">\u25c8 ENDING: BROKEN MIRROR \u25c8</span></p>\n\n    <p>The SPARROW offering in Treptower Park was wrong, and you knew it the moment you felt certain it was right. Certainty is a red flag in tradecraft. Certainty means something has been engineered.</p>\n\n    <p>SPARROW was turned. Not recently \u2014 the evidence, when you assembled it later, suggested she'd been running as a double for at least two years, feeding the Stasi controlled intelligence that maintained her credibility while quietly identifying assets. The network she'd spent eleven years building was, partially, a Stasi creation: assets who were genuine, placed beside assets who were Stasi plants, in a configuration designed to give the appearance of a working network while steering it toward conclusions the Stasi wanted reached.</p>\n\n    <p>Volkov was also genuine. That's the part that takes the longest to accept \u2014 that the trap and the real thing can coexist in the same operation, that a genuine defector can be run alongside a Stasi sting without either knowing it fully, that the intelligence world is built of mirrors inside mirrors and at the center there is no solid object, just reflections of reflections.</p>\n\n    <p>You walked away from the Treptower Park meeting. You went to Marsh. You told her everything. You told her about SPARROW's network being partially constructed. You told her the SOVA-7 intelligence you'd held in your head through everything, carefully, with the systematic precision of someone who knows how much depends on it not being lost.</p>\n\n    <p>Marsh sat with all of it for a long time. Then: <em>\"SPARROW.\"</em></p>\n\n    <p><em>\"Yes.\"</em></p>\n\n    <p><em>\"You're certain.\"</em></p>\n\n    <p><em>\"No. Which is why I'm telling you and not acting.\"</em></p>\n\n    <p>She almost smiled. <em>\"Good. That's the right answer. The wrong answer was to assume and move.\"</em></p>\n\n    <p>SPARROW was extracted anyway \u2014 London judged that leaving her in place after a potential compromise was worse than losing a potentially good asset. She was debriefed for six months. The conclusion was equivocal: partial cooperation with the Stasi, partial genuine agency, motivations unclear. She was not prosecuted. She was retired. She moved to the Highlands and got a dog and apparently raises sheep, which is either metaphorically significant or simply what people do when the world of mirrors gets too reflective to inhabit comfortably.</p>\n\n    <p>Volkov never made it out. The operation that would have extracted him was never run, because by the time the debriefs finished, his residency at the Academy had ended and he'd returned to Moscow. He's still there, somewhere, carrying SOVA-7 in his head. London files him as an open case. It may close someday. It may not.</p>\n\n    <p class=\"dim\">// Operation Broken Mirror: named for the intelligence operation, but also for the thing that happens when you look at the intelligence world long enough. Every surface reflects every other surface. The spy, the double agent, the genuine defector, the genuine spy \u2014 all reflections of each other, all looking for something solid at the center. It's mirrors all the way down. //</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s0\">Begin Again \u2014 Some Mirrors Deserve Another Look</label>\n</div>\n</div>\n\n<!-- ENDING: CIPHER ONLY -->\n<div id=\"scene_e_cipher\" class=\"scene\">\n<pre>\n  CHECKPOINT CHARLIE\n  Westbound \u2014 alone\n  Briefcase: manuscripts\n  Head: SOVA-7 architecture (complete)\n  Volkov: East Berlin \u2014 Room 14\n  Decision: made\n</pre>\n<span class=\"scene-tag\">// ENDING: THE INTELLIGENCE FIRST //</span>\n<div class=\"story-text\">\n    <p class=\"ending-title\"><span class=\"gold\">\u25b3 ENDING: THE MISSION ABOVE THE MAN \u25b3</span></p>\n\n    <p>You crossed at Checkpoint Charlie alone, at 19:30, using your cultural exchange visa for the last time. The guard stamped your passport and handed it back and you walked across the line with SOVA-7 complete in your head and Volkov's face \u2014 the tired mathematician's eyes, the round-shouldered posture of a man who has carried too much for too long \u2014 in the part of your mind that your professional training has not yet managed to make quiet.</p>\n\n    <p>The intelligence is staggering in its completeness. GCHQ works on SOVA-7 for three weeks and breaks it entirely \u2014 not partially, not probabilistically, but completely and verifiably. The Cheltenham analysts describe it, later, in a report that will remain classified for thirty years, as the most significant single intelligence acquisition of the decade. Soviet military communications become transparent. Command structures become visible. The operational planning that was opaque the week before you went to East Berlin becomes, by the week after, fully readable.</p>\n\n    <p>The course of the Cold War shifts by a degree that isn't visible in real time but is visible in retrospect, in the accumulation of small decisions made by Western governments who suddenly knew, with a certainty they hadn't had before, what the Soviets were planning and what they weren't. Wars don't start. Crises de-escalate before they become crises. The world is, by a degree that cannot be measured precisely, safer.</p>\n\n    <p>You receive a commendation you can never discuss. A promotion. A new operational role that involves less East Berlin and more analysis, which is either a reward or a consolation depending on how you choose to read it.</p>\n\n    <p>Volkov was returned to Moscow at the end of his residency, on Friday, having made no successful contact with Western intelligence \u2014 officially. He was investigated by KGB internal security for the suspicion of intent, which resulted in a six-month security review, a demotion from his cryptography work, and a reassignment to administrative duties in a regional KGB office in Volgograd. His daughter, Natalya, completed her medical degree and became a pediatrician in Leningrad. She knows nothing about any of this. She probably never will.</p>\n\n    <p>You think about him sometimes. Not with guilt, exactly \u2014 guilt requires believing you made the wrong choice, and you're not sure you did. With something more like acknowledgement: the knowledge that the mission you chose to protect, and the man you chose not to protect, are both real and both permanent, and you carry both of them in the same space where Volkov carried SOVA-7.</p>\n\n    <p>Some things you carry. Some things carry themselves. The weight doesn't diminish over time \u2014 it just becomes familiar, which is a different thing, and perhaps the best you can hope for.</p>\n\n    <p class=\"dim\">// The intelligence won. The mission succeeded. The man was left behind. All three of these things are true simultaneously. The Cold War was full of situations like this, and most of them didn't have anyone this honest about what they were. //</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s0\">Begin Again \u2014 Volkov's Door Is Still Open</label>\n</div>\n</div>\n\n<!-- ENDING: FREE -->\n<div id=\"scene_e_free\" class=\"scene\">\n<pre>\n  WEST BERLIN \u2014 DAWN\n  Wednesday, 02:10\n  A man covered in things\n  that require a shower.\n  Looking at the sky.\n  Free, for the first time\n  in twenty-three years.\n</pre>\n<span class=\"scene-tag\">// ENDING: THE FIRST FREE MORNING //</span>\n<div class=\"story-text\">\n    <p class=\"ending-title\"><span class=\"green\">\u25c9 ENDING: WHAT FREEDOM LOOKS LIKE AT 02:10 \u25c9</span></p>\n\n    <p>You emerged from the sewer at 01:40 and Volkov came up after you and you both stood in a West Berlin service lane in October, covered in the specific residue of forty meters of pre-war sewage infrastructure, and looked at each other in the way that people look at each other when something impossible has just been accomplished through the medium of being willing to be very uncomfortable.</p>\n\n    <p>Volkov looked at the service lane. At the brick walls. At the orange sky above the city. He looked at these things with the systematic attention of a mathematician cataloguing a new environment \u2014 recording, classifying, the habit of mind that twenty-three years in Soviet intelligence had layered over whatever person he'd been before.</p>\n\n    <p>Then he said: <em>\"I haven't been outside the Soviet Union in eleven years.\"</em></p>\n\n    <p><em>\"You're still technically in Germany,\"</em> you said. <em>\"West Germany.\"</em></p>\n\n    <p><em>\"Yes. But it feels different from the inside.\"</em></p>\n\n    <p>It does. It always does.</p>\n\n    <p>The West Berlin contact arrived with towels and a change of clothes \u2014 the practical German competence of someone who has done this before and knows that the first thing people need after a sewer crossing is not a debrief or a congratulations but dry clothing and something hot to drink. The contact had tea. Of course he had tea. You're British.</p>\n\n    <p>Volkov's debrief in London takes three weeks and produces a 400-page classified document that becomes the foundation of the GCHQ's SOVA-7 decryption program. His daughter, Natalya, is approached by British intelligence through a diplomatic channel and given \u2014 without drama, through the ordinary mechanics of an international scholarship program \u2014 a medical fellowship at a London teaching hospital. She takes it. She knows why. She never asks anything directly. She is her father's daughter: she carries what she carries and doesn't require anyone to explain the weight.</p>\n\n    <p>Volkov lives in a house in Hampshire with a garden. He grows things \u2014 vegetables, which he approaches with the methodical attention of someone who has found in horticulture a system of problems that have actual solutions, which after twenty-three years of cryptography is perhaps not a coincidence. On Sunday mornings he takes long walks. On Tuesday evenings he plays chess with a neighbor who is probably not an intelligence officer but is competent enough that you've never been entirely certain.</p>\n\n    <p>He sends you a postcard, once a year, from somewhere in England. No message. Just a postcard. You keep them in a drawer.</p>\n\n    <p>Feldmann's network unravels over six months \u2014 the photographs and your report providing the thread, London's internal security pulling carefully until the whole cloth comes apart. The damage assessment is significant but containable. Several assets are brought in. Two are lost. Kr\u00f6ger is promoted within the Stasi for having run the best penetration operation of the decade, which is accurate and completely appropriate in the perverse way that things are appropriate in the intelligence world.</p>\n\n    <p>SPARROW retires from operational work but not from the business \u2014 she transitions to analysis, which suits her careful mind and her terrible habit of being right about things slightly too early for anyone to act on them. She sends you a bottle of West German wine at Christmas with a card that says nothing except her codename, which is the most personal communication you've ever received from her and which you therefore treasure.</p>\n\n    <p>The Wall stands for another sixteen years. People cross it and don't cross it and run toward it and run away from it and die trying and survive trying and eventually, on a Thursday night in November 1989, it stops being a wall and becomes a street, and the people of Berlin walk across it carrying pieces of it in their hands, which is what people do when a wall becomes a monument: they take it home, bit by bit, until there's nothing left but the memory of where it stood.</p>\n\n    <p>You're in London when it falls. You watch it on television. You think about a grey October Tuesday, a service lane, a man looking at the sky for the first time in eleven years. You think about forty meters of sewer and a gap of forty centimeters and the specific quality of freedom that can be won by being willing to be very uncomfortable for a very short time.</p>\n\n    <p class=\"dim\">// The sewer route, which was undignified and exact, was exactly right. Some paths to freedom look nothing like freedom from the outside. The inside is the point. //</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s0\">Begin Again \u2014 The Wall Has Other Doors</label>\n</div>\n</div>\n\n<!-- TRUE ENDING -->\n<div id=\"scene_e_true\" class=\"scene\">\n<pre>\n    *          *\n   /|\\        /|\\\n  / | \\      / | \\\n /  |  \\    /  |  \\\n/   |   \\  /   |   \\\n    |       |\n  WEST   EAST\n    |       |\n    '-------'\n  THE WALL ENDS.\n  EVERYTHING CONTINUES.\n</pre>\n<span class=\"scene-tag\">// TRUE ENDING: WHAT MATTERED ALL ALONG //</span>\n<div class=\"story-text\">\n    <p class=\"ending-title\"><span style=\"color: var(--gold-bright);\">\u2726 TRUE ENDING: THE COMPLETE ACCOUNT \u2726</span></p>\n\n    <p>To reach this point, you found SPARROW, understood the mole, neutralized Feldmann's ability to compromise the operation, reached Volkov, gave him the honest version of his three conditions rather than the comfortable lie, got him out through the tunnel, and arrived in West Berlin with both the intelligence and the man, intact, on a Wednesday night in October 1973, covered in the particular residue of a pastor's tunnel and a city's history of division.</p>\n\n    <p>This is what the complete account looks like:</p>\n\n    <p><strong>Aleksandr Volkov</strong> is debriefed over three weeks in a safe house in Wiltshire, where the October countryside is the exact opposite of East Berlin in every quality that can be measured \u2014 open, green, quiet, without watchtowers. He gives SOVA-7 in full, twice, allowing GCHQ to verify every element before beginning the decryption program. The program succeeds. Soviet military traffic becomes readable within six weeks. The intelligence benefit \u2014 measured in operational certainty that prevents two escalation events in 1974 alone \u2014 is incalculable in the literal sense: the events that don't happen cannot be counted.</p>\n\n    <p><strong>Natalya Volkova</strong> receives a medical fellowship at University College London through a scholarship program that is genuine except for the mechanism that identified her for it. She completes her fellowship and stays. She and her father live in Hampshire. They have dinner on Sundays. She grows up knowing, without ever discussing it, that the distance between the life she has and the life she might have had is her father's choice, made in a guesthouse in K\u00f6penick on a Tuesday in October, and one anonymous British officer who went through a sewer in the middle of the night because a man's trust is heavier than convenience.</p>\n\n    <p><strong>SPARROW</strong> continues operating for three more years, until she chooses to come in of her own accord in 1976. Her network \u2014 the real one, not the partial structure Kr\u00f6ger had been monitoring \u2014 produces eighteen additional intelligence successes before the curtain closes. At her retirement dinner, which is attended by eight people whose names are not in any official record, she gives a speech that lasts four minutes and contains, in the middle of it, a single sentence that you will remember for the rest of your career: <em>\"The best operations are the ones where everyone who matters comes home. The criterion is 'matters,' not 'everyone' \u2014 we are always making hard decisions about what matters. The discipline is making them honestly.\"</em></p>\n\n    <p><strong>Feldmann</strong> is broken by her own network. The photographs, the report, and the subsequent investigation reveal not just her Stasi connection but the connection behind it \u2014 a recruitment dating to 1965, in the ideological turbulence after the building of the Wall, when she had believed that the division of Germany was a crime committed equally by both sides and that providing limited intelligence to the East German services was a form of parity. By 1973, she had long since stopped believing this and had continued anyway, which is the most common form of moral failure in the intelligence community and also the hardest to prosecute. She is quietly removed from service, her pension reduced but not eliminated, her family \u2014 a husband who knew nothing and a daughter in university \u2014 allowed to keep the ordinary life that her choices nearly destroyed.</p>\n\n    <p><strong>Kr\u00f6ger</strong> is promoted. This is appropriate. He ran a sophisticated operation against British intelligence that succeeded in identifying one mole and nearly succeeded in identifying you. His failure to close the Volkov extraction is noted in his file as an operational shortcoming but is balanced against his successes, and the Stasi, like every intelligence service, prefers productive people to perfect ones. He retires in 1985. In 1989, he watches the Wall fall from a television in his Pankow apartment with the expression of a man watching a building he spent decades constructing be demolished by a crowd carrying hammers they found in the rubble of history. You never meet him. You don't need to. You know him well enough.</p>\n\n    <p><strong>The Wall</strong> stands until November 9th, 1989, which is sixteen years after this story, and falls in a night that no political scientist, intelligence analyst, or historian predicted with precision, which is the Wall's last and most complete joke \u2014 that the thing that everyone knew was wrong and temporary and sustained only by institutional inertia lasted exactly as long as the institutional inertia held, and no longer, and the moment the inertia faltered, the people crossed in an evening.</p>\n\n    <p>You are in West Berlin that night. You're there for a different reason \u2014 a different operation, a different brief, the ordinary machinery of a career that keeps producing occasions. You hear the news at 21:00 and walk to the Brandenburg Gate, where the crowd is growing with the speed of something that has been waiting for years and is now simply spilling over all available surfaces. The sound is extraordinary \u2014 not a roar, not a cheer, but a kind of sustained human noise that has no name because it doesn't happen often enough to have been given one, the sound of a collective impossibility becoming possible.</p>\n\n    <p>You stand at the edge of the crowd for a long time. You think about a pastor's tunnel in Prenzlauer Berg, which by now has been sealed and forgotten, its three hundred and forty meters of timber-reinforced passage slowly filling with groundwater and leaf-fall and the quiet archaeology of things that mattered once and are slowly becoming simply underground. You think about Volkov's face when he came out of the tunnel into the West Berlin shed \u2014 the way he didn't immediately speak, just stood, taking it in with the systematic attention of a mathematician and the unguarded bewilderment of a man who has just crossed a threshold he spent twenty years approaching.</p>\n\n    <p>Someone near you in the crowd has a bottle of Sekt. They offer it. You take it. You drink. The Wall's lights are still on \u2014 the watchtowers, the flood lights, the infrastructure of a border that is technically still standing but functionally over. Tomorrow they'll start taking pieces of it home. Tonight it just stands there in its lights, a very large object that has already become a ruin without quite knowing it yet.</p>\n\n    <p>There is a postcard at home in your desk, from Volkov. This year's is of the New Forest in autumn. No message. Just the postcard. You've been keeping them for sixteen years.</p>\n\n    <p>In the morning, you'll write him a letter. Not operational. Not professional. Just a letter, from one person to another, saying: the Wall fell last night, and I was there, and I thought about you, and I'm glad you're not on the other side of it anymore. You'll sign it with your real name, which is the name he knows you by, because there was a moment in a guesthouse room in K\u00f6penick where the professional identities fell away and you were just two people trying to get the same person to the same place, and that moment has a kind of authority that doesn't expire.</p>\n\n    <p class=\"dim\">// To reach the true ending, you found the truth beneath the operation: SPARROW's genuine intelligence, Feldmann's real nature, Volkov's honest conditions, and the route that required the most discomfort and the least hesitation. You gave the honest version of the guarantees. You used the tunnel \u2014 the one built by people who believed that division was wrong and acted on it with shovels and timber and twenty-five minutes of darkness. And you arrived with both the intelligence and the man, which is the only version of this operation that deserves to be called a success. Everything else \u2014 the cipher, the mole, the mission \u2014 is secondary to the fact that a person who asked for help received it, completely, without condition. In a business built on conditions, that's the extraordinary thing. //</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s0\">Begin Again \u2014 The Wall Has Many Doors, and Not All of Them Are Over</label>\n</div>\n<p class=\"note\">// THE BERLIN CIPHER \u2014 A Cold War Story //<br>8 endings \u00b7 4 main branches \u00b7 60+ scenes \u00b7 The Wall is real. Every choice leaves a mark. //</p>\n</div>\n\n</div><!-- .game-container -->\n</body>\n</html>\n",
  "gothic": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Choose Your Own Adventure</title>\n    <style>\n        :root {\n            --blood: #cc2222;\n            --blood-bright: #ff4444;\n            --blood-dim: #661111;\n            --candle: #ff9933;\n            --candle-dim: #885511;\n            --shadow: #0a0202;\n            --parchment: #ddbb88;\n            --silver: #aaaacc;\n            --glow-blood: rgba(204, 34, 34, 0.35);\n            --glow-candle: rgba(255, 153, 51, 0.25);\n            --glow-crypt: rgba(150, 40, 40, 0.4);\n            --glow-garden: rgba(180, 60, 60, 0.3);\n            --glow-tower: rgba(200, 80, 80, 0.35);\n            --glow-dawn: rgba(255, 180, 140, 0.3);\n        }\n\n        * {\n            box-sizing: border-box;\n            margin: 0;\n            padding: 0;\n        }\n\n        body {\n            background: #050101;\n            color: var(--blood-bright);\n            font-family: 'Courier New', 'Courier', 'Lucida Console', monospace;\n            padding: 16px;\n            line-height: 1.6;\n            min-height: 100vh;\n            background-image: repeating-linear-gradient(0deg,\n                    transparent,\n                    transparent 3px,\n                    rgba(30, 2, 2, 0.04) 3px,\n                    rgba(30, 2, 2, 0.04) 6px);\n            background-size: 100% 6px;\n            background-attachment: fixed;\n        }\n\n        .game-container {\n            max-width: 740px;\n            margin: 0 auto;\n            border: 2px solid var(--blood);\n            padding: 30px 24px;\n            min-height: 84vh;\n            box-shadow: 0 0 30px var(--glow-blood), inset 0 0 50px rgba(180, 20, 20, 0.04);\n            background: radial-gradient(ellipse at center,\n                    rgba(30, 8, 8, 0.7) 0%,\n                    rgba(5, 1, 1, 0.97) 72%);\n            transition: box-shadow 0.6s ease, border-color 0.6s ease, color 0.6s ease;\n        }\n\n        .env-candle {\n            box-shadow: 0 0 28px var(--glow-candle);\n            border-color: var(--candle);\n            color: #f0c080;\n        }\n        .env-crypt {\n            box-shadow: 0 0 28px var(--glow-crypt);\n            border-color: #993333;\n            color: #dd8888;\n        }\n        .env-garden {\n            box-shadow: 0 0 28px var(--glow-garden);\n            border-color: #aa4444;\n            color: #e0a0a0;\n        }\n        .env-tower {\n            box-shadow: 0 0 28px var(--glow-tower);\n            border-color: #bb5555;\n            color: #f0b0b0;\n        }\n        .env-dawn {\n            box-shadow: 0 0 28px var(--glow-dawn);\n            border-color: #ddaa88;\n            color: #ffe0c8;\n        }\n\n        pre {\n            font-size: 12px;\n            white-space: pre;\n            text-align: center;\n            margin-bottom: 24px;\n            text-shadow: 0 0 7px currentColor;\n            line-height: 1.25;\n            overflow-x: auto;\n            letter-spacing: 0;\n            animation: flickerIn 1s ease-out;\n            padding: 2px 0;\n        }\n\n        @keyframes flickerIn {\n            0% {\n                opacity: 0;\n                text-shadow: 0 0 35px currentColor;\n            }\n            18% {\n                opacity: 0.35;\n            }\n            30% {\n                opacity: 0.8;\n                text-shadow: 0 0 15px currentColor;\n            }\n            45% {\n                opacity: 0.5;\n            }\n            60% {\n                opacity: 0.9;\n            }\n            78% {\n                opacity: 0.55;\n            }\n            100% {\n                opacity: 1;\n                text-shadow: 0 0 7px currentColor;\n            }\n        }\n\n        .scene-tag {\n            display: block;\n            font-size: 0.7rem;\n            letter-spacing: 3px;\n            color: var(--blood-dim);\n            text-align: center;\n            margin-bottom: 16px;\n            text-transform: uppercase;\n        }\n\n        .story-text {\n            font-size: 1.1rem;\n            margin-bottom: 28px;\n            padding: 0 4px;\n            line-height: 1.75;\n            animation: fadeIn 0.55s ease-out;\n        }\n\n        @keyframes fadeIn {\n            from {\n                opacity: 0;\n                transform: translateY(8px);\n            }\n            to {\n                opacity: 1;\n                transform: translateY(0);\n            }\n        }\n\n        .story-text p {\n            margin-bottom: 13px;\n        }\n        .story-text p:last-child {\n            margin-bottom: 0;\n        }\n\n        strong {\n            color: var(--blood-bright);\n            font-weight: bold;\n        }\n        em {\n            color: var(--candle);\n            font-style: italic;\n        }\n        .silver {\n            color: var(--silver);\n        }\n        .dim {\n            color: var(--blood-dim);\n        }\n        .warn {\n            color: #ff6666;\n        }\n\n        hr {\n            border: none;\n            border-top: 1px solid var(--blood-dim);\n            margin: 20px 0;\n            opacity: 0.4;\n        }\n\n        .choices {\n            display: flex;\n            flex-direction: column;\n            gap: 12px;\n            align-items: center;\n            margin-top: 6px;\n        }\n\n        label {\n            display: inline-block;\n            border: 1px solid currentColor;\n            padding: 13px 24px;\n            cursor: pointer;\n            text-transform: uppercase;\n            letter-spacing: 2px;\n            background: rgba(10, 2, 2, 0.6);\n            font-weight: bold;\n            font-size: 0.82rem;\n            width: 86%;\n            text-align: center;\n            transition: background 0.2s, box-shadow 0.2s, transform 0.15s;\n            user-select: none;\n            position: relative;\n        }\n\n        label::before {\n            content: '> ';\n            opacity: 0;\n            transition: opacity 0.15s;\n        }\n\n        label:hover::before {\n            opacity: 1;\n            animation: blink 0.65s step-end infinite;\n        }\n\n        @keyframes blink {\n            50% {\n                opacity: 0;\n            }\n        }\n\n        label:hover {\n            background: currentColor;\n            color: #0a0202 !important;\n            box-shadow: 0 0 22px currentColor;\n            transform: scale(1.025);\n        }\n\n        label:active {\n            transform: scale(0.97);\n            transition: transform 0.08s;\n        }\n\n        .ending-title {\n            font-size: 1.25rem;\n            letter-spacing: 2px;\n            text-align: center;\n            margin-bottom: 18px;\n            text-shadow: 0 0 12px currentColor;\n        }\n\n        .note {\n            font-size: 0.76rem;\n            color: var(--blood-dim);\n            text-align: center;\n            margin-top: 10px;\n            font-style: italic;\n        }\n\n        input[type=\"radio\"] {\n            display: none;\n        }\n        .scene {\n            display: none;\n            animation: fadeIn 0.5s ease-out;\n        }\n\n        /* STATE MACHINE */\n        #s0:checked~.game-container #scene0,\n        #s1_gate:checked~.game-container #scene1_gate,\n        #s1_balcony:checked~.game-container #scene1_balcony,\n        #s1_grounds:checked~.game-container #scene1_grounds,\n        #s2_hall:checked~.game-container #scene2_hall,\n        #s2_chamber:checked~.game-container #scene2_chamber,\n        #s2_garden:checked~.game-container #scene2_garden,\n        #s3_accept:checked~.game-container #scene3_accept,\n        #s3_refuse:checked~.game-container #scene3_refuse,\n        #s3_free:checked~.game-container #scene3_free,\n        #s3_suspicious:checked~.game-container #scene3_suspicious,\n        #s3_crypt:checked~.game-container #scene3_crypt,\n        #s3_servants:checked~.game-container #scene3_servants,\n        #s4_feast:checked~.game-container #scene4_feast,\n        #s4_library:checked~.game-container #scene4_library,\n        #s4_betrayal:checked~.game-container #scene4_betrayal,\n        #s4_ally:checked~.game-container #scene4_ally,\n        #s4_sarcophagus:checked~.game-container #scene4_sarcophagus,\n        #s4_passage:checked~.game-container #scene4_passage,\n        #s5_tower_key:checked~.game-container #scene5_tower_key,\n        #s5_cellar:checked~.game-container #scene5_cellar,\n        #s5_tower_climb:checked~.game-container #scene5_tower_climb,\n        #s5_relic_room:checked~.game-container #scene5_relic_room,\n        #s5_confront:checked~.game-container #scene5_confront,\n        #s5_escape_run:checked~.game-container #scene5_escape_run,\n        #e_thrall:checked~.game-container #scene_e_thrall,\n        #e_trapped:checked~.game-container #scene_e_trapped,\n        #e_relic_cost:checked~.game-container #scene_e_relic_cost,\n        #e_slain:checked~.game-container #scene_e_slain,\n        #e_true:checked~.game-container #scene_e_true,\n        #e_escape:checked~.game-container #scene_e_escape {\n            display: block;\n        }\n\n        @media (max-width: 520px) {\n            .game-container {\n                padding: 18px 12px;\n            }\n            pre {\n                font-size: 10px;\n            }\n            .story-text {\n                font-size: 0.95rem;\n            }\n            label {\n                width: 94%;\n                font-size: 0.76rem;\n                padding: 11px 14px;\n                letter-spacing: 1px;\n            }\n            .ending-title {\n                font-size: 1.05rem;\n            }\n        }\n    </style>\n</head>\n<body>\n<a href=\"#\" onclick=\"window.parent.showMenu();return false;\" style=\"color:white;cursor:pointer;\">Back to Home</a>\n    <!-- STATE INPUTS -->\n    <input type=\"radio\" name=\"game\" id=\"s0\" checked>\n    <input type=\"radio\" name=\"game\" id=\"s1_gate\">\n    <input type=\"radio\" name=\"game\" id=\"s1_balcony\">\n    <input type=\"radio\" name=\"game\" id=\"s1_grounds\">\n    <input type=\"radio\" name=\"game\" id=\"s2_hall\">\n    <input type=\"radio\" name=\"game\" id=\"s2_chamber\">\n    <input type=\"radio\" name=\"game\" id=\"s2_garden\">\n    <input type=\"radio\" name=\"game\" id=\"s3_accept\">\n    <input type=\"radio\" name=\"game\" id=\"s3_refuse\">\n    <input type=\"radio\" name=\"game\" id=\"s3_free\">\n    <input type=\"radio\" name=\"game\" id=\"s3_suspicious\">\n    <input type=\"radio\" name=\"game\" id=\"s3_crypt\">\n    <input type=\"radio\" name=\"game\" id=\"s3_servants\">\n    <input type=\"radio\" name=\"game\" id=\"s4_feast\">\n    <input type=\"radio\" name=\"game\" id=\"s4_library\">\n    <input type=\"radio\" name=\"game\" id=\"s4_betrayal\">\n    <input type=\"radio\" name=\"game\" id=\"s4_ally\">\n    <input type=\"radio\" name=\"game\" id=\"s4_sarcophagus\">\n    <input type=\"radio\" name=\"game\" id=\"s4_passage\">\n    <input type=\"radio\" name=\"game\" id=\"s5_tower_key\">\n    <input type=\"radio\" name=\"game\" id=\"s5_cellar\">\n    <input type=\"radio\" name=\"game\" id=\"s5_tower_climb\">\n    <input type=\"radio\" name=\"game\" id=\"s5_relic_room\">\n    <input type=\"radio\" name=\"game\" id=\"s5_confront\">\n    <input type=\"radio\" name=\"game\" id=\"s5_escape_run\">\n    <input type=\"radio\" name=\"game\" id=\"e_thrall\">\n    <input type=\"radio\" name=\"game\" id=\"e_trapped\">\n    <input type=\"radio\" name=\"game\" id=\"e_relic_cost\">\n    <input type=\"radio\" name=\"game\" id=\"e_slain\">\n    <input type=\"radio\" name=\"game\" id=\"e_true\">\n    <input type=\"radio\" name=\"game\" id=\"e_escape\">\n\n    <!-- GAME CONTAINER -->\n    <div class=\"game-container\" id=\"gameBox\">\n\n        <!-- ============ SCENE 0 \u2014 ARRIVAL ============ -->\n        <div id=\"scene0\" class=\"scene\">\n            <pre>\n        .    *    .\n      .   . | .   .\n    .   .   |   .   .\n      .   . | .   .\n        .   |   .\n    ---+---+---+---\n       /    |    \\\n      /     |     \\\n     /      |      \\\n    /       |       \\\n   /    __  |  __    \\\n  /    /  \\ | /  \\    \\\n /____/    \\|/    \\____\\\n      |     |     |\n      |  CASTLE   |\n      | SANGUINE  |\n      |_____|_____|\n    </pre>\n            <span class=\"scene-tag\">// CARPATHIAN FOOTHILLS \u2014 NIGHT OF THE HUNTER'S MOON //</span>\n            <div class=\"story-text\">\n                <p>The castle rises against the moon like a blade held to the sky. You've been walking since dusk, following the old road that winds through the Carpathian foothills \u2014 a road the villagers back home swore was cursed. <em>\"Nobody who goes to Castle Sanguine comes back the same,\"</em> they said. <em>\"Most don't come back at all.\"</em></p>\n\n                <p>But your village is dying. The <strong>Crimson Plague</strong> has taken thirty-seven souls this winter alone. The healers have tried everything. The priests have prayed. Nothing works. Then Elder Vasile, on his deathbed, whispered about the castle \u2014 about a relic hidden within, the <strong>Heart of Sanguine</strong>, a crystalline object said to purify blood and cure any ailment. He described it in detail before the fever took him: a fist-sized gem the color of fresh arterial blood, warm to the touch, kept in the highest tower behind a door that only opens under moonlight.</p>\n\n                <p>You volunteered. Someone had to. Now, standing before the iron gates with your lantern flickering in the mountain wind, you're not sure whether you were brave or just desperate.</p>\n\n                <p>The castle is enormous \u2014 black stone, gothic spires, narrow windows that glow faintly from within. The front gate is slightly ajar, rust flaking from the hinges. To the left, ivy climbs the wall toward a balconied window on the second floor. To the right, a low stone wall encloses what appears to be an overgrown garden, its iron gate hanging loose.</p>\n\n                <p class=\"dim\">// Three ways in. Each holds its own peril. Choose quickly \u2014 the moon is rising, and something inside this castle knows you're here. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"s1_gate\">Enter through the main gate \u2014 bold and direct</label>\n                <label for=\"s1_balcony\">Climb the ivy to the balconied window above</label>\n                <label for=\"s1_grounds\">Slip into the overgrown garden through the side gate</label>\n            </div>\n        </div>\n\n        <!-- ============ SCENE 1A \u2014 MAIN GATE ============ -->\n        <div id=\"scene1_gate\" class=\"scene\">\n            <pre>\n      /\\    /\\    /\\\n     /  \\  /  \\  /  \\\n    /    \\/    \\/    \\\n    |    /\\    /\\    |\n    |   /  \\  /  \\   |\n    |  /    \\/    \\  |\n    | /     /\\     \\ |\n    |/     /  \\     \\|\n    [   GREAT HALL   ]\n    [   candles lit  ]\n    </pre>\n            <span class=\"scene-tag\">// CASTLE SANGUINE \u2014 GREAT HALL \u2014 THE HOUR OF WELCOME //</span>\n            <div class=\"story-text\">\n                <p>The main gate groans as you push it open, the sound echoing through stone corridors like a long-held breath finally released. Beyond is the great hall \u2014 vast, arched ceilings lost in shadow, tall windows draped in burgundy velvet, and a long dining table set for one. Candles flicker in iron sconces, their flames a warm amber that feels almost inviting after the cold climb up the mountain.</p>\n\n                <p>At the far end of the table, a figure rises from a high-backed chair. He is tall, lean, dressed in a black velvet coat with silver buttons. His face is pale \u2014 not the pallor of illness, but the polished white of marble. His eyes are dark and deep-set, and when he smiles, it doesn't quite reach them. <em>\"A guest,\"</em> he says, his voice smooth as old silk. <em>\"How rare. How delightful. Please \u2014 sit. Eat. You must be exhausted.\"</em> He gestures to the table, where a covered platter steams faintly.</p>\n\n                <p>Behind him, partially concealed by a curtain, you glimpse a narrow stone staircase spiraling upward. A faint reddish glow pulses from somewhere above \u2014 rhythmic, like a heartbeat made visible.</p>\n\n                <p class=\"dim\">// The man has not introduced himself. The food smells incredible. The glow from upstairs is exactly the color Elder Vasile described. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_accept\">Accept the stranger's hospitality \u2014 sit, eat, learn what you can</label>\n                <label for=\"s3_refuse\">Politely decline \u2014 something about this feast feels wrong</label>\n            </div>\n        </div>\n\n        <!-- ============ SCENE 1B \u2014 BALCONY ============ -->\n        <div id=\"scene1_balcony\" class=\"scene\">\n            <pre>\n      |   |\n      |   |\n      |   |\n     /     \\\n    /       \\\n   /    _    \\\n  /    / \\    \\\n /    /   \\    \\\n|    /     \\    |\n|   /       \\   |\n|  /  CHAMBER \\  |\n| /_____________\\ |\n    </pre>\n            <span class=\"scene-tag\">// CASTLE SANGUINE \u2014 UPPER CHAMBER \u2014 THE PRISONER'S WINDOW //</span>\n            <div class=\"story-text\">\n                <p>The ivy is thick and ancient \u2014 your hands find purchase easily, and within a few tense minutes you're pulling yourself onto a stone balcony. The window beyond is cracked open, lace curtains stirring in the cold breeze. You slip inside.</p>\n\n                <p>The chamber is unexpectedly warm. A fire crackles in a marble hearth. Bookshelves line one wall, filled with leather-bound volumes in languages you don't recognize. And against the far wall, chained by one ankle to an iron ring set in the stone, sits a young woman in a simple gray dress. Her hair is dark, her eyes are tired, and when she sees you, she flinches \u2014 then leans forward with desperate hope.</p>\n\n                <p><em>\"Please,\"</em> she whispers, <em>\"you have to get me out of here. The key is on the mantle. Please \u2014 he'll be back soon. He's not what he seems. None of this is what it seems.\"</em> She points to a small iron key resting on the fireplace mantle. <em>\"My name is Anna. I was a traveler, like you. He's kept me here for months. Please.\"</em></p>\n\n                <p>Through the chamber door, you hear footsteps \u2014 slow, deliberate, ascending stone stairs. You have maybe two minutes.</p>\n\n                <p class=\"dim\">// Her story makes sense. But there's something about the way she watches you \u2014 too focused, too calm for someone who's been imprisoned for months. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_free\">Take the key and free her \u2014 no one deserves to be chained</label>\n                <label for=\"s3_suspicious\">Something's off \u2014 leave her and investigate the room yourself</label>\n            </div>\n        </div>\n\n        <!-- ============ SCENE 1C \u2014 GARDEN ============ -->\n        <div id=\"scene1_grounds\" class=\"scene\">\n            <pre>\n      \\|/  \\|/  \\|/\n       O    O    O\n        \\   |   /\n         \\  |  /\n          \\ | /\n     .-\"\"\"-|-\"\"\"-.\n    /  o o  |  o o  \\\n    |   ~   |   ~   |\n    \\       |       /\n     '-...- | -...-'\n            |\n      [ IRON GATE ]\n      [ creaking  ]\n    </pre>\n            <span class=\"scene-tag\">// CASTLE SANGUINE \u2014 OVERGROWN GARDEN \u2014 THE ROSE COURT //</span>\n            <div class=\"story-text\">\n                <p>The garden gate swings open with a sound like a whispered complaint. Inside, the garden has gone wild \u2014 rose bushes grown into tangled walls, their blooms a deep, unsettling red that looks almost black in the moonlight. The air is thick with their scent, cloying and sweet, layered over something earthier beneath. Stone benches sit half-buried in moss. A dry fountain stands at the center, its basin cracked.</p>\n\n                <p>At the far end of the garden, a stone staircase descends into the earth \u2014 the <strong>family crypt</strong>, its entrance framed by two weathered statues of hooded figures with clasped hands. Beside it, a smaller building with a chimney \u2014 the <strong>servants' quarters</strong> \u2014 leans tiredly against the outer wall, its door hanging open.</p>\n\n                <p>You notice that the roses nearest the crypt are different \u2014 they glow very faintly, a soft red luminescence that pulses in time with something you can't quite feel. The same rhythmic pattern the Elder described when he spoke of the Heart of Sanguine.</p>\n\n                <p class=\"dim\">// The crypt promises answers. The servants' quarters promise information. The roses promise nothing but secrets. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_crypt\">Descend into the family crypt \u2014 the roses point the way</label>\n                <label for=\"s3_servants\">Enter the servants' quarters \u2014 learn who tends this place</label>\n            </div>\n        </div>\n\n        <!-- ============ SCENE 3A \u2014 ACCEPT HOSPITALITY ============ -->\n        <div id=\"scene3_accept\" class=\"scene\">\n            <pre>\n   +-------------------+\n   |  [covered platter] |\n   |  [wine goblet]     |\n   |  [stranger smiles] |\n   +-------------------+\n         \\     /\n          \\   /\n           \\ /\n            *\n    </pre>\n            <span class=\"scene-tag\">// GREAT HALL \u2014 THE FEAST //</span>\n            <div class=\"story-text\">\n                <p>You sit. The stranger's smile deepens. <em>\"Wise,\"</em> he murmurs, and pours you a glass of wine so dark it's nearly black. <em>\"I am Count Mircalla Sanguine. This castle has been my family's home for \u2014 well. A very long time.\"</em> He doesn't specify how long. The wine tastes of blackberries and something metallic, like iron or old blood.</p>\n\n                <p>As you eat, he talks. About the castle's history, about the valley below, about the plague that's been sweeping through the villages. He mentions it casually, the way one might mention the weather, but his dark eyes watch your reaction with unsettling intensity. <em>\"The Crimson Plague is a tragedy,\"</em> he says. <em>\"But not a natural one. Someone designed it. Someone who wanted to test whether a population under extreme duress would produce \u2014 interesting results.\"</em> He swirls his wine. <em>\"I know who. And I know where the cure is kept.\"</em></p>\n\n                <p>He leans forward. <em>\"The Heart of Sanguine. It's real. It's in my tower. I can give it to you \u2014 but I need something in return. A small thing. A vial of your blood. Just one. For my... research.\"</em></p>\n\n                <p class=\"dim\">// The Count's eyes have not blinked once during this entire conversation. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"s5_tower_key\">Agree \u2014 give the Count a vial of your blood and take the Heart</label>\n                <label for=\"s4_library\">Stall \u2014 ask to see his research first, learn more before committing</label>\n            </div>\n        </div>\n\n        <!-- ============ SCENE 3B \u2014 REFUSE HOSPITALITY ============ -->\n        <div id=\"scene3_refuse\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  NO   \\\n     |   !   |\n     \\       /\n      '-...-'\n       /   \\\n      /     \\\n    </pre>\n            <span class=\"scene-tag\">// GREAT HALL \u2014 THE REFUSAL //</span>\n            <div class=\"story-text\">\n                <p><em>\"I'd rather not eat,\"</em> you say, keeping your voice steady. <em>\"But I'd appreciate information. I'm looking for something.\"</em></p>\n\n                <p>The stranger's smile freezes for just a moment \u2014 a flicker of something cold passing behind his eyes \u2014 then returns. <em>\"Of course,\"</em> he says, though his tone has cooled. <em>\"You're here for the Heart. They always are.\"</em> He sets down his goblet and rises. <em>\"I won't stop you from seeking it. The tower door is at the top of the staircase behind me. It opens only under direct moonlight, which you'll find streaming through the upper window in approximately twelve minutes.\"</em> He pauses. <em>\"But I should warn you \u2014 the Heart is guarded. Not by me. By something older than me, and considerably less polite.\"</em></p>\n\n                <p>He gestures toward a side door. <em>\"If you want to understand what you're walking into, visit my library first. First door on the left. The records there go back three hundred years. They'll tell you everything you need to know about the Heart \u2014 and about me.\"</em></p>\n\n                <p class=\"dim\">// He's being unusually helpful for someone who clearly doesn't want you here. Either he's confident you'll fail, or he's testing you. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_library\">Go to the library \u2014 knowledge is a weapon</label>\n                <label for=\"s5_tower_key\">Head straight for the tower \u2014 you've wasted enough time</label>\n            </div>\n        </div>\n\n        <!-- ============ SCENE 3C \u2014 FREE THE PRISONER ============ -->\n        <div id=\"scene3_free\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  KEY  \\\n     |   ~   |\n     \\       /\n      '-...-'\n       |   |\n       |   |\n    </pre>\n            <span class=\"scene-tag\">// UPPER CHAMBER \u2014 THE UNCHAINING //</span>\n            <div class=\"story-text\">\n                <p>You grab the key and unlock the shackle. Anna gasps, rubbing her ankle, and stands on unsteady legs. <em>\"Thank you,\"</em> she breathes. <em>\"Thank you \u2014 we don't have much time. He'll be here any minute.\"</em></p>\n\n                <p>She leads you through a servant's corridor behind the bookcase \u2014 a narrow passage you never would have found alone \u2014 and down a spiraling stairwell into the bowels of the castle. <em>\"The Heart of Sanguine is real,\"</em> she says as you descend. <em>\"But the Count lied about what it does. It doesn't just cure the plague. It creates it. The plague is his design \u2014 a modified version of an older disease, something alchemical. He spreads it, then waits for desperate people to come looking for the cure. And when they do...\"</em> She stops at a heavy oak door. <em>\"He offers them a choice. Their blood for the Heart. But the Heart doesn't cure anything. It just makes them carriers. They go home, the plague stops in their village, and starts in the next one. He's been doing it for centuries.\"</em></p>\n\n                <p>She turns to face you. Her eyes are strange in the torchlight \u2014 too reflective, almost luminous. <em>\"The real cure is in the crypt,\"</em> she says. <em>\"But you'll need me to get past the guardian. I can help you \u2014 if you trust me.\"</em></p>\n\n                <p class=\"dim\">// She knows an awful lot for someone who was supposedly chained up for months. But her information matches too many details to be entirely false. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"s5_cellar\">Follow Anna to the crypt \u2014 she seems to know the way</label>\n                <label for=\"s4_betrayal\">Stop here \u2014 demand to know who she really is before going further</label>\n            </div>\n        </div>\n\n        <!-- ============ SCENE 3D \u2014 SUSPICIOUS OF ANNA ============ -->\n        <div id=\"scene3_suspicious\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  ? ?  \\\n     |   ~   |\n     \\       /\n      '-...-'\n    </pre>\n            <span class=\"scene-tag\">// UPPER CHAMBER \u2014 TRUST YOUR INSTINCTS //</span>\n            <div class=\"story-text\">\n                <p>You leave the key on the mantle and instead examine the room. Anna's expression shifts \u2014 the desperate hope flickers, replaced by something colder. <em>\"You're making a mistake,\"</em> she says, but her voice is different now, lower, and the chains rattle as she shifts her weight in a way that doesn't look uncomfortable at all.</p>\n\n                <p>You search the bookshelves and find a journal \u2014 handwritten, in elegant script. It details the castle's residents: Count Mircalla Sanguine, his sister <strong>Lady Annelise</strong>, and their retainers. The journal is dated 1743. A pressed rose falls from its pages, perfectly preserved, the same deep crimson as the ones blooming in the garden outside.</p>\n\n                <p>A bookmark notes: <em>\"Annelise was bitten in the spring of 1739. She retains her faculties but cannot leave the castle. She hungers. The Count keeps her in the upper chamber during daylight hours for her own protection \u2014 and for the protection of visitors. She is not dangerous unless freed by moonlight. She is very dangerous then.\"</em></p>\n\n                <p>The footsteps in the hallway are closer now. Anna \u2014 Annelise \u2014 is smiling at you from her chains, and it's not a grateful smile. It's the smile of something that has been waiting a very long time for someone to make the wrong choice.</p>\n\n                <p class=\"dim\">// You made the right call. Now you need to get out of this room before the Count \u2014 or his sister \u2014 decides you've overstayed your welcome. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_ally\">Wait for the Count \u2014 if Annelise is the danger, he may be an ally</label>\n                <label for=\"s5_escape_run\">Flee through the servant's passage behind the bookcase</label>\n            </div>\n        </div>\n\n        <!-- ============ SCENE 3E \u2014 CRYPT ============ -->\n        <div id=\"scene3_crypt\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  REST \\\n     |   IN  |\n     \\  PEACE/\n      '-...-'\n       |   |\n       |   |\n      /     \\\n     /       \\\n    </pre>\n            <span class=\"scene-tag\">// CASTLE SANGUINE \u2014 FAMILY CRYPT \u2014 BELOW THE ROSE COURT //</span>\n            <div class=\"story-text\">\n                <p>The crypt stairs are worn smooth by centuries of footsteps. At the bottom, a heavy stone chamber opens before you \u2014 lined with sarcophagi, each carved with the Sanguine family crest: a rose with a dagger through its stem. Candles burn in alcoves, though you can't imagine who lit them. The air is cold and smells of old stone and dried flowers.</p>\n\n                <p>At the center of the crypt, on a raised stone bier, lies a sarcophagus larger than the others \u2014 the lid carved with the likeness of a woman in medieval dress, her hands folded over her chest, a serene expression on her stone face. At her feet, a small iron chest sits unopened. The lock is shaped like a rose.</p>\n\n                <p>An inscription on the sarcophagus reads: <em>\"Here lies Lenora Sanguine, First of the Line. She gave her blood that others might live. She gave her life that the Rose might bloom. The cure she carried sleeps with her still.\"</em></p>\n\n                <p>The iron chest at her feet pulses with that same faint red glow you saw in the garden roses \u2014 slow, rhythmic, like a sleeping heartbeat.</p>\n\n                <p class=\"dim\">// Lenora Sanguine. The first vampire of this line. And according to this inscription, she carried the cure \u2014 not the plague. The story is more complicated than the villagers knew. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_sarcophagus\">Open the sarcophagus \u2014 the cure may be inside with her</label>\n                <label for=\"s4_passage\">Take the iron chest \u2014 it's pulsing with the same light as the Heart</label>\n            </div>\n        </div>\n\n        <!-- ============ SCENE 3F \u2014 SERVANTS' QUARTERS ============ -->\n        <div id=\"scene3_servants\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  DUST \\\n     |   &   |\n     \\  ASH  /\n      '-...-'\n    </pre>\n            <span class=\"scene-tag\">// CASTLE SANGUINE \u2014 SERVANTS' QUARTERS \u2014 ABANDONED BUT NOT EMPTY //</span>\n            <div class=\"story-text\">\n                <p>The servants' quarters are small and sparse \u2014 a kitchen, a pantry, two sleeping rooms. Everything is covered in a fine layer of dust, but there are signs of recent use: a half-burned candle, a bowl of water still clean, a wool blanket folded neatly on a cot. Someone lives here. Or something.</p>\n\n                <p>On the kitchen table, you find a letter, written in a shaky hand. It's addressed to no one \u2014 or perhaps to anyone who might find it:</p>\n\n                <p><em>\"To whomever reads this \u2014 My name was Grigore. I served the Sanguine family for forty-seven years. The Count is not evil. He is cursed, as all his line are cursed, but he has spent three centuries trying to undo what his ancestor Lenora created. The Heart of Sanguine is not a relic \u2014 it is a prison. It contains the original strain of the plague, bound in crystal so it could never be released. The Count keeps it locked in the tower to protect the world from it. The plague in the villages is not his doing \u2014 it is the work of his sister Annelise, who was turned against her will and has spent two hundred years trying to perfect and spread the disease in revenge. The Count keeps her chained in the upp
