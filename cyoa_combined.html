er chamber. He is not your enemy. Annelise is. Take this information and use it wisely. \u2014 G.\"</em></p>\n\n                <p>At the bottom of the letter, a key is pressed into the paper with wax \u2014 a small iron key labeled <strong>TOWER</strong>.</p>\n\n                <p class=\"dim\">// Grigore's letter changes everything. The Count is a jailer, not a monster. Annelise is the threat. And the Heart is a prison for the plague, not a cure for it. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"s5_tower_key\">Take the tower key \u2014 confront the Count with what you know</label>\n                <label for=\"s5_cellar\">Go to the crypt \u2014 if the Heart is a prison, the real cure must be elsewhere</label>\n            </div>\n        </div>\n\n        <!-- ============ SCENE 4A \u2014 FEAST (Count's Bargain) ============ -->\n        <div id=\"scene4_feast\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  RED  \\\n     |  WINE  |\n     \\       /\n      '-...-'\n    </pre>\n            <span class=\"scene-tag\">// GREAT HALL \u2014 THE COUNT'S BARGAIN ACCEPTED //</span>\n            <div class=\"story-text\">\n                <p>You let the Count draw a small vial of blood from your arm. The process is quick, almost clinical \u2014 he uses a silver lancet and a glass vial, handling both with the practiced ease of someone who has done this many, many times before. <em>\"Thank you,\"</em> he says, and for a moment he sounds almost sincere. <em>\"You'd be surprised how few people agree. Most would rather fight, or run, or try to steal the Heart without understanding what it is.\"</em></p>\n\n                <p>He leads you up the spiral staircase. The red glow intensifies with every step, and you feel it now \u2014 a pressure behind your eyes, a warmth in your chest. At the top, a heavy stone door stands open, moonlight pouring through a circular window directly onto a crystal pedestal. On the pedestal rests the <strong>Heart of Sanguine</strong> \u2014 exactly as Elder Vasile described it, a fist-sized gem the color of arterial blood, warm to the touch, pulsing with its own inner light.</p>\n\n                <p><em>\"Take it,\"</em> the Count says. <em>\"It will cure your village. But you should know \u2014 you will become a carrier. Not of the plague. Of the cure. Wherever you go, the plague will recede. But you will never be able to stay anywhere for long, because people will notice. People will ask questions. The life of a wandering healer is lonely.\"</em> He pauses. <em>\"I should know. I've been doing it for three hundred years.\"</em></p>\n\n                <p class=\"dim\">// The Count isn't what you expected. He's not a monster \u2014 he's a man carrying an impossible burden. And now he's offering you the same burden. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"e_relic_cost\">Take the Heart \u2014 accept the burden and save your village</label>\n                <label for=\"e_true\">Ask the Count about Lenora \u2014 understand the full story before deciding</label>\n            </div>\n        </div>\n\n        <!-- ============ SCENE 4B \u2014 LIBRARY ============ -->\n        <div id=\"scene4_library\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     / BOOKS \\\n     |  ~~~  |\n     \\  ___  /\n      '-...-'\n    </pre>\n            <span class=\"scene-tag\">// CASTLE SANGUINE \u2014 THE LIBRARY \u2014 THREE HUNDRED YEARS OF RECORDS //</span>\n            <div class=\"story-text\">\n                <p>The library is a scholar's dream and a mortal's nightmare \u2014 shelves stretching up into darkness, ladders on rails, the smell of old leather and older paper. You light a candle and begin reading.</p>\n\n                <p>The Sanguine family history unfolds across centuries. Lenora Sanguine, the matriarch, was an alchemist and physician in the 1600s. When a plague swept through the Carpathians \u2014 an earlier, more lethal version of the Crimson Plague \u2014 she experimented on herself with a combination of alchemical compounds and something the records call <em>\"the sanguine infusion,\"</em> derived from a rare mineral found only in these mountains. She cured herself and became immune \u2014 but the infusion changed her. Extended her life. Made her sensitive to sunlight. Gave her a thirst for blood that she fought for decades before finding a way to control it.</p>\n\n                <p>The Heart of Sanguine, you learn, is a crystalized form of her original cure \u2014 but bound with a containment spell that also holds the original plague strain inside it. It's both cure and disease, locked together in eternal stalemate. If the crystal is broken, the plague is released at full strength. If it's used correctly \u2014 placed in water, dissolved over seven days \u2014 it creates a true cure with no side effects.</p>\n\n                <p>You also find a letter from Count Mircalla to his ancestors, dated 1821: <em>\"I have contained Annelise. She will not harm another village. I will maintain the tower, guard the Heart, and wait for someone who can end this properly \u2014 someone who seeks the truth, not just the cure.\"</em></p>\n\n                <p class=\"dim\">// The Count has been waiting two hundred years for someone to read this letter. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"e_true\">Go to the Count \u2014 tell him you've read the records and want to help</label>\n                <label for=\"s5_tower_key\">Go to the tower \u2014 you know how to use the Heart correctly now</label>\n            </div>\n        </div>\n\n        <!-- ============ SCENE 4C \u2014 BETRAYAL (Annelise revealed) ============ -->\n        <div id=\"scene4_betrayal\" class=\"scene\">\n            <pre>\n      \\|/  \\|/\n       O    O\n        \\  /\n         \\/\n         /\\\n        /  \\\n       /    \\\n    </pre>\n            <span class=\"scene-tag\">// CORRIDOR \u2014 THE MASK FALLS //</span>\n            <div class=\"story-text\">\n                <p><em>\"Who am I?\"</em> Anna \u2014 Annelise \u2014 laughs, and it's not a pleasant sound. <em>\"I'm the one who's been trying to save you. But fine. You want the truth?\"</em></p>\n\n                <p>She steps back, and the torchlight catches her face differently \u2014 older, sharper, with something ancient moving behind her eyes. <em>\"My brother Mircalla has been playing the tragic jailer for two centuries, and people keep falling for it. The Heart of Sanguine isn't a prison for the plague \u2014 it's a weapon. He uses it to spread the disease, then offers the 'cure' in exchange for blood samples. He's built an archive of human bloodlines spanning three hundred years. He's not a healer. He's a collector.\"</em></p>\n\n                <p>She pulls up her sleeve. Her arm is covered in small, neat scars \u2014 dozens of them, in various stages of healing. <em>\"He keeps me chained because I'm the only one who knows the truth and is willing to tell it. The real cure \u2014 the one Lenora actually made \u2014 is buried with her in the crypt. Mircalla destroyed all records of it except one, which I hid in the library. Under the loose floorboard, third shelf from the left, behind the red ledger.\"</em></p>\n\n                <p>She looks at you steadily. <em>\"You can still walk away. Go to the crypt, find Lenora's cure, leave the Heart where it is. Or you can go to Mircalla and let him spin you his version. But ask yourself \u2014 why would I be chained up if I were the dangerous one? What's easier to control \u2014 a prisoner, or a rival?\"</em></p>\n\n                <p class=\"dim\">// She makes a compelling argument. But so would anyone. You need to verify her claims independently. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"s5_cellar\">Go to the crypt \u2014 find Lenora's tomb and verify Annelise's story</label>\n                <label for=\"s4_library\">Go to the library \u2014 check the loose floorboard she mentioned</label>\n            </div>\n        </div>\n\n        <!-- ============ SCENE 4D \u2014 WAIT FOR THE COUNT ============ -->\n        <div id=\"scene4_ally\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  WAIT \\\n     |   .   |\n     \\       /\n      '-...-'\n    </pre>\n            <span class=\"scene-tag\">// UPPER CHAMBER \u2014 A CALM CONVERSATION //</span>\n            <div class=\"story-text\">\n                <p>The door opens and Count Mircalla enters. He stops when he sees you standing by the bookshelf, journal in hand. His eyes move to Annelise \u2014 still chained, still watching with that cold smile \u2014 and something in his expression shifts. Not anger. Relief.</p>\n\n                <p><em>\"You didn't free her,\"</em> he says quietly. <em>\"In two hundred years, you're the first.\"</em></p>\n\n                <p>He crosses to the fireplace and adds a log. <em>\"My sister is very persuasive. She's had a long time to practice. The story she tells \u2014 that I'm the monster, that she's the victim, that the Heart is a weapon \u2014 it's a good story. Well-constructed. There's even truth in it, which is what makes it so effective.\"</em> He sinks into a worn armchair. <em>\"The truth is messier. Annelise was turned against her will \u2014 that part is real. But the turning didn't just change her body. It changed her mind. She developed a kind of madness \u2014 a conviction that the only way to end her suffering was to spread it. She believes that if enough people carry the plague, someone will find a cure that works for everyone, including her. She's not evil. She's broken. And she's very, very dangerous.\"</em></p>\n\n                <p>He looks at you. <em>\"The Heart can cure your village. I'll give it to you freely \u2014 no blood bargain, no strings. The only thing I ask is that you hear the whole story before you leave. Lenora's story. Our family's story. It matters. It might matter more than you know.\"</em></p>\n\n                <p class=\"dim\">// The Count is tired. Two hundred years of guarding his sister, maintaining the Heart, waiting for someone to listen. You might be the first person in centuries to actually hear him. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"e_true\">Sit down and listen \u2014 hear the full story of the Sanguine family</label>\n                <label for=\"s5_tower_key\">Take the Heart and go \u2014 your village is dying, and every hour counts</label>\n            </div>\n        </div>\n\n        <!-- ============ SCENE 4E \u2014 OPEN SARCOPHAGUS ============ -->\n        <div id=\"scene4_sarcophagus\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  OPEN \\\n     |   |   |\n     \\  __C__/\n      '-...-'\n    </pre>\n            <span class=\"scene-tag\">// FAMILY CRYPT \u2014 LENORA'S REST //</span>\n            <div class=\"story-text\">\n                <p>The sarcophagus lid is heavy but counterweighted \u2014 it swings open with surprising ease. Inside lies a woman preserved in an unnatural state between life and death. Her skin is pale but not decayed. Her eyes are closed. Her hands, folded over her chest, hold a small crystal vial filled with a glowing red liquid \u2014 brighter than the Heart, warmer in color, like liquid sunlight mixed with blood.</p>\n\n                <p>Her eyes open.</p>\n\n                <p>It happens slowly, dreamily, as if she's waking from a very long nap. She focuses on you with pupils that contract in the candlelight. <em>\"How long?\"</em> she whispers. Her voice is dry as old parchment. <em>\"How long has it been?\"</em></p>\n\n                <p>You tell her: roughly three hundred years. She closes her eyes again briefly, then opens them. <em>\"I hoped it wouldn't be this long. I hoped someone would come sooner.\"</em> She lifts the crystal vial slightly. <em>\"This is the true cure. Not the Heart \u2014 the Heart was my first attempt. It worked, but it carried the plague strain within it. This vial contains the perfected version. Seven drops in a village well, and the plague is gone forever \u2014 not suppressed, not carried elsewhere, just... gone. No side effects. No carriers. No curse.\"</em></p>\n\n                <p>Her hand trembles. <em>\"Take it. Please. I've been holding it for three centuries, waiting for someone who would use it properly. Don't let my children's mistakes define my legacy.\"</em></p>\n\n                <p class=\"dim\">// Lenora Sanguine, the first vampire, is not a monster. She's a healer who made a flawed cure and spent her death waiting to make it right. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"e_true\">Take the vial \u2014 thank Lenora and promise to use it well</label>\n                <label for=\"e_relic_cost\">Take both the vial and the Heart \u2014 you're not leaving anything behind</label>\n            </div>\n        </div>\n\n        <!-- ============ SCENE 4F \u2014 IRON CHEST IN CRYPT ============ -->\n        <div id=\"scene4_passage\" class=\"scene\">\n            <pre>\n      .___.\n      |[=]|\n      '---'\n       / \\\n      /   \\\n    </pre>\n            <span class=\"scene-tag\">// FAMILY CRYPT \u2014 THE IRON CHEST //</span>\n            <div class=\"story-text\">\n                <p>The rose-shaped lock yields to pressure \u2014 it's not locked at all, merely closed. Inside the chest, you find a bundle of letters, a silver dagger, and a folded map of the castle. The letters are correspondence between Lenora and her children, dated from the 1690s through the early 1700s.</p>\n\n                <p>They tell a story of a family trying to contain a disaster. Lenora's cure worked \u2014 but the plague she'd created in the process of developing it was stored inside the Heart as a necessary part of the alchemical process. She couldn't destroy one without destroying the other. So she locked the Heart in the tower, entrusted the key to her eldest son, and tasked her descendants with a simple mission: wait. Wait for alchemical science to advance enough that the plague could be separated from the cure. Wait for someone who could finish what she started.</p>\n\n                <p>The last letter, written in a different hand, is from Count Mircalla: <em>\"Mother, I am still waiting. Annelise grows more unstable each year. I fear I will have to chain her for her own safety, and for the safety of others. I will maintain the tower, guard the Heart, and keep her contained. I hope someone reads this letter someday and understands \u2014 we are not monsters. We are caretakers of a mistake we have spent three centuries trying to fix.\"</em></p>\n\n                <p>At the bottom of the chest, wrapped in velvet, is a small crystal vial. The label reads: <em>\"Perfected Cure \u2014 L. Sanguine, 1712.\"</em></p>\n\n                <p class=\"dim\">// The cure was here all along. Lenora perfected it before she died. Her children either didn't know about it, or forgot. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"e_true\">Take the perfected cure \u2014 Lenora's legacy is finally fulfilled</label>\n            </div>\n        </div>\n\n        <!-- ============ SCENE 5A \u2014 TOWER KEY ============ -->\n        <div id=\"scene5_tower_key\" class=\"scene\">\n            <pre>\n        /\\\n       /  \\\n      /    \\\n     /  __  \\\n    /  /  \\  \\\n   /  /    \\  \\\n  /  /  TWR \\  \\\n /__/________\\__\\\n    |        |\n    |  MOON  |\n    |________|\n    </pre>\n            <span class=\"scene-tag\">// CASTLE SANGUINE \u2014 THE TOWER \u2014 UNDER MOONLIGHT //</span>\n            <div class=\"story-text\">\n                <p>The tower door opens to moonlight, just as the Count said. The circular room at the top is small and spare \u2014 stone walls, a single window, and in the center, the Heart of Sanguine on its crystal pedestal. Up close, it's breathtaking \u2014 a gem that seems to contain an entire sunset inside it, swirling with deep reds and golds and the faintest hints of amber. It's warm. Almost alive.</p>\n\n                <p>The pedestal has an inscription carved around its base: <em>\"He who takes the Heart takes also its burden. The plague and the cure are one. To carry this stone is to carry both. Choose with full knowledge.\"</em></p>\n\n                <p>The moonlight intensifies, and for a moment the Heart seems to pulse in time with your own heartbeat. You feel it \u2014 the weight of the choice, the centuries of waiting, the village thirty-seven souls deep in grief and counting. Whatever you decide, it has to be now. The moon is at its zenith. The Heart is at its most receptive.</p>\n\n                <p class=\"dim\">// You have everything you need to make this decision. The only question is which version of the truth you believe. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"e_relic_cost\">Take the Heart \u2014 whatever the cost, your village needs it</label>\n                <label for=\"e_true\">You have the perfected cure from Lenora \u2014 use it instead, leave the Heart</label>\n            </div>\n        </div>\n\n        <!-- ============ SCENE 5B \u2014 CELLAR / CRYPT APPROACH ============ -->\n        <div id=\"scene5_cellar\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  DOWN \\\n     |   |   |\n     \\  | |  /\n      '-.|.-'\n         |\n         |\n    </pre>\n            <span class=\"scene-tag\">// CASTLE SANGUINE \u2014 CELLAR PASSAGE \u2014 BENEATH THE FOUNDATIONS //</span>\n            <div class=\"story-text\">\n                <p>The cellar passage is old \u2014 older than the castle above it, the stones rough-hewn and unmortared. This was here before the Sanguines built their fortress. This was here before anyone thought to build anything in these mountains. The air grows colder with each step, and the faint red glow intensifies, pulsing steadily through cracks in the stone.</p>\n\n                <p>You emerge into a natural cavern beneath the crypt. Stalactites hang overhead like stone teeth. A subterranean stream runs through the center, its water clear and cold and faintly luminous. And at the far end of the cavern, resting on a natural stone shelf, is a sarcophagus older than the ones in the crypt above \u2014 carved with symbols you don't recognize, older than any language you know.</p>\n\n                <p>This is the true resting place of Lenora Sanguine. Not the ornate tomb upstairs \u2014 that was a decoy, meant for visitors who might come looking. This is where the first of the Sanguine line chose to spend her eternity, guarding the perfected cure she made in the last years of her life. The air here is still. Sacred. Waiting.</p>\n\n                <p>The sarcophagus lid is carved with a single word: <em>\"SPERANTA\"</em> \u2014 hope, in the old tongue.</p>\n\n                <p class=\"dim\">// You've found it. The true tomb. The real cure. Whatever happens next, you're standing at the heart of a three-hundred-year-old mystery, and the answer is within arm's reach. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"e_true\">Open the sarcophagus \u2014 claim Lenora's perfected cure</label>\n                <label for=\"e_trapped\">Something feels wrong \u2014 leave now while you still can</label>\n            </div>\n        </div>\n\n        <!-- ============ SCENE 5C \u2014 TOWER CLIMB ============ -->\n        <div id=\"scene5_tower_climb\" class=\"scene\">\n            <pre>\n        /\\\n       /  \\\n      /    \\\n     /||||||\\\n    /||||||||\\\n    \\||||||||/\n     \\||||||/\n      \\||||/\n       \\||/\n        \\/\n    </pre>\n            <span class=\"scene-tag\">// CASTLE SANGUINE \u2014 TOWER SPIRE \u2014 THE HIGHEST POINT //</span>\n            <div class=\"story-text\">\n                <p>You climb. The spiral staircase seems endless, winding up through the tower's core, each step bringing you closer to the rhythmic red glow that has become as familiar as your own pulse. The walls are lined with portraits \u2014 generations of Sanguines, pale-faced and dark-eyed, watching you climb with painted stares.</p>\n\n                <p>At the top, the tower room is exactly as described. The Heart pulses on its pedestal. Moonlight streams through the window. And standing beside the Heart, waiting for you, is the Count.</p>\n\n                <p><em>\"I wondered if you'd make it here,\"</em> he says. <em>\"Most don't. Most get lost in the library, or seduced by my sister's stories, or frightened away by the crypt. But you \u2014 you kept climbing.\"</em> He steps aside, gesturing to the Heart. <em>\"It's yours. I won't stop you. I've been waiting two hundred years for someone to take it off my hands. But before you do \u2014 I want you to know that there's another option. A better one. One my mother perfected before she died, and hid in a place she knew her children would never look.\"</em></p>\n\n                <p>He holds out a hand. In his palm is a small iron key \u2014 the same one from the servants' letter, the same shape as the rose lock on the iron chest in the crypt. <em>\"The perfected cure. No plague. No burden. Just \u2014 healing. It's in the iron chest at my mother's feet. I was too proud to look for it. Too sure I knew best. Don't make my mistake.\"</em></p>\n\n                <p class=\"dim\">// The Count is handing you the key to the real cure. He's also handing you three hundred years of regret, wrapped in iron. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"e_true\">Take the key \u2014 go to the crypt and find the perfected cure</label>\n                <label for=\"e_relic_cost\">Take the Heart instead \u2014 you've come too far to trust another story</label>\n            </div>\n        </div>\n\n        <!-- ============ SCENE 5D \u2014 RELIC ROOM ============ -->\n        <div id=\"scene5_relic_room\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  GLOW \\\n     |   *   |\n     \\       /\n      '-...-'\n    </pre>\n            <span class=\"scene-tag\">// CASTLE SANGUINE \u2014 THE RELIC ROOM \u2014 HIDDEN CHAMBER //</span>\n            <div class=\"story-text\">\n                <p>Behind a tapestry in the library, you find a hidden door. Beyond it, a small chamber lined with shelves holding the Sanguine family's most precious possessions \u2014 not gold or jewels, but records. Journals. Letters. A lock of hair tied with a red ribbon. A child's drawing of a rose. The accumulated memory of a family that has lived in the shadow of a curse for ten generations.</p>\n\n                <p>On a central pedestal, in a glass case, rests Lenora's final journal. The last entry reads: <em>\"I have done it. After forty-seven years of work, I have separated the plague from the cure. The perfected formula is stable. It will cure any who drink from a well treated with seven drops, and it carries no residual infection. I have placed a vial of it in the iron chest in the crypt, and another \u2014 hidden \u2014 in the cavern below, where the stream runs clean. My children do not know about the second vial. I could not bring myself to tell them, for fear they would fight over it. Let fate decide who finds it. Let hope guide their hands.\"</em></p>\n\n                <p>Below the entry, in fresher ink, someone has written: <em>\"Found this today. Two hundred and thirteen years after she wrote it. I never knew. \u2014 M.S.\"</em></p>\n\n                <p class=\"dim\">// The Count found this journal recently. Very recently. He's been carrying the weight of this knowledge for a short time, after centuries of believing the Heart was the only option. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"e_true\">Go to the cavern below the crypt \u2014 find the second vial in the stream</label>\n            </div>\n        </div>\n\n        <!-- ============ SCENE 5E \u2014 CONFRONT ANNELISE ============ -->\n        <div id=\"scene5_confront\" class=\"scene\">\n            <pre>\n      \\   /\n       \\ /\n        O\n       / \\\n      /   \\\n    </pre>\n            <span class=\"scene-tag\">// UPPER CHAMBER \u2014 THE FINAL CONFRONTATION //</span>\n            <div class=\"story-text\">\n                <p>You return to the upper chamber armed with knowledge. Annelise sees it in your face immediately. <em>\"You figured it out,\"</em> she says. Not a question. <em>\"Which version did you believe? My brother's tragic jailer story, or mine?\"</em></p>\n\n                <p><em>\"Neither,\"</em> you say. <em>\"I believe Lenora's.\"</em></p>\n\n                <p>Annelise goes still. For a long moment, she doesn't move, doesn't blink, doesn't seem to breathe. Then, very quietly: <em>\"Grandmother Lenora?\"</em></p>\n\n                <p><em>\"She perfected the cure,\"</em> you tell her. <em>\"Before she died. She hid it because she knew her descendants would fight over it. The Heart was never the answer \u2014 it was a stopgap, and everyone who came after her treated it like the final solution. Including you. Including Mircalla. All of you have been fighting over the wrong thing for three hundred years.\"</em></p>\n\n                <p>Annelise's expression crumbles. The cold, predatory mask falls away, and underneath is just a woman \u2014 tired, ancient, impossibly sad. <em>\"I didn't know,\"</em> she whispers. <em>\"All this time. All those villages. I thought \u2014 I thought I was punishing him. I thought if I spread the plague, he'd have to admit the Heart was a lie. I never...\"</em> She covers her face with her hands. <em>\"What have I done?\"</em></p>\n\n                <p class=\"dim\">// Annelise is a villain. She's also a victim. The two things are not mutually exclusive, and the weight of that complexity fills the room like smoke. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"e_true\">Tell Annelise it's not too late \u2014 help her find a way to make amends</label>\n                <label for=\"e_slain\">The damage is done \u2014 leave her to her guilt and take the cure to your village</label>\n            </div>\n        </div>\n\n        <!-- ============ SCENE 5F \u2014 ESCAPE RUN ============ -->\n        <div id=\"scene5_escape_run\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  RUN  \\\n     |   |   |\n     \\  / \\  /\n      '-' '-'\n    </pre>\n            <span class=\"scene-tag\">// CASTLE SANGUINE \u2014 THE FLIGHT //</span>\n            <div class=\"story-text\">\n                <p>You run. Through the servant's passage, down the spiraling stairs, through the kitchen and into the cold night air of the garden. The roses seem to turn toward you as you pass, their crimson blooms tracking your movement like silent faces. Behind you, the castle looms dark and patient, its windows flickering with candlelight.</p>\n\n                <p>You didn't find the cure. You didn't find the Heart. But you're alive, and sometimes that's the only victory the castle allows. You'll return to your village empty-handed, but you'll return with knowledge \u2014 the Sanguine family's story, the truth about the plague, the location of the perfected cure. Maybe that knowledge will be enough. Maybe someone braver, or luckier, or more persuasive than you will come next and finish what you started.</p>\n\n                <p>The mountain road stretches before you, silver in the moonlight. Behind you, a single candle appears in the tower window \u2014 someone watching you go. You don't know if it's Mircalla or Annelise. You suppose it doesn't matter. You're leaving Castle Sanguine behind, but you suspect it will never quite leave you.</p>\n\n                <p class=\"dim\">// You escaped. But the castle keeps its secrets, and your village is still dying. Some victories are just postponements of defeat. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"e_escape\">Walk the mountain road \u2014 go home and tell them what you've learned</label>\n            </div>\n        </div>\n\n        <!-- ==================== ENDINGS ==================== -->\n\n        <!-- ENDING: THRALL -->\n        <div id=\"scene_e_thrall\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  RED   \\\n     |   EYES  |\n     \\  FOREVER/\n      '-...-'\n    </pre>\n            <span class=\"scene-tag\">// ENDING: THE COUNT'S COLLECTION //</span>\n            <div class=\"story-text\">\n                <p class=\"ending-title\">\u2715 ENDING: BLOODBOUND \u2715</p>\n                <p>You gave the Count what he wanted. The vial of blood, freely offered, created a bond you didn't understand until it was too late. You are not dead \u2014 the Count doesn't kill his donors. But you are changed. Bound to the castle. Bound to him. You will serve as his attendant, his scribe, his companion in the long centuries ahead. You will watch other travelers come and go. You will see the Heart taken and returned. You will witness Annelise's scheming and the slow decay of the Sanguine line. Your village will die of the plague \u2014 the Count has no interest in curing villages that don't send him interesting visitors. You will think about this every day for the rest of your very, very long life.</p>\n                <p class=\"dim\">// You are not a prisoner. You gave your consent. That's the worst part. //</p>\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Begin Again \u2014 The Castle Has Many Doors</label></div>\n        </div>\n\n        <!-- ENDING: TRAPPED -->\n        <div id=\"scene_e_trapped\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  DARK  \\\n     |   |    |\n     \\  FOREVER/\n      '-...-'\n    </pre>\n            <span class=\"scene-tag\">// ENDING: BURIED WITH LENORA //</span>\n            <div class=\"story-text\">\n                <p class=\"ending-title\">\u2715 ENDING: THE CRYPT CLAIMS ALL \u2715</p>\n                <p>The sarcophagus lid seals behind you with a sound like a stone heartbeat stopping. In the darkness, you hear Lenora sigh \u2014 not with malice, but with the weary disappointment of someone who has seen this happen before. <em>\"You should have left when you had the chance,\"</em> she murmurs. <em>\"But since you're here \u2014 you may as well keep me company. The centuries are long, and stories make them shorter. Tell me about the world above. Tell me what I've missed.\"</em> You have no choice. You talk. The darkness listens. And somewhere far above, in a village you'll never see again, the Crimson Plague takes its thirty-eighth soul.</p>\n                <p class=\"dim\">// You found Lenora. You just can't leave her. //</p>\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Begin Again \u2014 The Castle Remembers, But You May Forget</label></div>\n        </div>\n\n        <!-- ENDING: RELIC COST -->\n        <div id=\"scene_e_relic_cost\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  BURDEN \\\n     |   *   |\n     \\  HEAVY /\n      '-...-'\n    </pre>\n            <span class=\"scene-tag\">// ENDING: THE CARRIER'S ROAD //</span>\n            <div class=\"story-text\">\n                <p class=\"ending-title\">\u25b3 ENDING: THE WANDERING CURE \u25b3</p>\n                <p>You take the Heart and return to your village. The plague recedes within a week \u2014 the sick recover, the dying stabilize, the wells run clean. Your village hails you as a hero. But you know what you carry. The Heart's warmth is constant against your chest, a reminder that the plague is not gone \u2014 it's contained within you now. You leave your village under cover of night, before anyone can ask too many questions. You become a wanderer, moving from town to town, curing outbreaks that mysteriously follow in your wake. The Count was right \u2014 the life of a carrier is lonely. But sometimes, in the quiet moments between crises, you look at the Heart and think about Lenora Sanguine, who chose this same burden three hundred years ago, and you feel something almost like kinship across the centuries.</p>\n                <p class=\"dim\">// You saved your village. The cost was everything else. Was it worth it? Only the road knows. //</p>\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Begin Again \u2014 Other Paths Await</label></div>\n        </div>\n\n        <!-- ENDING: VAMPIRE SLAIN -->\n        <div id=\"scene_e_slain\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  DAWN  \\\n     |   *   |\n     \\  PEACE /\n      '-...-'\n    </pre>\n            <span class=\"scene-tag\">// ENDING: THE HUNTER'S TRIUMPH //</span>\n            <div class=\"story-text\">\n                <p class=\"ending-title\"><span class=\"silver\">\u25c7 ENDING: THE CASTLE FALLS \u25c7</span></p>\n                <p>You return to your village with the perfected cure. Seven drops in the well, and within a day the plague begins to lift. Within a week, the sick are walking. Within a month, the village is whole again. But you can't stop thinking about Castle Sanguine \u2014 about Mircalla and Annelise, locked in their centuries-old conflict, waiting for someone to end it. You gather a party of volunteers and return to the castle with torches and silver. The battle is brief. Mircalla, exhausted by centuries of guardianship, barely fights back. Annelise, consumed by guilt, surrenders willingly. The castle burns. The Heart is destroyed \u2014 the plague strain within it finally, permanently ended. Lenora's body, brought into the sunlight, crumbles to ash with a sound almost like a sigh of relief. You go home. You sleep. For the first time in months, you sleep without dreaming of roses.</p>\n                <p class=\"dim\">// The Sanguine line is ended. The plague is gone. The cure is real. Sometimes the right ending is the simple one. //</p>\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Begin Again \u2014 Every Story Has Its Hunter</label></div>\n        </div>\n\n        <!-- TRUE ENDING -->\n        <div id=\"scene_e_true\" class=\"scene\">\n            <pre>\n         *\n        /|\\\n       / | \\\n      /  |  \\\n     /   |   \\\n    /    |    \\\n   /     |     \\\n  /______|______\\\n      |  |  |\n      |  |  |\n      |__|__|\n       \\   /\n        \\ /\n         *\n      [ DAWN ]\n    </pre>\n            <span class=\"scene-tag\">// TRUE ENDING: THE HEALER'S LEGACY //</span>\n            <div class=\"story-text\">\n                <p class=\"ending-title\"><span style=\"color:#ffcc88;\">\u2726 TRUE ENDING: WHAT LENORA WANTED \u2726</span></p>\n                <p>You take Lenora's perfected cure \u2014 not the Heart, but the small crystal vial she spent forty-seven years refining. Seven drops in your village well. Within a day, the fever breaks across every household. Within a week, the dying sit up and ask for soup. Within a month, your village is not just healed but whole \u2014 the grief still present, but no longer compounded by fresh loss every morning.</p>\n\n                <p>You return to Castle Sanguine. Not to burn it, not to fight, but to talk. You tell Count Mircalla about Lenora's journal, about the perfected cure, about the second vial hidden in the cavern. You tell Annelise that her grandmother's legacy is not the plague \u2014 it's the cure. The plague was a mistake. The cure was the point.</p>\n\n                <p>Annelise weeps. Mircalla, after a long silence, unlocks her chains himself \u2014 not because he trusts her, but because he's tired of being her jailer. <em>\"We have both been prisoners,\"</em> he says. <em>\"I think it's time we learned to be something else.\"</em></p>\n\n                <p>The Sanguine siblings begin a long, difficult process of reconciliation. Annelise dedicates herself to undoing the damage she caused \u2014 traveling to the villages she infected, offering what reparations she can. Mircalla opens the castle to travelers, turning it into a waystation for those crossing the Carpathians. The Heart remains in the tower, but it's no longer a secret or a burden \u2014 it's a museum piece, a reminder of what happens when good intentions go wrong.</p>\n\n                <p>You go home. You plant a rose bush in the village square \u2014 a cutting from the garden at Castle Sanguine, given to you by Annelise as a gesture of apology. It blooms every spring, deep crimson, and the villagers say the petals glow faintly on the anniversary of the day the plague ended. You're not sure if that's true or just a story. But you like it. You like the idea that Lenora is still watching, still hoping, still waiting for the world to become what she always believed it could be.</p>\n\n                <p class=\"dim\">// To reach this ending you needed to find the truth beneath the stories \u2014 Lenora's journal, the perfected cure, the understanding that the Sanguines were not monsters but caretakers of a mistake they didn't know how to fix. You gave them the answer. You gave them each other. And you gave your village a future. Not bad, for someone who walked up a mountain with nothing but a lantern and a desperate hope. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"s0\">\u2605 Begin Again \u2014 Every Path Has Its Own Dawn \u2605</label>\n            </div>\n            <p class=\"note\">// CASTLE SANGUINE \u2014 A Gothic Tale //<br>6 endings \u00b7 3 main branches \u00b7 30+ scenes \u00b7 The castle remembers every choice //</p>\n        </div>\n\n        <!-- ENDING: ESCAPE -->\n        <div id=\"scene_e_escape\" class=\"scene\">\n            <pre>\n      .   .   .\n     .   .   .\n    .   .   .   .\n     .   .   .\n      .   .   .\n    </pre>\n            <span class=\"scene-tag\">// ENDING: THE LONG WALK HOME //</span>\n            <div class=\"story-text\">\n                <p class=\"ending-title\">\u25a1 ENDING: ALIVE, AT LEAST \u25a1</p>\n                <p>You walk the mountain road as dawn breaks over the Carpathians. The sky turns from black to deep purple to a pale, watery gold. Behind you, Castle Sanguine is a silhouette against the morning \u2014 just another ruin on a hill, just another story to tell. You didn't find the cure. You didn't find the Heart. But you found something \u2014 information, experience, the knowledge that the world is stranger and older than your village ever taught you. You'll go home and tell them what you learned. Maybe it won't save anyone. But maybe it will inspire someone else to try. Someone better prepared. Someone who won't run when the castle doors close behind them. The road is long. Your lantern has gone out. But the sun is rising, and for now, that's enough.</p>\n                <p class=\"dim\">// You survived. Sometimes that's the only ending the castle allows. But survival, in itself, is a kind of victory. //</p>\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Begin Again \u2014 The Castle Is Always Waiting</label></div>\n        </div>\n\n    </div>\n</body>\n</html>\n",
  "fantasy": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Choose Your Own Adventure</title>\n    <style>\n        :root {\n            --term-green: #33ff33;\n            --term-bg: #050505;\n            --term-dim: #1a7a1a;\n            --term-amber: #ffaa33;\n            --term-blue: #33aaff;\n            --term-red: #ff4433;\n            --glow-forest: rgba(51, 255, 51, 0.25);\n            --glow-mountain: rgba(150, 200, 255, 0.2);\n            --glow-cavern: rgba(255, 170, 51, 0.2);\n            --glow-danger: rgba(255, 68, 51, 0.3);\n            --glow-magic: rgba(180, 130, 255, 0.25);\n        }\n\n        * {\n            box-sizing: border-box;\n        }\n\n        body {\n            background-color: #020202;\n            color: var(--term-green);\n            font-family: 'Courier New', 'Courier', 'Lucida Console', monospace;\n            margin: 0;\n            padding: 16px;\n            line-height: 1.55;\n            min-height: 100vh;\n            background-image:\n                repeating-linear-gradient(0deg,\n                    transparent,\n                    transparent 3px,\n                    rgba(0, 0, 0, 0.03) 3px,\n                    rgba(0, 0, 0, 0.03) 6px);\n            background-size: 100% 6px;\n        }\n\n        .game-container {\n            max-width: 720px;\n            margin: 0 auto;\n            border: 2px solid var(--term-green);\n            padding: 28px 22px;\n            min-height: 82vh;\n            box-shadow:\n                0 0 20px var(--glow-forest),\n                inset 0 0 40px rgba(51, 255, 51, 0.03);\n            position: relative;\n            background: radial-gradient(ellipse at center,\n                    rgba(10, 28, 10, 0.5) 0%,\n                    rgba(2, 2, 2, 0.95) 70%);\n            transition: box-shadow 0.6s ease;\n        }\n\n        /* Environment-specific glows */\n        .env-forest {\n            box-shadow: 0 0 20px var(--glow-forest), inset 0 0 40px rgba(51, 255, 51, 0.03) !important;\n            border-color: var(--term-green) !important;\n        }\n        .env-mountain {\n            box-shadow: 0 0 20px var(--glow-mountain), inset 0 0 40px rgba(150, 200, 255, 0.03) !important;\n            border-color: #5599cc !important;\n            color: #c8ddf8 !important;\n        }\n        .env-cavern {\n            box-shadow: 0 0 20px var(--glow-cavern), inset 0 0 40px rgba(255, 170, 51, 0.03) !important;\n            border-color: #cc8833 !important;\n            color: #f0c878 !important;\n        }\n        .env-danger {\n            box-shadow: 0 0 20px var(--glow-danger), inset 0 0 40px rgba(255, 68, 51, 0.03) !important;\n            border-color: #cc3322 !important;\n            color: #ff7766 !important;\n        }\n        .env-magic {\n            box-shadow: 0 0 20px var(--glow-magic), inset 0 0 40px rgba(180, 130, 255, 0.03) !important;\n            border-color: #9966dd !important;\n            color: #c8a8f8 !important;\n        }\n\n        pre {\n            font-size: 13px;\n            white-space: pre;\n            text-align: center;\n            margin-bottom: 24px;\n            text-shadow: 0 0 6px currentColor;\n            letter-spacing: 0;\n            line-height: 1.25;\n            overflow-x: auto;\n            padding: 4px 0;\n            animation: flickerIn 1.2s ease-out;\n        }\n\n        @keyframes flickerIn {\n            0% {\n                opacity: 0;\n                text-shadow: 0 0 20px currentColor;\n            }\n            15% {\n                opacity: 0.4;\n                text-shadow: 0 0 2px currentColor;\n            }\n            25% {\n                opacity: 0.7;\n                text-shadow: 0 0 14px currentColor;\n            }\n            35% {\n                opacity: 0.5;\n            }\n            50% {\n                opacity: 0.9;\n                text-shadow: 0 0 8px currentColor;\n            }\n            100% {\n                opacity: 1;\n                text-shadow: 0 0 6px currentColor;\n            }\n        }\n\n        .story-text {\n            font-size: 1.15rem;\n            margin-bottom: 28px;\n            text-align: center;\n            padding: 0 8px;\n            animation: fadeIn 0.5s ease-out;\n        }\n\n        @keyframes fadeIn {\n            from {\n                opacity: 0;\n                transform: translateY(10px);\n            }\n            to {\n                opacity: 1;\n                transform: translateY(0);\n            }\n        }\n\n        .choices {\n            display: flex;\n            flex-direction: column;\n            gap: 13px;\n            align-items: center;\n        }\n\n        label {\n            display: inline-block;\n            border: 1px solid currentColor;\n            padding: 13px 26px;\n            cursor: pointer;\n            text-transform: uppercase;\n            letter-spacing: 1.5px;\n            transition: all 0.25s;\n            width: 82%;\n            text-align: center;\n            background: #000;\n            font-weight: bold;\n            font-size: 0.9rem;\n            position: relative;\n            user-select: none;\n        }\n\n        label:hover {\n            background-color: currentColor;\n            color: #000;\n            font-weight: bold;\n            box-shadow: 0 0 18px currentColor;\n            transform: scale(1.02);\n            letter-spacing: 2px;\n        }\n\n        label:active {\n            transform: scale(0.97);\n            transition: transform 0.08s;\n        }\n\n        /* Cursor blink indicator on labels */\n        label::before {\n            content: '> ';\n            opacity: 0;\n            transition: opacity 0.2s;\n        }\n        label:hover::before {\n            opacity: 1;\n            animation: blink 0.7s infinite;\n        }\n        @keyframes blink {\n            0%,\n            100% {\n                opacity: 1;\n            }\n            50% {\n                opacity: 0.2;\n            }\n        }\n\n        /* --- THE CSS STATE MACHINE --- */\n        input[type=\"radio\"] {\n            display: none;\n        }\n        .scene {\n            display: none;\n            animation: fadeIn 0.5s ease-out;\n        }\n\n        /* START */\n        #s0:checked~.game-container #scene0,\n        /* FOREST BRANCH */\n        #s1_forest:checked~.game-container #scene1_forest,\n        #s2_draw:checked~.game-container #scene2_draw,\n        #s2_ignore:checked~.game-container #scene2_ignore,\n        #s2_talk_jester:checked~.game-container #scene2_talk_jester,\n        #s3_burn:checked~.game-container #scene3_burn,\n        #s3_walk:checked~.game-container #scene3_walk,\n        #s3_lights:checked~.game-container #scene3_lights,\n        #s3_hut:checked~.game-container #scene3_hut,\n        #s3_wade:checked~.game-container #scene3_wade,\n        #s3_riddle_right:checked~.game-container #scene3_riddle_right,\n        #s3_riddle_wrong:checked~.game-container #scene3_riddle_wrong,\n        #s4_crown:checked~.game-container #scene4_crown,\n        #s4_crystal:checked~.game-container #scene4_crystal,\n        #s4_explore_castle:checked~.game-container #scene4_explore_castle,\n        #s4_bandit_fight:checked~.game-container #scene4_bandit_fight,\n        #s4_surrender:checked~.game-container #scene4_surrender,\n        #s4_trick_bandits:checked~.game-container #scene4_trick_bandits,\n        #s4_willowisp:checked~.game-container #scene4_willowisp,\n        /* MOUNTAIN BRANCH */\n        #s1_mountain:checked~.game-container #scene1_mountain,\n        #s2_mallet:checked~.game-container #scene2_mallet,\n        #s2_sword:checked~.game-container #scene2_sword,\n        #s2_search_camp:checked~.game-container #scene2_search_camp,\n        #s3_smash:checked~.game-container #scene3_smash,\n        #s3_talk:checked~.game-container #scene3_talk,\n        #s3_fight:checked~.game-container #scene3_fight,\n        #s3_flee:checked~.game-container #scene3_flee,\n        #s3_secret_pass:checked~.game-container #scene3_secret_pass,\n        #s3_ignore_map:checked~.game-container #scene3_ignore_map,\n        #s4_sneak:checked~.game-container #scene4_sneak,\n        #s4_bonk:checked~.game-container #scene4_bonk,\n        #s4_befriend:checked~.game-container #scene4_befriend,\n        #s4_map_treasure:checked~.game-container #scene4_map_treasure,\n        #s4_map_trap:checked~.game-container #scene4_map_trap,\n        #s4_griffon_nest:checked~.game-container #scene4_griffon_nest,\n        /* CAVERN BRANCH */\n        #s1_cavern:checked~.game-container #scene1_cavern,\n        #s2_cave_river:checked~.game-container #scene2_cave_river,\n        #s2_cave_crystals:checked~.game-container #scene2_cave_crystals,\n        #s3_underground_lake:checked~.game-container #scene3_underground_lake,\n        #s3_crystal_mine:checked~.game-container #scene3_crystal_mine,\n        #s4_lake_spirit:checked~.game-container #scene4_lake_spirit,\n        #s4_lake_dive:checked~.game-container #scene4_lake_dive,\n        #s4_mine_golem:checked~.game-container #scene4_mine_golem,\n        #s4_mine_steal:checked~.game-container #scene4_mine_steal,\n        /* SECRET ENDING */\n        #s5_true_ending:checked~.game-container #scene5_true_ending {\n            display: block;\n        }\n\n        /* Responsive */\n        @media (max-width: 500px) {\n            .game-container {\n                padding: 16px 10px;\n                min-height: 88vh;\n            }\n            pre {\n                font-size: 10px;\n                letter-spacing: -0.5px;\n            }\n            .story-text {\n                font-size: 0.95rem;\n            }\n            label {\n                width: 94%;\n                padding: 11px 14px;\n                font-size: 0.78rem;\n                letter-spacing: 1px;\n            }\n        }\n    </style>\n</head>\n<body>\n<a href=\"#\" onclick=\"window.parent.showMenu();return false;\" style=\"color:white;cursor:pointer;\">Back to Home</a>\n    <!-- ==================== STATE INPUTS ==================== -->\n    <!-- Start -->\n    <input type=\"radio\" name=\"cyoa\" id=\"s0\" checked>\n\n    <!-- Forest -->\n    <input type=\"radio\" name=\"cyoa\" id=\"s1_forest\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_draw\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_ignore\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_talk_jester\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_burn\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_walk\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_lights\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_hut\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_wade\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_riddle_right\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_riddle_wrong\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_crown\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_crystal\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_explore_castle\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_bandit_fight\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_surrender\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_trick_bandits\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_willowisp\">\n\n    <!-- Mountain -->\n    <input type=\"radio\" name=\"cyoa\" id=\"s1_mountain\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_mallet\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_sword\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_search_camp\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_smash\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_talk\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_fight\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_flee\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_secret_pass\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_ignore_map\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_sneak\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_bonk\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_befriend\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_map_treasure\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_map_trap\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_griffon_nest\">\n\n    <!-- Cavern -->\n    <input type=\"radio\" name=\"cyoa\" id=\"s1_cavern\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_cave_river\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_cave_crystals\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_underground_lake\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_crystal_mine\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_lake_spirit\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_lake_dive\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_mine_golem\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_mine_steal\">\n\n    <!-- Secret -->\n    <input type=\"radio\" name=\"cyoa\" id=\"s5_true_ending\">\n\n\n    <!-- ==================== GAME CONTAINER ==================== -->\n    <div class=\"game-container env-forest\" id=\"gameBox\">\n\n        <!-- ========== START SCENE ========== -->\n        <div id=\"scene0\" class=\"scene\">\n            <pre>\n        .    *    .\n    .       |       .\n        .   /|\\   .\n    .     /  |  \\     .\n        /    |    \\\n    .  /     |     \\  .\n      /      |      \\\n     /       |       \\\n    /   __   |   __   \\\n   /   /  \\  |  /  \\   \\\n  /   /    \\ | /    \\   \\\n /___/______\\|/______\\___\\\n     |       |       |\n     |       |       |\n     |_______|_______|\n    </pre>\n            <div class=\"story-text\">\n                You stand at the crossroads of the Eldritch Valley, where three ancient paths diverge under a bruised purple sky. To the west, the <strong>Whispering Woods</strong> pulse with fey magic and the scent of ozone. To the east, the jagged peaks of <strong>Mount Dread</strong> claw at heavy gray clouds. Before you, a <strong>Dark Cavern</strong> yawns open like a sleeping beast's mouth, exhaling warm, mineral-scented air. Your destiny beckons.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s1_forest\">West: Enter the Whispering Woods</label>\n                <label for=\"s1_mountain\">East: Climb Mount Dread</label>\n                <label for=\"s1_cavern\">Down: Descend into the Dark Cavern</label>\n            </div>\n        </div>\n\n        <!-- ==================== FOREST BRANCH ==================== -->\n        <div id=\"scene1_forest\" class=\"scene\">\n            <pre>\n      ) \\     ( /\n     / (       ) \\\n    ( * )     ( * )\n     | |       | |\n     | |       | |\n    /   \\     /   \\\n   /     \\   /     \\\n  /       \\_/       \\\n /                   \\\n    </pre>\n            <div class=\"story-text\">\n                The trees close in, their bark etched with faintly glowing runes. In a small moonlit clearing, a spectral jester in a patched motley hat sits cross-legged on a mossy stump. He says nothing, but his long fingers expertly shuffle a deck of cards that shimmer with inner light. He fans them out with a knowing grin, inviting you to choose. Something about his silent gaze suggests he knows more than he lets on.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s2_draw\">Draw a card from the glowing deck</label>\n                <label for=\"s2_talk_jester\">Ask the jester who he is</label>\n                <label for=\"s2_ignore\">Ignore him and walk deeper into the woods</label>\n            </div>\n        </div>\n\n        <!-- --- Draw Card --- -->\n        <div id=\"scene2_draw\" class=\"scene\">\n            <pre>\n   +---------+\n   | \\     / |\n   |  \\   /  |\n   |   \\ /   |\n   |    X    |\n   |   / \\   |\n   |  /   \\  |\n   | /     \\ |\n   +---------+\n   |  FLAME  |\n   +---------+\n    </pre>\n            <div class=\"story-text\">\n                You pull a card. It's the <strong>Joker of Flames</strong>! The card sears itself onto the back of your hand in a flash of heat, leaving a glowing mark. You feel raw fire magic coursing through your veins. Further down the path, you encounter an impassable wall of thorny black vines, pulsing with malevolent life, guarding a crystalline castle beyond.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_burn\">Unleash fire magic: Burn the thorn wall down</label>\n                <label for=\"s3_walk\">Conserve your magic: Find another way around</label>\n            </div>\n        </div>\n\n        <!-- --- Talk to Jester --- -->\n        <div id=\"scene2_talk_jester\" class=\"scene\">\n            <pre>\n      .-\"\"\"\"-.\n     /   __   \\\n    |   /  \\   |\n    |   \\__/   |\n     \\   __   /\n      '-....-'\n       /    \\\n      /      \\\n    </pre>\n            <div class=\"story-text\">\n                The jester's grin widens. He speaks in a voice like wind chimes: <em>\"I am the keeper of riddles, wanderer. Answer true and the forest shall open its heart to you. Answer false...\"</em> He trails off, tapping his chin. <em>\"What has roots that nobody sees, is taller than trees, up, up it goes, and yet never grows?\"</em>\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_riddle_right\">A mountain</label>\n                <label for=\"s3_riddle_wrong\">The wind</label>\n            </div>\n        </div>\n\n        <!-- --- Ignore Jester --- -->\n        <div id=\"scene2_ignore\" class=\"scene\">\n            <pre>\n     .~~~.\n    /     \\    ~~~~\n   |  @ @  |  ~~~~~~\n    \\  ~  /  ~~~~ ~~~\n     '._.'   ~~ ~~~~\n       |    ~~~~ ~~\n     ~~|~~ ~~~~ ~~~~\n    ~~~~|~~~~~~~~~~~\n    </pre>\n            <div class=\"story-text\">\n                You brush past the jester. He sighs dramatically, and with a snap of his fingers, the forest around you warps into a dark, bubbling swamp. Bioluminescent mushrooms cast eerie pools of light. In the distance, a crooked witch's hut leans precariously over the muck, while ghostly willow-o'-the-wisps dance over the water, beckoning you toward deeper marsh.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_hut\">Approach the witch's hut</label>\n                <label for=\"s3_wade\">Wade through the swamp muck</label>\n                <label for=\"s3_lights\">Follow the willow-o'-the-wisps</label>\n            </div>\n        </div>\n\n        <!-- --- Burn Thorns --- -->\n        <div id=\"scene3_burn\" class=\"scene\">\n            <pre>\n      (  .  )\n       ) . (\n     (  (  )  )\n      )  .  (\n        \\|/\n     --- * ---\n        /|\\\n       / | \\\n    </pre>\n            <div class=\"story-text\">\n                With a flick of your wrist, the Joker's magic erupts! A torrent of flame engulfs the thorn wall, reducing it to ash in seconds. You step through into the glittering <strong>Crystal Castle</strong>. In the center of the grand hall, on a pedestal of frozen light, rests the legendary <strong>Crown of Glass</strong>. It hums with ancient, terrible power.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_crown\">Place the Crown of Glass upon your head</label>\n                <label for=\"s4_crystal\">Smash the crown to end its curse forever</label>\n                <label for=\"s4_explore_castle\">Explore the castle further before deciding</label>\n            </div>\n        </div>\n\n        <!-- --- Walk Around --- -->\n        <div id=\"scene3_walk\" class=\"scene\">\n            <pre>\n       /\\    /\\\n      /  \\  /  \\\n     /    \\/    \\\n    /     /\\     \\\n   /     /  \\     \\\n  /_____/    \\_____\\\n      |        |\n      |  BANDITS  |\n      |___________|\n    </pre>\n            <div class=\"story-text\">\n                You decide to save your magic and trek around the thorn wall via a narrow gorge. As you squeeze through, three heavily armed bandits drop from the rocks above, surrounding you. <em>\"Your gold or your life, stranger! And we'd prefer the gold \u2014 it's less messy.\"</em>\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_bandit_fight\">Use the Joker of Flames: Fight them off</label>\n                <label for=\"s4_surrender\">Hand over your coin purse peacefully</label>\n                <label for=\"s4_trick_bandits\">Bluff: Claim you're a powerful wizard</label>\n            </div>\n        </div>\n\n        <!-- --- Follow Wisps --- -->\n        <div id=\"scene3_lights\" class=\"scene\">\n            <pre>\n      .  ~  .  ~  .\n     ~   o   o   ~\n    .  o  \\_/  o  .\n     ~  o  |  o  ~\n      .  ~  |  ~  .\n         ~  |  ~\n    ~~~~~~  |  ~~~~~~\n    ~~~~~~~~~~~~~~~~~\n    </pre>\n            <div class=\"story-text\">\n                The wisps lead you deeper into the marsh, their glow pulsing rhythmically. They circle around an ancient stone altar half-sunken in the bog. On the altar lies a pulsating green gem, radiating pure life energy. But the wisps grow agitated, swirling faster \u2014 this place is sacred, and you are an intruder.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_willowisp\">Take the glowing gem from the altar</label>\n                <label for=\"s3_wade\">Leave it be and wade back to safety</label>\n            </div>\n        </div>\n\n        <!-- --- Riddles --- -->\n        <div id=\"scene3_riddle_right\" class=\"scene\">\n            <pre>\n      \\   /\n       \\ /\n        *\n       / \\\n      /   \\\n     /     \\\n    /       \\\n    </pre>\n            <div class=\"story-text\">\n                <em>\"Correct!\"</em> the jester beams, clapping his hands. <em>\"A mountain indeed! You have a sharp mind, traveler.\"</em> He reaches behind his ear and produces a tiny silver key that grows to full size in his palm. <em>\"This unlocks the hidden grove. Go \u2014 and may the old magic guide you.\"</em> The trees part, revealing a sunlit path to a secret sanctuary. You have found the <strong>Grove of Eternal Spring</strong>, a paradise hidden from the world. You live out your days in peace and wonder.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <div id=\"scene3_riddle_wrong\" class=\"scene\">\n            <pre>\n      .   .\n     \\_____/\n     /     \\\n    /  X X  \\\n    |   ^   |\n    \\_______/\n    </pre>\n            <div class=\"story-text\">\n                The jester's face falls. <em>\"Oh, dear. Wrong answer.\"</em> He snaps his fingers once. The world spins, and you find yourself shrunk to the size of a beetle, trapped under a glass jar in the jester's collection. <em>\"Don't worry,\"</em> he whispers, peering down at you, <em>\"I'll feed you crumbs.\"</em>\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- --- Swamp Hut --- -->\n        <div id=\"scene3_hut\" class=\"scene\">\n            <pre>\n       @..@\n      (----)\n     ( >__< )\n     ^^ ~~ ^^\n      |    |\n     /|    |\\\n    / |____| \\\n    </pre>\n            <div class=\"story-text\">\n                You push open the creaking door. The witch looks up from her cauldron, furious at the intrusion. <em>\"No manners at all!\"</em> she shrieks. Before you can apologize, her wand lashes out with a crackle of green energy. Your body shrinks, your skin turns warty, and the world grows enormous around you. You are now a swamp toad. Ribbit.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- --- Wade in Swamp --- -->\n        <div id=\"scene3_wade\" class=\"scene\">\n            <pre>\n    ~~~~~~~~~~~~~~~~\n    ~~~~~~~ ~~~~~~~~\n    ~~~~~  o  ~~~~~~\n    ~~~~  \\_/  ~~~~~\n    ~~~~~~ | ~~~~~~~\n    ~~~~~~ | ~~~~~~~\n    ~~~~~~~~~~~~~~~~\n    </pre>\n            <div class=\"story-text\">\n                You step into the murky water. It's far deeper than it looked. Before you can react, massive reptilian forms surge from beneath the surface. The swamp crocodiles have lived here for centuries, and they are always hungry. The murky water churns red, then stills.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- --- Crown Endings --- -->\n        <div id=\"scene4_crown\" class=\"scene\">\n            <pre>\n       _/\\_\n      /    \\\n      \\    /\n       \\  /\n        \\/\n        /\\\n       /  \\\n      /    \\\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: THE CRYSTAL MONARCH</strong><br><br>\n                The moment the crown touches your brow, your skin hardens into living crystal. You gain infinite power over the valley \u2014 but you are forever fused to the throne, a beautiful, terrible statue-king, watching centuries pass in silence.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <div id=\"scene4_crystal\" class=\"scene\">\n            <pre>\n       \\ | /\n     --- * ---\n       / | \\\n      /  |  \\\n         |\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: LIBERATOR OF THE VALLEY</strong><br><br>\n                You raise the heavy mallet (or your fist) and shatter the crown! A massive shockwave of purified energy surges outward. The curse lifts, the sky clears, the jester bows to you from afar, and the valley blooms into spring. You return home a true hero.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <div id=\"scene4_explore_castle\" class=\"scene\">\n            <pre>\n      /|   |\\\n     / |   | \\\n    /  |   |  \\\n   /___|___|___\\\n       |   |\n       |   |\n       |___|\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: THE HIDDEN ARCHIVE</strong><br><br>\n                You explore deeper into the castle and discover an ancient library filled with crystallized books. Among them, a tome reveals the true history of the valley \u2014 and a spell to free the land without destroying the crown. You become the realm's wisest scholar-king, ruling with knowledge instead of power.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- --- Bandit Endings --- -->\n        <div id=\"scene4_bandit_fight\" class=\"scene\">\n            <pre>\n      (   )   (   )\n     (  FIRE  )\n      (   )   (   )\n         \\   /\n          \\ /\n           *\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: THE FEARSOME PYROMANCER</strong><br><br>\n                You unleash a roaring wave of flame! The bandits scream and scatter into the hills. Word spreads fast \u2014 nobody in the valley ever dares cross the wandering fire-wielder again. You walk the roads freely, respected and feared.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <div id=\"scene4_surrender\" class=\"scene\">\n            <pre>\n      ._____.\n      | EMPTY |\n      '-----'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: PENNILESS BUT ALIVE</strong><br><br>\n                You hand over your coin purse with a sigh. The bandits laugh and leave you in the dirt. You survive, but the long walk back to civilization with empty pockets teaches you a hard lesson about preparedness.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <div id=\"scene4_trick_bandits\" class=\"scene\">\n            <pre>\n      .___.\n      | ? |\n      '---'\n       / \\\n      /   \\\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: THE GREAT BLUFF</strong><br><br>\n                You raise your marked hand and speak in a booming voice: <em>\"I am the Flame-Keeper of the Jester's Court! Flee or be ash!\"</em> The Joker's mark glows menacingly. The bandits' eyes widen \u2014 they drop their weapons and run. You didn't spend a single coin or spark. Sometimes a good bluff is the sharpest weapon.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- --- Willowisp Ending --- -->\n        <div id=\"scene4_willowisp\" class=\"scene\">\n            <pre>\n      *  .  *  .  *\n     .  \\ | /  .\n      * - O - *\n     .  / | \\  .\n      *  .  *  .  *\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: KEEPER OF THE MARSH</strong><br><br>\n                You grasp the glowing gem. The wisps swirl around you in a frenzy \u2014 then suddenly calm. The gem bonds to your spirit, and you become the new guardian of the marsh, protecting its ancient magic for all eternity, accompanied by your floating wisp companions.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- ==================== MOUNTAIN BRANCH ==================== -->\n        <div id=\"scene1_mountain\" class=\"scene\">\n            <pre>\n        /\\\n       /  \\/\\\n      /    \\ \\\n     /      \\ \\\n    /        \\ \\\n   /__________\\ \\\n   \\          /  \\\n    \\        /    \\\n     \\      /      \\\n      \\    /        \\\n    </pre>\n            <div class=\"story-text\">\n                The air thins as you ascend. You stumble upon the remains of a long-dead adventurer's camp. A rusted iron sword lies half-buried in the scree. Nearby, sitting inexplicably pristine on a flat rock, is a heavy <strong>red croquet mallet</strong> with a polished oak handle. A torn journal peeks out from under a rotted bedroll.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s2_mallet\">Take the red croquet mallet</label>\n                <label for=\"s2_sword\">Take the iron sword</label>\n                <label for=\"s2_search_camp\">Search the journal and bedroll</label>\n            </div>\n        </div>\n\n        <!-- --- Mallet --- -->\n        <div id=\"scene2_mallet\" class=\"scene\">\n            <pre>\n       _____\n      [_____]\n        | |\n        | |\n        | |\n        | |\n       /   \\\n      /     \\\n    </pre>\n            <div class=\"story-text\">\n                You heft the mallet. It's surprisingly well-balanced and feels almost eager in your grip. As you continue upward, a massive <strong>Mountain Troll</strong> leaps from behind a boulder, blocking the narrow pass. Its stone-gray hide looks impenetrable, and its club is the size of a small tree.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_smash\">Swing the mallet with all your might</label>\n                <label for=\"s3_talk\">Raise a hand and try to negotiate</label>\n            </div>\n        </div>\n\n        <!-- --- Sword --- -->\n        <div id=\"scene2_sword\" class=\"scene\">\n            <pre>\n          /| ________________\n    O|===|* >________________>\n          \\|\n           \\\\\n            \\\\\n    </pre>\n            <div class=\"story-text\">\n                You pull the rusty sword from the dirt. It feels flimsy, the blade pitted with age. Before you can test its edge, a massive <strong>Mountain Troll</strong> crashes down from the cliffs, roaring and blocking your path entirely.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_fight\">Stand your ground and fight the troll</label>\n                <label for=\"s3_flee\">Drop the sword and flee back down the trail</label>\n            </div>\n        </div>\n\n        <!-- --- Search Camp --- -->\n        <div id=\"scene2_search_camp\" class=\"scene\">\n            <pre>\n      .-------.\n      | JOURNAL |\n      '-------'\n       /     \\\n      /       \\\n     /  MAP    \\\n    /___________\\\n    </pre>\n            <div class=\"story-text\">\n                You flip through the journal. The last entry describes a <strong>secret mountain pass</strong> leading to an ancient griffon's nest, said to contain treasure beyond measure. Tucked in the back cover is a faded but legible map. The journal also warns of unstable rockfalls along the pass.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_secret_pass\">Follow the map to the secret pass</label>\n                <label for=\"s3_ignore_map\">Ignore it \u2014 maps from dead adventurers are bad omens</label>\n            </div>\n        </div>\n\n        <!-- --- Smash Troll --- -->\n        <div id=\"scene3_smash\" class=\"scene\">\n            <pre>\n        O\n       /|\\\n       / \\\n      /   \\\n     /     \\\n    /       \\\n    </pre>\n            <div class=\"story-text\">\n                You swing with everything you have. <strong>CRACK!</strong> The mallet releases a burst of strange kinetic energy on impact. The troll goes flying over the cliff edge, howling all the way down. You press on and discover a cavern entrance. Inside, a <strong>massive dragon</strong> sleeps atop a glittering hoard of gold and jewels, its breath rising and falling in smoky puffs.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_sneak\">Set down the mallet and sneak past to steal gold</label>\n                <label for=\"s4_bonk\">Bonk the dragon on the snout with the mallet</label>\n                <label for=\"s4_befriend\">Try to befriend the sleeping dragon</label>\n            </div>\n        </div>\n\n        <!-- --- Talk to Troll --- -->\n        <div id=\"scene3_talk\" class=\"scene\">\n            <pre>\n      .___.\n      |RIP|\n      '---'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: DIPLOMACY FAILED</strong><br><br>\n                You raise your hands peacefully. The troll, who skipped breakfast, sees not a diplomat but a convenient snack. It picks you up, sniffs you once, and swallows you whole. Negotiations were brief.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- --- Fight Troll --- -->\n        <div id=\"scene3_fight\" class=\"scene\">\n            <pre>\n      ___\n     /   \\\n    |  X  |\n     \\___/\n      | |\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: SHATTERED STEEL</strong><br><br>\n                You lunge and strike the troll's leg. The ancient sword snaps clean in half against its stone-like hide. The troll looks down, almost offended, then brings its club down with a thunderous crash. The stars go out.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- --- Flee --- -->\n        <div id=\"scene3_flee\" class=\"scene\">\n            <pre>\n      .___.\n      |RUN|\n      '---'\n       / \\\n      /   \\\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: THE COWARD'S TALE</strong><br><br>\n                You drop the worthless sword and sprint back down the mountain, heart pounding. You survive, and eventually become a tavern keeper, entertaining patrons with wildly exaggerated stories of monsters you definitely, absolutely, heroically defeated.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- --- Secret Pass --- -->\n        <div id=\"scene3_secret_pass\" class=\"scene\">\n            <pre>\n       /\\\n      /  \\\n     /    \\\n    /  __  \\\n   /  /  \\  \\\n  /  /    \\  \\\n /__/______\\__\\\n    </pre>\n            <div class=\"story-text\">\n                You follow the crumbling map through a narrow, wind-blasted defile. The pass opens onto a high ledge overlooking a magnificent valley. Before you lies a <strong>griffon's nest</strong>, empty \u2014 the great beast is out hunting. Golden artifacts glint among the twigs and bones.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_griffon_nest\">Quickly grab treasure from the nest</label>\n                <label for=\"s4_map_treasure\">The map also marks a hidden cave nearby \u2014 investigate</label>\n            </div>\n        </div>\n\n        <!-- --- Ignore Map --- -->\n        <div id=\"scene3_ignore_map\" class=\"scene\">\n            <pre>\n      .___.\n      | NOPE |\n      '---'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: THE PRUDENT CLIMBER</strong><br><br>\n                You decide the map is cursed and the dead adventurer's fate is warning enough. You climb back down the mountain, sell the journal to a historian for a modest sum, and live a quiet, uneventful life. Safe, but utterly unremarkable.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- --- Dragon Endings --- -->\n        <div id=\"scene4_sneak\" class=\"scene\">\n            <pre>\n      .___. .___. .___.\n      |Au| |Ag| |Cu|\n      '---' '---' '---'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: THE SILENT HOARDER</strong><br><br>\n                You leave the mallet by the entrance and tiptoe through the cavern. You fill every pocket with gold coins and precious gems, then slip away as silently as a shadow. You retire wealthy beyond measure, though sometimes you dream of the red mallet you left behind.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <div id=\"scene4_bonk\" class=\"scene\">\n            <pre>\n        \\|/\n       - O -\n        /|\\\n       / | \\\n      /  |  \\\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: THE LEGENDARY DRAGON-BONKER</strong><br><br>\n                You leap from a stalactite and bring the mallet down squarely on the dragon's snout. The beast's eyes fly open \u2014 not in rage, but in utter, bewildered shock. Never in its 3,000 years has anything dared to <em>bonk</em> it. It lets out a yelp like a startled puppy and flees the cavern, crying. The entire hoard is yours.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <div id=\"scene4_befriend\" class=\"scene\">\n            <pre>\n      .-\"\"\"\"-.\n     /  _  _  \\\n     |   __   |\n     \\  '--'  /\n      '-....-'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: DRAGONKIN</strong><br><br>\n                You approach slowly, mallet lowered, and hum an old lullaby your grandmother taught you. The dragon stirs, fixes you with one enormous golden eye \u2014 and then rumbles with what sounds almost like a purr. You have made a friend for life. Together, you soar the skies of the Eldritch Valley, an unbreakable bond between human and dragon.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- --- Map Endings --- -->\n        <div id=\"scene4_map_treasure\" class=\"scene\">\n            <pre>\n      .___.\n      | X |\n      '---'\n       / \\\n      /   \\\n
