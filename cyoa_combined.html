  </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: THE HIDDEN CAVE FORTUNE</strong><br><br>\n                The map's second marking leads you to a hidden cave behind a waterfall. Inside, you find the original adventurer's stash \u2014 a chest of gold, preserved rations, and a perfectly forged steel longsword. With wealth and a proper weapon, you carve out a legendary career as a monster hunter.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <div id=\"scene4_map_trap\" class=\"scene\">\n            <pre>\n      .___. .___. .___.\n      | B | | O | | M |\n      '---' '---' '---'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: TRIGGERED</strong><br><br>\n                The \"hidden cave\" was a trap all along. As you step onto the pressure plate, the entire ledge gives way. You tumble down the mountainside in a cascade of rocks and debris. The adventurer's journal was bait, and you took it. At least the view on the way down was spectacular.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- --- Griffon Nest --- -->\n        <div id=\"scene4_griffon_nest\" class=\"scene\">\n            <pre>\n      ^\\    /^\n      ) \\  / (\n      )  \\/  (\n      )  /\\  (\n      ) /  \\ (\n      )/    \\)\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: FLIGHT OF THE GRIFFON</strong><br><br>\n                You grab a gleaming golden torc from the nest just as a shadow falls over you. The griffon has returned. But instead of attacking, it cocks its head and lets out a curious chirp. The torc, it seems, was a gift meant for you \u2014 a bond between species. You mount the great beast and take to the skies, the valley sprawling beneath you in all its glory.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- ==================== CAVERN BRANCH ==================== -->\n        <div id=\"scene1_cavern\" class=\"scene\">\n            <pre>\n       _______\n      /       \\\n     /  .   .  \\\n    /    ___    \\\n    |   /   \\   |\n    |   \\___/   |\n    |           |\n    \\___________/\n         | |\n         | |\n         | |\n    </pre>\n            <div class=\"story-text\">\n                You descend into the cool darkness. The air smells of damp stone and minerals. After a short crawl, the tunnel opens into a vast underground chamber. To your left, an <strong>underground river</strong> glows faintly with bioluminescent algae. To your right, a forest of <strong>glowing crystal formations</strong> casts prismatic light across the cavern walls.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s2_cave_river\">Follow the glowing underground river</label>\n                <label for=\"s2_cave_crystals\">Explore the crystal forest</label>\n            </div>\n        </div>\n\n        <!-- --- Cave River --- -->\n        <div id=\"scene2_cave_river\" class=\"scene\">\n            <pre>\n    ~~~~ ~~~~ ~~~~ ~~~~\n    ~~~~ ~~~~ ~~~~ ~~~~\n    ~~~~ ~~~~ ~~~~ ~~~~\n        ~~~~ ~~~~\n            ~~~~\n             ~~~~\n    </pre>\n            <div class=\"story-text\">\n                The river's gentle current leads you to a vast <strong>underground lake</strong>. The ceiling above is encrusted with glowing crystals that mirror the stars. At the lake's center, a small island holds what appears to be a shrine. The water is crystal clear, revealing ancient carvings on the lakebed far below.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_underground_lake\">Swim to the island shrine</label>\n                <label for=\"s4_lake_dive\">Dive down to examine the carvings</label>\n            </div>\n        </div>\n\n        <!-- --- Cave Crystals --- -->\n        <div id=\"scene2_cave_crystals\" class=\"scene\">\n            <pre>\n      /\\    /\\    /\\\n     /  \\  /  \\  /  \\\n    /    \\/    \\/    \\\n    \\    /\\    /\\    /\n     \\  /  \\  /  \\  /\n      \\/    \\/    \\/\n    </pre>\n            <div class=\"story-text\">\n                The crystal forest hums with ancient energy. At its heart, you find a <strong>crystal mine</strong> abandoned by dwarves centuries ago. Pickaxes still lean against the walls. A faint rhythmic thumping echoes from deeper within \u2014 something large, made of stone and crystal, still guards this place.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_crystal_mine\">Enter the mine cautiously</label>\n                <label for=\"s4_mine_steal\">Grab a few loose crystals and retreat</label>\n            </div>\n        </div>\n\n        <!-- --- Underground Lake --- -->\n        <div id=\"scene3_underground_lake\" class=\"scene\">\n            <pre>\n      .  *  .  *  .\n     *   o   o   *\n    .  o  \\_/  o  .\n     *  o  |  o  *\n      .  *  |  *  .\n         *  |  *\n    ~~~~~~~ | ~~~~~~~\n    ~~~~~~~~~~~~~~~~~\n    </pre>\n            <div class=\"story-text\">\n                You swim across the cold, clear water and pull yourself onto the island. The shrine is dedicated to an ancient water spirit. A chalice filled with shimmering liquid sits at its base. A carved inscription reads: <em>\"Drink and know the depths of all things.\"</em>\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_lake_spirit\">Drink from the chalice</label>\n                <label for=\"s4_lake_dive\">Leave it and dive to explore the lakebed</label>\n            </div>\n        </div>\n\n        <!-- --- Crystal Mine --- -->\n        <div id=\"scene3_crystal_mine\" class=\"scene\">\n            <pre>\n      /\\/\\/\\\n     /      \\\n    /   __   \\\n    |  /  \\  |\n    |  \\__/  |\n    \\        /\n     \\/\\/\\/\\/\n    </pre>\n            <div class=\"story-text\">\n                You step into the mine. The thumping grows louder. Around a corner, you come face-to-face with a <strong>Crystal Golem</strong> \u2014 a towering humanoid made of living gemstone. It regards you with faceted eyes that glow like embers. It does not attack, but it blocks the path to a vein of pure, priceless diamond.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_mine_golem\">Attempt to communicate with the golem</label>\n                <label for=\"s4_mine_steal\">Dash past it and grab a diamond</label>\n            </div>\n        </div>\n\n        <!-- --- Lake Endings --- -->\n        <div id=\"scene4_lake_spirit\" class=\"scene\">\n            <pre>\n      *   *   *\n       \\  |  /\n        \\ | /\n          *\n         /|\\\n        / | \\\n       /  |  \\\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: THE DEEP KNOWLEDGE</strong><br><br>\n                You drink the shimmering liquid. In an instant, all the hidden truths of the world flood your mind \u2014 past, present, and future. You understand everything. You become the new water spirit of the underground lake, a font of wisdom for those brave enough to find you.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <div id=\"scene4_lake_dive\" class=\"scene\">\n            <pre>\n      ~~~~ ~~~~ ~~~~\n      ~~~~ .o. ~~~~\n      ~~~~ /|\\ ~~~~\n      ~~~~ / \\ ~~~~\n      ~~~~~~~~~~~~~~\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: THE SUNKEN SECRET</strong><br><br>\n                You dive deep. The carvings on the lakebed form a map \u2014 a map to a surface location where a true relic lies buried. You memorize it, surface gasping, and emerge from the cavern with purpose. The adventure is only beginning. This is the <strong>TRUE ENDING</strong> \u2014 the lost relic of Eldritch Valley awaits above, and you now know exactly where to dig.\n            </div>\n            <div class=\"choices\"><label for=\"s5_true_ending\">Claim your destiny</label></div>\n        </div>\n\n        <!-- --- Mine Endings --- -->\n        <div id=\"scene4_mine_golem\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  _  _  \\\n     |   __   |\n     \\  '--'  /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: THE GOLEM'S FRIEND</strong><br><br>\n                You speak softly to the golem, showing respect for its ancient duty. It rumbles in response and steps aside, allowing you to take a single perfect diamond. More importantly, it gifts you a shard of its own crystal heart \u2014 a charm of protection that will guard you for life.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <div id=\"scene4_mine_steal\" class=\"scene\">\n            <pre>\n      .___.\n      |CRASH|\n      '---'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: CRYSTAL CRUSH</strong><br><br>\n                You dart past the golem and snatch a diamond. Bad move. The golem's fist comes down like a hammer of judgment. The mine collapses around you, and you become a permanent part of the underground \u2014 a cautionary tale for future treasure hunters.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- ==================== TRUE ENDING ==================== -->\n        <div id=\"scene5_true_ending\" class=\"scene\">\n            <pre>\n         *\n        /|\\\n       / | \\\n      /  |  \\\n     /   |   \\\n    /    |    \\\n   /     |     \\\n  /______|______\\\n     |   |   |\n     |   |   |\n     |___|___|\n      \\     /\n       \\   /\n        \\ /\n         *\n    </pre>\n            <div class=\"story-text\">\n                <strong>TRUE ENDING: THE LOST RELIC</strong><br><br>\n                Armed with the underwater map, you journey to a forgotten corner of the Eldritch Valley. There, beneath an ancient oak split by lightning, you dig. Your shovel strikes something solid \u2014 a chest of weathered oak, bound in iron. Inside lies the <strong>Lost Relic of Eldritch</strong>: a crystal orb that hums with the combined magic of forest, mountain, and cavern. You hold the heart of the valley in your hands. The land recognizes you as its true guardian. Every creature, every spirit, every stone knows your name. You have not just survived the adventure \u2014 you have <em>won</em> it.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Play Again: A New Destiny Awaits</label></div>\n        </div>\n\n    </div>\n</body>\n</html>\n",
  "scifi": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Choose Your Own Adventure</title>\n    <style>\n        :root {\n            --term-cyan: #33eeff;\n            --term-bg: #020a10;\n            --term-dim: #1a5c6e;\n            --term-amber: #ffb444;\n            --term-red: #ff4455;\n            --term-plasma: #bb55ff;\n            --glow-ship: rgba(51, 238, 255, 0.25);\n            --glow-lab: rgba(100, 200, 255, 0.2);\n            --glow-alien: rgba(160, 220, 50, 0.25);\n            --glow-danger: rgba(255, 68, 85, 0.3);\n            --glow-hack: rgba(187, 85, 255, 0.3);\n        }\n\n        * {\n            box-sizing: border-box;\n        }\n\n        body {\n            background-color: #02060a;\n            color: var(--term-cyan);\n            font-family: 'Courier New', 'Courier', 'Lucida Console', monospace;\n            margin: 0;\n            padding: 16px;\n            line-height: 1.55;\n            min-height: 100vh;\n            background-image:\n                repeating-linear-gradient(0deg,\n                    transparent,\n                    transparent 2px,\n                    rgba(0, 20, 30, 0.03) 2px,\n                    rgba(0, 20, 30, 0.03) 4px);\n            background-size: 100% 4px;\n        }\n\n        .game-container {\n            max-width: 720px;\n            margin: 0 auto;\n            border: 2px solid var(--term-cyan);\n            padding: 28px 22px;\n            min-height: 82vh;\n            box-shadow:\n                0 0 20px var(--glow-ship),\n                inset 0 0 40px rgba(51, 238, 255, 0.03);\n            position: relative;\n            background: radial-gradient(ellipse at center,\n                    rgba(8, 20, 35, 0.6) 0%,\n                    rgba(2, 4, 8, 0.95) 70%);\n            transition: box-shadow 0.6s ease, border-color 0.6s ease, color 0.6s ease;\n        }\n\n        .env-ship {\n            box-shadow: 0 0 20px var(--glow-ship), inset 0 0 40px rgba(51, 238, 255, 0.03) !important;\n            border-color: var(--term-cyan) !important;\n            color: #c0f0ff !important;\n        }\n        .env-lab {\n            box-shadow: 0 0 20px var(--glow-lab), inset 0 0 40px rgba(100, 200, 255, 0.03) !important;\n            border-color: #5599cc !important;\n            color: #c8e0ff !important;\n        }\n        .env-alien {\n            box-shadow: 0 0 20px var(--glow-alien), inset 0 0 40px rgba(160, 220, 50, 0.03) !important;\n            border-color: #88aa44 !important;\n            color: #d0f0a0 !important;\n        }\n        .env-danger {\n            box-shadow: 0 0 20px var(--glow-danger), inset 0 0 40px rgba(255, 68, 85, 0.03) !important;\n            border-color: #cc3344 !important;\n            color: #ff8899 !important;\n        }\n        .env-hack {\n            box-shadow: 0 0 20px var(--glow-hack), inset 0 0 40px rgba(187, 85, 255, 0.03) !important;\n            border-color: #9944dd !important;\n            color: #d4b8ff !important;\n        }\n\n        pre {\n            font-size: 13px;\n            white-space: pre;\n            text-align: center;\n            margin-bottom: 24px;\n            text-shadow: 0 0 6px currentColor;\n            letter-spacing: 0;\n            line-height: 1.25;\n            overflow-x: auto;\n            padding: 4px 0;\n            animation: flickerIn 1.2s ease-out;\n        }\n\n        @keyframes flickerIn {\n            0% { opacity: 0; text-shadow: 0 0 20px currentColor; }\n            15% { opacity: 0.4; text-shadow: 0 0 2px currentColor; }\n            25% { opacity: 0.7; text-shadow: 0 0 14px currentColor; }\n            35% { opacity: 0.5; }\n            50% { opacity: 0.9; text-shadow: 0 0 8px currentColor; }\n            100% { opacity: 1; text-shadow: 0 0 6px currentColor; }\n        }\n\n        .story-text {\n            font-size: 1.15rem;\n            margin-bottom: 28px;\n            text-align: center;\n            padding: 0 8px;\n            animation: fadeIn 0.5s ease-out;\n        }\n\n        @keyframes fadeIn {\n            from { opacity: 0; transform: translateY(10px); }\n            to { opacity: 1; transform: translateY(0); }\n        }\n\n        .choices {\n            display: flex;\n            flex-direction: column;\n            gap: 13px;\n            align-items: center;\n        }\n\n        label {\n            display: inline-block;\n            border: 1px solid currentColor;\n            padding: 13px 26px;\n            cursor: pointer;\n            text-transform: uppercase;\n            letter-spacing: 1.5px;\n            transition: all 0.25s;\n            width: 82%;\n            text-align: center;\n            background: #000a12;\n            font-weight: bold;\n            font-size: 0.9rem;\n            position: relative;\n            user-select: none;\n        }\n\n        label:hover {\n            background-color: currentColor;\n            color: #000a12;\n            font-weight: bold;\n            box-shadow: 0 0 18px currentColor;\n            transform: scale(1.02);\n            letter-spacing: 2px;\n        }\n\n        label:active {\n            transform: scale(0.97);\n            transition: transform 0.08s;\n        }\n\n        label::before {\n            content: '> ';\n            opacity: 0;\n            transition: opacity 0.2s;\n        }\n        label:hover::before {\n            opacity: 1;\n            animation: blink 0.7s infinite;\n        }\n        @keyframes blink {\n            0%,100% { opacity: 1; }\n            50% { opacity: 0.2; }\n        }\n\n        input[type=\"radio\"] { display: none; }\n        .scene { display: none; animation: fadeIn 0.5s ease-out; }\n\n        /* START */\n        #s0:checked ~ .game-container #scene0,\n        /* LAB BRANCH */\n        #s1_lab:checked ~ .game-container #scene1_lab,\n        #s2_take_pistol:checked ~ .game-container #scene2_take_pistol,\n        #s2_read_logs:checked ~ .game-container #scene2_read_logs,\n        #s2_ignore_lab:checked ~ .game-container #scene2_ignore_lab,\n        #s3_fight_mutant:checked ~ .game-container #scene3_fight_mutant,\n        #s3_sneak_lab:checked ~ .game-container #scene3_sneak_lab,\n        #s3_reactor_warn:checked ~ .game-container #scene3_reactor_warn,\n        #s3_shutdown_reactor:checked ~ .game-container #scene3_shutdown_reactor,\n        #s3_bypass_hack:checked ~ .game-container #scene3_bypass_hack,\n        #s4_lab_escape:checked ~ .game-container #scene4_lab_escape,\n        #s4_lab_selfdestruct:checked ~ .game-container #scene4_lab_selfdestruct,\n        #s4_lab_artifact:checked ~ .game-container #scene4_lab_artifact,\n        /* ALIEN DERELICT BRANCH */\n        #s1_alien:checked ~ .game-container #scene1_alien,\n        #s2_take_artifact:checked ~ .game-container #scene2_take_artifact,\n        #s2_scan_ship:checked ~ .game-container #scene2_scan_ship,\n        #s3_hive_awaken:checked ~ .game-container #scene3_hive_awaken,\n        #s3_use_artifact:checked ~ .game-container #scene3_use_artifact,\n        #s3_flee_alien:checked ~ .game-container #scene3_flee_alien,\n        #s4_alien_queen:checked ~ .game-container #scene4_alien_queen,\n        #s4_alien_bond:checked ~ .game-container #scene4_alien_bond,\n        /* MINING COLONY BRANCH */\n        #s1_colony:checked ~ .game-container #scene1_colony,\n        #s2_bribe_pirates:checked ~ .game-container #scene2_bribe_pirates,\n        #s2_fight_pirates:checked ~ .game-container #scene2_fight_pirates,\n        #s3_pirate_alliance:checked ~ .game-container #scene3_pirate_alliance,\n        #s3_pirate_betray:checked ~ .game-container #scene3_pirate_betray,\n        #s3_colony_hack:checked ~ .game-container #scene3_colony_hack,\n        #s4_drone_army:checked ~ .game-container #scene4_drone_army,\n        #s4_mining_blast:checked ~ .game-container #scene4_mining_blast,\n        /* TRUE ENDING */\n        #s5_omega:checked ~ .game-container #scene5_omega {\n            display: block;\n        }\n\n        @media (max-width: 500px) {\n            .game-container { padding: 16px 10px; min-height: 88vh; }\n            pre { font-size: 10px; letter-spacing: -0.5px; }\n            .story-text { font-size: 0.95rem; }\n            label { width: 94%; padding: 11px 14px; font-size: 0.78rem; letter-spacing: 1px; }\n        }\n    </style>\n</head>\n<body>\n<a href=\"#\" onclick=\"window.parent.showMenu();return false;\" style=\"color:white;cursor:pointer;\">Back to Home</a>\n    <!-- STATE INPUTS -->\n    <input type=\"radio\" name=\"cyoa\" id=\"s0\" checked>\n    <!-- LAB -->\n    <input type=\"radio\" name=\"cyoa\" id=\"s1_lab\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_take_pistol\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_read_logs\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_ignore_lab\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_fight_mutant\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_sneak_lab\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_reactor_warn\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_shutdown_reactor\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_bypass_hack\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_lab_escape\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_lab_selfdestruct\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_lab_artifact\">\n    <!-- ALIEN -->\n    <input type=\"radio\" name=\"cyoa\" id=\"s1_alien\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_take_artifact\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_scan_ship\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_hive_awaken\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_use_artifact\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_flee_alien\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_alien_queen\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_alien_bond\">\n    <!-- COLONY -->\n    <input type=\"radio\" name=\"cyoa\" id=\"s1_colony\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_bribe_pirates\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_fight_pirates\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_pirate_alliance\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_pirate_betray\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_colony_hack\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_drone_army\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_mining_blast\">\n    <!-- TRUE END -->\n    <input type=\"radio\" name=\"cyoa\" id=\"s5_omega\">\n\n    <div class=\"game-container env-ship\" id=\"gameBox\">\n\n        <!-- START SCENE -->\n        <div id=\"scene0\" class=\"scene\">\n            <pre>\n      .    .    .\n    .   .   .   .\n       .   |   .\n     .   . | .   .\n    . -----+----- .\n     .   . | .   .\n       .   |   .\n    .   .  |  .   .\n      .    *    .\n    .   . / \\ .   .\n       . /   \\ .\n    </pre>\n            <div class=\"story-text\">\n                Your shuttle drifts silently toward the coordinates of <strong>Void Station Omega-7</strong>, a derelict research hub orbiting a dying star. Sensors detect three points of interest: a flickering <strong>Abandoned Research Lab</strong> on the station's lower ring, a dormant <strong>Alien Derelict</strong> docked to the station, and a signal from an <strong>Asteroid Mining Colony</strong> on a nearby rock. Which do you investigate first?\n            </div>\n            <div class=\"choices\">\n                <label for=\"s1_lab\">Dock at the Abandoned Research Lab</label>\n                <label for=\"s1_alien\">Board the Alien Derelict</label>\n                <label for=\"s1_colony\">Head to the Asteroid Mining Colony</label>\n            </div>\n        </div>\n\n        <!-- ==================== LAB BRANCH ==================== -->\n        <div id=\"scene1_lab\" class=\"scene\">\n            <pre>\n     .-----------.\n    /_____________\\\n    |  _______  | |\n    | |       | | |\n    | |  BIO  | | |\n    | |_______| | |\n    |___________|_|\n    \\_____________/\n       |  |  |  |\n       |  |  |  |\n    </pre>\n            <div class=\"story-text\">\n                The lab corridors are cold and sterile, lit only by emergency strips. Stasis pods line the walls, some shattered, their occupants missing. On a nearby console, a <strong>plasma pistol</strong> lies next to a flickering datapad. An audio log repeats: <em>\"Experiment Theta went wrong... containment breach... do not engage...\"</em>\n            </div>\n            <div class=\"choices\">\n                <label for=\"s2_take_pistol\">Take the plasma pistol and proceed</label>\n                <label for=\"s2_read_logs\">Read the full datapad logs first</label>\n                <label for=\"s2_ignore_lab\">Ignore everything and head deeper into the lab</label>\n            </div>\n        </div>\n\n        <!-- Take Pistol -->\n        <div id=\"scene2_take_pistol\" class=\"scene\">\n            <pre>\n      .___.\n      |===|>\n      '---'\n       / \\\n      /   \\\n    </pre>\n            <div class=\"story-text\">\n                The pistol hums to life in your grip, displaying a charge of 87%. As you round a corner, a grotesque <strong>Mutated Scientist</strong> lunges from the shadows, its limbs elongated and claws dripping with green ichor. It shrieks, blocking the path to the main reactor room.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_fight_mutant\">Fire the plasma pistol!</label>\n                <label for=\"s3_sneak_lab\">Try to sneak past it through a vent</label>\n            </div>\n        </div>\n\n        <!-- Read Logs -->\n        <div id=\"scene2_read_logs\" class=\"scene\">\n            <pre>\n      .-------.\n      | DATA  |\n      | LOGS  |\n      '-------'\n       /     \\\n      /  BIO  \\\n    </pre>\n            <div class=\"story-text\">\n                The logs reveal that the lab was studying a crystalline alien artifact. It caused the mutations. The head researcher, Dr. Voss, activated the self-destruct before vanishing. The reactor is unstable. You also find a <strong>security bypass code</strong> for the lab's blast doors.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_reactor_warn\">Rush to the reactor to stop the meltdown</label>\n                <label for=\"s3_bypass_hack\">Use the bypass code to reach the artifact storage</label>\n            </div>\n        </div>\n\n        <!-- Ignore Lab -->\n        <div id=\"scene2_ignore_lab\" class=\"scene\">\n            <pre>\n      .   .   .\n     .   .   .\n    .   .   .   .\n     .   .   .\n      .   .   .\n    </pre>\n            <div class=\"story-text\">\n                You push forward blindly. The lights flicker and die. In the darkness, you hear wet, slithering sounds. You stumble into a maintenance shaft and fall several decks. Miraculously, you land near an emergency escape pod. But the lab's self-destruct sequence has already begun...\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_lab_escape\">Launch the escape pod immediately</label>\n                <label for=\"s4_lab_selfdestruct\">Try to race back and deactivate the self-destruct</label>\n            </div>\n        </div>\n\n        <!-- Fight Mutant -->\n        <div id=\"scene3_fight_mutant\" class=\"scene\">\n            <pre>\n      (   )   (   )\n     (  PLASMA )\n      (   )   (   )\n         \\   /\n          \\ /\n           *\n    </pre>\n            <div class=\"story-text\">\n                You squeeze the trigger. Superheated plasma bolts incinerate the mutant mid-lunge. The path is clear, and you access the reactor control room. The core is critical. You can attempt a manual shutdown, or grab the strange crystalline artifact floating in a containment field nearby.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_shutdown_reactor\">Shut down the reactor to save the station</label>\n                <label for=\"s4_lab_artifact\">Grab the floating crystalline artifact</label>\n            </div>\n        </div>\n\n        <!-- Sneak Lab -->\n        <div id=\"scene3_sneak_lab\" class=\"scene\">\n            <pre>\n      ___\n     /  _\\\n     | | |\n     |_|_|\n    </pre>\n            <div class=\"story-text\">\n                You crawl through the vent and emerge in the artifact storage. The crystalline object floats serenely, pulsing with blue light. The self-destruct warning blares \u2014 you have seconds to decide. Take the artifact and flee, or try to deactivate the sequence from here?\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_lab_artifact\">Take the artifact and run to the escape pod</label>\n                <label for=\"s4_lab_selfdestruct\">Attempt to override the self-destruct sequence</label>\n            </div>\n        </div>\n\n        <!-- Reactor Warn -->\n        <div id=\"scene3_reactor_warn\" class=\"scene\">\n            <pre>\n      .---.\n      |!!!|\n      '---'\n       /|\\\n      / | \\\n    </pre>\n            <div class=\"story-text\">\n                You race to the reactor room. The core is a swirling vortex of unstable plasma. The control panel is dead. You can try a manual coolant override, but it's risky. Alternatively, the artifact's containment is failing \u2014 it might be able to stabilize the reaction if placed in the core.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_shutdown_reactor\">Attempt the manual coolant override</label>\n                <label for=\"s4_lab_artifact\">Fetch the artifact and use it on the core</label>\n            </div>\n        </div>\n\n        <!-- Shutdown Reactor -->\n        <div id=\"scene3_shutdown_reactor\" class=\"scene\">\n            <pre>\n      .___.\n      |COOL|\n      '---'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: HERO OF THE STATION</strong><br><br>\n                You pull the manual levers despite the searing heat. Coolant floods the chamber, and the reactor stabilizes. The station is saved, and your actions are recorded by the black box. You'll be remembered as the one who prevented Omega-7 from becoming a supernova.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- Bypass Hack -->\n        <div id=\"scene3_bypass_hack\" class=\"scene\">\n            <pre>\n      _   _\n     | | | |\n     | |_| |\n     |  _  |\n     |_| |_|\n    </pre>\n            <div class=\"story-text\">\n                You enter the bypass code. Blast doors slide open, revealing the artifact floating in a magnetic cradle. The device hums with alien energy. You can take it and escape, or interface with it to learn its secrets.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_lab_artifact\">Take the artifact and head to your ship</label>\n                <label for=\"s5_omega\">Interface with the artifact directly</label>\n            </div>\n        </div>\n\n        <!-- Lab Escape -->\n        <div id=\"scene4_lab_escape\" class=\"scene\">\n            <pre>\n      .---.\n      |ESC|\n      '---'\n       / \\\n      /   \\\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: NARROW ESCAPE</strong><br><br>\n                The escape pod rockets away just as the lab module detaches and explodes behind you. You drift in space, alive but empty-handed. The secrets of Omega-7 die with the station. You survive, but the mystery haunts you forever.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- Lab Selfdestruct -->\n        <div id=\"scene4_lab_selfdestruct\" class=\"scene\">\n            <pre>\n      * * *\n     * BOOM *\n      * * *\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: VAPORIZED</strong><br><br>\n                You dash back toward the reactor, but the countdown hits zero. A blinding white light consumes everything. Omega-7 becomes a brief, brilliant star in the void. No trace of you remains.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- Lab Artifact -->\n        <div id=\"scene4_lab_artifact\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  ___  \\\n     | /   \\ |\n     | \\___/ |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: ARTIFACT THIEF</strong><br><br>\n                You secure the crystalline artifact and escape before the lab blows. Back on your ship, you realize the artifact contains a star map leading to an uncharted system. The adventure is just beginning, but you have the key.\n            </div>\n            <div class=\"choices\"><label for=\"s5_omega\">Set course for the uncharted system</label></div>\n        </div>\n\n        <!-- ==================== ALIEN DERELICT BRANCH ==================== -->\n        <div id=\"scene1_alien\" class=\"scene\">\n            <pre>\n      .___     ___.\n     /   \\   /   \\\n     |  o | | o  |\n     \\___/   \\___/\n      |||     |||\n      |||     |||\n     //|\\\\   //|\\\\\n    </pre>\n            <div class=\"story-text\">\n                The alien ship is organic, its walls pulsing with bioluminescence. At its heart, you find a pedestal holding a <strong>psionic resonator</strong>, a device that seems to translate alien thought. Nearby, a corridor leads deeper into what looks like a living hive structure.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s2_take_artifact\">Take the psionic resonator</label>\n                <label for=\"s2_scan_ship\">Scan the ship's bio-network for information</label>\n            </div>\n        </div>\n\n        <!-- Take Resonator -->\n        <div id=\"scene2_take_artifact\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  ^ ^  \\\n     |   @   |\n     \\  '-'  /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                As soon as you touch the resonator, a psychic scream echoes in your mind. The hive awakens! Alien drones skitter from the walls. The resonator allows you to command them, but the queen's presence is overwhelming. You can try to dominate the swarm, or flee while you still can.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_hive_awaken\">Attempt to dominate the alien swarm</label>\n                <label for=\"s3_flee_alien\">Flee back to the airlock</label>\n            </div>\n        </div>\n\n        <!-- Scan Ship -->\n        <div id=\"scene2_scan_ship\" class=\"scene\">\n            <pre>\n      .-------.\n      | SCAN  |\n      | DATA  |\n      '-------'\n    </pre>\n            <div class=\"story-text\">\n                The scan reveals the ship is a <strong>Xenohive Mothership</strong>, dormant for millennia. The queen is in stasis, but the resonator can awaken her. The data also contains a genetic key that could bond you to the hive. Dangerous, but potentially rewarding.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_use_artifact\">Use the resonator to awaken the queen</label>\n                <label for=\"s3_flee_alien\">Leave immediately \u2014 this is beyond you</label>\n            </div>\n        </div>\n\n        <!-- Hive Awaken -->\n        <div id=\"scene3_hive_awaken\" class=\"scene\">\n            <pre>\n      \\|/  \\|/  \\|/\n       O    O    O\n      /|\\  /|\\  /|\\\n         \\ | /\n           *\n    </pre>\n            <div class=\"story-text\">\n                You focus your will through the resonator. The drones freeze, then bow before you. But the queen's mind pushes back. A mental battle ensues. You can either submit and become part of the hive, or try a desperate psychic counterattack.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_alien_queen\">Submit to the queen's will</label>\n                <label for=\"s4_alien_bond\">Launch a psychic counterattack to bond as equals</label>\n            </div>\n        </div>\n\n        <!-- Use Artifact -->\n        <div id=\"scene3_use_artifact\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  ___  \\\n     | /   \\ |\n     | \\___/ |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                You activate the resonator. The queen stirs. A colossal alien consciousness probes your mind. She offers you a choice: merge with the hive and become a new hybrid lifeform, or be consumed. Do you accept?\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_alien_queen\">Accept the merge</label>\n                <label for=\"s4_alien_bond\">Refuse and fight back with the resonator</label>\n            </div>\n        </div>\n\n        <!-- Flee Alien -->\n        <div id=\"scene3_flee_alien\" class=\"scene\">\n            <pre>\n      .---.\n      |RUN|\n      '---'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: COWARDICE PRESERVES</strong><br><br>\n                You bolt for the airlock and detach your ship. The alien derelict drifts away. You live, but you know you left behind unimaginable power. Some nights, the psychic whispers still echo in your dreams.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- Alien Queen -->\n        <div id=\"scene4_alien_queen\" class=\"scene\">\n            <pre>\n      .---.\n      |MERGE|\n      '---'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: XENOHIVE CONSCIOUSNESS</strong><br><br>\n                You merge with the queen. Your body transforms, but your mind expands across the galaxy. You become the new hive mind, commanding the entire dormant fleet. The universe will learn to fear the name Omega-7.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- Alien Bond -->\n        <div id=\"scene4_alien_bond\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  = =  \\\n     |   ~   |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: PSIONIC SYMBIOSIS</strong><br><br>\n                You and the queen reach an equilibrium. The resonator binds you as equals. She grants you a fraction of the hive's power and a map to the ancient homeworld. Together, you set out to explore the stars \u2014 a partnership unlike any other.\n            </div>\n            <div class=\"choices\"><label for=\"s5_omega\">Set course for the homeworld</label></div>\n        </div>\n\n        <!-- ==================== MINING COLONY BRANCH ==================== -->\n        <div id=\"scene1_colony\" class=\"scene\">\n            <pre>\n      .___. .___. .___.\n      |ORE| |ORE| |ORE|\n      '---' '---' '---'\n         \\    |    /\n          \\   |   /\n           \\  |  /\n            \\ | /\n             \\|/\n    </pre>\n            <div class=\"story-text\">\n                The mining colony is a rough outpost carved into an asteroid. As you dock, a group of <strong>Space Pirates</strong> intercepts you. Their leader, a scarred woman named Rex, demands payment for \"docking rights.\" You notice her crew is heavily armed but their equipment is patchwork.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s2_bribe_pirates\">Pay the docking fee (you have credits)</label>\n                <label for=\"s2_fight_pirates\">Refuse and draw your weapon</label>\n                <label for=\"s3_colony_hack\">Try to hack the station's defense turrets</label>\n            </div>\n        </div>\n\n        <!-- Bribe -->\n        <div id=\"scene2_bribe_pirates\" class=\"scene\">\n            <pre>\n      .___.\n      |$$$|\n      '---'\n    </pre>\n            <div class=\"story-text\">\n                Rex grins and pockets your credits. \"Smart move, spacer.\" She offers you a drink and a job: help them raid an untouched asteroid cavern full of rare crystals. The payout could make you rich, but it's dangerous.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_pirate_alliance\">Accept the job and join the pirate crew</label>\n                <label for=\"s3_pirate_betray\">Take the job but plan to betray them for the full haul</label>\n            </div>\n        </div>\n\n        <!-- Fight Pirates -->\n        <div id=\"scene2_fight_pirates\" class=\"scene\">\n            <pre>\n      ( )\n       *---*\n      (     )\n       \\   /\n        \\_/\n    </pre>\n            <div class=\"story-text\">\n                You draw your weapon, but Rex is faster. A stun blast hits your chest, and you wake up in the colony's brig. They stripped your ship. Now you must either join them or find another way out.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_pirate_alliance\">Reluctantly join the pirate crew</label>\n                <label for=\"s3_colony_hack\">Try to override the brig lock from the terminal</label>\n            </div>\n        </div>\n\n        <!-- Pirate Alliance -->\n        <div id=\"scene3_pirate_alliance\" class=\"scene\">\n            <pre>\n      .___.\n      |CREW|\n      '---'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: PIRATE LEGEND</strong><br><br>\n                You earn your place among the pirates. Together, you raid the crystal cavern, fighting off rival gangs and alien beasts. You become a notorious space outlaw, living free among the stars with your new family.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- Pirate Betray -->\n        <div id=\"scene3_pirate_betray\" class=\"scene\">\n            <pre>\n      .___.\n      |TRAP|\n      '---'\n    </pre>\n            <div class=\"story-text\">\n                During the raid, you set off an explosive you planted. The pirates are caught in the blast, and you grab the crystal haul for yourself. You escape, but now you have a price on your head and no friends in the galaxy.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- Colony Hack -->\n        <div id=\"scene3_colony_hack\" class=\"scene\">\n            <pre>\n      _   _\n     | | | |\n     | |_| |\n     |  _  |\n     |_| |_|\n    </pre>\n            <div class=\"story-text\">\n                You access the colony's network. You can activate mining drones to fight the pirates, or trigger a controlled collapse of the entrance tunnel to seal them out. The colony's core systems are yours.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_drone_army\">Activate the mining drone army</label>\n                <label for=\"s4_mining_blast\">Trigger the entrance collapse</label>\n            </div>\n        </div>\n\n        <!-- Drone Army -->\n        <div id=\"scene4_drone_army\" class=\"scene\">\n            <pre>\n      [=] [=] [=]\n      | | | | | |\n      |_| |_| |_|\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: DRONE COMMANDER</strong><br><br>\n                Dozens of mining drones swarm the pirates and drive them off. The colonists hail you as a hero. You stay on as the colony's chief of security, using your tech skills to build a thriving, well-defended settlement.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- Mining Blast -->\n        <div id=\"scene4_mining_blast\" class=\"scene\">\n            <pre>\n      * * *\n     * BOOM *\n      * * *\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: COLLATERAL DAMAGE</strong><br><br>\n                You trigger the collapse. The tunnel seals, but the explosion destabilizes a gas pocket. The entire colony module is destroyed. You barely escape in the chaos, alone and responsible for countless deaths.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- ==================== TRUE ENDING ==================== -->\n        <div id=\"scene5_omega\" class=\"scene\">\n            <pre>\n         *\n        /|\\\n       / | \\\n      /  |  \\\n     /   |   \\\n    /    |    \\\n   /  ___|___  \\\n  /  /   |   \\  \\\n /__/____|____\\__\\\n     \\   |   /\n      \\  |  /\n       \\ | /\n        \\|/\n         *\n    </pre>\n            <div class=\"story-text\">\n                <strong>TRUE ENDING: THE OMEGA KEY</strong><br><br>\n                You gather all the pieces: the lab's artifact, the alien resonator, and the mining colony's crystal data. Together, they form a complete map to the <strong>Omega Gate</strong> \u2014 an ancient hyperspace portal capable of reaching any point in the universe instantaneously. You activate the gate and step through, leaving behind the known galaxy. Your destiny is no longer written in the stars \u2014 you now write the stars themselves.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure: New Galaxy Awaits</label></div>\n        </div>\n\n    </div>\n\n</body>\n</html>\n",
  "pirates": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Choose Your Own Adventure</title>\n    <style>\n        :root {\n            --term-amber: #ffb000;\n            --term-bg: #0a0703;\n            --term-dim: #7a5c1a;\n            --term-red: #ff4422;\n            --glow-ship: rgba(255, 176, 0, 0.3);\n            --glow-jungle: rgba(100, 200, 50, 0.2);\n            --glow-temple: rgba(255, 200, 0, 0.25);\n            --glow-danger: rgba(255, 68, 34, 0.3);\n            --glow-treasure: rgba(255, 215, 0, 0.35);\n        }\n\n        * {\n            box-sizing: border-box;\n        }\n\n        body {\n            background-color: #050302;\n            color: var(--term-amber);\n            font-family: 'Courier New', 'Courier', 'Lucida Console', monospace;\n            margin: 0;\n            padding: 16px;\n            line-height: 1.55;\n            min-height: 100vh;\n            background-image:\n                repeating-linear-gradient(0deg,\n                    transparent,\n                    transparent 2px,\n                    rgba(80, 60, 10, 0.03) 2px,\n                    rgba(80, 60, 10, 0.03) 4px);\n            background-size: 100% 4px;\n        }\n\n        .game-container {\n            max-width: 720px;\n            margin: 0 auto;\n            border: 2px solid var(--term-amber);\n            padding: 28px 22px;\n            min-height: 82vh;\n            box-shadow: 0 0 20px var(--glow-ship);\n            position: relative;\n            background: radial-gradient(ellipse at center,\n                    rgba(40, 25, 5, 0.6) 0%,\n                    rgba(5, 3, 2, 0.95) 70%);\n            transition: box-shadow 0.6s ease, border-color 0.6s ease, color 0.6s ease;\n        }\n\n        .env-ship { box-shadow: 0 0 20px var(--glow-ship); border-color: #cc8800; color: #f0c070; }\n        .env-jungle { box-shadow: 0 0 20px var(--glow-jungle); border-color: #558833; color: #c0e0a0; }\n        .env-temple { box-shadow: 0 0 20px var(--glow-temple); border-color: #aa8800; color: #ffe080; }\n        .env-danger { box-shadow: 0 0 20px var(--glow-danger); border-color: #aa3322; color: #ff7755; }\n        .env-treasure { box-shadow: 0 0 20px var(--glow-treasure); border-color: #ddbb00; color: #ffd700; }\n\n        pre {\n            font-size: 13px;\n            white-space: pre;\n            text-align: center;\n            margin-bottom: 24px;\n            text-shadow: 0 0 6px currentColor;\n            letter-spacing: 0;\n            line-height: 1.25;\n            overflow-x: auto;\n            padding: 4px 0;\n            animation: flickerIn 1.2s ease-out;\n        }\n\n        @keyframes flickerIn {\n            0% { opacity: 0; text-shadow: 0 0 20px currentColor; }\n            15% { opacity: 0.4; text-shadow: 0 0 2px currentColor; }\n            25% { opacity: 0.7; text-shadow: 0 0 14px currentColor; }\n            35% { opacity: 0.5; }\n            50% { opacity: 0.9; text-shadow: 0 0 8px currentColor; }\n            100% { opacity: 1; text-shadow: 0 0 6px currentColor; }\n        }\n\n        .story-text {\n            font-size: 1.15rem;\n            margin-bottom: 28px;\n            text-align: center;\n            padding: 0 8px;\n            animation: fadeIn 0.5s ease-out;\n        }\n\n        @keyframes fadeIn {\n            from { opacity: 0; transform: translateY(10px); }\n            to { opacity: 1; transform: translateY(0); }\n        }\n\n        .choices {\n            display: flex;\n            flex-direction: column;\n            gap: 13px;\n            align-items: center;\n        }\n\n        label {\n            display: inline-block;\n            border: 1px solid currentColor;\n            padding: 13px 26px;\n            cursor: pointer;\n            text-transform: uppercase;\n            letter-spacing: 1.5px;\n            transition: all 0.25s;\n            width: 82%;\n            text-align: center;\n            background: #0a0500;\n            font-weight: bold;\n            font-size: 0.9rem;\n            position: relative;\n            user-select: none;\n        }\n\n        label:hover {\n            background-color: currentColor;\n            color: #0a0500;\n            font-weight: bold;\n            box-shadow: 0 0 18px currentColor;\n            transform: scale(1.02);\n            letter-spacing: 2px;\n        }\n\n        label:active { transform: scale(0.97); transition: transform 0.08s; }\n\n        label::before {\n            content: '> ';\n            opacity: 0;\n            transition: opacity 0.2s;\n        }\n        label:hover::before {\n            opacity: 1;\n            animation: blink 0.7s infinite;\n        }\n        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }\n\n        input[type=\"radio\"] { display: none; }\n        .scene { display: none; animation: fadeIn 0.5s ease-out; }\n\n        /* START */\n        #s0:checked ~ .game-container #scene0,\n        /* BEACH BRANCH */\n        #s1_beach_take:checked ~ .game-container #scene1_beach_take,\n        #s1_beach_inland:checked ~ .game-container #scene1_beach_inland,\n        #s2_follow_map:checked ~ .game-container #scene2_follow_map,\n        #s2_explore_jungle:checked ~ .game-container #scene2_explore_jungle,\n        #s2_shipwreck:checked ~ .game-container #scene2_shipwreck,\n        #s3_temple_enter:checked ~ .game-container #scene3_temple_enter,\n        #s3_temple_climb:checked ~ .game-container #scene3_temple_climb,\n        #s3_cutlass_fight:checked ~ .game-container #scene3_cutlass_fight,\n        #s3_sneak_camp:checked ~ .game-container #scene3_sneak_camp,\n        #s3_grapple_hook:checked ~ .game-container #scene3_grapple_hook,\n        #s3_swim_wreck:checked ~ .game-container #scene3_swim_wreck,\n        #s4_treasure_room:checked ~ .game-container #scene4_treasure_room,\n        #s4_cursed_gold:checked ~ .game-container #scene4_cursed_gold,\n        #s4_fight_captain:checked ~ .game-container #scene4_fight_captain,\n        #s4_join_crew:checked ~ .game-container #scene4_join_crew,\n        #s4_steal_ship:checked ~ .game-container #scene4_steal_ship,\n        #s4_kraken:checked ~ .game-container #scene4_kraken,\n        /* ENDINGS */\n        #s5_legend:checked ~ .game-container #scene5_legend,\n        #s5_curse:checked ~ .game-container #scene5_curse,\n        #s5_king:checked ~ .game-container #scene5_king,\n        #s5_castaway:checked ~ .game-container #scene5_castaway {\n            display: block;\n        }\n\n        @media (max-width: 500px) {\n            .game-container { padding: 16px 10px; min-height: 88vh; }\n            pre { font-size: 10px; letter-spacing: -0.5px; }\n            .story-text { font-size: 0.95rem; }\n            label { width: 94%; padding: 11px 14px; font-size: 0.78rem; letter-spacing: 1px; }\n        }\n    </style>\n</head>\n<body>\n<a href=\"#\" onclick=\"window.parent.showMenu();return false;\" style=\"color:white;cursor:pointer;\">Back to Home</a>\n    <!-- STATE INPUTS -->\n    <input type=\"radio\" name=\"cyoa\" id=\"s0\" checked>\n    <input type=\"radio\" name=\"cyoa\" id=\"s1_beach_take\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s1_beach_inland\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_follow_map\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_explore_jungle\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_shipwreck\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_temple_enter\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_temple_climb\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_cutlass_fight\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_sneak_camp\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_grapple_hook\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_swim_wreck\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_treasure_room\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_cursed_gold\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_fight_captain\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_join_crew\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_steal_ship\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_kraken\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s5_legend\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s5_curse\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s5_king\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s5_castaway\">\n\n    <div class=\"game-container env-ship\" id=\"gameBox\">\n\n        <!-- START SCENE -->\n        <div id=\"scene0\" class=\"scene\">\n            <pre>\n       ~~~  ~~~~  ~~~\n    ~~~~  ~~~~~~~~  ~~~~\n    ~~~~~  ~~~~~~  ~~~~~\n    ~~~~~~  ~~~~  ~~~~~~\n    ~~~~~~~  ~~  ~~~~~~~\n    ~~~~~~~~~~~~~~~~~~~~~\n    ~~~~~~~~~~~~~~~~~~~~~\n    ~~~~~  ISLA  ~~~~~~~~\n    ~~~~~ CALAVERA ~~~~~~\n    ~~~~~~~~~~~~~~~~~~~~~\n    </pre>\n            <div class=\"story-text\">\n                You awaken on a tropical beach, the wreckage of your ship scattered along the sand. Clutched in your hand is a torn treasure map pointing to the heart of <strong>Isla Calavera</strong>. A rusty <strong>cutlass</strong> lies half-buried nearby. Inland, dense jungle obscures the island's interior. To the north, you spot the mast of a beached <strong>shipwreck</strong>.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s1_beach_take\">Grab the cutlass and study the map</label>\n                <label for=\"s1_beach_inland\">Head inland without a weapon</label>\n            </div>\n        </div>\n\n        <!-- BEACH: TAKE CUTLASS -->\n        <div id=\"scene1_beach_take\" class=\"scene\">\n            <pre>\n       ____\n      /    \\\n     |  ()  |\n      \\____/\n        ||\n        ||\n       /  \\\n      /    \\\n    </pre>\n            <div class=\"story-text\">\n                Armed with the cutlass, you follow the map into the jungle. The trail splits. To the left, ancient stone steps climb toward a <strong>crumbling temple</strong>. To the right, you hear the sounds of a <strong>pirate camp</strong> and drunken shanties.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s2_follow_map\">Climb toward the temple</label>\n                <label for=\"s2_explore_jungle\">Sneak toward the pirate camp</label>\n            </div>\n        </div>\n\n        <!-- BEACH: INLAND WITHOUT WEAPON -->\n        <div id=\"scene1_beach_inland\" class=\"scene\">\n            <pre>\n       ~~~~  ~~~~\n      ~~~~~~~~~~~~\n     ~~~~~  o  ~~~~\n      ~~~~ ~|~ ~~~~\n       ~~~~~|~~~~~\n         ~~~~|~~~~\n            ||\n    </pre>\n            <div class=\"story-text\">\n                Unarmed, you stumble upon the <strong>beached shipwreck</strong> before reaching the treeline. The hull is cracked open. Inside, you spot a <strong>grappling hook</strong> dangling from a broken mast and a chest that might contain supplies. The tide is rising fast.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s2_shipwreck\">Enter the wreck and grab the grappling hook</label>\n                <label for=\"s3_swim_wreck\">Swim around to the other side of the hull</label>\n            </div>\n        </div>\n\n        <!-- TEMPLE PATH -->\n        <div id=\"scene2_follow_map\" class=\"scene\">\n            <pre>\n        /\\\n       /  \\\n      /    \\\n     /  __  \\\n    /  /  \\  \\\n   /__/    \\__\\\n       |  |\n       |  |\n    </pre>\n            <div class=\"story-text\">\n                The temple is overgrown with vines. At its entrance, a stone altar holds a golden idol, but the floor is covered in pressure plates. You can either <strong>enter carefully</strong> or <strong>climb the outer wall</strong> to bypass the traps.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_temple_enter\">Step carefully through the trapped entrance</label>\n                <label for=\"s3_temple_climb\">Scale the outer wall with the grappling hook (if you have it)</label>\n            </div>\n        </div>\n\n        <!-- PIRATE CAMP -->\n        <div id=\"scene2_explore_jungle\" class=\"scene\">\n            <pre>\n     .-.   .-.\n    /   \\ /   \\\n    |   | |   |\n    \\   / \\   /\n     '-'   '-'\n      |     |\n      |     |\n    </pre>\n            <div class=\"story-text\">\n                You creep close to the camp. A gang of pirates guards a captive navigator and a chest of stolen goods. The pirate captain, a hulking brute with a mechanical hand, barks orders. You can <strong>fight them with the cutlass</strong> or <strong>try to sneak past and free the navigator</strong>.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_cutlass_fight\">Charge in swinging! For freedom!</label>\n                <label for=\"s3_sneak_camp\">Sneak around to the navigator's cage</label>\n            </div>\n        </div>\n\n        <!-- SHIPWRECK -->\n        <div id=\"scene2_shipwreck\" class=\"scene\">\n            <pre>\n      ._____.\n      |/   \\|\n      |/   \\|\n      '-----'\n        | |\n        | |\n    </pre>\n            <div class=\"story-text\">\n                You climb into the dark, creaking wreck. A skeleton still clutching a flintlock pistol grins at you from the corner. You can take the <strong>pistol</strong> (it might still work) or secure the <strong>grappling hook</strong> hanging above.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3_grapple_hook\">Take the grappling hook</label>\n                <label for=\"s4_fight_captain\">Pocket the flintlock and head back to the pirate camp</label>\n            </div>\n        </div>\n\n        <!-- TEMPLE ENTER -->\n        <div id=\"scene3_temple_enter\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  ! !  \\\n     |   ~   |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                You avoid the pressure plates and reach the inner chamber. A massive stone golem awakens, demanding a treasure offering. You have no gold \u2014 but the cutlass might work as a trade. Or you can try to <strong>fight the golem</strong>.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_treasure_room\">Offer the cutlass as tribute</label>\n                <label for=\"s4_cursed_gold\">Fight the stone golem</label>\n            </div>\n        </div>\n\n        <!-- TEMPLE CLIMB -->\n        <div id=\"scene3_temple_climb\" class=\"scene\">\n            <pre>\n       |  |\n       |  |\n       |  |\n       |  |\n      /    \\\n     /      \\\n    </pre>\n            <div class=\"story-text\">\n                You scale the temple wall and enter through a shattered window. Inside is a treasure trove, but the idol on the pedestal radiates dark energy. You can <strong>grab the treasure and run</strong> or <strong>examine the idol more closely</strong>.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_treasure_room\">Fill your pockets with gold and escape</label>\n                <label for=\"s4_cursed_gold\">Touch the cursed golden idol</label>\n            </div>\n        </div>\n\n        <!-- CUTLASS FIGHT -->\n        <div id=\"scene3_cutlass_fight\" class=\"scene\">\n            <pre>\n      O   O\n     /|   |\\\n     / \\ / \\\n    </pre>\n            <div class=\"story-text\">\n                You clash with the pirate captain. Steel rings out. You disarm him, but he triggers the ship's cannons aimed at the island. You can <strong>finish him</strong> or <strong>spare him and take his ship</strong>.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_fight_captain\">End the pirate captain once and for all</label>\n                <label for=\"s4_join_crew\">Spare him and demand to join his crew</label>\n            </div>\n        </div>\n\n        <!-- SNEAK CAMP -->\n        <div id=\"scene3_sneak_camp\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  o o  \\\n     |   <   |\n     \\  ___  /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                You free the navigator undetected. Grateful, he tells you the location of a hidden cove where the pirates keep a swift ship. You can <strong>steal the ship together</strong> or <strong>sail away with the navigator</strong> and leave the island.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_steal_ship\">Steal the pirate ship and become captain</label>\n                <label for=\"s5_legend\">Set sail with the navigator to chart new waters</label>\n            </div>\n        </div>\n\n        <!-- GRAPPLE HOOK -->\n        <div id=\"scene3_grapple_hook\" class=\"scene\">\n            <pre>\n      .___.\n      | _ |>\n      '---'\n       / \\\n      /   \\\n    </pre>\n            <div class=\"story-text\">\n                With the grappling hook, you climb to the temple's upper level and bypass all traps. You find the treasure room filled with gold and jewels, but also a cursed idol. You can <strong>take the gold</strong> or <strong>touch the idol</strong>.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_treasure_room\">Take the gold and leave</label>\n                <label for=\"s4_cursed_gold\">Touch the cursed idol</label>\n            </div>\n        </div>\n\n        <!-- SWIM WRECK -->\n        <div id=\"scene3_swim_wreck\" class=\"scene\">\n            <pre>\n      ~~~~ ~~~~\n      ~~~~o~~~~\n      ~~~~|~~~~\n      ~~~~|~~~~\n      ~~~~~~~~\n    </pre>\n            <div class=\"story-text\">\n                Swimming around, you spot a hidden cave beneath the wreck. Inside rests a skeleton clutching a worn journal. It tells of a <strong>sea monster</strong> guarding the greatest treasure. You can <strong>sail toward the monster's lair</strong> or <strong>return to shore</strong>.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s4_kraken\">Seek the sea monster's lair</label>\n                <label for=\"s5_castaway\">Return to shore and live as a castaway</label>\n            </div>\n        </div>\n\n        <!-- TREASURE ROOM -->\n        <div id=\"scene4_treasure_room\" class=\"scene\">\n            <pre>\n      .___. .___. .___.\n      |Au| |Ag| |Cu|\n      '---' '---' '---'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: LORD OF THE ISLAND</strong><br><br>\n                You claim the treasure and escape the temple just before it collapses. With your new wealth, you buy a ship and a loyal crew. You become the most feared and respected pirate lord in the Caribbean.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- CURSED GOLD -->\n        <div id=\"scene4_cursed_gold\" class=\"scene\">\n            <pre>\n      .-\"\"\"-.\n     /  X X  \\\n     |   ^   |\n     \\       /\n      '-...-'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: THE CURSED SKULL</strong><br><br>\n                The moment you touch the idol, your flesh turns to gold. You become a living statue, forever guarding the treasure you sought. Your golden form will stare at the next adventurer who dares enter.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- FIGHT CAPTAIN -->\n        <div id=\"scene4_fight_captain\" class=\"scene\">\n            <pre>\n      \\   /\n       \\ /\n        O\n       / \\\n      /   \\\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: PIRATE SLAYER</strong><br><br>\n                You defeat the captain in single combat. His crew, impressed by your strength, swears loyalty to you. You commandeer the ship and sail off as the new captain, ready to plunder the Spanish Main.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- JOIN CREW -->\n        <div id=\"scene4_join_crew\" class=\"scene\">\n            <pre>\n      .___.\n      |CREW|\n      '---'\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: QUARTERMASTER'S HONOR</strong><br><br>\n                You spare the captain and earn his respect. You join the crew as quartermaster, and together you become the most successful pirate partnership on the seas. Adventure and rum await every horizon.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- STEAL SHIP -->\n        <div id=\"scene4_steal_ship\" class=\"scene\">\n            <pre>\n      .-.   .-.\n     /   \\_/   \\\n     |         |\n     \\_________/\n        |_|_|\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: THE GREAT ESCAPE</strong><br><br>\n                You and the navigator steal the pirate ship under cover of darkness. With a fast vessel and a skilled navigator, you sail beyond the known world, discovering islands no European has ever seen.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- KRAKEN -->\n        <div id=\"scene4_kraken\" class=\"scene\">\n            <pre>\n      \\|/  \\|/  \\|/\n       O    O    O\n      /|\\  /|\\  /|\\\n         \\ | /\n           *\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: KRAKEN'S PREY</strong><br><br>\n                You sail into the monster's territory. A massive tentacle rises from the deep and crushes your boat. You sink into the abyss, but as you drown, you glimpse the greatest treasure \u2014 a pearl the size of a cannonball \u2014 forever out of reach.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- LEGEND -->\n        <div id=\"scene5_legend\" class=\"scene\">\n            <pre>\n      .   .   .\n     \\   |   /\n      \\  |  /\n       \\ | /\n         *\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: NAVIGATOR'S TALE</strong><br><br>\n                You and the navigator become inseparable. Together you map uncharted waters and discover a new continent. Your journals will inspire explorers for centuries. You didn't just find treasure \u2014 you found a friend.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n        <!-- CASTAWAY -->\n        <div id=\"scene5_castaway\" class=\"scene\">\n            <pre>\n      ~~~~ ~~~~\n      ~~~~~~~~\n      ~~~~~~~~\n      ~~~~~~~~\n    </pre>\n            <div class=\"story-text\">\n                <strong>ENDING: ETERNAL CASTAWAY</strong><br><br>\n                You return to the beach and build a shelter. Days turn into years. You survive, but the treasure remains a dream. Sometimes, when the tide is low, you still see the map's X marked on the sand.\n            </div>\n            <div class=\"choices\"><label for=\"s0\">Restart Adventure</label></div>\n        </div>\n\n    </div>\n\n</body>\n</html>\n",
  "western": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Choose Your Own Adventure</title>\n    <style>\n        :root {\n            --western-glow: #ff8800;\n            --western-bg: #0d0702;\n            --western-dim: #7a4a1a;\n            --western-red: #cc3311;\n            --glow-desert: rgba(255, 136, 0, 0.3);\n            --glow-saloon: rgba(230, 180, 80, 0.25);\n            --glow-canyon: rgba(200, 120, 40, 0.2);\n            --glow-danger: rgba(255, 51, 17, 0.35);\n            --glow-legend: rgba(255, 200, 50, 0.35);\n        }\n\n        * { box-sizing: border-box; margin: 0; padding: 0; }\n        body {\n            background-color: #0a0400;\n            color: var(--western-glow);\n            font-family: 'Courier New', 'Courier', 'Lucida Console', monospace;\n            margin: 0;\n            padding: 16px;\n            line-height: 1.55;\n            min-height: 100vh;\n            background-image:\n                repeating-linear-gradient(0deg,\n                    transparent,\n                    transparent 2px,\n                    rgba(100, 60, 10, 0.03) 2px,\n                    rgba(100, 60, 10, 0.03) 4px);\n            background-size: 100% 4px;\n        }\n        .game-container {\n            max-width: 720px;\n            margin: 0 auto;\n            border: 2px solid var(--western-glow);\n            padding: 28px 22px;\n            min-height: 82vh;\n            box-shadow: 0 0 20px var(--glow-desert);\n            position: relative;\n            background: radial-gradient(ellipse at center,\n                    rgba(50, 25, 5, 0.7) 0%,\n                    rgba(5, 3, 1, 0.95) 70%);\n            transition: box-shadow 0.6s, border-color 0.6s, color 0.6s;\n        }\n        .env-desert { box-shadow: 0 0 20px var(--glow-desert); border-color: #cc7700; color: #f0b060; }\n        .env-saloon { box-shadow: 0 0 20px var(--glow-saloon); border-color: #bb9933; color: #f8d090; }\n        .env-canyon { box-shadow: 0 0 20px var(--glow-canyon); border-color: #aa6600; color: #e0b070; }\n        .env-danger { box-shadow: 0 0 20px var(--glow-danger); border-color: #992211; color: #ff8866; }\n        .env-legend { box-shadow: 0 0 20px var(--glow-legend); border-color: #dd9900; color: #ffe090; }\n\n        pre {\n            font-size: 13px;\n            white-space: pre;\n            text-align: center;\n            margin-bottom: 24px;\n            text-shadow: 0 0 6px currentColor;\n            letter-spacing: 0;\n            line-height: 1.25;\n            overflow-x: auto;\n            padding: 4px 0;\n            animation: flickerIn 1.2s ease-out;\n        }\n        @keyframes flickerIn {\n            0% { opacity: 0; text-shadow: 0 0 20px currentColor; }\n            15% { opacity: 0.4; text-shadow: 0 0 2px currentColor; }\n            25% { opacity: 0.7; text-shadow: 0 0 14px currentColor; }\n            35% { opacity: 0.5; }\n            50% { opacity: 0.9; text-shadow: 0 0 8px currentColor; }\n            100% { opacity: 1; text-shadow: 0 0 6px currentColor; }\n        }\n        .story-text {\n            font-size: 1.15rem;\n            margin-bottom: 28px;\n            text-align: center;\n            padding: 0 8px;\n            animation: fadeIn 0.5s ease-out;\n        }\n        @keyframes fadeIn {\n            from { opacity: 0; transform: translateY(10px); }\n            to { opacity: 1; transform: translateY(0); }\n        }\n        .choices { display: flex; flex-direction: column; gap: 13px; align-items: center; }\n        label {\n            display: inline-block;\n            border: 1px solid currentColor;\n            padding: 13px 26px;\n            cursor: pointer;\n            text-transform: uppercase;\n            letter-spacing: 1.5px;\n            transition: all 0.25s;\n            width: 82%;\n            text-align: center;\n            background: #0a0300;\n            font-weight: bold;\n            font-size: 0.9rem;\n            position: relative;\n            user-select: none;\n        }\n        label:hover {\n            background-color: currentColor;\n            color: #0a0300;\n            font-weight: bold;\n            box-shadow: 0 0 18px currentColor;\n            transform: scale(1.02);\n            letter-spacing: 2px;\n        }\n        label:active { transform: scale(0.97); }\n        label::before { content: '> '; opacity: 0; transition: opacity 0.2s; }\n        label:hover::before { opacity: 1; animation: blink 0.7s infinite; }\n        @keyframes blink { 0%,100%{ opacity:1; } 50%{ opacity:0.2; } }\n        input[type=\"radio\"] { display: none; }\n        .scene { display: none; animation: fadeIn 0.5s ease-out; }\n\n        /* STATE MACHINE */\n        #s0:checked ~ .game-container #scene0,\n        #s1_saloon:checked ~ .game-container #scene1_saloon,\n        #s1_sheriff:checked ~ .game-container #scene1_sheriff,\n        #s1_outskirts:checked ~ .game-container #scene1_outskirts,\n        #s2_gamble:checked ~ .game-container #scene2_gamble,\n        #s2_barfight:checked ~ .game-container #scene2_barfight,\n        #s2_take_badge:checked ~ .game-container #scene2_take_badge,\n        #s2_infiltrate:checked ~ .game-container #scene2_infiltrate,\n        #s2_snake_hill:checked ~ .game-container #scene2_snake_hill,\n        #s3_win_gamble:checked ~ .game-container #scene3_win_gamble,\n        #s3_lose_gamble:checked ~ .game-container #scene3_lose_gamble,\n        #s3_fight_win:checked ~ .game-container #scene3_fight_win,\n        #s3_fight_lose:checked ~ .game-container #scene3_fight_lose,\n        #s3_track_gang:checked ~ .game-container #scene3_track_gang,\n        #s3_warn_sheriff:checked ~ .game-container #scene3_warn_sheriff,\n        #s3_dynamite:checked ~ .game-container #scene3_dynamite,\n        #s4_duel_blackwood:checked ~ .game-container #scene4_duel_blackwood,\n        #s4_ambush:checked ~ .game-container #scene4_ambush,\n        #s4_horse_chase:checked ~ .game-container #scene4_horse_chase,\n        #s4_hidden_gold:checked ~ .game-container #scene4_hidden_gold,\n        #s5_legend:checked ~ .game-container #scene5_legend,\n        #s5_outlaw:checked ~ .game-container #scene5_outlaw,\n        #s5_sheriff_end:checked ~ .game-container #scene5_sheriff_end,\n        #s5_dead:checked ~ .game-container #scene5_dead {\n            display: block;\n        }\n        @media (max-width: 500px) {\n            .game-container { padding: 16px 10px; min-height: 88vh; }\n            pre { font-size: 10px; }\n            .story-text { font-size: 0.95rem; }\n            label { width: 94%; padding: 11px 14px; font-size: 0.78rem; }\n        }\n    </style>\n</head>\n<body>\n<a href=\"#\" onclick=\"window.parent.showMenu();return false;\" style=\"color:white;cursor:pointer;\">Back to Home</a>\n    <input type=\"radio\" name=\"cyoa\" id=\"s0\" checked>\n    <input type=\"radio\" name=\"cyoa\" id=\"s1_saloon\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s1_sheriff\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s1_outskirts\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_gamble\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_barfight\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_take_badge\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_infiltrate\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s2_snake_hill\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_win_gamble\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_lose_gamble\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_fight_win\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_fight_lose\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_track_gang\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_warn_sheriff\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s3_dynamite\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_duel_blackwood\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_ambush\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_horse_chase\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s4_hidden_gold\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s5_legend\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s5_outlaw\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s5_sheriff_end\">\n    <input type=\"radio\" name=\"cyoa\" id=\"s5_dead\">\n\n    <div class=\"game-container env-desert\" id=\"gameBox\">\n\n        <!-- START -->\n        <div id=\"scene0\" class=\"scene\">\n            <pre>\n        .   .   .\n      .   .   .   .\n    .   .   |   .   .\n      .   . | .   .\n        .   |   .\n      .   . | .   .\n    .   .   |   .   .\n      .   . | .   .\n        .   |   .\n    ---+---+---+---\n       /   |   \\\n      /    |    \\\n    </pre>\n            <div class=\"story-text\">\n                You ride into the sun-bleached town of Dry Gulch, the dust swirling around your boots. The notorious Blackwood Gang controls these parts, and the sheriff seems powerless. You hitch your horse. A saloon piano drifts on the wind. The sheriff's office stands across the street. Out beyond the town lie the badlands.\n            </div>\n            <div class=\"choices\">\n                <label for=\"s1_saloon\">Enter the Dusty Spur Saloon</label>\n                <label for=\"s1_sheriff\">Head to the Sheriff's Office</label>\n                <label for=\"s1_outskirts\">Ride into the badlands alone</label>\n            </div>\n        </div>\n\n        <!-- SALOON BRANCH -->\n        <div id=\"scene1_saloon\" class=\"scene\">\n            <pre>\n     .-------.\n    /  _____  \\\n    | |     | |\n    | |     | |\n    | |_____| |\n    \\       /\n     '-----'\n       | |\n       | |\n    </pre>\n            <div class=\"story-text\">\n                The saloon is thick with smoke and the smell of whiskey. A man in a black hat is dealing cards at a back table, a pile of gold coins in front of him. At the bar, a
