tograph Feldmann \u2014 evidence first, action second</label>\n    <label for=\"s_stasi3\">Confront Feldmann here, now \u2014 use surprise as leverage</label>\n    <label for=\"s_kgb1\">Leave Feldmann and use what you know to lay a disinformation trap \u2014 send false intelligence through her channel</label>\n</div>\n</div>\n\n<div id=\"scene_stasi2\" class=\"scene\">\n<pre>\n  [ MINIATURE CAMERA \u2014 MINOX B ]\n  Exposure: f/3.5, 1/100\n  Subject: Feldmann + Stasi courier\n  Film: 8 frames captured\n  Evidence: SECURED\n</pre>\n<span class=\"scene-tag\">// PRENZLAUER BERG BAR \u2014 EVIDENCE GATHERING \u2014 17:10 //</span>\n<div class=\"story-text\">\n    <p>The Minox B is barely larger than a finger and produces images sharp enough for document photography at thirty centimeters. You've used it in worse light than this. You order a beer at the bar and spend eight minutes becoming part of the furniture \u2014 a Western visitor nursing a Berliner Kindl, unremarkable, unthreatening \u2014 and during those eight minutes you expose eight frames of the 36-exposure cartridge.</p>\n\n    <p>Feldmann and the courier. The satchel exchanging hands. The documents briefly visible as Feldmann opens the satchel to check the contents \u2014 you get two frames of that. A third that catches her face clearly in profile when she lights a cigarette.</p>\n\n    <p>It's not conclusive espionage evidence by any legal standard. But London doesn't need legal standards \u2014 it needs operational certainty, and what you have will provide it.</p>\n\n    <p>You leave the bar before Feldmann finishes her cigarette. Outside, you walk two blocks in the wrong direction before turning \u2014 standard counter-surveillance \u2014 and then make your way toward a decision point.</p>\n\n    <p>You have evidence of the mole. You have Volkov's location. You have two possible exfiltration routes. You have a Stasi colonel who knows your operational name and may know your face. The clock is running \u2014 Volkov's residency ends Friday and today is Tuesday.</p>\n\n    <p>The photographs need to reach London. Volkov needs to reach West Berlin. You can't do both simultaneously \u2014 you're one person. But maybe you don't have to do both alone.</p>\n\n    <p>NIGHTJAR is in the city. She could take the photographs to London while you extract Volkov. Or she could help you extract Volkov while you get the photographs out through a dead drop for Marsh to collect later. The problem is that NIGHTJAR herself might be compromised \u2014 you've been warned to trust nothing that comes from the Trade Mission, and NIGHTJAR was briefed by Marsh through official channels.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_defect1\">Send the photographs via dead drop and go to Volkov immediately</label>\n    <label for=\"s_east3\">Find NIGHTJAR and coordinate \u2014 split the tasks between you</label>\n    <label for=\"s_stasi4\">Follow Feldmann when she leaves \u2014 find out where she's taking the Stasi documents</label>\n</div>\n</div>\n\n<div id=\"scene_stasi3\" class=\"scene\">\n<pre>\n  BAR \u2014 PRENZLAUER BERG\n  Table in the corner.\n  The mole, a satchel, and a question.\n  \"Who told you I would be here?\"\n  \"Nobody. I followed the courier.\"\n</pre>\n<span class=\"scene-tag\">// PRENZLAUER BERG \u2014 CONFRONTATION \u2014 17:15 //</span>\n<div class=\"story-text\">\n    <p>You slide into the seat across from Feldmann before she's finished opening the satchel. She looks up, and in the half-second before her training reasserts itself, her face shows pure, unfiltered terror. Then it smooths into something that is trying to be composure.</p>\n\n    <p><em>\"This is a public place,\"</em> she says, in German, very quietly.</p>\n\n    <p><em>\"Which is why I chose it,\"</em> you say, equally quietly. <em>\"If you raise your voice, I raise mine. Loudly. In English. About what I just photographed.\"</em></p>\n\n    <p>She goes still.</p>\n\n    <p><em>\"Here's what I want,\"</em> you say. <em>\"Not your confession \u2014 I have that already. Not your contacts \u2014 you'd lie. What I want is simple: you tell Kr\u00f6ger nothing about my current location or activities for the next twenty-four hours. In exchange, I don't send my photographs to Marsh until I'm across the Wall with my asset. After that, they go to her regardless. But you'll have twenty-four hours to make whatever arrangements you need to make.\"</em></p>\n\n    <p>She looks at you for a long time. She's calculating \u2014 how much does he know, how much can I deny, what are my options. You watch the calculation happen and wait for it to finish.</p>\n\n    <p><em>\"Why would you give me twenty-four hours?\"</em> she asks. <em>\"You have the photographs. You could burn me now.\"</em></p>\n\n    <p><em>\"Because burning you now creates noise,\"</em> you say. <em>\"Kr\u00f6ger runs to ground. The operation gets harder. I want quiet for twenty-four hours more than I want your career ended today.\"</em></p>\n\n    <p>Another silence. Then: <em>\"Twenty-four hours. I'll tell Kr\u00f6ger I lost your signal.\"</em></p>\n\n    <p><em>\"I know,\"</em> you say. <em>\"I'm going to assume you'll try to find a way to betray me anyway \u2014 that's what you do. So I'm not going to go where you think I'm going. Good luck.\"</em></p>\n\n    <p>You leave the bar. You don't go to K\u00f6penick immediately. You take a bus in the wrong direction for twenty minutes, then double back. The twenty-four-hour window \u2014 real or not \u2014 is the best resource you've managed to extract today.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_defect1\">Go to K\u00f6penick and begin the Volkov extraction</label>\n    <label for=\"s_tunnel1\">Go directly to the tunnel contact to set up the exfil route first</label>\n    <label for=\"s_kgb1\">Feldmann will try to betray you \u2014 use her expectation of your movements as a decoy</label>\n</div>\n</div>\n\n<div id=\"scene_stasi4\" class=\"scene\">\n<pre>\n  FELDMANN \u2014 FOLLOWED\n  Route: Prenzlauer Berg \u2192 \n         Sch\u00f6nhauser Allee \u2192\n         Pankow (residential) \u2192\n         [ UNKNOWN BUILDING ]\n</pre>\n<span class=\"scene-tag\">// PANKOW DISTRICT \u2014 FOLLOWING FELDMANN \u2014 18:30 //</span>\n<div class=\"story-text\">\n    <p>Feldmann doesn't go straight anywhere. She takes three trams and two buses in a route that is either coincidentally circuitous or carefully designed to detect pursuit \u2014 the effect is the same in either case, so you treat it as deliberate. You've maintained forty to sixty meters and changed your appearance twice \u2014 coat reversed, hat removed \u2014 which in a city where everyone wears grey and brown is enough to blur the silhouette.</p>\n\n    <p>She ends in Pankow, the northernmost district of East Berlin, a residential area of pre-war apartment buildings and quiet streets. She goes into a building that has no particular distinction except that it has a very new intercom panel bolted to its nineteenth-century fa\u00e7ade, which means someone with money has recently added security.</p>\n\n    <p>You wait across the street for forty minutes. At 18:05, a man you recognize emerges \u2014 not from the building Feldmann entered, but from the building next door, which shares a courtyard. He's walking quickly, carrying a briefcase. He's well-dressed for East Berlin. He has the short-haired, focused look of a military officer in civilian clothes.</p>\n\n    <p><strong>Kr\u00f6ger.</strong> The man from the microfilm SPARROW sent \u2014 the Stasi lieutenant colonel running MIRROR HUNT. And he's moving quickly, which means something has happened \u2014 either Feldmann told him something useful, or he's received intelligence from another source, or he's moving to close a trap.</p>\n\n    <p>He's heading south. Toward Prenzlauer Berg. Toward the Academy in K\u00f6penick.</p>\n\n    <p>He's moving toward Volkov.</p>\n\n    <p>You have a choice that you have to make in about three seconds: follow Kr\u00f6ger and see where he goes, or race ahead to Volkov and warn him. You can't do both. You're one person. You're good at this. But you're one person.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_chase1\">Race to Volkov \u2014 warn him that Kr\u00f6ger is moving, extract immediately</label>\n    <label for=\"s_caught1\">Follow Kr\u00f6ger \u2014 understand exactly what he knows before you commit to any action</label>\n    <label for=\"s_kgb4\">This is the KGB trap closing \u2014 get out of East Berlin yourself while you still can</label>\n</div>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     ACT 2b \u2014 KGB TRAP INVESTIGATION\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<div id=\"scene_kgb1\" class=\"scene\">\n<pre>\n  KGB COUNTER-INTELLIGENCE\n  OPERATION: HONEY MIRROR\n  Objective: Identify British handler\n  Status: [ ACTIVE ]\n  Asset: VOLKOV (willing bait)\n  Note: Volkov may have own agenda.\n</pre>\n<span class=\"scene-tag\">// EAST BERLIN \u2014 KGB TRAP ANALYSIS \u2014 17:45 //</span>\n<div class=\"story-text\">\n    <p>You find a bench in the Volkspark Friedrichshain and sit for forty-five minutes, which is the minimum time required to think clearly about a problem that is trying very hard to seem simpler than it is.</p>\n\n    <p>The KGB is running Volkov as bait. M\u00fcller told you this. The question is whether M\u00fcller's information is accurate (in which case the KGB knows you're here), fabricated (in which case M\u00fcller has been turned to give you false intelligence), or partially accurate (in which case Volkov is genuinely trying to defect but the KGB is also monitoring him, and the two things are true simultaneously, which is how most intelligence situations actually work).</p>\n\n    <p>The third option seems most probable. Here's the logic: the KGB running a defector as bait requires the defector's cooperation, or at least his ignorance. A man of Volkov's intelligence is not easily ignorant. He knows he's being monitored. He may be working around the monitoring to make genuine contact. Which means: the KGB wants to identify you, but Volkov also genuinely wants to defect, and these two goals are running on parallel tracks until they collide.</p>\n\n    <p>The collision point is the extraction. When you try to move Volkov across the Wall, the KGB will be watching \u2014 and that's when they'll try to roll you up. The information flows both ways. If you know when they'll move, you can plan for it.</p>\n\n    <p>You need someone inside the KGB monitoring operation \u2014 not to turn them, but to get a few hours' warning before they close the trap. You know one person in East Berlin who might have that access: an asset you've never used but know exists \u2014 code-named <strong>PRISM</strong>, a cultural attach\u00e9 in the Soviet Embassy who has been passing administrative KGB information to London for six years through a dead-drop system that predates your knowledge of his existence.</p>\n\n    <p>Using PRISM is a significant escalation. It exposes an asset who has never been burned and whose intelligence has been valuable. But the alternative is running blind into a trap.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_kgb2\">Activate PRISM \u2014 risk the asset, get the timing intelligence</label>\n    <label for=\"s_kgb3\">Don't risk PRISM \u2014 spring the trap deliberately but on your terms</label>\n    <label for=\"s_defect1\">Ignore the KGB angle \u2014 if Volkov is genuine, the extraction is what matters</label>\n</div>\n</div>\n\n<div id=\"scene_kgb2\" class=\"scene\">\n<pre>\n  PRISM \u2014 ASSET \u2014 SOVIET EMBASSY\n  Dead drop: Botanic Garden, north bench\n  Message: [ THREE PEBBLES \u2014 URGENT ]\n  Response window: 2 hours\n  Risk level: SIGNIFICANT\n</pre>\n<span class=\"scene-tag\">// BOTANIC GARDEN \u2014 PRISM ACTIVATION \u2014 18:20 //</span>\n<div class=\"story-text\">\n    <p>The dead drop for PRISM is at the Botanic Garden in Lichterfelde \u2014 technically West Berlin, which requires you to cross back briefly through one of the minor crossing points, using your cultural exchange visa in the most boring way possible: declaring nothing, wearing the expression of a man returning to his hotel to work on his manuscript, creating absolutely zero interest in either direction.</p>\n\n    <p>The minor crossing at Bornholmer Strasse is exactly as tedious as intended: a guard who has seen five hundred identical civilians today and will remember none of them, a stamp in the passport, a wave through. You cross in eleven minutes.</p>\n\n    <p>In the Botanic Garden, the north bench has a loose stone at its base. Three pebbles placed in a specific triangle means <em>urgent contact requested, maximum priority.</em> You place them and walk away.</p>\n\n    <p>Two hours later, you're back on the Eastern side \u2014 the same minor crossing, a different guard, equally uninteresting. You take a tram to the agreed signal point: a phone box near the Lustgarten. At 20:30, it rings.</p>\n\n    <p>PRISM's voice is precisely what you'd expect from a Soviet cultural attach\u00e9 who has been living a double life for six years: careful, dry, with the slight over-precision of someone speaking in a non-native language. He speaks in English. <em>\"You are taking a very large risk,\"</em> he says, without preamble.</p>\n\n    <p><em>\"I know. When does the KGB move?\"</em></p>\n\n    <p>A pause. <em>\"They know Volkov has made contact. They don't know who with. They are waiting for him to be extracted \u2014 at that point, they will follow and identify the handler. The window is... flexible. They will not move before the extraction attempt because they want the handler, not just Volkov. But they have a deadline: if no extraction happens by Friday, they take Volkov back to Moscow and run the same operation again later.\"</em></p>\n\n    <p><em>\"Is there a gap? A period when the surveillance is thinnest?\"</em></p>\n\n    <p>Another pause, longer. <em>\"Wednesday night, between 01:00 and 03:00. The shift rotation creates a command gap \u2014 both the senior officers are off-site for a command meeting, and the junior officers are not authorized to act without senior approval. If you move then, you have approximately two hours before anyone with authority can give an order.\"</em></p>\n\n    <p>Wednesday. Tomorrow night. You have a window.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_tunnel4\">Go immediately to set up the tunnel extraction for Wednesday night, 01:00</label>\n    <label for=\"s_cross4\">Prepare the diplomatic crossing for the Wednesday night window</label>\n    <label for=\"s_defect5\">Go to Volkov now and prepare him \u2014 he needs to know the timeline</label>\n</div>\n</div>\n\n<div id=\"scene_kgb3\" class=\"scene\">\n<pre>\n  THE TRAP \u2014 DELIBERATE ENTRY\n  You know it's a trap.\n  You enter anyway.\n  The difference between a trap\n  and an opportunity is who\n  controls the exit.\n</pre>\n<span class=\"scene-tag\">// EAST BERLIN \u2014 TACTICAL ASSESSMENT \u2014 19:00 //</span>\n<div class=\"story-text\">\n    <p>The KGB wants to identify you. They're willing to run Volkov as bait to do it. The elegant response to a trap you know about is to spring it yourself, on your terms, in a place where the trap-closers can't follow without exposing themselves.</p>\n\n    <p>Here's the plan: you make contact with Volkov openly \u2014 at a location of your choice, not theirs, with a route out that they cannot easily close. You allow them to see the contact happen. Then you extract Volkov through a route that puts the KGB surveillance team in an impossible position: if they follow, they compromise themselves; if they don't follow, they lose both of you.</p>\n\n    <p>The trick is the route. You need a crossing point that the KGB surveillance team can't follow through without papers they don't have \u2014 because they're operating on Soviet intelligence authorization, not East German authorization, and the crossing points are, technically, under East German Stasi jurisdiction. If you go through a crossing point with diplomatic credentials and they don't have matching credentials, they can't follow without starting an inter-service incident that neither the KGB nor the Stasi wants.</p>\n\n    <p>The problem: you only have one set of diplomatic credentials \u2014 your own, from Vienna station. You can get Volkov through on a separate cover identity, but only if the cover is clean, and the clean covers are filed with the Trade Mission, and the Trade Mission has a mole.</p>\n\n    <p>You work through the angles for twenty minutes on the park bench, and eventually arrive at a solution that is either brilliant or insane \u2014 a characteristic it shares with most solutions that actually work in this business.</p>\n\n    <p>You'll use Feldmann. Not as a mole. As an unwitting cover-document provider. You call the Trade Mission and ask Feldmann, in her official capacity, to prepare emergency cover documents for an asset extraction \u2014 giving her just enough real information that the documents are genuine and usable, but the location and timing you give her are twelve hours off from the real ones.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_cross5\">Execute the deception plan \u2014 fake timing sent to Feldmann, real extraction twelve hours earlier</label>\n    <label for=\"s_tunnel4\">Abandon the diplomatic route entirely \u2014 use the tunnel, which Feldmann doesn't know about</label>\n    <label for=\"s_caught3\">The plan has a fatal flaw \u2014 Feldmann will suspect the deception and tell Kr\u00f6ger the real timing</label>\n</div>\n</div>\n\n<div id=\"scene_kgb4\" class=\"scene\">\n<pre>\n  EXIT STRATEGY \u2014 PERSONAL\n  Asset: yourself, SOVA-7 intelligence\n  Volkov: status uncertain\n  Kr\u00f6ger: closing in\n  Decision: mission or survival?\n</pre>\n<span class=\"scene-tag\">// EAST BERLIN \u2014 ESCAPE DECISION \u2014 18:45 //</span>\n<div class=\"story-text\">\n    <p>You stand in a doorway on a quiet street in Pankow and look at the problem with the cold clarity of someone who has just watched the hunter move toward the trap that contains both the quarry and himself.</p>\n\n    <p>You have SOVA-7 in your head. You have the photographs of Feldmann meeting the Stasi courier. You have the identity of Kr\u00f6ger. Without Volkov, without the physical defection, you still have the intelligence. If you go back across the Wall now \u2014 tonight \u2014 using your cultural exchange visa before Kr\u00f6ger has your identification confirmed, you bring back three enormously valuable things: the cipher system that will open Soviet military communications, the identity of a mole in British Trade Mission, and the name of the Stasi officer running the penetration operation against British intelligence in East Germany.</p>\n\n    <p>Volkov, on the other side of this calculation, is a man. A frightened man with a daughter in Leningrad who will face no reprisal if her father doesn't defect, but will face consequences if he does and is caught, which is increasingly likely given how fast the net is closing.</p>\n\n    <p>You think about Volkov. The tired eyes. The round-shouldered posture of a man who has been carrying too many secrets for too long. The way he said, <em>\"Everything I need I am carrying.\"</em> Touching his temple.</p>\n\n    <p>In the intelligence business, missions are impersonal by design. The intelligence matters. The human being carrying it is a vehicle, not a passenger. This is not cruelty \u2014 it's simply the cold mathematics of the work.</p>\n\n    <p>Except.</p>\n\n    <p>He chose this. He reached out. He chose the risk. He's trusting someone, right now, in Room 14 in K\u00f6penick, to come back.</p>\n\n    <p>Do you?</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_cross1\">Go back for Volkov \u2014 you gave your word</label>\n    <label for=\"e_cipher\">Get yourself and the intelligence out \u2014 this is the rational choice</label>\n    <label for=\"s_tunnel1\">Find the tunnel contact and set up a route for Volkov tonight \u2014 you can do both</label>\n</div>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     ACT 3 \u2014 TUNNEL ROUTE\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<div id=\"scene_tunnel1\" class=\"scene\">\n<pre>\n  THE BERLIN TUNNEL NETWORK\n  Operated by: \n  St. Annen-Gemeinde (West Berlin)\n  Contact: Pastor Werner Hoeck\n  Entrance: Greifswalder Strasse, \n  basement of #114\n  Current status: ACTIVE\n</pre>\n<span class=\"scene-tag\">// PRENZLAUER BERG \u2014 TUNNEL CONTACT \u2014 20:00 //</span>\n<div class=\"story-text\">\n    <p>The address is a pre-war apartment building that looks exactly like every other pre-war apartment building in Prenzlauer Berg: crumbling stucco, interior courtyard, the smell of coal and boiled cabbage. The building at number 114 on Greifswalder Strasse has the additional distinction of having a pastor's residence on the ground floor \u2014 a small plate by the door identifies it: <em>Pastor W. Hoeck \u2014 Gemeindeb\u00fcro.</em></p>\n\n    <p>You knock. A woman in her thirties answers \u2014 the pastor's wife, you assume, from the way she looks at you with the particular wariness of someone who regularly opens doors to people in difficult circumstances. You give the recognition phrase \u2014 <em>\"I was told to ask about the Sunday school for adults.\"</em></p>\n\n    <p>She opens the door wider. <em>\"My husband is in the study.\"</em></p>\n\n    <p><strong>Pastor Werner Hoeck</strong> is a lean man in his sixties with the seamed face of someone who has spent years making hard decisions and the surprisingly mild eyes of someone who has not been embittered by them. He's been running tunnel operations since 1963. He's gotten forty-six people across to West Berlin. He's lost three \u2014 one to a cave-in, two to a Stasi sweep in 1969 that came within forty minutes of catching him too.</p>\n\n    <p>He listens to your request. One asset, non-urgent but time-sensitive, able-bodied, currently in K\u00f6penick. You need the tunnel within forty-eight hours.</p>\n\n    <p><em>\"The tunnel is currently viable,\"</em> he says, without drama. <em>\"We dug it in sections over eight months in 1968. It runs from this basement to a garden shed in Gesundbrunnen on the Western side \u2014 three hundred and forty meters, reinforced with timber every five meters. The ceiling clearance is one meter twenty. You crawl. It takes twenty-five minutes if you don't panic.\"</em></p>\n\n    <p>He looks at you levelly. <em>\"The question is not whether the tunnel is ready. The question is whether you can get your asset from K\u00f6penick to this basement without being followed. If you're followed into the tunnel, we lose the tunnel, we lose the route, and we lose forty-six people's investment in something that has kept families together for five years.\"</em></p>\n\n    <p>You understand. The tunnel is the most valuable thing in this room. More valuable than Volkov's intelligence. More valuable than you. <em>\"I'll be clean,\"</em> you say. <em>\"I promise you that.\"</em></p>\n\n    <p>He nods. <em>\"Wednesday midnight. Don't be late \u2014 the tunnel needs to be sealed before the 01:00 patrol.\"</em></p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_tunnel2\">Accept the Wednesday midnight slot \u2014 go to Volkov and brief him</label>\n    <label for=\"s_tunnel3\">Ask for an earlier slot \u2014 the surveillance situation is deteriorating faster than expected</label>\n    <label for=\"s_tunnel5\">The tunnel is too high-risk for the pastor and his people \u2014 find another route and come back only if necessary</label>\n</div>\n</div>\n\n<div id=\"scene_tunnel2\" class=\"scene\">\n<pre>\n  Wednesday, 23:15\n  [ Greifswalder Strasse 114 ]\n  [ Basement door: open ]\n  [ Tunnel entrance: active ]\n  [ VOLKOV: present ]\n  [ You: present ]\n  [ Stasi: unknown ]\n</pre>\n<span class=\"scene-tag\">// TUNNEL ENTRANCE \u2014 WEDNESDAY NIGHT \u2014 23:15 //</span>\n<div class=\"story-text\">\n    <p>You got Volkov out of the compound three hours ago using a variation of the timing gap \u2014 NIGHTJAR didn't need to have a medical emergency this time; instead, you created a distraction by having someone call the compound's main line and report a water main break three blocks away, which sent two of the watchers to investigate in their car, reducing the surveillance team to two men covering four exits, which is too little coverage and you walked Volkov out the front door while they were oriented toward the back.</p>\n\n    <p>The S-Bahn from K\u00f6penick to Prenzlauer Berg took forty minutes. You changed trains twice, Volkov following you with the focused, uncomplaining endurance of a man who has decided that the person in front of him knows what they're doing and has committed to that belief completely. He carries one bag. He asks no questions. He trusts you. This is the heaviest thing you've ever carried.</p>\n\n    <p>The pastor's wife lets you in at 23:15. The tunnel entrance is in the basement \u2014 a trapdoor behind a coal furnace that requires the furnace to be moved, which the pastor does with the practiced efficiency of long repetition. Below: timber-reinforced darkness, the smell of earth and cold air, a rope guide along the right-hand wall.</p>\n\n    <p>Volkov looks at it. <em>\"How far?\"</em></p>\n\n    <p><em>\"Three hundred and forty meters. Twenty-five minutes.\"</em></p>\n\n    <p>He nods. <em>\"I'm not afraid of dark places. I've been in one for twenty years.\"</em> He adjusts his bag and goes first, which surprises you. A man who goes first into a tunnel he can't see the end of is either very brave or has nothing left to be afraid of. You follow.</p>\n\n    <p>The tunnel is exactly as the pastor described: 1.2 meters of clearance, timber every five meters, rope on the right, earth smell and cold air. You crawl. Volkov crawls ahead of you. The darkness is absolute. The rope is real. The twenty-five minutes stretch into something longer than time usually manages.</p>\n\n    <p>Then: light ahead. A square of grey. The shed in Gesundbrunnen. West Berlin.</p>\n\n    <p>You crawl out into a garden shed that smells of old clay pots and WD-40. A man in a parka is waiting \u2014 the West Berlin contact, who looks at you both with the expression of someone who has done this before and is still, each time, relieved when it works.</p>\n\n    <p><em>\"Welcome,\"</em> he says, in English. Then, to Volkov, in Russian: <em>\"Welcome.\"</em></p>\n\n    <p>Volkov stands up, slowly, in the shed. He straightens to his full height. He looks at the wooden walls of the shed, the clay pots, the grey West Berlin sky through the grimy skylight. He says nothing for a long moment. Then: <em>\"I would like a cup of tea. A proper cup, if that's possible.\"</em></p>\n\n    <p>It is possible. This is West Berlin. Nearly anything is possible.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"e_true\">Continue to the debrief \u2014 the mission is complete, almost</label>\n</div>\n</div>\n\n<div id=\"scene_tunnel3\" class=\"scene\">\n<pre>\n  ROUTE: K\u00f6penick \u2192 Ostbahnhof \u2192 Prenzlauer Berg\n  Travel time: 40 min (with cover)\n  Surveillance: possible tail \u2014 Volga sedan\n  Status: MOVING\n</pre>\n<span class=\"scene-tag\">// MOVING THROUGH EAST BERLIN \u2014 22:20 //</span>\n<div class=\"story-text\">\n    <p>The route from the Academy compound to Prenzlauer Berg is straightforward on a map and complicated on the ground, which is the general relationship between maps and East Berlin.</p>\n\n    <p>You take the S-Bahn from K\u00f6penick. Volkov sits across the aisle from you \u2014 not beside you, not too far away, maintaining the fiction of two strangers who happen to be traveling the same direction. He's carrying his one bag with the careful posture of a man who does not want to draw attention to what he's carrying, which unfortunately looks exactly like what it is: a man who does not want to draw attention to what he's carrying.</p>\n\n    <p><em>\"Look bored,\"</em> you tell him quietly, in German, as the train pulls into Ostbahnhof. <em>\"Not sad. Not worried. Bored.\"</em></p>\n\n    <p>He practices an expression that is approximately bored. On a mathematician, it looks like he's calculating cube roots. Close enough.</p>\n\n    <p>You change trains at Ostbahnhof. On the platform, waiting for the connection, you spot the grey Volga again \u2014 not the car itself, but the silhouette of a man you recognize from the Academy compound surveillance: the passenger-seat watcher, distinctive because of the specific way he holds himself, weight on the left foot, right shoulder slightly forward. He's forty meters back and pretending to read a timetable.</p>\n\n    <p>You have a tail. He's good, but not good enough. The question is whether he's alone.</p>\n\n    <p>The train arrives. You board. So does the watcher. He's alone \u2014 one man, which means he's there to track location, not intercept. He's reporting back. Which means someone, somewhere in East Berlin, is receiving his reports and deciding when to move.</p>\n\n    <p>You have time. But the window is narrowing with every stop.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_tunnel4\">Lose the tail \u2014 use the tunnel, you can't risk bringing him to the pastor's building</label>\n    <label for=\"s_shot1\">The tail needs to stop following you \u2014 deal with him directly</label>\n    <label for=\"s_cross3\">Abandon the tunnel plan \u2014 go to Checkpoint Charlie, it's faster and the tail will be on record crossing</label>\n</div>\n</div>\n\n<div id=\"scene_tunnel4\" class=\"scene\">\n<pre>\n  COUNTER-SURVEILLANCE ROUTE\n  [ Change platforms at Alexanderplatz ]\n  [ Exit at wrong stop \u2014 walk back one block ]\n  [ Enter building through rear \u2014 exit front ]\n  [ Wait 4 minutes \u2014 check for followers ]\n  [ Clean. Go. ]\n</pre>\n<span class=\"scene-tag\">// PRENZLAUER BERG \u2014 CLEAN APPROACH \u2014 23:00 //</span>\n<div class=\"story-text\">\n    <p>You lose the tail at Alexanderplatz with a technique that is less elegant than it is effective: you exit the train on one side, walk through the station quickly, take a different train two platforms over, ride one stop, exit, walk around the block, and approach the Prenzlauer Berg address from the direction opposite to your original approach. You do this with Volkov following you without explanation, which requires him to trust that you know what you're doing, which you do, mostly.</p>\n\n    <p>The tail doesn't make it through. You check twice \u2014 corner reflections, a shop window, the pause at a phone box \u2014 and see nothing. You're clean.</p>\n\n    <p>The pastor's wife opens the door at 23:08. The pastor has the furnace moved before you're all the way into the basement. The tunnel entrance is there, waiting, exactly as he described.</p>\n\n    <p>Three hundred and forty meters. Twenty-five minutes in the dark. The rope on the right. The cold air and earth smell and the knowledge that somewhere above you, at one-meter intervals, is a city that wants to keep you here.</p>\n\n    <p>You go. Volkov goes first, which surprises you both times it happens \u2014 at the compound exit and here. A man who leads in darkness is either very brave or has very little left to fear losing. Possibly both. After twenty-three years in Soviet intelligence, carrying their most sensitive cipher system in his head and his daughter's safety in his hands, perhaps Volkov has already given everything that fear could take.</p>\n\n    <p>Twenty-three minutes. The light at the end is grey but real. The shed smells of clay pots and motor oil. The West Berlin contact says: <em>\"Welcome.\"</em></p>\n\n    <p>Volkov stands up slowly, straight, and looks at the grimy skylight for a long time without saying anything. Then: <em>\"I would like to see what the sky looks like from here.\"</em></p>\n\n    <p>You open the shed door. October sky, West Berlin, orange with city light. It looks like any other sky. But it's on the right side of the Wall.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"e_true\">Continue to London \u2014 the mission reaches its conclusion</label>\n</div>\n</div>\n\n<div id=\"scene_tunnel5\" class=\"scene\">\n<pre>\n  TUNNEL \u2014 DECISION\n  The pastor's route: high value, high risk.\n  To use it is to risk losing it.\n  To not use it is to find another way.\n  Both options have costs.\n</pre>\n<span class=\"scene-tag\">// TUNNEL CONTACT \u2014 ETHICAL CALCULATION \u2014 20:20 //</span>\n<div class=\"story-text\">\n    <p>You sit with the pastor over a cup of ersatz coffee and think about the forty-six people this tunnel has moved. Names you don't know. Families. Lovers. A scientist, two journalists, several people who simply made the wrong political remark and needed to disappear before the consequences found them. The tunnel is not a piece of intelligence infrastructure \u2014 it's a human artery that has kept beating for five years because nobody with a shovel or a prison cell has found it yet.</p>\n\n    <p>If Kr\u00f6ger is running a tight surveillance net around Volkov \u2014 and the evidence suggests he is \u2014 then extracting Volkov through this tunnel has a non-trivial probability of leading Stasi surveillance to the entrance. And if the Stasi finds the entrance, forty-six people's investment ends, and no one else gets through.</p>\n\n    <p>You tell the pastor this, directly, because he has earned directness.</p>\n\n    <p>He listens. Then: <em>\"You're not the first person to raise this concern. Every extraction carries the risk you describe. I made the decision in 1968 that this risk was acceptable because the alternative \u2014 the tunnel existing but being unused out of caution \u2014 meant it was accomplishing nothing. It might as well not exist.\"</em></p>\n\n    <p>He looks at you. <em>\"But there is a threshold. If the surveillance around your asset is heavy enough that you believe discovery is likely \u2014 not possible, but likely \u2014 then I agree with you. The tunnel should not be used.\"</em></p>\n\n    <p>You consider. Heavy surveillance, yes. Likely discovery? Less certain. You've been trained in counter-surveillance. You can clean yourself before approaching. But you can't guarantee it.</p>\n\n    <p><em>\"I'll use another route,\"</em> you say. <em>\"But I want to know: if the other route fails, can I come back?\"</em></p>\n\n    <p>He nods. <em>\"Wednesday midnight. If you come back before then and you're clean, you come in. If you're not clean\u2014\"</em> He doesn't finish the sentence. He doesn't need to.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_cross1\">Use the diplomatic crossing route instead</label>\n    <label for=\"s_sewer1\">Investigate the sewage tunnel option \u2014 it's older but still viable</label>\n    <label for=\"s_defect5\">Go back to Volkov, explain the situation, and decide together</label>\n</div>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     ACT 3b \u2014 SEWER ROUTE\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<div id=\"scene_sewer1\" class=\"scene\">\n<pre>\n  BERLIN MUNICIPAL SEWERS\n  Pre-war infrastructure: 1875-1920\n  Wall intersection points: 3 known\n  Access: maintenance hatch, \n          Dircksenstrasse near Alexanderplatz\n  Condition: functioning, unpatrolled\n</pre>\n<span class=\"scene-tag\">// SEWAGE INFRASTRUCTURE \u2014 ASSESSMENT \u2014 20:45 //</span>\n<div class=\"story-text\">\n    <p>Berlin's sewage system is a pre-war engineering achievement that predates the Wall by eighty-three years and, as a result, predates the Wall's assumptions about where and how things should be sealed. The water infrastructure runs under the city without reference to the post-war political geography because water moves according to gradient, not ideology, and the pipes that the city engineers laid in 1875 don't know they're supposed to respect a border that didn't exist when they were built.</p>\n\n    <p>You got this information from a West German civil engineer in 1970 who had been hired to assess the structural integrity of pre-war infrastructure in both Berlins \u2014 a brief, narrow moment of cooperative assessment that the politics of the era allowed and then immediately regretted. He had drawn a map. Someone had duplicated the map. A copy of the map had ended up in Vauxhall Cross. Someone had put it in the pre-mission briefing file, almost as an afterthought, in a section labeled <em>\"Secondary exfiltration options \u2014 unverified.\"</em></p>\n\n    <p>Unverified is not the same as unusable.</p>\n\n    <p>The maintenance hatch on Dircksenstrasse is a heavy iron lid set into the pavement, exactly like three hundred other maintenance hatches in this block of the city. You find it without difficulty. You lift it without difficulty \u2014 it hasn't been locked, because nobody locks sewer hatches, because the Stasi's imagination, vast as it is, does not fully extend to <em>people crawling through the sewers.</em></p>\n\n    <p>You go down fifteen feet on an iron ladder. The smell is precise and unwelcome. The tunnel is large \u2014 large enough to walk in, if hunched \u2014 and runs in both directions. The pre-war engineering was generous. You follow the northern branch with a pocket torch.</p>\n\n    <p>After four hundred meters and one wrong turn, you find what you're looking for: a section where the tunnel passes under the Wall. You know this not from the Wall itself \u2014 you're underground, the Wall is above you \u2014 but from the infrastructure above: at two points in this section, there are heavy concrete foundations that don't match the pre-war brick, and the tunnel narrows around them. The Wall was anchored through the sewers at these two points, creating barriers. But between the two foundation pillars, there is a gap \u2014 forty centimeters of pipe that runs under both barriers and exits on the Western side.</p>\n\n    <p>Forty centimeters. You are a larger person than forty centimeters suggests. Volkov, similarly, is not a small man.</p>\n\n    <p>But forty centimeters of pipe is still, technically, a route.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_sewer2\">This is viable \u2014 go back, get Volkov, come through the sewers</label>\n    <label for=\"s_sewer3\">This is too risky physically \u2014 find a different approach but keep the sewer route as emergency backup</label>\n    <label for=\"s_tunnel1\">Go back to the pastor \u2014 the tunnel is better than this</label>\n</div>\n</div>\n\n<div id=\"scene_sewer2\" class=\"scene\">\n<pre>\n  BENEATH THE WALL\n  Width: 40cm\n  Darkness: total\n  Smell: significant\n  Freedom: three hundred meters ahead\n</pre>\n<span class=\"scene-tag\">// BENEATH THE BERLIN WALL \u2014 01:15 //</span>\n<div class=\"story-text\">\n    <p>You retrieved Volkov from the guesthouse at midnight. The extraction from the compound was quieter than expected \u2014 either the surveillance had genuinely thinned out or it had been reassigned elsewhere, and you weren't in a position to find out which, so you moved on the assumption that any gap in coverage is a gift and gifts should not be questioned.</p>\n\n    <p>Getting Volkov through the sewer entrance required a brief explanation \u2014 <em>\"We are going through the sewers,\"</em> said without apology or embellishment \u2014 and a brief silence from Volkov, followed by: <em>\"How wide is it?\"</em></p>\n\n    <p><em>\"Wide enough.\"</em></p>\n\n    <p><em>\"Is that a precise measurement?\"</em></p>\n\n    <p><em>\"It's the only measurement available.\"</em></p>\n\n    <p>He went first. Again. A man who leads in tunnels. Remarkable, consistent, inexplicable.</p>\n\n    <p>The forty-centimeter section takes seven minutes to negotiate. Seven minutes of absolute darkness, cold water, the smell of everything the city has ever discarded, your shoulders scraping both walls simultaneously, the knowledge that if you get stuck there is nobody who can help you and no direction but forward. Seven minutes of pure, focused not-panicking, which is a skill they teach but which remains, in practice, a matter of personal negotiation between yourself and the part of your mind that is trying very hard to remind you that you are currently beneath a concrete wall in a sewer in East Germany.</p>\n\n    <p>Then: wider. Then: the ladder. Then: iron rungs, a hatch, fresh cold Berlin air that after the sewer smells like spring even though it's October.</p>\n\n    <p>You emerge in a service lane in Gesundbrunnen, West Berlin, at 01:40. Volkov comes up after you, climbs out, and stands in the lane covered in things that will require a thorough shower and possibly the incineration of his clothing. He looks at the West Berlin skyline. He looks at you.</p>\n\n    <p><em>\"That,\"</em> he says, with considerable dignity, <em>\"was undignified.\"</em></p>\n\n    <p><em>\"It worked,\"</em> you say.</p>\n\n    <p><em>\"It worked,\"</em> he agrees. And then, for the first time since you met him, <strong>Aleksandr Volkov smiles</strong>.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"e_free\">Continue \u2014 the long way home begins</label>\n</div>\n</div>\n\n<div id=\"scene_sewer3\" class=\"scene\">\n<pre>\n  SEWER ROUTE \u2014 BACKUP ONLY\n  Physical constraints: marginal\n  Decision: find primary route first.\n  Sewer: emergency use only.\n</pre>\n<span class=\"scene-tag\">// SEWER INFRASTRUCTURE \u2014 BACKUP PLAN \u2014 20:55 //</span>\n<div class=\"story-text\">\n    <p>You spend fifteen minutes mapping the route in your head \u2014 the approach, the hatch, the directions, the forty-centimeter gap under the Wall \u2014 and then you climb back out into the October night and put it in the mental file marked <em>last resort.</em></p>\n\n    <p>It might come to that. In this business, last resorts have a way of becoming first resorts, because the situation tends to deteriorate in the direction that eliminates all alternatives before the last one. You've been in last-resort scenarios before. You're still here.</p>\n\n    <p>But try the better options first.</p>\n\n    <p>The fresh air above ground smells better than the sewer in a way that you commit to appreciating for approximately thirty seconds before the practical requirements of the situation reassert themselves. You need to get to Volkov. You need a route. You have one option firmly in mind \u2014 the tunnel \u2014 and one fallback \u2014 the sewers. You also have the diplomatic credentials in your briefcase, which represent a third option that is faster but more exposed.</p>\n\n    <p>The question is speed. How much time do you have before Kr\u00f6ger closes the net?</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_tunnel1\">Use the tunnel \u2014 it's the safest option for Volkov</label>\n    <label for=\"s_cross1\">Use the diplomatic credentials \u2014 speed matters more than safety at this point</label>\n    <label for=\"s_defect5\">Go to Volkov first and decide together \u2014 his assessment of the risk may change your calculus</label>\n</div>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     ACT 3c \u2014 CHECKPOINT / DIPLOMATIC ROUTE\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<div id=\"scene_cross1\" class=\"scene\">\n<pre>\n  CHECKPOINT CHARLIE\n  ___________________________\n  | ALLIED CHECKPOINT         |\n  | Allied side \u2192 East side   |\n  | Document inspection: ALL  |\n  | Current threat level: HIGH|\n  |___________________________|\n  \"You are leaving the \n   American sector.\"\n</pre>\n<span class=\"scene-tag\">// APPROACHING CHECKPOINT CHARLIE \u2014 20:30 //</span>\n<div class=\"story-text\">\n    <p>Checkpoint Charlie is the most famous and most watched crossing point in the world, which makes it, paradoxically, useful: the watching is mutual, and the Allies maintain a significant intelligence presence at the crossing that provides a certain hostile buffer against the Stasi doing anything overt on their side of the line. The diplomats cross here. The military cross here. The journalists cross here. It is a theater of co-managed tension that both sides have found a strange stability in, and the stability itself provides cover.</p>\n\n    <p>Your Vienna station credentials identify you as a third-secretary cultural attach\u00e9 with the British Embassy in Bonn \u2014 a rank just significant enough to command routine respect and just low enough to be unremarkable. The second set of credentials \u2014 for Volkov \u2014 identify him as a technical expert with the same Embassy: one <strong>Dr. Klaus Werner</strong>, British national, accompanying the attach\u00e9 on a cultural exchange review visit.</p>\n\n    <p>The documents are technically genuine \u2014 they were prepared by Vienna station's document section using real Embassy forms and real Embassy authentication codes. The identities are entirely fabricated, but the paper is real, which is the relevant quality when a checkpoint guard looks at documents for six seconds and makes a decision.</p>\n\n    <p>You collected Volkov from K\u00f6penick at 19:00 and briefed him on the cover while taking the long route to Checkpoint Charlie. He absorbed the identity details \u2014 name, occupation, recent travel \u2014 with the speed of a man who has spent his career maintaining cover identities on the other side of the same game. <em>\"Dr. Werner,\"</em> he said, trying the name. <em>\"A German name. Good. My German accent is better than my English.\"</em></p>\n\n    <p><em>\"Don't volunteer the accent,\"</em> you told him. <em>\"The documentation establishes UK nationality. If they hear German and the documents say British, that's a question you don't want.\"</em></p>\n\n    <p>He nodded. He practiced looking bored. He was better at it than before.</p>\n\n    <p>Now you're thirty meters from the guard post. The document inspector is checking papers for two American businessmen. One more vehicle ahead of you. You watch the guard's body language. Routine. Not elevated. Possibly fine.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_cross2\">Proceed through the checkpoint \u2014 the papers are good, proceed normally</label>\n    <label for=\"s_cross3\">Abort \u2014 you've spotted something wrong, abort the checkpoint approach</label>\n    <label for=\"s_caught2\">You're being pulled out of line \u2014 something triggered an additional inspection</label>\n</div>\n</div>\n\n<div id=\"scene_cross2\" class=\"scene\">\n<pre>\n  CHECKPOINT \u2014 INSPECTION\n  Inspector: Guard Sergeant Fischer\n  Documents: under review\n  Volkov: maintaining cover\n  Time: 120 seconds (approximate)\n  Outcome: unknown\n</pre>\n<span class=\"scene-tag\">// CHECKPOINT CHARLIE \u2014 DOCUMENT INSPECTION \u2014 21:05 //</span>\n<div class=\"story-text\">\n    <p>The inspection is conducted by a guard sergeant who has the calm, methodical manner of someone who does this hundreds of times a day and has developed a system for doing it efficiently without looking bored. He takes your documents, runs a practiced eye over both sets, holds Volkov's ID up to the light \u2014 standard procedure for checking the anti-forgery elements \u2014 and asks, in German, the standard questions.</p>\n\n    <p>Purpose of visit: cultural exchange review. Duration: three days. Accommodations: Checkpoint Charlie Hotel. The name of your Embassy contact on the Eastern side? You give the name of a real Embassy contact, properly briefed for exactly this eventuality.</p>\n\n    <p>Then he looks at Volkov. <em>\"Dr. Werner \u2014 you are German-born?\"</em></p>\n\n    <p>Volkov meets his eyes. <em>\"My parents were German. I grew up in Surrey.\"</em> His English is workable \u2014 accented, but more than workable. He sounds like what he's supposed to be: a second-generation German emigrant, thoroughly Anglicized.</p>\n\n    <p>The guard sergeant looks at the documents again. Looks at Volkov. Looks at you. Looks at the document again.</p>\n\n    <p>Six seconds is the average. This is taking twelve. The extra six seconds are a very long time.</p>\n\n    <p>Then he hands the documents back, stamps both, and nods you through with the specific grunt that means <em>move along and stop standing in my light.</em></p>\n\n    <p>You walk through the checkpoint. Volkov walks two steps behind you. Neither of you speaks. You don't speed up or slow down. You walk at exactly the pace of two people who belong here, which is the pace you agreed on, which is slightly slower than you actually want to be moving, which is a sprint.</p>\n\n    <p>The Western side of Checkpoint Charlie. A British military officer is waiting, because you radioed ahead through a protocol that doesn't officially exist, and he leads you both to a vehicle, and the vehicle moves, and East Berlin recedes in the rear window.</p>\n\n    <p>Volkov looks out the back window at the Wall. The strips of lights. The watchtowers. The death strip that has killed not-quite-as-many-people-as-it-should-have, given how long it's been standing. He watches it until he can't see it anymore. Then he faces forward.</p>\n\n    <p><em>\"I thought,\"</em> he says quietly, <em>\"that when this happened, I would feel something dramatic. Relief. Joy. Something.\"</em> He pauses. <em>\"I feel tired. Is that wrong?\"</em></p>\n\n    <p><em>\"No,\"</em> you say. <em>\"That's exactly right.\"</em></p>\n</div>\n<div class=\"choices\">\n    <label for=\"e_true\">Continue \u2014 debrief in London, and what comes after</label>\n</div>\n</div>\n\n<div id=\"scene_cross3\" class=\"scene\">\n<pre>\n  ABORT \u2014 CHECKPOINT APPROACH\n  Reason: surveillance vehicle \u2014 \n  Grey Volga, same dent pattern.\n  Parked 80m from checkpoint, engine running.\n  They're watching the crossing point.\n</pre>\n<span class=\"scene-tag\">// CHECKPOINT CHARLIE \u2014 ABORT \u2014 20:45 //</span>\n<div class=\"story-text\">\n    <p>The grey Volga with the specific front-quarter dent. Engine running, two men inside, parked in a position with direct line of sight to the checkpoint approach lane. They're not Stasi \u2014 the Stasi doesn't operate that close to the Allied crossing point, which is too politically sensitive for routine surveillance. KGB counterintelligence, operating on a joint authorization that allows them this close to the Wall because they've been told the asset they're hunting is heading for this crossing.</p>\n\n    <p>They don't know your face yet \u2014 that's the intelligence they're trying to get. If you walk to the checkpoint with Volkov, they photograph you both. The photographs go to KGB central files. You're burned. Every operation you run in the Eastern Bloc for the next twenty years is contaminated.</p>\n\n    <p>You stop walking forty meters from the checkpoint, turn to Volkov, and say: <em>\"We're not going this way.\"</em></p>\n\n    <p>He doesn't look at the Volga. A good instinct. <em>\"Which way?\"</em></p>\n\n    <p><em>\"Still working on that.\"</em></p>\n\n    <p>You walk back the way you came, slowly, two people who have changed their minds about something innocuous. Behind you, the Volga doesn't move. They're watching the checkpoint, not you \u2014 they haven't identified you as the target yet. You have perhaps three minutes before someone in that car decides to run your faces against a description.</p>\n\n    <p>You need a different route. You have two options you hadn't expected to need tonight: the pastor's tunnel, or the sewers. Both require getting to Prenzlauer Berg before whoever is in the Volga decides you looked suspicious enough to follow.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_tunnel4\">Get to Prenzlauer Berg \u2014 the tunnel is the safest route now</label>\n    <label for=\"s_sewer2\">Go through the sewers \u2014 it's faster to the crossing point and the Volga is watching the wrong direction</label>\n    <label for=\"s_chase2\">They've made you \u2014 you're being followed, run</label>\n</div>\n</div>\n\n<div id=\"scene_cross4\" class=\"scene\">\n<pre>\n  WEDNESDAY NIGHT \u2014 00:45\n  Checkpoint: clear\n  Documents: prepared\n  KGB surveillance: blinded (2hr window)\n  Route: DIPLOMATIC\n  Status: GO\n</pre>\n<span class=\"scene-tag\">// CHECKPOINT CHARLIE \u2014 WEDNESDAY NIGHT \u2014 00:50 //</span>\n<div class=\"story-text\">\n    <p>PRISM's intelligence about the two-hour command gap is exactly accurate. You test it first with a low-value probe \u2014 a Trade Mission officer with clean papers who crosses at 01:00 and is waved through in forty-five seconds \u2014 before committing to the primary extraction.</p>\n\n    <p>You collected Volkov from the compound at 00:20, using the gap that NIGHTJAR's distraction created \u2014 she's still somewhere in East Berlin, and you'll worry about that after \u2014 and briefed him on the Dr. Werner identity on the walk to the checkpoint. He absorbed it with the unhurried efficiency of a man who has maintained cover identities for most of his professional life and views the exercise as familiar, if not comfortable.</p>\n\n    <p>At the checkpoint, the guard on duty is young, new, and in that particular state of 01:00 alertness that looks like wakefulness but is actually a sophisticated form of operational autopilot. He checks documents with the thoroughness of someone who has been told to be thorough but whose capacity for genuine scrutiny at this hour is limited.</p>\n\n    <p>He stamps both passports. He waves you through. He probably will not remember this in the morning.</p>\n\n    <p>You walk into West Berlin at 01:12 on a Wednesday night, with Aleksandr Volkov two steps behind you and the SOVA-7 cipher system secured in both your heads and about to become one of the most significant intelligence acquisitions of the decade.</p>\n\n    <p>From the British military facility at the crossing point, you make a call to London using a line so secure it has three separate encryption layers and sounds, as a result, like speaking into a tin can across a very long string. Marsh's voice comes through the tin-can quality with characteristic dryness: <em>\"You're late.\"</em></p>\n\n    <p><em>\"By one day. The original plan had flaws.\"</em></p>\n\n    <p><em>\"They always do.\"</em> A pause. <em>\"Is he genuine?\"</em></p>\n\n    <p><em>\"He's genuine.\"</em></p>\n\n    <p><em>\"Is he intact?\"</em></p>\n\n    <p><em>\"He's tired and wants tea. Both of which are consistent with genuine.\"</em></p>\n\n    <p>A brief, characteristic Marsh silence that functions as approval. <em>\"Get him to London. Good work.\"</em></p>\n</div>\n<div class=\"choices\">\n    <label for=\"e_true\">Continue \u2014 London debrief and the aftermath</label>\n</div>\n</div>\n\n<div id=\"scene_cross5\" class=\"scene\">\n<pre>\n  DECEPTION PLAN \u2014 EXECUTED\n  Feldmann informed: Thursday 15:00\n  Real extraction: Wednesday 03:00\n  Twelve-hour offset\n  Kr\u00f6ger watching the wrong window.\n</pre>\n<span class=\"scene-tag\">// DECEPTION IN MOTION \u2014 WEDNESDAY \u2014 03:00 //</span>\n<div class=\"story-text\">\n    <p>You called Feldmann at 20:00 on Tuesday evening \u2014 using a routine Trade Mission line that she answers in her official capacity \u2014 and gave her a carefully constructed story: your asset was ready to move, you needed emergency cover documents for a Thursday afternoon crossing at Checkpoint Charlie, name Dr. Klaus Werner, technical expert. She was helpful, efficient, and asked only one question that suggested she was probing for your location: <em>\"Will you be coming to the Mission to collect the documents, or shall I arrange delivery?\"</em></p>\n\n    <p><em>\"I'll collect them Thursday morning,\"</em> you said. Thursday morning. Twelve hours after you planned to be on the Western side with Volkov in hand.</p>\n\n    <p>She said of course, perfectly pleasant, and you hung up knowing that within the hour Kr\u00f6ger had been told the extraction was happening Thursday at 15:00, and he was positioning his teams accordingly.</p>\n\n    <p>Wednesday. 03:00. You crossed Checkpoint Charlie with Volkov \u2014 <em>Dr. Werner</em> \u2014 using the original Vienna station credentials, not the ones Feldmann was preparing. The guard on duty at 03:00 is the least alert human being you have ever met, which in this case is a professional asset. He stamps both passports without apparent consciousness and waves you through.</p>\n\n    <p>West Berlin in the early hours of Wednesday morning. Cold air. Orange street lights. A British military vehicle idling near the crossing point, exactly where you asked it to be. Volkov gets in without being asked. You get in beside him.</p>\n\n    <p>Twelve hours from now, Kr\u00f6ger's teams will converge on Checkpoint Charlie expecting a Thursday afternoon extraction that isn't coming. By then, Volkov will be in London. SOVA-7 will be on a whiteboard at GCHQ. And Feldmann will find herself explaining to Kr\u00f6ger why her source gave him incorrect intelligence \u2014 which, conveniently, is the first step in her becoming a liability to him instead of an asset, which is the first step in her network unraveling.</p>\n\n    <p>Elegant. Perhaps too elegant. You'll worry about that later. Right now, it worked.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"e_true\">Continue to London \u2014 and what the aftermath looks like</label>\n</div>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     ACT 4 \u2014 CONFRONTATIONS\n\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<div id=\"scene_chase1\" class=\"scene\">\n<pre>\n  RUNNING\n  [ East Berlin \u2014 night ]\n  [ two pursuers \u2014 professional ]\n  [ Volkov: keeping up, barely ]\n  [ Options: narrow ]\n</pre>\n<span class=\"scene-tag\">// EAST BERLIN \u2014 PURSUIT \u2014 22:30 //</span>\n<div class=\"story-text\">\n    <p>They came out of the service lane behind the compound, which means they were waiting there \u2014 not the watchers from the car, but a separate team, deployed behind the obvious surveillance positions. A two-layer net. The outer ring to be seen, the inner ring to be effective.</p>\n\n    <p>Professional. Kr\u00f6ger's people are professional.</p>\n\n    <p>You're running through the residential streets east of K\u00f6penick with Volkov beside you \u2014 not behind you, beside you, because he's faster than he looks, which is one of several things about him that continues to surprise you. The pursuers are thirty meters back and maintaining the distance, which means they're comfortable \u2014 they know the streets better than you do and they're herding, not chasing. They want to push you somewhere specific.</p>\n\n    <p><em>\"Don't let them herd us,\"</em> you say, between breaths.</p>\n\n    <p><em>\"How do you know they're herding?\"</em></p>\n\n    <p><em>\"Because they're not shooting.\"</em></p>\n\n    <p>Volkov processes this at a run. <em>\"Where do they want us to go?\"</em></p>\n\n    <p>You look at the layout \u2014 the streets you've memorized from the map, the direction of the pursuers' pressure, the streets they're blocking with their body positions. South. They're pushing you south. Away from the S-Bahn, away from the checkpoint, toward the industrial area south of K\u00f6penick where there's less civilian presence and more room to operate without witnesses.</p>\n\n    <p>You turn left instead of right. Sharply. Into a lane too narrow for two people to run side by side, which forces the pursuers to go single-file and slows them. The lane exits into a residential courtyard. From the courtyard, a door to a building. The building's lobby is open \u2014 East German apartment buildings rarely lock their lobbies because the tenants can't afford to lose their keys.</p>\n\n    <p>Through the lobby. Out the back. Into the next street. Ninety degrees from where they expected you.</p>\n\n    <p>You've bought time. Not much.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_tunnel3\">Make for the S-Bahn \u2014 get to the tunnel contact in Prenzlauer Berg</label>\n    <label for=\"s_sewer2\">Find the nearest sewer access point \u2014 go under the city</label>\n    <label for=\"s_shot1\">Stop running and turn \u2014 deal with the pursuit directly</label>\n</div>\n</div>\n\n<div id=\"scene_chase2\" class=\"scene\">\n<pre>\n  CHECKPOINT CHARLIE \u2014 APPROACH\n  [ Volga: engine running \u2014 watching ]\n  [ You: spotted them \u2014 abort? ]\n  [ Volkov: unaware ]\n  The question is: how much do they know?\n</pre>\n<span class=\"scene-tag\">// CHECKPOINT APPROACH \u2014 COUNTER-SURVEILLANCE \u2014 21:15 //</span>\n<div class=\"story-text\">\n    <p>They've made you \u2014 or at least they've made someone who could be you, which in the intelligence business is close enough to the same thing that the distinction doesn't help much. The Volga's passenger-side window has come down. A camera with a long lens. They're photographing everyone approaching the checkpoint. Systematic identification, not targeted. They don't know who you are yet, but they're collecting faces to run against files.</p>\n\n    <p>You have approximately ninety seconds before you enter the effective range of that lens.</p>\n\n    <p><em>\"Stop,\"</em> you tell Volkov, quietly. <em>\"Turn around. Look at the building on your left like you've just noticed something interesting.\"</em></p>\n\n    <p>He does this, smoothly, which confirms that twenty-three years of Soviet intelligence work has left him with a set of reflexes that are useful even when directed against his former colleagues.</p>\n\n    <p>You walk back the way you came at a pace that is slightly faster than casual but not quite purposeful \u2014 the pace of someone who has forgotten something important and turned back to get it. You turn a corner. You're out of the camera's range.</p>\n\n    <p><em>\"What happened?\"</em> Volkov asks.</p>\n\n    <p><em>\"Camera at the checkpoint approach. They're photographing arrivals.\"</em></p>\n\n    <p><em>\"Counterintelligence. They expected this crossing point.\"</em></p>\n\n    <p><em>\"Yes.\"</em></p>\n\n    <p>He considers this. <em>\"They expected it because someone told them.\"</em></p>\n\n    <p><em>\"Yes.\"</em></p>\n\n    <p><em>\"Then we need a different route and a different timeline.\"</em> He says this the way you'd say <em>we need a different table at a restaurant</em> \u2014 practically, without alarm. A man who has been living with this level of operational risk for years and has developed a pragmatic relationship with it. <em>\"What are the options?\"</em></p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_tunnel4\">Get to Prenzlauer Berg \u2014 the tunnel is the safest remaining option</label>\n    <label for=\"s_sewer1\">The sewers cross the Wall without going through any checkpoint</label>\n    <label for=\"s_caught3\">You're surrounded \u2014 the net is closing from multiple directions, assess your options</label>\n</div>\n</div>\n\n<div id=\"scene_chase3\" class=\"scene\">\n<pre>\n  SPARROW \u2014 EMERGENCY CONTACT\n  Location: Treptower Park, east bench\n  22:05\n  \"I have a way out.\n   But it costs something.\"\n</pre>\n<span class=\"scene-tag\">// TREPTOWER PARK \u2014 22:05 //</span>\n<div class=\"story-text\">\n    <p>You get the message through a method that shouldn't work \u2014 a chalk mark on a specific lamppost, a method SPARROW established three years ago for emergency-only use \u2014 and you're at Treptower Park at 22:05 because SPARROW wouldn't use the emergency chalk mark if it wasn't an emergency.</p>\n\n    <p>She's on the east bench beside the park pond, wearing a different coat than you'd expect from her file and looking at the water with the focused stillness of someone who is using stillness as camouflage. She doesn't move when you sit beside her. Neither of you looks at the other.</p>\n\n    <p><em>\"There's a diplomatic vehicle,\"</em> she says, quietly. <em>\"Hungarian embassy. Leaving for Vienna Thursday morning. The cultural attach\u00e9 owes me a significant favor \u2014 I helped his sister get to Munich in 1970. He's willing to give us two places in the vehicle's document pouch. The problem\u2014\"</em></p>\n\n    <p>She pauses.</p>\n\n    <p><em>\"The problem is that the cost of his favor is my leaving with you. He'll only do it if I go tonight. He says if I'm still in East Berlin in seventy-two hours, he won't help, and he'll know nothing about this conversation.\"</em></p>\n\n    <p>A beat.</p>\n\n    <p><em>\"I've been building networks here for eleven years,\"</em> she says. <em>\"I have four assets still active, untouched by the Stasi sweeps. If I leave tonight, those assets go dark. They'll be without support or direction. Some of them will survive that. Some won't.\"</em></p>\n\n    <p>She's asking you to make a decision that isn't yours to make \u2014 or is it? You're the senior officer on the ground. She's asking whether the mission to extract Volkov is worth the cost of her network.</p>\n\n    <p><em>\"What do you want me to say?\"</em> you ask.</p>\n\n    <p><em>\"I want you to tell me it's the right call,\"</em> she says. <em>\"But I want you to mean it. Not mission-speak. Actually mean it.\"</em></p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_cross2\">Accept the Hungarian vehicle \u2014 SPARROW comes with you, Volkov gets out through a different route</label>\n    <label for=\"s_tunnel2\">Tell SPARROW to wait \u2014 you have the tunnel, Volkov gets out that way, she follows through her own route later</label>\n    <label for=\"e_doubled\">Something about this offer is wrong \u2014 this feels like a constructed situation designed to get you to commit to a crossing point</label>\n</div>\n</div>\n\n<div id=\"scene_shot1\" class=\"scene\">\n<pre>\n  CONFRONTATION \u2014 DARK LANE\n  You: one Walther 9mm\n  Pursuers: two, armed\n  Distance: 15 meters\n  Option: stop running\n</pre>\n<span class=\"scene-tag\">// EAST BERLIN LANE \u2014 22:45 //</span>\n<div class=\"story-text\">\n    <p>You stop at the next corner, in the shadow of a doorway, and wait.</p>\n\n    <p>The first pursuer rounds the corner eleven seconds later. You step out. The Walther is not pointed at him \u2014 you've had it in your hand since the alley, but a pointed weapon changes the situation in ways that cannot be easily reversed, and there are six million people in East Berlin who will hear a gunshot and none of them will help you. You have the gun. He can see you have the gun. This is the negotiation.</p>\n\n    <p><em>\"Stehen bleiben,\"</em> you say. Stand still. </p>\n\n    <p>He stands still. He has the specific posture of a professional who has been trained to assess situations before acting, which means he's also assessing exit options, which means you have about four seconds before his assessment concludes.</p>\n\n    <p>Behind him, his partner hasn't come around the corner yet. He slowed down when the first man stopped \u2014 also trained, also assessing. Two professionals, one of whom you can see and one of whom you can't. The classic problem.</p>\n\n    <p><em>\"I'm not here to shoot anyone,\"</em> you say, in German, keeping your voice flat and reasonable. <em>\"I want to walk away. You let me walk away. Nobody has a bad night.\"</em></p>\n\n    <p>He looks at the Walther. Looks at you. Looks at Volkov behind you. Makes a calculation.</p>\n\n    <p><em>\"You understand that whatever you're doing is finished,\"</em> he says. <em>\"Not tonight. But finished.\"</em></p>\n\n    <p><em>\"Everything finishes eventually,\"</em> you say. <em>\"Tonight I want to finish it somewhere else.\"</em></p>\n\n    <p>A long moment. Then he takes one step sideways \u2014 not back, sideways, which is the professional compromise between surrender and challenge. He's giving you the lane. His partner, invisible around the corner, doesn't appear. They're letting you go.</p>\n\n    <p>Which means they're either humane, or smart enough to know that following Volkov is more useful than catching you here.</p>\n\n    <p>You back away. When you've turned a corner, you run.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_tunnel3\">Run to the S-Bahn \u2014 Prenzlauer Berg, the tunnel</label>\n    <label for=\"s_sewer2\">Find the nearest sewer access \u2014 they'll have eyes on the S-Bahn stops</label>\n    <label for=\"s_shot2\">They let you go because they've already alerted ahead \u2014 they know where you're going, change the plan entirely</label>\n</div>\n</div>\n\n<div id=\"scene_shot2\" class=\"scene\">\n<pre>\n  TACTICAL REASSESSMENT\n  They let you go.\n  This was deliberate.\n  They are tracking you to \n  something bigger.\n  Change direction. Now.\n</pre>\n<span class=\"scene-tag\">// EAST BERLIN \u2014 COUNTER-MOVE \u2014 23:00 //</span>\n<div class=\"story-text\">\n    <p>A professional pursuer who lets you go is not being humane. He's being strategic. He has a camera. He's transmitted your image already. He has a radio. He's told someone where you went and what direction. Letting you run is only rational if he knows where you're going \u2014 because then he doesn't need to follow you, he just needs to tell whoever is waiting at your destination that you're coming.</p>\n\n    <p>Your destination \u2014 whichever one they think it is \u2014 is now burned.</p>\n\n    <p>You stop Volkov in a shop doorway and think for forty-five seconds, which is a luxury you can't afford but the alternative is running into a prepared position, which is worse.</p>\n\n    <p>They think you're going to Checkpoint Charlie. That's the obvious exit. That's what the surveillance net at the checkpoint was for. They think you know the checkpoint is covered and you'll find an alternative, and the two most common alternatives \u2014 tunnel or sewer \u2014 have known access points that can be watched.</p>\n\n    <p>What they don't think you'll do is something they haven't prepared for.</p>\n\n    <p>You look at Volkov. <em>\"Can you drive?\"</em></p>\n\n    <p><em>\"Yes.\"</em></p>\n\n    <p><em>\"A Soviet military vehicle?\"</em></p>\n\n    <p>A pause. <em>\"I have driven an army Ural truck twice, in the mid-1960s. I would describe my skill level as sufficient not to immediately crash.\"</em></p>\n\n    <p><em>\"That's a higher threshold than I expected from you.\"</em></p>\n\n    <p>There's a motor pool for the Academy of Sciences two blocks from the guesthouse. Academic vehicle, not military \u2014 but it has civilian plates and a vehicle authorization that covers movement between East Berlin districts without routine stop-and-search. If you can get into the motor pool, get a vehicle with the authorization papers already in it, and drive to a crossing point that nobody has pre-identified as your target, you might thread through a net that's looking for pedestrians.</p>\n\n    <p>The question is which crossing point is least expected. The answer, counterintuitively, is Checkpoint Bravo \u2014 the military checkpoint on the Berlin-Helmstedt autobahn, which is primarily used for military convoys and authorized government vehicles and is staffed at night by two Allied MPs who are under orders to let authorized vehicles through without delay. An unauthorized vehicle would have a problem. A vehicle with Academy authorization papers and two plausible occupants in the middle of the night is not unauthorized \u2014 it's unusual, but unusual is not the same as prohibited.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_cross4\">Execute the motor pool plan \u2014 drive to Checkpoint Bravo</label>\n    <label for=\"s_tunnel4\">Too complicated \u2014 stick to the tunnel, take the risk</label>\n    <label for=\"e_dead\">The plan fails before it starts \u2014 the motor pool is guarded and you've been identified</label>\n</div>\n</div>\n\n<!-- CAUGHT SCENES -->\n<div id=\"scene_caught1\" class=\"scene\">\n<pre>\n  FOLLOWING KR\u00d6GER\n  He's going to K\u00f6penick.\n  He knows about Volkov.\n  Question: does he know about you?\n  You're about to find out.\n</pre>\n<span class=\"scene-tag\">// FOLLOWING KR\u00d6GER \u2014 PANKOW TO K\u00d6PENICK \u2014 19:00 //</span>\n<div class=\"story-text\">\n    <p>You follow Kr\u00f6ger on two trams and a bus, maintaining sixty meters and changing your body language at each interchange \u2014 slumped and tired on the first tram, upright and business-focused on the bus. He doesn't check for surveillance, which is itself interesting: a man certain he's not being followed, or a man using the absence of surveillance checks as a statement of confidence.</p>\n\n    <p>He goes to the Academy of Sciences guesthouse in K\u00f6penick and enters through the front entrance with the familiarity of someone who has been here before. The reception guard nods him through without checking his identity. He goes upstairs.</p>\n\n    <p>You wait in the street for forty minutes. Then the light in Room 14 goes on.</p>\n\n    <p>He's in Volkov's room. Which means one of three things: he's arresting Volkov, he's running Volkov as a controlled asset, or he's briefing Volkov on something \u2014 the last being the least probable, because KGB counterintelligence doesn't brief defectors, it surveilles them.</p>\n\n    <p>Fifteen minutes later, the light goes off in Room 14 and the light in an adjacent room goes on. Kr\u00f6ger has moved to the room next to Volkov's. He's not arresting Volkov \u2014 you'd see the activity of an arrest, the additional people, the vehicle at the door. He's watching. He's moved in next door to listen.</p>\n\n    <p>Which means Volkov is still free. And Kr\u00f6ger is expecting Volkov to receive a contact \u2014 you \u2014 within the next twenty-four hours, and he wants to hear it happen.</p>\n\n    <p>If you go to Room 14, Kr\u00f6ger hears everything. If you don't go, Volkov sits in that room indefinitely until Friday, when his residency ends and he goes back to Moscow without having defected.</p>\n\n    <p>You need to get to Volkov without going through Room 14. Or you need to get Room 14 away from Kr\u00f6ger.</p>\n</div>\n<div class=\"choices\">\n    <label for=\"s_defect5\">Make contact with Volkov outside the building \u2014 intercept him at the lecture tomorrow</label>\n    <label for=\"s_east1\">Neutralize Kr\u00f6ger's surveillance \u2014 create a situation that moves him away from Room 14</label>\n    <label for=\"s_kgb3\">The situation is a controlled set-up \u2014 Volkov knows Kr\u00f6ger is there, they're working together against you</label>\n</div>\n</div>\n\n<div id=\"scene_caught2\" class=\"scene\">\n<pre>\n  ADDITIONAL INSPECTION\n  Checkpoint Charlie \u2014 secondary line\n  Agent: Fischer (senior)\n  Documents: under detailed review\n  Your cover: under pressure\n  Options: maintain, or abort\n</pre>\n<span class=\"scene-tag\">// CHECKPOINT CHARLIE \u2014 SECONDARY INSPECTION \u2014 21:10 //</span>\n<div class=\"story-text\">\n    <p>The guard waves you to a secondary inspection position \u2014 not a dramatic intervention, just a routine redirect, the kind that happens to one in twenty vehicles and means nothing, or means everything, and you won't know which until you're standing in front of the senior inspector and he tells you.</p>\n\n    <p>The senior inspector is a heavyset man named Fischer \u2014 his name is on his badge \u2014 who has the cheerless thoroughness of someone who has caught a few things in his career and is hoping to catch another. He takes your documents and Volkov's and does something the first guard didn't: he enters the document numbers into a system. A ledger, actually \u2014 East German bureaucracy runs on paper \u2014 cross-referencing against a list of flagged identities.</p>\n\n    <p>Your document numbers aren't flagged. Vienna station prepared them clean.</p>\n\n    <p>Volkov's aren't either.</p>\n\n    <p>But Fischer doesn't immediately give them back. He asks you \u2014 in English, which is interesting, because it means he suspects you're not German \u2014 the purpose of your visit, the name of your Embassy contact, the date of your last crossing into the Eastern sector.</p>\n\n    <p>You answer all three correctly.</p>\n\n    <p>Then he asks Volkov: <em>\"Dr. Werner, you have been in East Berlin three days. Where did you stay?\"</em></p>\n\n    <p>Volkov answers: the Checkpoint Charlie Hotel, room 6. Clean answer \u2014 the hotel is in the briefing, the room number is in the briefing, he remembers it precisely because mathematicians remember precise numbers.</p>\n\n    <p>Fischer looks at him for a lo
