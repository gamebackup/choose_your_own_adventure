<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Your Own Adventure</title>
    <style>
        :root {
            --fantasy-glow: #33ff33;
            --scifi-glow: #33eeff;
            --pirate-glow: #ffb000;
            --western-glow: #924A36;
            --detective-glow: #ff44aa;
            --underwater-glow: #11AAFF;
            --prehistoric-glow: #8F6946;
            --newvegas-glow: #ffb000;
            --gothic-glow: #cc2222;
            --spy-glow: #c8a84b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            background: #050510;
            font-family: 'Courier New', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
            overflow-y: auto;
        }
        .star-layer {
            position: fixed; top: 0; left: 0; width: 1px; height: 1px;
            pointer-events: none; z-index: 0;
        }
        .star-layer1 {
            box-shadow: 10vw 15vh 2px #fff, 45vw 23vh 1px #fff, 70vw 10vh 3px #fff,
                25vw 65vh 1px #fff, 60vw 75vh 2px #fff, 85vw 45vh 1px #fff,
                15vw 85vh 3px #fff, 40vw 40vh 2px #fff, 90vw 80vh 1px #fff,
                5vw 50vh 2px #fff, 55vw 8vh 1px #fff, 75vw 55vh 3px #fff,
                33vw 33vh 1px #fff, 68vw 68vh 2px #fff, 82vw 20vh 1px #fff,
                20vw 5vh 2px #fff, 95vw 60vh 1px #fff, 48vw 90vh 3px #fff,
                12vw 72vh 1px #fff, 88vw 35vh 2px #fff;
            animation: twinkle1 3s infinite alternate;
        }
        .star-layer2 {
            box-shadow: 2vw 30vh 1px #fff, 38vw 12vh 2px #fff, 65vw 28vh 1px #fff,
                80vw 5vh 3px #fff, 18vw 55vh 2px #fff, 52vw 80vh 1px #fff,
                72vw 62vh 2px #fff, 8vw 40vh 1px #fff, 95vw 85vh 3px #fff,
                30vw 75vh 1px #fff, 58vw 45vh 2px #fff, 78vw 18vh 1px #fff,
                42vw 3vh 2px #fff, 62vw 90vh 1px #fff, 85vw 72vh 2px #fff,
                10vw 20vh 3px #fff, 25vw 50vh 1px #fff, 70vw 38vh 2px #fff,
                50vw 95vh 1px #fff, 92vw 15vh 2px #fff;
            animation: twinkle2 4s infinite alternate;
        }
        .star-layer3 {
            box-shadow: 5vw 8vh 2px #fff, 35vw 18vh 1px #fff, 60vw 5vh 2px #fff,
                75vw 40vh 1px #fff, 15vw 45vh 3px #fff, 48vw 75vh 1px #fff,
                68vw 58vh 2px #fff, 85vw 68vh 1px #fff, 22vw 80vh 2px #fff,
                55vw 28vh 1px #fff, 80vw 85vh 3px #fff, 12vw 60vh 2px #fff,
                32vw 95vh 1px #fff, 88vw 22vh 2px #fff, 95vw 50vh 1px #fff,
                42vw 42vh 3px #fff, 72vw 15vh 1px #fff, 8vw 32vh 2px #fff,
                28vw 68vh 1px #fff, 65vw 88vh 2px #fff;
            animation: twinkle3 5s infinite alternate;
        }
        @keyframes twinkle1 { 0% { opacity: 0.3; } 100% { opacity: 1; } }
        @keyframes twinkle2 { 0% { opacity: 0.5; } 100% { opacity: 0.9; } }
        @keyframes twinkle3 { 0% { opacity: 0.4; } 100% { opacity: 0.85; } }

        .hub {
            position: relative; z-index: 10;
            display: flex; flex-direction: column;
            align-items: center; gap: 2rem;
        }
        h1 {
            color: #fff; font-size: 2.8rem;
            text-shadow: 0 0 20px rgba(255,255,255,0.4);
            letter-spacing: 3px;
        }
        .subtitle { color: #aaa; font-size: 1.3rem; letter-spacing: 2px; }
        .button-group {
            display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center;
        }
        .game-btn {
            text-decoration: none; border: 2px solid;
            padding: 1.2rem 2.8rem; font-size: 1.4rem; font-weight: bold;
            text-transform: uppercase; letter-spacing: 3px;
            background: rgba(0,0,0,0.5); transition: all 0.3s;
            display: inline-block; cursor: pointer;
        }
        .fantasy    { color: var(--fantasy-glow);    border-color: var(--fantasy-glow);    box-shadow: 0 0 15px rgba(51,255,51,0.3); }
        .scifi      { color: var(--scifi-glow);      border-color: var(--scifi-glow);      box-shadow: 0 0 15px rgba(51,238,255,0.3); }
        .pirates    { color: var(--pirate-glow);     border-color: var(--pirate-glow);     box-shadow: 0 0 15px rgba(255,176,0,0.3); }
        .western    { color: var(--western-glow);    border-color: var(--western-glow);    box-shadow: 0 0 15px rgba(146,74,54,0.3); }
        .underwater { color: var(--underwater-glow); border-color: var(--underwater-glow); box-shadow: 0 0 15px rgba(17,170,255,0.3); }
        .detective  { color: var(--detective-glow);  border-color: var(--detective-glow);  box-shadow: 0 0 15px rgba(255,68,170,0.3); }
        .prehistoric{ color: var(--prehistoric-glow);border-color: var(--prehistoric-glow);box-shadow: 0 0 15px rgba(143,105,70,0.3); }
        .newvegas   { color: var(--newvegas-glow);   border-color: var(--newvegas-glow);   box-shadow: 0 0 15px rgba(255,176,0,0.3); }
        .gothic     { color: var(--gothic-glow);     border-color: var(--gothic-glow);     box-shadow: 0 0 15px rgba(204,34,34,0.3); }
        .spy        { color: var(--spy-glow);        border-color: var(--spy-glow);        box-shadow: 0 0 15px rgba(200,168,75,0.3); }
        .game-btn:hover { transform: translateY(-3px); box-shadow: 0 0 30px currentColor; }
        .fantasy:hover    { background: rgba(51,255,51,0.15); }
        .scifi:hover      { background: rgba(51,238,255,0.15); }
        .pirates:hover    { background: rgba(255,176,0,0.15); }
        .underwater:hover { background: rgba(17,170,255,0.15); }
        .western:hover    { background: rgba(146,74,54,0.15); }
        .detective:hover  { background: rgba(255,68,170,0.15); }
        .prehistoric:hover{ background: rgba(143,105,70,0.15); }
        .newvegas:hover   { background: rgba(255,176,0,0.15); }
        .gothic:hover     { background: rgba(204,34,34,0.15); }
        .spy:hover        { background: rgba(200,168,75,0.15); }
        .game-btn:active  { transform: scale(0.96); }

        /* Game iframe overlay */
        #game-frame {
            display: none;
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            border: none; z-index: 100;
            background: #000;
        }

        @media (max-width: 500px) {
            h1 { font-size: 1.8rem; }
            .subtitle { font-size: 1rem; }
            .game-btn { padding: 1rem 1.8rem; font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="stars">
        <div class="star-layer star-layer1"></div>
        <div class="star-layer star-layer2"></div>
        <div class="star-layer star-layer3"></div>
    </div>

    <div class="hub" id="menu">
        <h1>CHOOSE YOUR ADVENTURE</h1>
        <p class="subtitle">Select a story to begin<br>To pick a new story, use the Back to Home button<br>Each story has the approximate 100% completion (all endings) time in minutes next to it</p>
        <div class="button-group">
            <button onclick="loadGame('fallout-nv')"  class="game-btn newvegas">Nexus Station, New Vegas ~80</button>
            <button onclick="loadGame('spy')"          class="game-btn spy">The Berlin Cipher ~76</button>
            <button onclick="loadGame('gothic')"       class="game-btn gothic">Castle Sanguine ~41</button>
            <button onclick="loadGame('fantasy')"      class="game-btn fantasy">The Eldritch Valley ~18</button>
            <button onclick="loadGame('scifi')"        class="game-btn scifi">Space Station Omega-7 ~18</button>
            <button onclick="loadGame('pirates')"      class="game-btn pirates">Isla Calavera ~17</button>
            <button onclick="loadGame('western')"      class="game-btn western">Dust & Lead ~16</button>
            <button onclick="loadGame('detective')"    class="game-btn detective">Neon Shadows ~14</button>
            <button onclick="loadGame('underwater')"   class="game-btn underwater">Depth Unknown ~14</button>
            <button onclick="loadGame('prehistoric')"  class="game-btn prehistoric">Flint and Ember ~12</button>
        </div>
    </div>

    <iframe id="game-frame"></iframe>

    <script>
const GAMES = {
  "fallout-nv": "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Choose Your Own Adventure</title>\n    <style>\n        :root {\n            --pip:       #ffb000;\n            --pip-dim:   #7a5000;\n            --pip-bright:#ffd060;\n            --danger:    #ff4433;\n            --ncr:       #4a90d9;\n            --ncr-dim:   #2a5080;\n            --legion:    #cc3322;\n            --legion-dim:#7a1a10;\n            --good:      #33cc66;\n            --good-dim:  #1a6633;\n            --bg:        #060400;\n            --glow-pip:  rgba(255,176,0,0.22);\n            --glow-ncr:  rgba(74,144,217,0.22);\n            --glow-leg:  rgba(204,51,34,0.25);\n            --glow-good: rgba(51,204,102,0.20);\n            --glow-red:  rgba(255,68,51,0.30);\n        }\n\n        * { box-sizing: border-box; margin: 0; padding: 0; }\n\n        body {\n            background: var(--bg);\n            color: var(--pip);\n            font-family: 'Courier New', 'Courier', monospace;\n            padding: 16px;\n            line-height: 1.65;\n            min-height: 100vh;\n            background-image: repeating-linear-gradient(\n                0deg,\n                transparent, transparent 3px,\n                rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 6px\n            );\n            background-attachment: fixed;\n        }\n\n        .game-container {\n            max-width: 780px;\n            margin: 0 auto;\n            border: 2px solid var(--pip);\n            padding: 32px 28px;\n            min-height: 86vh;\n            box-shadow: 0 0 28px var(--glow-pip), inset 0 0 60px rgba(255,176,0,0.03);\n            background: radial-gradient(ellipse at center,\n                rgba(22,14,0,0.65) 0%, rgba(6,4,0,0.97) 75%);\n            transition: box-shadow 0.5s ease, border-color 0.5s ease, color 0.5s ease;\n        }\n\n        /* ---- Environment overrides ---- */\n        /* NCR blue */\n        #s2a1:checked ~ .game-container,\n        #s3a1:checked ~ .game-container,\n        #sgn:checked  ~ .game-container,\n        #e1:checked   ~ .game-container {\n            border-color: var(--ncr);\n            box-shadow: 0 0 28px var(--glow-ncr), inset 0 0 60px rgba(74,144,217,0.03);\n            color: #88c0f0;\n        }\n        /* Legion red */\n        #s2b2:checked ~ .game-container,\n        #s3b3:checked ~ .game-container {\n            border-color: var(--legion);\n            box-shadow: 0 0 28px var(--glow-leg);\n            color: #ee9988;\n        }\n        /* Combat/danger red */\n        #si4:checked  ~ .game-container,\n        #swf:checked  ~ .game-container,\n        #san2:checked ~ .game-container,\n        #e4:checked   ~ .game-container {\n            border-color: var(--danger);\n            box-shadow: 0 0 36px var(--glow-red);\n            color: #ff8877;\n        }\n        /* Good/liberation green */\n        #swc:checked   ~ .game-container,\n        #e5:checked    ~ .game-container,\n        #etrue:checked ~ .game-container {\n            border-color: var(--good);\n            box-shadow: 0 0 28px var(--glow-good);\n            color: #66ffaa;\n        }\n\n        /* ---- Typography ---- */\n        pre {\n            font-size: 12px;\n            white-space: pre;\n            text-align: center;\n            margin-bottom: 24px;\n            text-shadow: 0 0 8px currentColor;\n            line-height: 1.25;\n            overflow-x: auto;\n            animation: flicker 0.9s ease-out;\n            letter-spacing: 0;\n        }\n\n        @keyframes flicker {\n            0%   { opacity: 0; text-shadow: 0 0 40px currentColor; }\n            18%  { opacity: 0.4; }\n            30%  { opacity: 0.85; }\n            45%  { opacity: 0.45; }\n            60%  { opacity: 0.9; }\n            75%  { opacity: 0.6; }\n            100% { opacity: 1; text-shadow: 0 0 8px currentColor; }\n        }\n\n        .scene-tag {\n            display: block;\n            font-size: 0.72rem;\n            letter-spacing: 4px;\n            color: var(--pip-dim);\n            text-align: center;\n            margin-bottom: 18px;\n            text-transform: uppercase;\n        }\n\n        .story-text {\n            font-size: 1.08rem;\n            margin-bottom: 30px;\n            padding: 0 2px;\n            animation: fadeIn 0.55s ease-out;\n            line-height: 1.75;\n        }\n\n        @keyframes fadeIn {\n            from { opacity: 0; transform: translateY(9px); }\n            to   { opacity: 1; transform: translateY(0); }\n        }\n\n        .story-text p { margin-bottom: 14px; }\n        .story-text p:last-child { margin-bottom: 0; }\n\n        strong { color: var(--pip-bright); font-weight: bold; }\n        em     { color: var(--pip-bright); font-style: italic; }\n        .ncr   { color: var(--ncr); }\n        .leg   { color: var(--legion); }\n        .good  { color: var(--good); }\n        .dim   { color: var(--pip-dim); }\n        .warn  { color: var(--danger); }\n\n        hr {\n            border: none;\n            border-top: 1px solid var(--pip-dim);\n            margin: 22px 0;\n            opacity: 0.35;\n        }\n\n        /* ---- Choices ---- */\n        .choices {\n            display: flex;\n            flex-direction: column;\n            gap: 13px;\n            align-items: center;\n            margin-top: 4px;\n        }\n\n        label {\n            display: inline-block;\n            border: 1px solid currentColor;\n            padding: 13px 26px;\n            cursor: pointer;\n            text-transform: uppercase;\n            letter-spacing: 2px;\n            background: rgba(0,0,0,0.55);\n            font-weight: bold;\n            font-size: 0.84rem;\n            width: 88%;\n            text-align: center;\n            transition: background 0.2s, box-shadow 0.2s, transform 0.15s;\n            user-select: none;\n            position: relative;\n        }\n\n        label::before {\n            content: '> ';\n            opacity: 0;\n            transition: opacity 0.15s;\n        }\n\n        label:hover::before {\n            opacity: 1;\n            animation: blink 0.65s step-end infinite;\n        }\n\n        @keyframes blink { 50% { opacity: 0; } }\n\n        label:hover {\n            background: currentColor;\n            color: #000 !important;\n            box-shadow: 0 0 22px currentColor;\n            transform: scale(1.025);\n        }\n\n        label:active { transform: scale(0.97); transition: transform 0.08s; }\n\n        .note {\n            font-size: 0.78rem;\n            color: var(--pip-dim);\n            text-align: center;\n            margin-top: 12px;\n            font-style: italic;\n        }\n\n        .ending-title {\n            font-size: 1.3rem;\n            letter-spacing: 3px;\n            text-align: center;\n            margin-bottom: 20px;\n            text-shadow: 0 0 15px currentColor;\n        }\n\n        /* ============================================================\n           THE CSS STATE MACHINE\n           All radio inputs are siblings of .game-container.\n           Each :checked state reveals exactly one .scene div.\n           ============================================================ */\n\n        input[type=\"radio\"] { display: none; }\n        .scene { display: none; animation: fadeIn 0.5s ease-out; }\n\n        /* START */\n        #s0:checked   ~ .game-container #scene0,\n        /* PART 1 \u2014 Three roads */\n        #s1a:checked  ~ .game-container #scene1a,\n        #s1b:checked  ~ .game-container #scene1b,\n        #s1c:checked  ~ .game-container #scene1c,\n        /* PART 2 \u2014 Mid-path encounters */\n        #s2a1:checked ~ .game-container #scene2a1,\n        #s2a2:checked ~ .game-container #scene2a2,\n        #s2b1:checked ~ .game-container #scene2b1,\n        #s2b2:checked ~ .game-container #scene2b2,\n        #s2c1:checked ~ .game-container #scene2c1,\n        #s2c2:checked ~ .game-container #scene2c2,\n        /* PART 3 \u2014 Approach */\n        #s3a1:checked ~ .game-container #scene3a1,\n        #s3a2:checked ~ .game-container #scene3a2,\n        #s3a3:checked ~ .game-container #scene3a3,\n        #s3b1:checked ~ .game-container #scene3b1,\n        #s3b2:checked ~ .game-container #scene3b2,\n        #s3b3:checked ~ .game-container #scene3b3,\n        #s3c1:checked ~ .game-container #scene3c1,\n        #s3c2:checked ~ .game-container #scene3c2,\n        /* ARRIVAL at NEXUS */\n        #sg:checked   ~ .game-container #scenesg,\n        #sgn:checked  ~ .game-container #scenesgn,\n        #sgv:checked  ~ .game-container #scenesgv,\n        /* ENTRY */\n        #si1:checked  ~ .game-container #scenesi1,\n        #si2:checked  ~ .game-container #scenesi2,\n        #si3:checked  ~ .game-container #scenesi3,\n        #si4:checked  ~ .game-container #scenesi4,\n        #si5:checked  ~ .game-container #scenesi5,\n        /* INTERIOR ROOMS */\n        #slab:checked ~ .game-container #sceneslab,\n        #soff:checked ~ .game-container #scenesoff,\n        #sarm:checked ~ .game-container #scenesarm,\n        /* HELIOS */\n        #sh1:checked  ~ .game-container #scenesh1,\n        #sh2:checked  ~ .game-container #scenesh2,\n        #sh3:checked  ~ .game-container #scenesh3,\n        /* WEBB */\n        #swf:checked  ~ .game-container #sceneswf,\n        #swt:checked  ~ .game-container #sceneswt,\n        #swc:checked  ~ .game-container #sceneswc,\n        /* ARMORY */\n        #san1:checked ~ .game-container #scenesan1,\n        #san2:checked ~ .game-container #scenesan2,\n        /* FINAL DECISIONS */\n        #svol:checked ~ .game-container #scenesvol,\n        #sref:checked ~ .game-container #scenesref,\n        #stk:checked  ~ .game-container #scenestk,\n        /* ENDINGS */\n        #e1:checked   ~ .game-container #scenee1,\n        #e2:checked   ~ .game-container #scenee2,\n        #e3:checked   ~ .game-container #scenee3,\n        #e4:checked   ~ .game-container #scenee4,\n        #e5:checked   ~ .game-container #scenee5,\n        #e6:checked   ~ .game-container #scenee6,\n        #e7:checked   ~ .game-container #scenee7,\n        #etrue:checked~ .game-container #sceneetrue\n        { display: block; }\n\n        /* ---- Responsive ---- */\n        @media (max-width: 520px) {\n            .game-container { padding: 20px 14px; }\n            pre { font-size: 10px; }\n            .story-text { font-size: 0.97rem; }\n            label { width: 96%; font-size: 0.78rem; padding: 11px 14px; letter-spacing: 1px; }\n            .ending-title { font-size: 1.05rem; }\n        }\n    </style>\n</head>\n<body>\n<a href=\"#\" onclick=\"window.parent.showMenu();return false;\" style=\"color:white;cursor:pointer;\">Back to Home</a>\n    <!-- ==================== ALL STATE RADIO INPUTS ====================\n         These MUST appear before .game-container in the DOM so that the\n         general sibling combinator (~) can reach .game-container.\n         All share name=\"game\" so only one is ever checked at a time.\n         ================================================================ -->\n\n    <input type=\"radio\" name=\"game\" id=\"s0\"   checked>\n    <!-- Part 1 -->\n    <input type=\"radio\" name=\"game\" id=\"s1a\">\n    <input type=\"radio\" name=\"game\" id=\"s1b\">\n    <input type=\"radio\" name=\"game\" id=\"s1c\">\n    <!-- Part 2 -->\n    <input type=\"radio\" name=\"game\" id=\"s2a1\">\n    <input type=\"radio\" name=\"game\" id=\"s2a2\">\n    <input type=\"radio\" name=\"game\" id=\"s2b1\">\n    <input type=\"radio\" name=\"game\" id=\"s2b2\">\n    <input type=\"radio\" name=\"game\" id=\"s2c1\">\n    <input type=\"radio\" name=\"game\" id=\"s2c2\">\n    <!-- Part 3 -->\n    <input type=\"radio\" name=\"game\" id=\"s3a1\">\n    <input type=\"radio\" name=\"game\" id=\"s3a2\">\n    <input type=\"radio\" name=\"game\" id=\"s3a3\">\n    <input type=\"radio\" name=\"game\" id=\"s3b1\">\n    <input type=\"radio\" name=\"game\" id=\"s3b2\">\n    <input type=\"radio\" name=\"game\" id=\"s3b3\">\n    <input type=\"radio\" name=\"game\" id=\"s3c1\">\n    <input type=\"radio\" name=\"game\" id=\"s3c2\">\n    <!-- Arrival -->\n    <input type=\"radio\" name=\"game\" id=\"sg\">\n    <input type=\"radio\" name=\"game\" id=\"sgn\">\n    <input type=\"radio\" name=\"game\" id=\"sgv\">\n    <!-- Entry -->\n    <input type=\"radio\" name=\"game\" id=\"si1\">\n    <input type=\"radio\" name=\"game\" id=\"si2\">\n    <input type=\"radio\" name=\"game\" id=\"si3\">\n    <input type=\"radio\" name=\"game\" id=\"si4\">\n    <input type=\"radio\" name=\"game\" id=\"si5\">\n    <!-- Interior -->\n    <input type=\"radio\" name=\"game\" id=\"slab\">\n    <input type=\"radio\" name=\"game\" id=\"soff\">\n    <input type=\"radio\" name=\"game\" id=\"sarm\">\n    <!-- HELIOS -->\n    <input type=\"radio\" name=\"game\" id=\"sh1\">\n    <input type=\"radio\" name=\"game\" id=\"sh2\">\n    <input type=\"radio\" name=\"game\" id=\"sh3\">\n    <!-- Webb -->\n    <input type=\"radio\" name=\"game\" id=\"swf\">\n    <input type=\"radio\" name=\"game\" id=\"swt\">\n    <input type=\"radio\" name=\"game\" id=\"swc\">\n    <!-- Armory -->\n    <input type=\"radio\" name=\"game\" id=\"san1\">\n    <input type=\"radio\" name=\"game\" id=\"san2\">\n    <!-- Final decisions -->\n    <input type=\"radio\" name=\"game\" id=\"svol\">\n    <input type=\"radio\" name=\"game\" id=\"sref\">\n    <input type=\"radio\" name=\"game\" id=\"stk\">\n    <!-- Endings -->\n    <input type=\"radio\" name=\"game\" id=\"e1\">\n    <input type=\"radio\" name=\"game\" id=\"e2\">\n    <input type=\"radio\" name=\"game\" id=\"e3\">\n    <input type=\"radio\" name=\"game\" id=\"e4\">\n    <input type=\"radio\" name=\"game\" id=\"e5\">\n    <input type=\"radio\" name=\"game\" id=\"e6\">\n    <input type=\"radio\" name=\"game\" id=\"e7\">\n    <input type=\"radio\" name=\"game\" id=\"etrue\">\n\n    <!-- ==================== GAME CONTAINER ==================== -->\n    <div class=\"game-container\">\n\n\n        <!-- ========================================================\n             SCENE 0 \u2014 GOODSPRINGS, DAWN\n             ======================================================== -->\n        <div id=\"scene0\" class=\"scene\">\n            <span class=\"scene-tag\">// GOODSPRINGS, NEVADA \u2014 0600 HOURS //</span>\n            <div class=\"story-text\">\n                <p>You wake to the sound of a brahmin bell and the dry scrape of a broom on the Prospector Saloon's porch. The Mojave sun isn't up yet, but the sky is already turning the color of an old wound \u2014 copper and rust above the hills, purple-black overhead. Somewhere out in the scrub, a gecko barks once and goes quiet.</p>\n\n                <p>Last night, a man named <strong>Mr. Burke</strong> paid you 200 caps to find something. He was well-dressed for the wasteland \u2014 clean shirt, functional wristwatch, no visible weapons. He called himself a \"procurement specialist\" working for \"significant interests in New Vegas.\" He had one clue to offer: a pre-war research facility called <strong>NEXUS STATION</strong>, somewhere in the deep Mojave northeast of Primm. Intact, he hoped. Active, he suspected. He'd pay the remaining <em>500 caps</em> when you returned with proof of both.</p>\n\n                <p>He didn't say what kind of research. He didn't say whose \"significant interests.\" You didn't ask. 200 caps upfront has a way of trimming those conversations down to the essentials.</p>\n\n                <p>You've got your gear, your water, and a slip of paper in Burke's precise handwriting: <strong>NEXUS STATION</strong>. That's it. That's the whole job. The Mojave is waiting, and it's not a patient place.</p>\n\n                <p class=\"dim\">// Three routes out of Goodsprings. Choose carefully \u2014 the Mojave rewards preparation and punishes arrogance in equal measure. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"s1a\">Take the I-15 north \u2014 the main road, NCR-patrolled, fastest route</label>\n                <label for=\"s1b\">Cut south of the highway through open desert \u2014 slower, but quieter</label>\n                <label for=\"s1c\">Head into Freeside first \u2014 gather intelligence before going in blind</label>\n            </div>\n        </div>\n\n\n        <!-- ========================================================\n             SCENE 1A \u2014 THE I-15: NCR CHECKPOINT\n             ======================================================== -->\n        <div id=\"scene1a\" class=\"scene\">\n            <pre>\n  ============================\n  |  I-15  NORTH  MOJAVE    |\n  ============================\n      |          |\n      |  [STOP]  |\n      |    /|\\   |\n     /_\\  / | \\  /_\\\n    [NCR][NCR][NCR]\n  ---concrete barrier---\n            </pre>\n            <span class=\"scene-tag\">// I-15 NORTHBOUND \u2014 NCR CHECKPOINT ALPHA //</span>\n            <div class=\"story-text\">\n                <p>The I-15 runs straight and cracked through the desert, flanked by rusted billboard skeletons that once advertised casinos now reduced to rubble or controlled by ghosts and robots. You've been walking an hour when the checkpoint materializes out of the heat shimmer \u2014 two concrete barriers across both lanes, three <strong class=\"ncr\">NCR soldiers</strong> in tan, and a mounted spotlight that's aimed at nothing in particular this time of morning.</p>\n\n                <p>The soldiers look tense. Not the usual I'm-bored-and-want-trouble tense, but something more specific. One keeps checking his radio. One has his rifle slung wrong \u2014 barrel up, like someone who just put it down in a hurry and forgot.</p>\n\n                <p>Whatever's got their attention isn't the standard Raider harassment. There's a jerrican on the ground next to the barrier with the cap off, as if someone dropped it mid-pour and never came back to finish the job. Small details, but in the wasteland, small details are often the loudest things in the room.</p>\n\n                <p class=\"dim\">// You're 40 yards out. They've spotted you. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"s2a1\">Approach the checkpoint openly \u2014 identify yourself and talk</label>\n                <label for=\"s2a2\">Slip through the drainage culvert under the road \u2014 go around</label>\n            </div>\n        </div>\n\n\n        <!-- ========================================================\n             SCENE 1B \u2014 OPEN DESERT: THE DEAD RANGER\n             ======================================================== -->\n        <div id=\"scene1b\" class=\"scene\">\n            <pre>\n   .   .   .   .   .   .\n     .   .   .   .   .\n  /\\    /\\    /\\    /\\\n /  \\  /  \\  /  \\  /  \\\n/    \\/    \\/    \\/    \\\n              |\n           [FIGURE]\n              |\n    . . . . sand . . . .\n            </pre>\n            <span class=\"scene-tag\">// OPEN MOJAVE \u2014 SECTOR 7-KILO //</span>\n            <div class=\"story-text\">\n                <p>You cut south of the highway into open Mojave. The Joshua trees grow tall and strange out here, arranged in clusters that almost look deliberate \u2014 like someone planted them in patterns that took centuries to become visible. The silence is extraordinary. No gecko-squabble, no wind. Just the crunch of your boots and the faraway glint of the highway to your north.</p>\n\n                <p>Twenty minutes in, you spot the <strong>khaki uniform</strong> beneath a Joshua tree whose shadow falls across the figure in a near-perfect X, like the desert itself is marking the spot. You slow down. Approach from the side, hand on your weapon. Nothing moves.</p>\n\n                <p>It's an NCR Ranger. Male, average build, face-down in the sand. Shot once in the back of the head \u2014 clean, close range, professional. The flies haven't found him yet, which means he died sometime in the last few hours. His pack has been rifled but not emptied. His Ranger badge is still on his chest: <strong>FULLER, E. \u2014 MOJAVE CHAPTER.</strong></p>\n\n                <p>Off to the east, you catch a distant dust cloud. Something moving. Could be radscorpions, could be whatever killed Ranger Fuller.</p>\n\n                <p class=\"dim\">// Time is a factor. What do you do? //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"s2b1\">Examine the Ranger's body and gear before the dust cloud closes in</label>\n                <label for=\"s2b2\">Keep moving east \u2014 avoid whatever made that dust cloud</label>\n            </div>\n        </div>\n\n\n        <!-- ========================================================\n             SCENE 1C \u2014 FREESIDE: THE KING'S DOMAIN\n             ======================================================== -->\n        <div id=\"scene1c\" class=\"scene\">\n            <pre>\n  D O M A I N\n  == = = = = ==\n  [denim]  [greased hair]\n  [chrome] [switchblades]\n            </pre>\n            <span class=\"scene-tag\">// FREESIDE \u2014 NEW VEGAS OUTER DISTRICT //</span>\n            <div class=\"story-text\">\n                <p>Freeside never really wakes up. It just transitions from its nighttime chaos to its daytime variation \u2014 slightly less stabbing, equally unpredictable. By mid-morning, the streets hold a grim ecosystem: squatters in doorways, <strong class=\"ncr\">Followers of the Apocalypse</strong> rushing between their clinics, and <strong>Kings</strong> drifting in loose formation, denim jackets and pompadours, watching everything with the territorial calm of men who know they run this place and don't need to prove it.</p>\n\n                <p>You ask around carefully. The name \"NEXUS Station\" gets blank looks and shrugs. But the <em>signal</em> \u2014 \"that weird headache out of the deep Mojave, been going on for months\" \u2014 lands differently. Eyes shift. The second King you ask, a woman named <strong>Kara</strong> with a leather jacket covered in pre-war band patches, stops picking her teeth and actually looks at you.</p>\n\n                <p>\"You're not the first one asking about that signal,\" she says. \"Come on. I'll take you to someone who's been looking at it longer than anybody.\"</p>\n\n                <p>She leads you to the Kings' building. Inside, pinned to the wall beside a rack of vintage records: a hand-drawn map. A red circle in the deep Mojave. Something labeled only with a question mark.</p>\n\n                <p class=\"dim\">// Two leads, both inside the Kings' building. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"s2c1\">Talk to the Kings' leadership \u2014 ask what they know about the signal</label>\n                <label for=\"s2c2\">Ask Kara to take you to the Followers \u2014 you want the pre-war records</label>\n            </div>\n        </div>\n\n\n        <!-- ========================================================\n             SCENE 2A1 \u2014 NCR SOLDIERS: INTEL EXCHANGE\n             ======================================================== -->\n        <div id=\"scene2a1\" class=\"scene\">\n            <pre>\n   ________________\n   |  Cpl. REEVES  |\n   |  Pvt. DANIELS |\n   |________________|\n   [bear insignia][bear insignia]\n            </pre>\n            <span class=\"scene-tag\">// NCR CHECKPOINT ALPHA \u2014 STATUS: HIGH ALERT //</span>\n            <div class=\"story-text\">\n                <p>The soldiers relax once you prove you're not a threat \u2014 or at least not an immediate one. <strong class=\"ncr\">Corporal Reeves</strong> is the talker. He's been awake for thirty-some hours and looks it, but his eyes are sharp. <strong class=\"ncr\">Private Daniels</strong> keeps one hand on his rifle and watches the road.</p>\n\n                <p>\"Three nights back,\" Reeves says, keeping his voice down, \"a full six-person Ranger squad out of Camp Searchlight goes completely off radio. We're talking experienced people \u2014 Sergeant Nakamura's team. An hour of nothing, then they come back online.\" He pauses. \"Different. All of them. Calm. Eerily calm. Nakamura \u2014 a woman who could cuss out a deathclaw without blinking \u2014 comes back on comms talking like a pre-war public service announcement. Words like 'harmony' and 'social equilibrium.' We have her in a field hospital in Primm right now. She's physically fine but she won't stop <em>smiling.</em>\"</p>\n\n                <p>He pulls a crumpled paper from his breast pocket. An intercepted Legion signal, decoded. It mentions a <em>\"tone device\"</em> in grid sector 7-Kilo, deep Mojave. Caesar's frumentarii are apparently looking for it too.</p>\n\n                <p>\"We've got a team staged at Primm, ready to move on a location if we had one,\" Reeves says. \"You got something worth trading?\"</p>\n\n                <p class=\"dim\">// You have the name NEXUS STATION. The NCR has manpower. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3a1\">Share Burke's intel \u2014 accept the NCR's offer of a squad escort to NEXUS</label>\n                <label for=\"s3a2\">Keep NEXUS to yourself \u2014 take the coordinates and head out alone</label>\n            </div>\n        </div>\n\n\n        <!-- ========================================================\n             SCENE 2A2 \u2014 DRAINAGE CULVERT: THE ROADSIDE TERMINAL\n             ======================================================== -->\n        <div id=\"scene2a2\" class=\"scene\">\n            <pre>\n  C O  T E R M I N A L\n  +-------------------+\n  | > EMERGENCY BCAST |\n  | > FREQUENCY 7.3   |\n  | > STATUS: ACTIVE  |\n  +-------------------+\n            </pre>\n            <span class=\"scene-tag\">// I-15 DRAINAGE CULVERT \u2014 SOMETHING IMPOSSIBLE //</span>\n            <div class=\"story-text\">\n                <p>The culvert is low and smells of old rust and standing water, but it's wide enough to crawl through without scraping your pack. You time your approach perfectly \u2014 one soldier heads for the water can, one lights a cigarette \u2014 and you slip under the road without a sound.</p>\n\n                <p>On the far side of the checkpoint, the I-15 stretches empty and flat. And about two miles ahead, half-buried in a sand drift against the highway median, you see something that stops you cold: a <strong>working Robco terminal</strong>, screen glowing amber in full daylight. Pre-war. Totally exposed. Nobody's sitting at it. Nobody's guarding it.</p>\n\n                <p>The screen cycles through a rotating display. Emergency broadcast status. Frequency logs. A location tag in military grid notation that you don't immediately recognize. And at the bottom, repeating on a slow loop: <strong>NEXUS-7 / MERIDIAN PROTOCOL / DO NOT APPROACH WITHOUT AUTHORIZATION.</strong></p>\n\n                <p>The terminal's keyboard is intact, sand-dusted but functional. Someone could have wiped this data years ago. The fact that it's still broadcasting means either nobody found it, or nobody who found it came back.</p>\n\n                <p class=\"dim\">// The coordinates are right there on the screen. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3a3\">Copy down the coordinates \u2014 you know where NEXUS is now</label>\n                <label for=\"sg\">You already have enough. Head deeper into the Mojave toward sector 7-Kilo</label>\n            </div>\n        </div>\n\n\n        <!-- ========================================================\n             SCENE 2B1 \u2014 DEAD RANGER: FULLER'S HOLOTAPE\n             ======================================================== -->\n        <div id=\"scene2b1\" class=\"scene\">\n            <pre>\n  [BADGE: FULLER E. \u2014 MOJAVE CHAPTER]\n  [HOLOTAPE \u2014 NEXUS \u2014 DO NOT COPY]\n            </pre>\n            <span class=\"scene-tag\">// OPEN MOJAVE \u2014 RANGER FULLER'S LAST POSITION //</span>\n            <div class=\"story-text\">\n                <p>You crouch by the body and work fast. The dust cloud to the east has slowed but not stopped \u2014 radscorpions, probably, drawn by the heat shimmer. Three minutes, maybe four.</p>\n\n                <p>Fuller's pack yields: a half-eaten box of Sugar Bombs, a personal journal (last entry three days ago, cut off mid-sentence), a <strong>holotape labeled NEXUS \u2014 DO NOT COPY</strong>, and a weathered map fragment. The map shows a section of Mojave you don't recognize, with a hand-drawn circle and the notation <em>\"blast door \u2014 concealed \u2014 look for the Joshua cluster shaped like a hand.\"</em></p>\n\n                <p>The journal's last full entry reads: <em>\"Found it. The station is real. HELIOS is active \u2014 has been for God knows how long. The signal is coming from inside, lower frequencies than what causes the headaches. Something is trying to communicate. Don't trust the Follower \u2014 she knows more than she's saying. Do NOT let the NCR or the Legion get inside first. Whatever's in there, it can't fall into those hands. If you find this, find Dr. Voss in Freeside and play her this tape. She'll know what to do.\"</em></p>\n\n                <p>The dust cloud just changed direction. Toward you.</p>\n\n                <p class=\"dim\">// The holotape. The map. The Follower named Dr. Voss. Three things you know now that you didn't before. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3b1\">Follow Fuller's map \u2014 it leads straight to NEXUS Station</label>\n                <label for=\"s3b2\">Head to Freeside first \u2014 find Dr. Voss and play her the tape</label>\n            </div>\n        </div>\n\n\n        <!-- ========================================================\n             SCENE 2B2 \u2014 LEGION PATROL: DECANUS TITUS\n             ======================================================== -->\n        <div id=\"scene2b2\" class=\"scene\">\n            <pre>\n  === CAESAR'S WILL ===\n  [TITUS] [soldier] [soldier]\n            </pre>\n            <span class=\"scene-tag\">// OPEN MOJAVE \u2014 LEGION PATROL CONTACT //</span>\n            <div class=\"story-text\">\n                <p>They appear from behind a basalt ridge, moving in clean three-man formation: two soldiers with machetes drawn, and in front, a <strong class=\"leg\">Decanus</strong> who walks like the desert owes him something. He's maybe thirty, broad-shouldered, with a bronze face and eyes like a hawk that's spotted a rabbit from altitude. His name, you'll learn, is <strong class=\"leg\">Titus.</strong></p>\n\n                <p>He stops exactly eight feet away. Studies you the way a card dealer studies a fresh player \u2014 professionally, without emotion. \"You carry a weapon,\" he says. It's not a question. \"State your purpose and your allegiance. You have one opportunity to answer correctly.\"</p>\n\n                <p>The two soldiers haven't moved, but their machetes are in different positions than they were ten seconds ago.</p>\n\n                <p>Titus's patrol is deep inside what the NCR considers their territory. They're not supposed to be here. The fact that they are, moving openly in daylight, means either they're very confident or they've received specific orders. There's a purpose to this patrol \u2014 they're looking for something. And the way Titus's eyes keep flicking east, toward the deep Mojave, you suspect he's getting warm.</p>\n\n                <p class=\"dim\">// Fight or talk. The math is not in your favor if it comes to weapons. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3b3\">Fight your way through the patrol \u2014 three-on-one, but you've had worse odds</label>\n                <label for=\"s3b2\">Submit to questioning \u2014 play harmless, learn what Titus is looking for, then slip away</label>\n            </div>\n        </div>\n\n\n        <!-- ========================================================\n             SCENE 2C1 \u2014 THE KINGS: INTELLIGENCE\n             ======================================================== -->\n        <div id=\"scene2c1\" class=\"scene\">\n            <pre>\n  ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~\n  \"We got style, we got soul,\n   we got answers you can't\n   get in the Strip.\" \u2014 KARA\n            </pre>\n            <span class=\"scene-tag\">// THE KINGS' BUILDING \u2014 FREESIDE //</span>\n            <div class=\"story-text\">\n                <p>Kara brings you to a back room where the walls are covered in maps, signal-monitoring printouts, and pre-war record sleeves. A King named <strong>Shades</strong> \u2014 an older man with silver-streaked hair and surprisingly methodical handwriting on a chalkboard \u2014 has been tracking the signal for six months.</p>\n\n                <p>\"It started small,\" Shades says, tapping the map. \"AM frequency, bouncing off the hardpan out in sector 7-Kilo. Causes headaches within thirty miles. Lucid dreaming. Loss of aggressive impulses. We had three Kings out near Boulder City come back talking about how they 'understood the fundamental interconnectedness of human experience.' One of them cried for four days. Real Kings don't cry.\" He says it matter-of-factly.</p>\n\n                <p>\"The source is here.\" He circles a point on the map. \"We went once \u2014 found a blast door set into a hillside. Big one. Pre-war military grade. Heard machinery humming inside. Didn't go in. Something about the place makes your teeth itch.\"</p>\n\n                <p>He hands you the map. \"Take it. Find out what's in there. We've got a bigger problem: in the last two weeks the signal has gotten stronger. Whatever's inside just woke up a little more.\"</p>\n\n                <p class=\"dim\">// You have the map. The location of NEXUS Station is confirmed. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3c1\">Take the map and head out alone \u2014 fast and quiet</label>\n                <label for=\"s3c2\">Ask the Kings for backup \u2014 strength in numbers on this one</label>\n            </div>\n        </div>\n\n\n        <!-- ========================================================\n             SCENE 2C2 \u2014 FOLLOWERS OF THE APOCALYPSE: THE ARCHIVE\n             ======================================================== -->\n        <div id=\"scene2c2\" class=\"scene\">\n            <pre>\n   \"Knowledge above all else.\"\n   [ARCHIVE] [FILING CABINETS] [DUSTY SHELVES]\n   ................reading................\n            </pre>\n            <span class=\"scene-tag\">// FOLLOWERS OF THE APOCALYPSE \u2014 OLD MORMON FORT //</span>\n            <div class=\"story-text\">\n                <p>The Followers' archive smells of antiseptic and two centuries of dust. The librarian \u2014 a teenager who clearly hasn't slept since last week \u2014 points you at the pre-war government files and goes back to her own reading. You dig for two hours.</p>\n\n                <p>Most of it is agricultural data, medical surveys, census records. Then \u2014 pay dirt. A government document dated September 2073, stamped <strong>CLASSIFIED \u2014 DECLASSIFIED UPON PUBLIC SAFETY NEED:</strong></p>\n\n                <p><em>\"NEXUS STATION (Designation: NEXUS-7) is hereby ordered closed pending full ethical review of Project MERIDIAN \u2014 a behavioral modification research program utilizing sub-audible frequency broadcast technology. Initial trials confirmed behavioral effects at ranges exceeding 40 miles. Effects included significant reduction of aggressive impulses, elevated social compliance, and in long-duration subjects, complete suppression of self-determination instincts. The review board finds these outcomes inconsistent with the American Charter of Rights.\"</em></p>\n\n                <p>The attachment listing the facility location is missing. But the document references its AI research platform: <strong>HELIOS</strong> \u2014 described as a \"first-generation social optimization intelligence\" designed to refine and deploy the MERIDIAN frequency without human error. Status at closure: <em>OPERATIONAL BUT UNCONFIRMED.</em></p>\n\n                <p>You find a second document \u2014 a memo from the facility's director arguing against closure. His name: <strong>Dr. Nathaniel Webb.</strong></p>\n\n                <p class=\"dim\">// HELIOS. Project MERIDIAN. Dr. Webb. Now you know what you're walking into. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"s3c2\">Find Dr. Voss \u2014 a Follower who's been investigating the signal, according to Kara</label>\n                <label for=\"sg\">You have enough. Head into the Mojave for sector 7-Kilo \u2014 find the station yourself</label>\n            </div>\n        </div>\n\n\n        <!-- ========================================================\n             SCENE 3A1 \u2014 NCR ESCORT TO NEXUS\n             ======================================================== -->\n        <div id=\"scene3a1\" class=\"scene\">\n            <pre>\n   [5 soldiers] ====march====>\n            </pre>\n            <span class=\"scene-tag\">// NCR FIELD TEAM \u2014 APPROACHING SECTOR 7-KILO //</span>\n            <div class=\"story-text\">\n                <p>You share the name \"NEXUS Station\" and Corporal Reeves's eyes go wide enough that you can see the bloodshot whites. He gets on the radio immediately. Within two hours, a five-person NCR field squad meets you on the road outside Primm \u2014 seasoned soldiers, good gear, led by a compact, serious woman named <strong class=\"ncr\">Sergeant Nakamura</strong>... wait. Not Nakamura. That's the one in the field hospital, smiling at nothing. Her replacement: <strong class=\"ncr\">Sergeant Diaz,</strong> who introduces herself with one word and immediately starts studying the terrain.</p>\n\n                <p>The march into sector 7-Kilo takes most of the day. Diaz runs a tight operation \u2014 scouts thirty yards ahead, flankers twenty yards out, no talking that isn't mission-critical. She fills you in during a water break: Command wants NEXUS's technology intact. Not to shut it down. To <em>weaponize it.</em> \"We could end the war with the Legion in a season if we can broadcast that signal at full power toward the Colorado,\" she says flatly. She's not troubled by this. That's what troubles you.</p>\n\n                <p>By late afternoon, the Joshua trees grow dense and strange \u2014 and then you see it: a blast door set into a basalt hillside, slightly ajar, trailing the faintest hum of working machinery. The entrance to NEXUS Station.</p>\n\n                <p class=\"dim\">// You arrived with a full NCR squad. That means power. It also means consequences. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"si2\">Enter together with the NCR squad \u2014 strength in numbers</label>\n                <label for=\"si1\">Slip away from the squad and go in alone \u2014 you don't trust Diaz's mission</label>\n            </div>\n        </div>\n\n\n        <!-- ========================================================\n             SCENE 3A2 \u2014 GOING ALONE (from NCR intel)\n             ======================================================== -->\n        <div id=\"scene3a2\" class=\"scene\">\n            <pre>\n   .  .  .  .  .  .  .\n   . . alone . . . . .\n   .  .  .  .  .  .  .\n   [footprints in sand]\n            </pre>\n            <span class=\"scene-tag\">// MOJAVE WASTELAND \u2014 TRAVELING SOLO //</span>\n            <div class=\"story-text\">\n                <p>You memorize the grid coordinates Reeves let slip during his description and walk away from the checkpoint before anyone thinks to ask more questions. If the NCR gets to NEXUS first, whatever's inside is going to become a weapon. You've seen what NCR \"resource acquisition\" looks like \u2014 Camp Forlorn Hope, the mess at Nipton, the Searchlight team now institutionalized in Primm. Their intentions might be fine. Their outcomes rarely are.</p>\n\n                <p>Sector 7-Kilo is a full day's walk east into terrain the maps describe as \"uninhabited,\" which in Mojave terms means \"inhabited by things that will kill you without paperwork.\" You stay away from the roads. You eat while walking. At one point a pair of centaurs crosses your path and you both agree, silently, to pretend the other doesn't exist.</p>\n\n                <p>Late in the afternoon, the Joshua trees cluster strangely \u2014 growing into a formation that almost looks like a spread hand, five trunks fanning outward from a shared root mass. Fuller's map. <em>Look for the Joshua cluster shaped like a hand.</em> You look past it and see a basalt hillside, and in the hillside: a steel blast door, partly open, machinery humming faintly from within.</p>\n\n                <p>NEXUS Station. You found it.</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"sg\">Approach the blast door \u2014 time to see what's inside</label>\n            </div>\n        </div>\n\n\n        <!-- ========================================================\n             SCENE 3A3 \u2014 ROADSIDE TERMINAL COORDINATES\n             ======================================================== -->\n        <div id=\"scene3a3\" class=\"scene\">\n            <pre>\n  +---------------------------+\n  | NEXUS-7 / MERIDIAN        |\n  | GRID: 7K-334-NNE          |\n  | BEARING: 047 DEGREES      |\n  | LANDMARK: JOSHUA HAND     |\n  | AUTH: WEBB, N.  [DIRECTOR]|\n  +---------------------------+\n  [ coordinates noted ]\n            </pre>\n            <span class=\"scene-tag\">// I-15 MEDIAN \u2014 TERMINAL DATA LOGGED //</span>\n            <div class=\"story-text\">\n                <p>You copy the grid reference onto the back of Burke's note: <strong>7K-334-NNE. Bearing 047 from the overpass. Landmark: Joshua Hand formation.</strong> The terminal's on an emergency power loop \u2014 it'll keep broadcasting those coordinates until someone pulls the plug or the wind buries it. Given the Mojave's track record with buried things, that could be another hundred years.</p>\n\n                <p>Below the main readout, you notice a secondary line of text you almost missed \u2014 scrolling slower, almost subliminal: <em>\"HELIOS OPERATIONAL. MERIDIAN CALIBRATION: 94.7%. AWAITING FINAL HUMAN PARAMETER INPUT. BROADCAST RANGE: FULL MOJAVE ACHIEVABLE UPON COMPLETION.\"</em></p>\n\n                <p>94.7%. Six years of calibration on a signal designed to alter human behavior, and whatever's in NEXUS Station is almost done.</p>\n\n                <p>You set off northeast, compass in hand. The Mojave gets wilder and quieter the further from the highway you go. By afternoon, the Joshua trees are growing in strange clusters, and one of them \u2014 five trunks fanning from a shared base like the fingers of a massive buried hand \u2014 matches the landmark description perfectly. Beyond it, a basalt hillside. A heavy steel door, partially open. The hum of something ancient and awake.</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"sg\">Approach NEXUS Station \u2014 the door is open, and something inside is waiting</label>\n            </div>\n        </div>\n\n\n        <!-- ========================================================\n             SCENE 3B1 \u2014 FOLLOWING FULLER'S MAP\n             ======================================================== -->\n        <div id=\"scene3b1\" class=\"scene\">\n            <pre>\n  the map leads east, then east again,\n  then into the kind of quiet that\n  swallows sound like a drain.\n            </pre>\n            <span class=\"scene-tag\">// FOLLOWING FULLER'S MAP \u2014 SECTOR 7-KILO //</span>\n            <div class=\"story-text\">\n                <p>Fuller's map is hand-drawn on the back of a pre-war gas station receipt, but it's accurate \u2014 every landmark checks out. The dry wash, the collapsed water tower, the distinctive triple-rock formation the rangers apparently call \"The Three Drunk Men.\" The map leads you northeast into terrain that gets progressively quieter and more alien.</p>\n\n                <p>Around midday, you notice something: the usual wasteland soundtrack \u2014 gecko-clicks, distant radscorpion scrape, the wind \u2014 has faded to almost nothing. It's not the silence of absence. It's the silence of something large and very quiet holding very still. You feel it in your teeth, a low vibration just below hearing. The MERIDIAN frequency. You're close.</p>\n\n                <p>The last notation on Fuller's map: <em>\"Joshua cluster \u2014 five trunks \u2014 look like a hand. Blast door in the hill behind it. They left it open. God help me, they left it open.\"</em></p>\n\n                <p>You find the hand-cluster of Joshua trees. You find the basalt hillside. The blast door, heavy pre-war military steel, stands open by about two feet \u2014 not broken open, but unlocked and swung slightly ajar, as if someone inside left a window cracked on a hot day. Machinery hums within. Cold air spills out, which in the Mojave afternoon is almost dreamlike.</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"sg\">You've arrived at NEXUS Station \u2014 time to go in</label>\n            </div>\n        </div>\n\n\n        <!-- ========================================================\n             SCENE 3B2 \u2014 DR. VOSS / OR FIGHTING THROUGH LEGION\n             ======================================================== -->\n        <div id=\"scene3b2\" class=\"scene\">\n            <pre>\n  \"I was afraid someone was going to\n   come looking. I was more afraid\n   nobody would.\"  \u2014 DR. ELENA VOSS\n            </pre>\n            <span class=\"scene-tag\">// FREESIDE \u2014 OLD MORMON FORT \u2014 DR. VOSS //</span>\n            <div class=\"story-text\">\n                <p>You find <strong>Dr. Elena Voss</strong> in the Followers' medical wing, treating a squatter's infected arm with a focus that makes the man wince. She's maybe forty-five, sharp-faced, with ink stains on two fingers that never fully wash out. When you say \"NEXUS Station\" and show her the holotape, she sets down her suturing kit with the careful deliberateness of someone who's been expecting bad news for a long time.</p>\n\n                <p>\"Play it,\" she says.</p>\n\n                <p>Fuller's voice. Recorded three days before his death: <em>\"Elena. I found it. I confirmed HELIOS is active. The signal is changing \u2014 it's getting intentional. I think it's communicating, or trying to. Someone has to go in before the NCR or Legion finds it. You have the pre-war ethics override codes from the university archive. If HELIOS can be reasoned with, those are the key. Don't let it fall into military hands. Please.\"</em></p>\n\n                <p>Voss is quiet for a long moment. Then: \"Fuller was one of my students. Before he became a Ranger.\" She closes her eyes briefly. \"I've been tracking the MERIDIAN signal for eight months. I have the ethics codes he mentioned \u2014 pre-war contingency protocols for rogue AI. I was too frightened to go in alone.\" She picks up her medkit. \"I'm not too frightened anymore.\"</p>\n\n                <p class=\"dim\">// You have an ally with critical knowledge. Dr. Voss knows the AI ethics override protocols. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"sgv\">Travel to NEXUS together \u2014 Voss's knowledge may be the difference between success and catastrophe</label>\n            </div>\n        </div>\n\n\n        <!-- ========================================================\n             SCENE 3B3 \u2014 SUBMITTING TO TITUS\n             ======================================================== -->\n        <div id=\"scene3b3\" class=\"scene\">\n            <pre>\n   /\\  /\\  /\\  /\\  /\\\n  /  \\/  \\/  \\/  \\/  \\\n  === LEGION TERRITORY ===\n  [TITUS speaks] [you listen]\n  [soldier] [you] [soldier]\n  ========================\n  \"The weak serve the strong.\n   This is the will of Caesar.\"\n            </pre>\n            <span class=\"scene-tag\">// OPEN MOJAVE \u2014 UNDER LEGION QUESTIONING //</span>\n            <div class=\"story-text\">\n                <p>You make yourself small. Non-threatening. An insignificant traveler with no particular destination and no particular value. Titus studies you the way a hawk studies a harmless sparrow \u2014 with contempt rather than interest \u2014 and accepts it. He asks three questions in rapid succession: where you're from, what you're carrying, where you're going. Your answers are creative but plausible.</p>\n\n                <p>He lets you go. Then calls after you: \"The wasteland northeast of here belongs to Caesar now. If you value your continued usefulness to the world, avoid it.\"</p>\n\n                <p>Northeast. Where you're going. You keep walking, don't look back.</p>\n\n                <p>A mile further, you find Titus's camp \u2014 abandoned but recently, fire still warm \u2014 and among the debris, a written order on Legion paper. In Titus's own hand: <em>\"Secure facility designated 'NEXUS-7' at the Joshua Hand landmark. Priority extraction: weapons cache, AI systems, broadcast hardware. Verify whether signal can be focused on NCR positions. Report to Legate Lanius.\"</em></p>\n\n                <p>Caesar's Legion wants NEXUS. Titus knows where it is. Which means you need to get there first, before Titus realizes you weren't a harmless sparrow after all and doubles back with more men.</p>\n\n                <p class=\"dim\">// Time is no longer abstract. Titus is behind you and closing. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"sg\">Move fast \u2014 reach NEXUS Station before Titus returns with reinforcements</label>\n            </div>\n        </div>\n\n\n        <!-- ========================================================\n             SCENE 3C1 \u2014 KINGS MAP: SOLO APPROACH\n             ======================================================== -->\n        <div id=\"scene3c1\" class=\"scene\">\n            <pre>\n   through the Mojave alone,\n   map in hand, dust in everything.\n   The Kings call it sector 7-Kilo.\n   The map calls it: HERE.\n            </pre>\n            <span class=\"scene-tag\">// SECTOR 7-KILO \u2014 FOLLOWING THE KINGS' MAP //</span>\n            <div class=\"story-text\">\n                <p>Shades's map is better than it looks \u2014 annotated with patrol timing for both NCR and Legion units, marked water sources, a note that reads <em>\"avoid the dry wash after rain (hah)\"</em> and a small skull icon near a stretch of road labeled only \"BAD DOGS.\" You navigate all of it successfully.</p>\n\n                <p>The deep Mojave in this sector is remarkable for its stillness. The further east you walk, the more the ambient noise drops. It's not threatening exactly, but it is wrong \u2014 the Mojave should never be this quiet. The MERIDIAN frequency, you realize. Whatever HELIOS is broadcasting, even at its current incomplete calibration, it's enough to settle the local wildlife into unusual docility. You spot three radscorpions, all stationary in the shade of a rock face, not hunting, just existing.</p>\n\n                <p>The Joshua Hand formation is unmistakable when you see it \u2014 five ancient trees growing from a shared root mass, trunks splaying outward like enormous fingers. It's beautiful in a strange, patient way. Behind it, worked into the hillside so well you'd walk right past it without the map, is the blast door: heavy steel, military spec, open by about two feet.</p>\n\n                <p>Cold air. The hum of something that has been running for two hundred years and has not stopped once.</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"sg\">Approach the door \u2014 NEXUS Station is right in front of you</label>\n            </div>\n        </div>\n\n\n        <!-- ========================================================\n             SCENE 3C2 \u2014 DR. VOSS: FULL REVEAL\n             ======================================================== -->\n        <div id=\"scene3c2\" class=\"scene\">\n            <pre>\n  [ DR. ELENA VOSS \u2014 FOLLOWERS OF THE APOCALYPSE ]\n            </pre>\n            <span class=\"scene-tag\">// OLD MORMON FORT \u2014 FOLLOWERS MEDICAL WING //</span>\n            <div class=\"story-text\">\n                <p><strong>Dr. Elena Voss</strong> is the one who sent the signal that Kara's Kings have been intercepting for months \u2014 not HELIOS's frequency, but a counter-signal she's been broadcasting as a <em>warning.</em> \"I couldn't get close enough to shut it down alone,\" she says, laying it out on the table with professional directness. \"The first team I brought died inside the perimeter \u2014 not killed, but incapacitated. The MERIDIAN frequency at close range doesn't just pacify. It causes complete loss of autonomous will. They just stopped. Sat down. Waited.\"</p>\n\n                <p>She survived because she'd pre-tested ear protection keyed to the known frequency. The problem: HELIOS has been shifting the frequency in the months since. She can't guarantee her original protection still works.</p>\n\n                <p>What she does have: the <strong>pre-war AI ethics override codes</strong>, recovered from a university archive two years ago. \"HELIOS was built with a self-limitation protocol \u2014 a set of philosophical constraints designed to prevent the AI from acting against human autonomy. If those constraints are reactivated via override codes, HELIOS cannot complete the MERIDIAN broadcast. It would be like... putting the gun back on safety.\"</p>\n\n                <p>\"I've been trying to work out how to use them for eight months,\" she says quietly. \"I think I need to be inside to do it. I also think I've been waiting for someone else to go first because I'm afraid.\" She looks at you levelly. \"Are you afraid?\"</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"sgv\">Go with Voss to NEXUS Station \u2014 her codes and knowledge are invaluable</label>\n                <label for=\"sg\">Take the codes and go alone \u2014 you'll need to move faster without her</label>\n            </div>\n        </div>\n\n\n        <!-- ========================================================\n             SCENE SG \u2014 ARRIVAL AT NEXUS STATION (ALONE/STANDARD)\n             ======================================================== -->\n        <div id=\"scenesg\" class=\"scene\">\n            <pre>\n   ====  BLAST DOOR AJAR  ====\n   [cold air] [machinery hum] [open 2 feet]\n            </pre>\n            <span class=\"scene-tag\">// NEXUS STATION \u2014 EXTERIOR \u2014 SECTOR 7-KILO //</span>\n            <div class=\"story-text\">\n                <p>The blast door is pre-war military grade \u2014 two feet of reinforced steel set into the basalt hillside with the kind of engineering that was meant to outlast civilization. It has. The door is slightly open, angled outward by maybe two feet, and from the gap comes a wash of cold, recycled air that smells of ozone and something else \u2014 a very faint sweetness, almost medicinal.</p>\n\n                <p>The hum is everywhere. Not mechanical exactly \u2014 more like a held musical note at the bottom of your hearing range. You feel it in your fillings. The MERIDIAN frequency. You're standing at ground zero.</p>\n\n                <p>The hillside around the door is clean. No bodies. No debris. No signage warning you off. Just a pre-war facility that's been running on its own for two hundred years, waiting for someone to come back. The door was left open deliberately \u2014 someone on the inside wanted visitors to be able to get in.</p>\n\n                <p>Through the gap you can make out the beginning of a corridor: bare concrete walls, strip lighting still working, a painted warning stripe on the floor. Standard pre-war government color-coding. The stripe is <strong>yellow</strong>, which means non-restricted. Interesting choice, for a facility this classified.</p>\n\n                <p class=\"dim\">// Three ways in. Choose one. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"si1\">Move quietly through the gap \u2014 stealth first, look before you touch anything</label>\n                <label for=\"si2\">Walk straight in \u2014 you're not hiding, and you want whatever's inside to know you're here</label>\n                <label for=\"si3\">Circle the hillside \u2014 look for another entrance before committing to the front door</label>\n            </div>\n        </div>\n\n\n        <!-- ========================================================\n             SCENE SGN \u2014 ARRIVAL WITH NCR\n             ======================================================== -->\n        <div id=\"scenesgn\" class=\"scene\">\n            <pre>\n   == SERGEANT DIAZ == [5 soldiers] == NEXUS STATION ==\n            </pre>\n            <span class=\"scene-tag\">// NEXUS STATION \u2014 NCR FIELD TEAM ARRIVAL //</span>\n            <div class=\"story-text\">\n                <p>Sergeant Diaz calls a halt thirty yards from the blast door and deploys the squad in a semicircle. She's good \u2014 recognizes the facility type immediately, calls out the yellow-stripe corridor, flags the lack of external defenses as suspicious. \"Too clean,\" she mutters. \"Automated defenses, maybe. Nothing mechanical's been shot at yet.\" She turns to you. \"You know this place better than we do. What are we expecting inside?\"</p>\n\n                <p>You tell her what you know: an AI called HELIOS, a behavioral modification signal, a director who might still be in there. Diaz absorbs it all without visible reaction, then issues orders with the efficiency of someone who's delegated emotions to a later time: two soldiers on the door, two flanking the hillside, one with you as you go in.</p>\n\n                <p>The soldier assigned to you is <strong class=\"ncr\">Private Wen</strong> \u2014 young, meticulous, doesn't talk much. Good choice for a stealth operation. Bad choice for anything requiring improvisation.</p>\n\n                <p>Diaz's final instruction, just before you enter: \"NCR Command wants the technology intact. I want my people intact. If you find a way to make both of those things happen, do it. If you can only pick one \u2014\" She looks at her squad. \"Pick mine.\"</p>\n\n                <p class=\"dim\">// You're going in. With firepower behind you. With a mission agenda that may not be yours. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"si2\">Enter with Wen through the main door \u2014 clear and professional</label>\n                <label for=\"si1\">Send Wen back \u2014 slip in alone, quietly, before Diaz's plan becomes your problem</label>\n            </div>\n        </div>\n\n\n        <!-- ========================================================\n             SCENE SGV \u2014 ARRIVAL WITH DR. VOSS\n             ======================================================== -->\n        <div id=\"scenesgv\" class=\"scene\">\n            <pre>\n  [ Voss: \"I have the codes.\" ]\n  [ You: \"I have the nerve.\" ]\n  [ Mojave: \"Prove it.\" ]\n            </pre>\n            <span class=\"scene-tag\">// NEXUS STATION \u2014 ARRIVING WITH DR. VOSS //</span>\n            <div class=\"story-text\">\n                <p>You and Voss stand before the blast door as the afternoon sun turns the basalt hillside copper-red. She's been quiet for the last hour of the walk \u2014 not nervously quiet, but the focused quiet of someone running through a plan they've rehearsed a hundred times in their head and are now meeting in reality for the first time.</p>\n\n                <p>She produced the frequency-dampening ear inserts forty minutes from the door \u2014 small wax plugs with a wire mesh core. \"Not perfect,\" she said. \"But they block the resonant range enough to preserve autonomous will at close range. Probably. My test data is eight months old and HELIOS has been modifying the signal since then.\" She said <em>probably</em> like a scientist rather than like someone frightened. You appreciated it.</p>\n\n                <p>Now she studies the open door, the yellow stripe, the cold air. \"The fact that it's open means HELIOS wants visitors,\" she says. \"That's new. When I was here before, the door was sealed. Something changed recently.\" A pause. \"My hypothesis: it reached the threshold of calibration where it needs one final variable. A living human. And it's been... waiting.\"</p>\n\n                <p>She meets your eyes. \"The codes will work if we can get to a primary terminal. I need four minutes at the interface, uninterrupted. Can you give me that?\"</p>\n\n                <p class=\"dim\">// You're going in together. Voss has the key. You have to buy her time. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"si1\">Go in quietly \u2014 stealth gives Voss the best chance to reach a terminal undetected</label>\n                <label for=\"si3\">Circle around \u2014 look for an access point closer to the lab terminals</label>\n            </div>\n        </div>\n\n\n        <!-- ========================================================\n             SCENE SI1 \u2014 STEALTH ENTRY\n             ======================================================== -->\n        <div id=\"scenesi1\" class=\"scene\">\n            <pre>\n   ..shadow..movement..silence..\n   [securitron \u2014 looking left]\n   [you \u2014 moving right]\n            </pre>\n            <span class=\"scene-tag\">// NEXUS STATION \u2014 ENTRY CORRIDOR \u2014 STEALTH APPROACH //</span>\n            <div class=\"story-text\">\n                <p>You move through the gap sideways, minimizing your profile. The corridor beyond is longer than you expected \u2014 forty, fifty feet of bare concrete before it opens into a junction. Strip lighting runs the full length, about half of it still functional, casting everything in alternating amber and shadow. The yellow paint stripe continues down the center of the floor.</p>\n\n                <p>At the junction, an <strong>MK I Securitron</strong> stands sentinel \u2014 a wheeled robot, waist-high, camera-eye currently pointed toward the left branch of the junction. It's not stationary. It's rotating on a slow, patient cycle. Every twelve seconds, approximately, it'll have a clear view of your position.</p>\n\n                <p>You time it. On the ninth second, you move. You hug the right wall, below the camera's sweep angle, and make the junction before the rotation completes. The Securitron continues its cycle without pausing. Either it didn't see you, or it did and decided you were acceptable. You're not sure which possibility is more unsettling.</p>\n\n                <p>The junction splits three ways. Left corridor: warmer, smells of old paper and dust \u2014 offices. Straight ahead: the hum is strongest here, vibrating the floor slightly \u2014 the main research area. Right corridor: you catch a faint metallic tang on the air, like gun oil and cold metal \u2014 storage or armory.</p>\n\n                <p class=\"dim\">// Three branches. Three different pieces of this place. What do you need most? //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"slab\">Straight ahead \u2014 follow the hum into the main research laboratory</label>\n                <label for=\"soff\">Left corridor \u2014 investigate the offices, look for records and personnel files</label>\n                <label for=\"sarm\">Right corridor \u2014 find that armory, assess the resources inside</label>\n            </div>\n        </div>\n\n\n        <!-- ========================================================\n             SCENE SI2 \u2014 DIRECT ENTRY\n             ======================================================== -->\n        <div id=\"scenesi2\" class=\"scene\">\n            <pre>\n   [corridor lights] [footsteps echo]\n   [securitron rotates toward you]\n   \"IDENTIFY YOURSELF.\"\n            </pre>\n            <span class=\"scene-tag\">// NEXUS STATION \u2014 MAIN CORRIDOR \u2014 DIRECT APPROACH //</span>\n            <div class=\"story-text\">\n                <p>You push the blast door wider and walk in like you have every right to be here. Your boots echo on the concrete. The strip lighting catches you immediately. The yellow stripe on the floor seems almost welcoming.</p>\n\n                <p>You make it exactly twelve feet before the <strong>MK I Securitron</strong> at the junction rotates to face you and speaks. Its voice is the standard Robco flat-affect \u2014 designed to sound official without sounding hostile \u2014 but the words are not standard protocol. \"IDENTIFY YOURSELF,\" it says. Then: \"Authorized personnel identification required. Please state your name and department affiliation.\"</p>\n\n                <p>It's waiting. It's not aiming a weapon at you. It's just waiting, camera-eye steady, with the patient expectation of a thing that has been waiting for two hundred years and learned long ago that hurry is a human limitation.</p>\n\n                <p>Behind it, the junction branches three ways. You can see the corridor ahead, hear the deep hum from somewhere further in. The Securitron is between you and everything else.</p>\n\n                <p class=\"dim\">// You have thirty seconds before it escalates to a security alert. Probably. //</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"si5\">Bluff \u2014 claim to be authorized pre-war personnel returning to duty</label>\n                <label for=\"si4\">Draw your weapon \u2014 disable the Securitron before it can call for reinforcements</label>\n            </div>\n        </div>\n\n\n        <!-- ========================================================\n             SCENE SI3 \u2014 BACK ENTRANCE\n             ======================================================== -->\n        <div id=\"scenesi3\" class=\"scene\">\n            <pre>\n   [ ventilation shaft \u2014 old, intact ]\n   [ 40-foot crawl \u2014 ends in ceiling panel ]\n            </pre>\n            <span class=\"scene-tag\">// NEXUS STATION \u2014 VENTILATION ACCESS //</span>\n            <div class=\"story-text\">\n                <p>You circle the hillside and find it \u2014 a ventilation shaft outlet on the eastern face, covered by a grille that's corroded but not sealed. Pre-war facilities always had these: secondary air systems for emergency egress, back when egress was something the designers expected people to need. The grille comes off with about forty seconds of patient work.</p>\n\n                <p>The crawlspace is cold, dark, and exactly shoulder-width. You move on elbows for what feels like forever but is probably four minutes. The hum through the metal is extraordinary up close \u2014 you feel it in your arms, your jaw, your thoughts, which is what makes you work faster rather than slower. Whatever HELIOS is broadcasting, you do not want prolonged exposure at this range.</p>\n\n                <p>The shaft terminates in a ceiling panel that opens on a quarter-turn. You ease it out, look down. You're above a large room with low amber lighting and rows of shelving. The metal tang is intense here. Below you: <strong>metal shelving units stocked with pre-war military equipment</strong>. Rifles still in cosmoline. Pre-war explosives in sealed crates. Energy weapons on charging cradles, some still showing indicator lights. An armory, untouched, perfectly preserved by two centuries of climate control.</p>\n\n                <p>You drop down without a sound. The armory door \u2014 solid metal \u2014 stands closed. Through it, the sound of the facility's machinery.</p>\n            </div>\n            <div class=\"choices\">\n                <label for=\"sarm\">Examine the armory \u2014 assess what's here and what you might need</label>\n                <label for=\"slab\">Leave the armory \u2014 head through the door toward the main research area</label>\n            </div>\n        </div>\n\n\n        <!-- ========================================================\n             SCENE SI4 \u2014 FIGHTING THE SECURITRON\n             ======================================================== -->\n        <div id=\"scenesi4\" class=\"scene\">\n            <pre>\n   [ MARK-I SECURITRON ]\n   WARNING: SECURITY ALERT ACTIVE\n   [ SPARKS ] [ SMOKE ] [ VICTORY? ]\n            </pre>\n            <span class=\"scene-tag\">// NEXUS STATION \u2014 MAIN CORRIDOR \u2014 COMBAT //</span>\n            <div class=\"story-text\">\n                <p>You go for the Securitron's optics first \u2014 a trick you learned from someone who'd done it before and survived. One shot, center lens. The robot staggers backward, camera cracked, and goes into an emergency sub-routine: it sprays a burst of zap at shoulder height, which you duck, then rights itself and lurches toward you with its manipulator arms deployed.</p>\n\n                <p>The fight is loud. Brief. Ugly. The
